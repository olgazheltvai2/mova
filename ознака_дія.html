<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сортування: Ознака чи Дія</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0f19;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #1a0b2e 0%, #0b0f19 100%);
        }

        #game-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .neon-board {
            position: absolute;
            background: linear-gradient(135deg, #16162e, #0d0d1a);
            border: 3px solid #1f4068;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(0, 0, 0, 0.8);
            color: #0ff;
            text-transform: uppercase;
            font-weight: 900;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s ease-out;
            text-shadow: 0 0 8px currentColor;
        }

        .interactive-board:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), inset 0 0 10px rgba(0, 0, 0, 0.8);
            filter: brightness(1.2);
        }

        #word-display {
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 100px;
            font-size: 48px;
            border-color: #f39c12;
            color: #f1c40f;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.3);
            pointer-events: none;
            background: repeating-linear-gradient(45deg, #111, #111 10px, #1a1a1a 10px, #1a1a1a 20px);
        }

        #left-btn {
            top: 25%;
            left: 5%;
            width: 240px;
            height: 100px;
            font-size: 34px;
            border-color: #00d2ff;
            color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        #right-btn {
            top: 25%;
            right: 5%;
            width: 240px;
            height: 100px;
            font-size: 34px;
            border-color: #ff007f;
            color: #ff007f;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
        }

        .nav-btn {
            position: absolute;
            bottom: 40px;
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #444;
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            z-index: 20;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            transform: scale(1.1);
        }

        #back-btn { left: 40px; }
        #next-btn { right: 40px; }

        /* --- АНІМАЦІЇ МАШИНИ (Піднято вище та зменшено масштаб для кращої видимості) --- */
        
        .car-front-start {
            transform: translate(500px, 250px) scale(0);
            opacity: 0;
        }

        .car-front-drive-in {
            animation: driveIn 2s cubic-bezier(0.3, 0.1, 0.3, 1) forwards;
        }

        .car-front-idle {
            transform: translate(500px, 440px) scale(1.6);
            animation: idleVibrate 0.1s infinite alternate;
            opacity: 1;
        }

        .car-front-wrong {
            animation: wrongShake 0.6s ease-in-out;
            transform: translate(500px, 440px) scale(1.6);
            opacity: 1;
        }

        .car-side-hidden {
            display: none;
        }

        .car-side-drive-left {
            display: block;
            animation: driveLeft 1.5s cubic-bezier(0.5, 0, 0.1, 1) forwards;
        }

        .car-side-drive-right {
            display: block;
            animation: driveRight 1.5s cubic-bezier(0.5, 0, 0.1, 1) forwards;
        }

        @keyframes driveIn {
            0% { transform: translate(500px, 250px) scale(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(500px, 440px) scale(1.6); opacity: 1; }
        }

        @keyframes idleVibrate {
            from { transform: translate(500px, 440px) scale(1.6) translateY(0px); }
            to { transform: translate(500px, 440px) scale(1.6) translateY(-2px); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translate(500px, 440px) scale(1.6); }
            20% { transform: translate(480px, 440px) scale(1.6) rotate(-5deg); }
            40% { transform: translate(520px, 440px) scale(1.6) rotate(5deg); }
            60% { transform: translate(480px, 440px) scale(1.6) rotate(-5deg); }
            80% { transform: translate(520px, 440px) scale(1.6) rotate(5deg); }
        }

        @keyframes driveLeft {
            0% { transform: translate(500px, 440px) scale(1.6); }
            100% { transform: translate(-300px, 440px) scale(1.6); }
        }

        @keyframes driveRight {
            0% { transform: translate(500px, 440px) scale(1.6) scaleX(-1); }
            100% { transform: translate(1300px, 440px) scale(1.6) scaleX(-1); }
        }

        .flash-correct { animation: flashBlue 0.8s; }
        .flash-wrong { animation: flashRed 0.8s; }

        @keyframes flashBlue {
            0% { filter: hue-rotate(0deg) brightness(1); }
            30% { filter: hue-rotate(180deg) brightness(1.5); }
            100% { filter: hue-rotate(0deg) brightness(1); }
        }

        @keyframes flashRed {
            0% { filter: hue-rotate(0deg) brightness(1); }
            30% { filter: hue-rotate(-90deg) brightness(0.7) sepia(1) saturate(500%) hue-rotate(-50deg); }
            100% { filter: hue-rotate(0deg) brightness(1); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <svg id="game-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
        <defs>
            <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#0f0c29" />
                <stop offset="50%" stop-color="#302b63" />
                <stop offset="100%" stop-color="#24243e" />
            </linearGradient>
            
            <linearGradient id="grassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#0a1a1f" />
                <stop offset="100%" stop-color="#050d10" />
            </linearGradient>

            <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#111" />
                <stop offset="100%" stop-color="#222" />
            </linearGradient>

            <linearGradient id="carBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f2fe" />
                <stop offset="100%" stop-color="#4facfe" />
            </linearGradient>

            <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#2c3e50" />
                <stop offset="100%" stop-color="#000000" />
            </linearGradient>
            
            <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f4068" stroke-width="1" opacity="0.3"/>
            </pattern>
        </defs>

        <rect x="0" y="0" width="1000" height="250" fill="url(#skyGrad)" />
        
        <g fill="#1a1a2e" opacity="0.8">
            <rect x="50" y="150" width="40" height="100" />
            <rect x="110" y="100" width="60" height="150" />
            <rect x="200" y="180" width="30" height="70" />
            <rect x="250" y="80" width="80" height="170" />
            <rect x="350" y="130" width="50" height="120" />
            <rect x="600" y="110" width="70" height="140" />
            <rect x="700" y="160" width="40" height="90" />
            <rect x="780" y="90" width="90" height="160" />
            <rect x="900" y="140" width="50" height="110" />
        </g>
        
        <g fill="#00d2ff" opacity="0.6">
            <rect x="120" y="120" width="5" height="5" />
            <rect x="140" y="120" width="5" height="5" />
            <rect x="120" y="140" width="5" height="5" />
            <rect x="270" y="100" width="5" height="15" />
            <rect x="300" y="130" width="10" height="5" fill="#ff007f"/>
            <rect x="620" y="130" width="5" height="5" />
            <rect x="640" y="150" width="5" height="5" />
            <rect x="800" y="110" width="5" height="20" fill="#ff007f"/>
            <rect x="830" y="140" width="20" height="5" />
        </g>

        <rect x="0" y="250" width="1000" height="350" fill="url(#grassGrad)" />
        <rect x="0" y="250" width="1000" height="350" fill="url(#gridPattern)" />

        <path d="M 480,250 L 520,250 L 580,420 L 420,420 Z" fill="url(#roadGrad)" />
        <rect x="0" y="420" width="1000" height="180" fill="url(#roadGrad)" />
        
        <path d="M 500,250 L 500,420" stroke="#f1c40f" stroke-width="3" stroke-dasharray="15 15" opacity="0.8" filter="drop-shadow(0 0 5px #f1c40f)" />
        <line x1="0" y1="490" x2="1000" y2="490" stroke="#f1c40f" stroke-width="4" stroke-dasharray="30 20" opacity="0.8" filter="drop-shadow(0 0 5px #f1c40f)" />
        
        <path d="M 480,250 L 420,420" stroke="#00d2ff" stroke-width="3" filter="drop-shadow(0 0 8px #00d2ff)" />
        <path d="M 520,250 L 580,420" stroke="#ff007f" stroke-width="3" filter="drop-shadow(0 0 8px #ff007f)" />
        <line x1="0" y1="420" x2="420" y2="420" stroke="#00d2ff" stroke-width="4" filter="drop-shadow(0 0 8px #00d2ff)" />
        <line x1="580" y1="420" x2="1000" y2="420" stroke="#ff007f" stroke-width="4" filter="drop-shadow(0 0 8px #ff007f)" />
        <line x1="0" y1="570" x2="1000" y2="570" stroke="#fff" stroke-width="5" opacity="0.2" />

        <g id="car-front" class="car-front-start">
            <ellipse cx="0" cy="30" rx="60" ry="10" fill="#000" opacity="0.8" filter="drop-shadow(0 5px 10px #000)"/>
            
            <path d="M -50,-25 L 50,-25 L 45,-10 L -45,-10 Z" fill="#111" stroke="#333" stroke-width="1"/>
            <rect x="-25" y="-10" width="50" height="15" fill="url(#carBodyGrad)"/>
            
            <path d="M -25,-15 L 25,-15 L 35,25 L -35,25 Z" fill="url(#carBodyGrad)" />
            
            <path d="M -15, -5 C -15,-15 15,-15 15,-5 L 20,10 L -20,10 Z" fill="url(#glassGrad)" stroke="#111" stroke-width="2"/>
            <polygon points="-15,-2 0,-2 -5,8 -18,8" fill="#fff" opacity="0.1" />

            <rect x="-40" y="-2" width="10" height="5" rx="2" fill="#000" />
            <rect x="30" y="-2" width="10" height="5" rx="2" fill="#000" />

            <rect x="-60" y="-10" width="20" height="30" rx="4" fill="#050505" />
            <rect x="40" y="-10" width="20" height="30" rx="4" fill="#050505" />
            <rect x="-65" y="15" width="22" height="35" rx="5" fill="#000" />
            <rect x="43" y="15" width="22" height="35" rx="5" fill="#000" />
            <ellipse cx="-54" cy="32" rx="5" ry="10" fill="#333" />
            <ellipse cx="54" cy="32" rx="5" ry="10" fill="#333" />

            <path d="M -60,30 L 60,30 L 65,45 L -65,45 Z" fill="#111" />
            <polygon points="-15,25 15,25 0,40" fill="#fff" opacity="0.8" />
            
            <ellipse cx="-45" cy="38" rx="8" ry="3" fill="#fff" filter="drop-shadow(0 0 15px #00d2ff)" />
            <ellipse cx="45" cy="38" rx="8" ry="3" fill="#fff" filter="drop-shadow(0 0 15px #00d2ff)" />
        </g>

        <g id="car-side" class="car-side-hidden">
            <ellipse cx="0" cy="32" rx="75" ry="8" fill="#000" opacity="0.8" filter="drop-shadow(0 5px 10px #000)" />
            
            <path d="M 45,-15 L 65,-25 L 75,-25 L 65,-10 Z" fill="#111" />
            <rect x="60" y="-25" width="15" height="5" fill="#00d2ff" />
            
            <path d="M 65,10 C 65,-10 40,-15 15,-15 C -10,-15 -30,-5 -70,15 L -75,25 L -70,30 L 70,30 L 75,20 Z" fill="url(#carBodyGrad)" />
            
            <path d="M 30,-5 C 30,-12 10,-12 -15,0 L -5,10 L 35,10 Z" fill="url(#glassGrad)" />
            <polygon points="10,-2 25,-2 28,6 12,6" fill="#fff" opacity="0.1" />
            
            <path d="M 60,15 L -50,20 L -60,25 L 65,25 Z" fill="#fff" opacity="0.2" />
            
            <g transform="translate(-40, 25)">
                <circle cx="0" cy="0" r="16" fill="#000" />
                <circle cx="0" cy="0" r="10" fill="#222" stroke="#444" stroke-width="2"/>
                <circle cx="0" cy="0" r="4" fill="#00d2ff" />
            </g>
            <g transform="translate(45, 25)">
                <circle cx="0" cy="0" r="18" fill="#000" />
                <circle cx="0" cy="0" r="12" fill="#222" stroke="#444" stroke-width="2"/>
                <circle cx="0" cy="0" r="5" fill="#00d2ff" />
            </g>
            
            <polygon points="-72,20 -65,17 -65,23" fill="#fff" filter="drop-shadow(-10px 0 15px #00d2ff)" />
            <rect x="70" y="15" width="5" height="8" rx="2" fill="#ff0000" filter="drop-shadow(5px 0 10px #ff0000)" />
        </g>
    </svg>

    <div id="ui-layer">
        <div id="word-display" class="neon-board">СЛОВО</div>
        
        <div id="left-btn" class="neon-board interactive-board" onclick="handleChoice('ознака')">
            ⬅ ОЗНАКА
        </div>
        
        <div id="right-btn" class="neon-board interactive-board" onclick="handleChoice('дія')">
            ДІЯ ➡
        </div>
        
        <div id="back-btn" class="nav-btn" onclick="changeWord(-1)">&#10094;</div>
        <div id="next-btn" class="nav-btn" onclick="changeWord(1)">&#10095;</div>
    </div>
</div>

<script>
    const wordsData = [
        { word: 'швидкий', type: 'ознака' }, { word: 'яскравий', type: 'ознака' }, { word: 'великий', type: 'ознака' },
        { word: 'червоний', type: 'ознака' }, { word: 'сміливий', type: 'ознака' }, { word: 'гучний', type: 'ознака' },
        { word: 'новий', type: 'ознака' }, { word: 'блискучий', type: 'ознака' }, { word: 'потужний', type: 'ознака' },
        { word: 'крутий', type: 'ознака' }, { word: 'залізний', type: 'ознака' }, { word: 'гарячий', type: 'ознака' },
        { word: 'веселий', type: 'ознака' }, { word: 'довгий', type: 'ознака' }, { word: 'важкий', type: 'ознака' },
        { word: 'бігати', type: 'дія' }, { word: 'стрибати', type: 'дія' }, { word: 'їхати', type: 'дія' },
        { word: 'гальмувати', type: 'дія' }, { word: 'летіти', type: 'дія' }, { word: 'світити', type: 'дія' },
        { word: 'гудіти', type: 'дія' }, { word: 'перемагати', type: 'дія' }, { word: 'сміятися', type: 'дія' },
        { word: 'радіти', type: 'дія' }, { word: 'крутити', type: 'дія' }, { word: 'ремонтувати', type: 'дія' },
        { word: 'стартувати', type: 'дія' }, { word: 'співати', type: 'дія' }, { word: 'дивитися', type: 'дія' }
    ];

    let gameWords = [...wordsData].sort(() => Math.random() - 0.5);
    let currentIndex = 0;
    let gameState = 'loading'; 

    const wordDisplay = document.getElementById('word-display');
    const carFront = document.getElementById('car-front');
    const carSide = document.getElementById('car-side');
    const gameContainer = document.getElementById('game-container');

    let audioCtx = null;

    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    function playSound(type) {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        const now = ctx.currentTime;

        if (type === 'engine_rev') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(50, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.5);
            osc.frequency.exponentialRampToValueAtTime(80, now + 1.5);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.3, now + 0.2);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
            osc.start(now);
            osc.stop(now + 1.5);
        } else if (type === 'zoom') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(400, now + 0.5);
            osc.frequency.exponentialRampToValueAtTime(100, now + 1.5);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.4, now + 0.2);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
            osc.start(now);
            osc.stop(now + 1.5);
        } else if (type === 'error') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, now);
            osc.frequency.exponentialRampToValueAtTime(60, now + 0.4);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'success') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.setValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
    }

    function initWordSequence() {
        if (currentIndex >= gameWords.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = gameWords.length - 1;
        
        wordDisplay.textContent = gameWords[currentIndex].word;
        gameState = 'animating_in';
        gameContainer.classList.remove('flash-correct', 'flash-wrong');

        carSide.className.baseVal = "car-side-hidden";
        carFront.className.baseVal = "car-front-start";

        setTimeout(() => {
            carFront.className.baseVal = "car-front-drive-in";
            playSound('engine_rev');
        }, 50);

        setTimeout(() => {
            if (gameState === 'animating_in') {
                carFront.className.baseVal = "car-front-idle";
                gameState = 'waiting';
            }
        }, 2050);
    }

    function handleChoice(selectedType) {
        if (gameState !== 'waiting') return;
        getAudioCtx();
        gameState = 'animating_out';

        const currentWordType = gameWords[currentIndex].type;

        if (selectedType === currentWordType) {
            playSound('success');
            setTimeout(() => playSound('zoom'), 200);
            gameContainer.classList.add('flash-correct');

            carFront.className.baseVal = "car-front-start";
            
            if (selectedType === 'ознака') {
                carSide.className.baseVal = "car-side-drive-left";
            } else {
                carSide.className.baseVal = "car-side-drive-right";
            }

            setTimeout(() => {
                currentIndex++;
                initWordSequence();
            }, 1800);

        } else {
            playSound('error');
            gameContainer.classList.add('flash-wrong');
            
            carFront.className.baseVal = "car-front-wrong";

            setTimeout(() => {
                carFront.className.baseVal = "car-front-idle";
                gameContainer.classList.remove('flash-wrong');
                gameState = 'waiting';
            }, 600);
        }
    }

    function changeWord(direction) {
        if (gameState === 'animating_out') return;
        currentIndex += direction;
        initWordSequence();
    }

    window.onload = () => {
        document.body.addEventListener('click', getAudioCtx, { once: true });
        initWordSequence();
    };
</script>
</body>
</html>
