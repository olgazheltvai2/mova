<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Підводна Пригода</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #001f3f;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0077be 0%, #002244 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #background-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .seaweed {
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite alternate;
        }
        .seaweed-fast {
            transform-origin: bottom center;
            animation: sway 3s ease-in-out infinite alternate-reverse;
        }

        @keyframes sway {
            0% { transform: skewX(-5deg); }
            100% { transform: skewX(5deg); }
        }

        .bg-fish {
            position: absolute;
            z-index: 2;
            animation: swim linear infinite;
        }
        .fish1 { top: 20%; left: -10%; animation-duration: 15s; }
        .fish2 { top: 60%; left: -10%; animation-duration: 20s; animation-delay: 5s; transform: scale(0.7); }
        .fish3 { top: 40%; left: -10%; animation-duration: 12s; animation-delay: 2s; transform: scale(0.5); }

        @keyframes swim {
            0% { left: -10%; transform: translateY(0px) scaleX(1); }
            50% { transform: translateY(-20px) scaleX(1); }
            100% { left: 110%; transform: translateY(0px) scaleX(1); }
        }

        .bubble {
            position: absolute;
            bottom: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            animation: rise linear infinite;
            z-index: 3;
        }

        @keyframes rise {
            0% { bottom: -10px; transform: translateX(0); opacity: 0; }
            10% { opacity: 1; }
            100% { bottom: 100%; transform: translateX(-20px); opacity: 0; }
        }

        #text-board {
            position: relative;
            z-index: 10;
            background: rgba(10, 40, 80, 0.85);
            border: 4px solid #00aaff;
            border-radius: 30px;
            padding: 40px;
            max-width: 800px;
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.5), inset 0 0 20px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            transition: all 0.5s ease;
        }

        #story-text {
            color: #e0f7fa;
            font-size: 28px;
            line-height: 1.6;
            text-align: center;
            text-shadow: 1px 1px 2px #000;
        }

        /* Новий клас для утримання слова разом */
        .word {
            display: inline-block;
        }

        .letter {
            cursor: pointer;
            display: inline-block;
            transition: transform 0.1s, color 0.3s;
        }

        .letter:hover {
            transform: scale(1.1) translateY(-2px);
            color: #ffffff;
        }

        #character-container {
            position: absolute;
            bottom: 20px;
            right: 50px;
            width: 150px;
            height: 120px;
            z-index: 15;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .breathe {
            animation: crabBreathe 2s infinite alternate ease-in-out;
        }
        @keyframes crabBreathe {
            0% { transform: scaleY(1); }
            100% { transform: scaleY(0.95); }
        }

        .cheer {
            animation: crabCheer 0.5s ease;
        }
        @keyframes crabCheer {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-30px) rotate(-10deg); }
            50% { transform: translateY(-40px) rotate(10deg); }
            75% { transform: translateY(-15px) rotate(-5deg); }
        }

        .shake {
            animation: crabShake 0.4s ease;
        }
        @keyframes crabShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }

        .claw-left { transform-origin: 80% 80%; animation: snapLeft 3s infinite alternate; }
        .claw-right { transform-origin: 20% 80%; animation: snapRight 3s infinite alternate-reverse; }
        @keyframes snapLeft { 0% { transform: rotate(0deg); } 100% { transform: rotate(-20deg); } }
        @keyframes snapRight { 0% { transform: rotate(0deg); } 100% { transform: rotate(20deg); } }

        #shark-container {
            position: absolute;
            top: 20%;
            left: -800px; 
            width: 600px;
            height: 300px;
            z-index: 50;
            pointer-events: none;
        }

        .shark-attack {
            animation: attackDash 3s forwards cubic-bezier(0.5, 0, 0.2, 1);
        }
        @keyframes attackDash {
            0% { left: -800px; transform: scale(1); }
            40% { left: 30%; transform: scale(1.1); }
            50% { left: 35%; transform: scale(1.15) rotate(-5deg); }
            100% { left: 120%; transform: scale(1); }
        }

        .scatter {
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) !important;
            transform: translate(calc(var(--rx) * 1000px), calc(var(--ry) * 1000px)) rotate(calc(var(--rr) * 360deg)) scale(0) !important;
            opacity: 0 !important;
        }

        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ffd700;
            box-shadow: 0 0 10px #ffd700;
            pointer-events: none;
            z-index: 100;
            animation: pop 0.5s forwards ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1) translate(0, 0); opacity: 1; }
            100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="game-container">
        
        <svg id="background-svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
            <path d="M0,900 Q480,850 960,920 T1920,880 L1920,1080 L0,1080 Z" fill="#d4a373" />
            <path d="M0,950 Q300,900 700,980 T1920,930 L1920,1080 L0,1080 Z" fill="#ccd5ae" opacity="0.5"/>
            <path d="M150,920 Q200,800 280,950 Z" fill="#5c677d" />
            <path d="M1600,900 Q1700,750 1850,930 Z" fill="#4a4e69" />
            <path d="M300,980 Q320,850 350,900 Q380,820 400,890 Q430,860 450,990 Z" fill="#ff758f" />
            <path d="M1500,950 Q1480,800 1450,850 Q1420,750 1400,820 Q1370,800 1350,960 Z" fill="#9d4edd" />

            <g class="seaweed" fill="#2d6a4f">
                <path d="M100,1000 Q120,800 90,600 Q150,700 110,1000 Z" />
                <path d="M120,1000 Q150,750 180,550 Q180,800 130,1000 Z" />
            </g>
            <g class="seaweed-fast" fill="#40916c">
                <path d="M1750,1000 Q1700,800 1780,600 Q1680,750 1760,1000 Z" />
                <path d="M1800,1000 Q1850,700 1820,500 Q1900,800 1810,1000 Z" />
            </g>
            <g class="seaweed" fill="#1b4332">
                <path d="M800,1000 Q850,850 820,700 Q880,800 810,1000 Z" />
            </g>
        </svg>

        <svg class="bg-fish fish1" width="100" height="60" viewBox="0 0 100 60">
            <path d="M10,30 Q30,0 80,30 Q30,60 10,30 Z" fill="#ffb703" />
            <polygon points="10,30 0,15 0,45" fill="#fb8500" />
            <circle cx="65" cy="25" r="4" fill="white" /><circle cx="65" cy="25" r="2" fill="black" />
            <path d="M40,15 Q50,5 60,15" fill="none" stroke="#fb8500" stroke-width="3" />
        </svg>
        <svg class="bg-fish fish2" width="120" height="70" viewBox="0 0 120 70">
            <path d="M15,35 Q40,5 100,35 Q40,65 15,35 Z" fill="#00f5d4" />
            <polygon points="15,35 0,20 0,50" fill="#00bbf9" />
            <circle cx="80" cy="30" r="5" fill="white" /><circle cx="80" cy="30" r="2.5" fill="black" />
        </svg>
        <svg class="bg-fish fish3" width="80" height="50" viewBox="0 0 80 50">
            <path d="M10,25 Q25,5 65,25 Q25,45 10,25 Z" fill="#f15bb5" />
            <polygon points="10,25 0,15 0,35" fill="#9b5de5" />
            <circle cx="50" cy="20" r="3" fill="white" /><circle cx="50" cy="20" r="1.5" fill="black" />
        </svg>

        <div id="text-board">
            <div id="story-text"></div>
        </div>

        <div id="character-container">
            <svg id="crab-svg" class="breathe" viewBox="0 0 200 150">
                <path d="M40,90 Q10,110 20,140" fill="none" stroke="#d62828" stroke-width="8" stroke-linecap="round"/>
                <path d="M60,100 Q30,130 50,150" fill="none" stroke="#d62828" stroke-width="8" stroke-linecap="round"/>
                <path d="M160,90 Q190,110 180,140" fill="none" stroke="#d62828" stroke-width="8" stroke-linecap="round"/>
                <path d="M140,100 Q170,130 150,150" fill="none" stroke="#d62828" stroke-width="8" stroke-linecap="round"/>
                
                <ellipse cx="100" cy="80" rx="60" ry="40" fill="#e63946" />
                <path d="M50,80 Q100,110 150,80 Q100,120 50,80 Z" fill="#a8dadc" opacity="0.3" />

                <path d="M80,50 L70,20" fill="none" stroke="#e63946" stroke-width="6" stroke-linecap="round"/>
                <path d="M120,50 L130,20" fill="none" stroke="#e63946" stroke-width="6" stroke-linecap="round"/>
                <circle cx="70" cy="20" r="12" fill="white" />
                <circle cx="130" cy="20" r="12" fill="white" />
                <circle cx="70" cy="20" r="5" fill="black">
                    <animate attributeName="r" values="5;0;5;5" dur="4s" repeatCount="indefinite" keyTimes="0;0.05;0.1;1"/>
                </circle>
                <circle cx="130" cy="20" r="5" fill="black">
                    <animate attributeName="r" values="5;0;5;5" dur="4s" repeatCount="indefinite" keyTimes="0;0.05;0.1;1"/>
                </circle>

                <path d="M80,90 Q100,105 120,90" fill="none" stroke="#660708" stroke-width="4" stroke-linecap="round"/>

                <g class="claw-left">
                    <path d="M40,70 Q10,50 20,20" fill="none" stroke="#e63946" stroke-width="10" stroke-linecap="round"/>
                    <path d="M20,20 Q0,5 15,-10 Q30,-5 20,20 Z" fill="#d62828" />
                    <path d="M20,20 Q40,10 30,-5 Q25,5 20,20 Z" fill="#e63946" />
                </g>
                <g class="claw-right">
                    <path d="M160,70 Q190,50 180,20" fill="none" stroke="#e63946" stroke-width="10" stroke-linecap="round"/>
                    <path d="M180,20 Q200,5 185,-10 Q170,-5 180,20 Z" fill="#d62828" />
                    <path d="M180,20 Q160,10 170,-5 Q175,5 180,20 Z" fill="#e63946" />
                </g>
            </svg>
        </div>

        <div id="shark-container">
            <svg viewBox="0 0 800 400">
                <path d="M100,200 Q50,100 20,50 Q40,150 10,200 Q40,250 20,350 Q50,300 100,200 Z" fill="#6c757d" />
                <path d="M80,200 Q200,80 500,150 Q750,180 780,220 Q700,280 400,280 Q200,300 80,200 Z" fill="#adb5bd" />
                <path d="M200,240 Q400,300 700,250 Q750,220 780,220 Q700,280 400,280 Q200,300 200,240 Z" fill="#e9ecef" />
                <path d="M350,130 Q400,20 450,10 Q420,100 450,145 Z" fill="#6c757d" />
                <path d="M380,250 Q420,320 450,350 Q430,280 460,250 Z" fill="#6c757d" />
                <circle cx="680" cy="190" r="10" fill="white" />
                <circle cx="685" cy="190" r="4" fill="black" />
                <path d="M550,200 Q540,220 550,240" fill="none" stroke="#495057" stroke-width="4" stroke-linecap="round"/>
                <path d="M570,195 Q560,220 570,245" fill="none" stroke="#495057" stroke-width="4" stroke-linecap="round"/>
                <path d="M590,190 Q580,220 590,250" fill="none" stroke="#495057" stroke-width="4" stroke-linecap="round"/>
                <path d="M700,250 Q750,230 780,220 Q750,270 700,250 Z" fill="#000" />
                <polygon points="710,245 715,235 720,242 725,233 730,240 735,231 740,238" fill="white" />
                <polygon points="705,252 710,260 715,253 720,262 725,254 730,265 735,255" fill="white" />
            </svg>
        </div>

    </div>

    <script>
        const originalText = "Маленька рибка Ромашка радісно гралася біля коралового рифу. Раптом стрімка течія принесла яскраву мушлю червоного кольору. Рибка швидко підпливла, щоб роздивитися дивний сюрприз. Краб Тарас сердито клацнув клешнею, охороняючи свою територію. Але Ромашка лише грайливо махнула прозорим хвостом і попливла назустріч пригодам.";

        const storyContainer = document.getElementById('story-text');
        const crab = document.getElementById('character-container');
        const textBoard = document.getElementById('text-board');
        const shark = document.getElementById('shark-container');
        
        let totalMistakes = 0;
        let correctedMistakes = 0;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playPlopSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playThudSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playSharkSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 2);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.5);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 3);
        }

        function playScatterSound() {
            initAudio();
            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800 + Math.random()*400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                }, i * 100);
            }
        }

        function createSparkles(x, y) {
            for (let i = 0; i < 6; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                sparkle.style.left = x + 'px';
                sparkle.style.top = y + 'px';
                const tx = (Math.random() - 0.5) * 100;
                const ty = (Math.random() - 0.5) * 100;
                sparkle.style.setProperty('--tx', `${tx}px`);
                sparkle.style.setProperty('--ty', `${ty}px`);
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 500);
            }
        }

        function triggerCrabReaction(isCorrect) {
            crab.classList.remove('cheer', 'shake');
            void crab.offsetWidth;
            if (isCorrect) {
                crab.classList.add('cheer');
            } else {
                crab.classList.add('shake');
            }
        }

        function triggerEnding() {
            setTimeout(() => {
                playSharkSound();
                shark.classList.add('shark-attack');
                
                setTimeout(() => {
                    playScatterSound();
                    
                    const scatterTargets = [
                        textBoard, 
                        crab, 
                        ...document.querySelectorAll('.bg-fish')
                    ];

                    scatterTargets.forEach(el => {
                        const rx = (Math.random() > 0.5 ? 1 : -1) * (1 + Math.random());
                        const ry = (Math.random() > 0.5 ? 1 : -1) * (1 + Math.random());
                        const rr = (Math.random() > 0.5 ? 1 : -1);
                        
                        el.style.setProperty('--rx', rx);
                        el.style.setProperty('--ry', ry);
                        el.style.setProperty('--rr', rr);
                        el.classList.add('scatter');
                    });
                }, 1000);

            }, 500);
        }

        function handleLetterClick(e, span, isMistake, originalChar) {
            initAudio();

            if (isMistake && !span.dataset.fixed) {
                span.textContent = originalChar;
                span.style.color = '#00ff88';
                span.dataset.fixed = "true";
                
                const rect = span.getBoundingClientRect();
                createSparkles(rect.left + rect.width / 2, rect.top + rect.width / 2);
                
                playPlopSound();
                triggerCrabReaction(true);
                
                correctedMistakes++;
                
                setTimeout(() => {
                    span.style.color = '';
                }, 1000);

                if (correctedMistakes === totalMistakes) {
                    triggerEnding();
                }

            } else if (!span.dataset.fixed) {
                playThudSound();
                triggerCrabReaction(false);
                span.style.color = '#ff4d4d';
                setTimeout(() => {
                    if(!span.dataset.fixed) span.style.color = '';
                }, 400);
            }
        }

        function buildGameText() {
            // Розбиваємо текст на слова по пробілах
            const words = originalText.split(' ');
            
            words.forEach((word, index) => {
                // Створюємо контейнер для цілого слова
                const wordSpan = document.createElement('span');
                wordSpan.classList.add('word');
                
                // Розбиваємо слово на окремі літери
                const chars = word.split('');
                
                chars.forEach(char => {
                    const letterSpan = document.createElement('span');
                    letterSpan.classList.add('letter');
                    
                    let displayChar = char;
                    let isMistake = false;

                    if (char === 'р') {
                        displayChar = 'л';
                        isMistake = true;
                        totalMistakes++;
                    } else if (char === 'Р') {
                        displayChar = 'Л';
                        isMistake = true;
                        totalMistakes++;
                    }

                    letterSpan.textContent = displayChar;
                    letterSpan.addEventListener('click', (e) => handleLetterClick(e, letterSpan, isMistake, char));
                    
                    wordSpan.appendChild(letterSpan);
                });

                storyContainer.appendChild(wordSpan);

                // Додаємо звичайний текстовий пробіл після кожного слова (крім останнього)
                if (index < words.length - 1) {
                    const space = document.createTextNode(' ');
                    storyContainer.appendChild(space);
                }
            });
        }

        function createBackgroundBubbles() {
            const container = document.getElementById('game-container');
            setInterval(() => {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                const size = Math.random() * 20 + 5;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = (Math.random() * 3 + 2) + 's';
                container.appendChild(bubble);
                
                setTimeout(() => {
                    bubble.remove();
                }, 5000);
            }, 300);
        }

        window.onload = () => {
            buildGameText();
            createBackgroundBubbles();
        };

    </script>
</body>
</html>
