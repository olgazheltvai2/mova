<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Морські Професії</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Nunito', 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            display: flex;
            flex-direction: row;
            background-color: #faebd7;
        }

        /* --- ЛІВА ЧАСТИНА: МОРСЬКА СЦЕНА --- */
        #left-scene {
            flex: 1 1 55%;
            position: relative;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #4facfe 0%, #87CEEB 100%);
            transition: all 1s;
        }

        svg.background {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            preserveAspectRatio="xMidYMax slice";
        }

        /* Анімації */
        @keyframes floatClouds {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }
        .cloud { animation: floatClouds 40s linear infinite; }
        .cloud-fast { animation: floatClouds 25s linear infinite; }

        @keyframes waveMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100px); }
        }
        .wave { animation: waveMove 4s linear infinite alternate; }

        @keyframes swayShip {
            0% { transform: rotate(-2.5deg) translateY(3px); }
            100% { transform: rotate(2.5deg) translateY(-3px); }
        }
        #ship-group {
            transform-origin: 500px 650px;
            animation: swayShip 4s ease-in-out infinite alternate;
        }

        @keyframes turnWheel {
            0% { transform: rotate(-12deg); }
            100% { transform: rotate(12deg); }
        }
        #helm-wheel {
            transform-origin: 500px 580px;
            animation: turnWheel 4s ease-in-out infinite alternate;
        }

        @keyframes puffSail {
            0% { d: path("M 350,150 Q 500,100 650,150 L 600,350 Q 500,380 400,350 Z"); }
            100% { d: path("M 350,150 Q 500,50 650,150 L 600,350 Q 500,420 400,350 Z"); }
        }
        .sail { animation: puffSail 3s ease-in-out infinite alternate; }

        @keyframes flapWings {
            0%, 100% { d: path("M0,10 Q10,0 20,10 Q30,0 40,10 Q30,5 20,20 Q10,5 0,10 Z"); }
            50% { d: path("M0,0 Q10,10 20,10 Q30,10 40,0 Q30,5 20,20 Q10,5 0,0 Z"); }
        }
        @keyframes flySeagull {
            0% { transform: translate(110%, 10%) scale(0.6); }
            100% { transform: translate(-10%, 30%) scale(0.6); }
        }
        .seagull-group { animation: flySeagull 15s linear infinite; }
        .seagull-wing { animation: flapWings 0.8s ease-in-out infinite; fill: white; stroke: #ccc; stroke-width: 1;}

        /* Анімація руки (віддача честі) */
        #upper-arm, #forearm {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #upper-arm { transform-origin: 540px 430px; }
        #forearm { transform-origin: 570px 480px; }

        .salute #upper-arm { transform: rotate(-80deg); }
        .salute #forearm { transform: rotate(-190deg); }

        .sun {
            transition: all 1.5s ease-in-out;
            transform-origin: 800px 180px;
        }

        /* --- ПРАВА ЧАСТИНА: ТЕКСТОВЕ ЗАВДАННЯ --- */
        #right-ui {
            flex: 0 0 45%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4vw;
            background: #faebd7;
            border-left: 8px solid #d4a373;
            box-shadow: -10px 0 25px rgba(0,0,0,0.15);
            position: relative;
        }

        #right-ui::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(transparent, transparent 40px, rgba(0,0,0,0.03) 40px, rgba(0,0,0,0.03) 41px);
            pointer-events: none;
        }

        .text-content {
            position: relative;
            z-index: 2;
            font-size: clamp(22px, 2.5vw, 42px);
            font-weight: 700;
            color: #3e2723;
            line-height: 2.2;
            text-align: justify;
        }

        .scrambled-word {
            display: inline-block;
            padding: 4px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 0 8px;
            position: relative;
        }

        .scrambled-word.unsolved {
            background-color: #ffb8b8;
            border: 4px dashed #ff4757;
            color: #c23616;
            box-shadow: 0 4px 0 #ff4757;
        }

        .scrambled-word.unsolved:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 0 #ff4757;
        }

        .scrambled-word.solved {
            background-color: #55efc4;
            border: 4px solid #00b894;
            color: #2d3436;
            cursor: default;
            box-shadow: 0 4px 0 #00b894;
            animation: solvePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes solvePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(2deg); box-shadow: 0 0 20px #00b894; }
            100% { transform: scale(1) rotate(0); box-shadow: 0 4px 0 #00b894; }
        }
    </style>
</head>
<body>

<div id="left-scene">
    <svg class="background" viewBox="0 0 1000 900">
        <defs>
            <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#028090" />
                <stop offset="100%" stop-color="#005f73" />
            </linearGradient>
            <linearGradient id="woodGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#8b5a2b" />
                <stop offset="100%" stop-color="#5c3a21" />
            </linearGradient>
            <pattern id="woodPattern" patternUnits="userSpaceOnUse" width="40" height="40">
                <path d="M0,10 Q20,15 40,10 M0,30 Q20,25 40,30" stroke="#4a2e12" stroke-width="1" fill="none" opacity="0.5"/>
            </pattern>
        </defs>

        <circle class="sun" cx="800" cy="180" r="70" fill="#ffb703" filter="drop-shadow(0 0 20px #ffb703)" opacity="0.9"/>

        <g class="cloud" transform="translate(100, 100)">
            <path d="M 0 30 Q 15 10 30 30 Q 50 0 70 30 Q 85 15 100 30 Q 110 50 90 60 L 10 60 Q -10 50 0 30 Z" fill="#ffffff" opacity="0.9"/>
        </g>
        <g class="cloud-fast" transform="translate(600, 250) scale(1.3)">
            <path d="M 0 30 Q 15 10 30 30 Q 50 0 70 30 Q 85 15 100 30 Q 110 50 90 60 L 10 60 Q -10 50 0 30 Z" fill="#ffffff" opacity="0.7"/>
        </g>

        <g class="seagull-group">
            <path class="seagull-wing" d="M0,10 Q10,0 20,10 Q30,0 40,10 Q30,5 20,20 Q10,5 0,10 Z" />
        </g>
        <g class="seagull-group" style="animation-delay: -7s; animation-duration: 18s;">
            <path class="seagull-wing" d="M0,10 Q10,0 20,10 Q30,0 40,10 Q30,5 20,20 Q10,5 0,10 Z" transform="scale(0.8) translate(100, -50)" />
        </g>

        <g id="ship-group">
            <rect x="480" y="50" width="20" height="550" fill="url(#woodGrad)" stroke="#3e2723" stroke-width="2"/>
            <rect x="350" y="150" width="280" height="15" fill="#3e2723" />
            <rect x="380" y="350" width="220" height="10" fill="#3e2723" />

            <path class="sail" d="M 350,150 Q 500,100 650,150 L 600,350 Q 500,380 400,350 Z" fill="#ffffff" stroke="#e9ecef" stroke-width="3"/>
            
            <line x1="480" y1="50" x2="200" y2="600" stroke="#d2b48c" stroke-width="3" opacity="0.8"/>
            <line x1="500" y1="50" x2="800" y2="600" stroke="#d2b48c" stroke-width="3" opacity="0.8"/>

            <path d="M 100 600 L 900 600 L 800 750 L 200 750 Z" fill="url(#woodGrad)" stroke="#4a2e12" stroke-width="5"/>
            <path d="M 100 600 L 900 600 L 800 750 L 200 750 Z" fill="url(#woodPattern)"/>
            
            <rect x="120" y="560" width="760" height="10" fill="#4a2e12" />
            <rect x="150" y="570" width="10" height="30" fill="#4a2e12" />
            <rect x="300" y="570" width="10" height="30" fill="#4a2e12" />
            <rect x="450" y="570" width="10" height="30" fill="#4a2e12" />
            <rect x="600" y="570" width="10" height="30" fill="#4a2e12" />
            <rect x="750" y="570" width="10" height="30" fill="#4a2e12" />

            <g id="captain" transform="translate(0, 20)">
                <rect x="470" y="520" width="20" height="60" fill="#1d3557"/>
                <rect x="510" y="520" width="20" height="60" fill="#1d3557"/>
                <path d="M 460 420 L 540 420 L 550 530 L 450 530 Z" fill="#457b9d" stroke="#1d3557" stroke-width="3"/>
                <circle cx="500" cy="440" r="4" fill="#f4a261"/>
                <circle cx="500" cy="470" r="4" fill="#f4a261"/>
                <circle cx="500" cy="500" r="4" fill="#f4a261"/>
                
                <circle cx="500" cy="390" r="30" fill="#ffcdb2"/>
                <path d="M 473 395 Q 500 425 527 395 Z" fill="#f8f9fa"/>
                <circle cx="490" cy="385" r="4" fill="#1d3557"/>
                <circle cx="510" cy="385" r="4" fill="#1d3557"/>
                
                <path d="M 465 370 Q 500 340 535 370 Z" fill="#457b9d"/>
                <path d="M 460 370 L 540 370 Q 550 380 540 380 L 460 380 Q 450 380 460 370 Z" fill="#1d3557"/>
                <circle cx="500" cy="365" r="6" fill="#f4a261"/>
                
                <path d="M 460 430 L 430 480 L 450 530" fill="none" stroke="#457b9d" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="450" cy="530" r="8" fill="#ffcdb2"/>

                <g id="right-arm-group">
                    <g id="upper-arm">
                        <line x1="540" y1="430" x2="570" y2="480" stroke="#457b9d" stroke-width="16" stroke-linecap="round"/>
                        <g id="forearm">
                            <line x1="570" y1="480" x2="540" y2="530" stroke="#457b9d" stroke-width="16" stroke-linecap="round"/>
                            <circle cx="540" cy="530" r="8" fill="#ffcdb2"/>
                        </g>
                    </g>
                </g>
            </g>

            <path d="M 470 540 L 530 540 L 540 600 L 460 600 Z" fill="url(#woodGrad)" stroke="#3e2723" stroke-width="2"/>
            <g id="helm-wheel">
                <line x1="500" y1="480" x2="500" y2="680" stroke="#5c3a21" stroke-width="10" stroke-linecap="round"/>
                <line x1="400" y1="580" x2="600" y2="580" stroke="#5c3a21" stroke-width="10" stroke-linecap="round"/>
                <line x1="430" y1="510" x2="570" y2="650" stroke="#5c3a21" stroke-width="10" stroke-linecap="round"/>
                <line x1="430" y1="650" x2="570" y2="510" stroke="#5c3a21" stroke-width="10" stroke-linecap="round"/>
                <circle cx="500" cy="580" r="60" fill="none" stroke="#8b5a2b" stroke-width="12"/>
                <circle cx="500" cy="580" r="60" fill="none" stroke="#4a2e12" stroke-width="4" stroke-dasharray="10, 5"/>
                <circle cx="500" cy="580" r="15" fill="#e76f51" stroke="#3e2723" stroke-width="3"/>
                <circle cx="500" cy="580" r="5" fill="#f4a261"/>
            </g>
        </g>

        <g class="wave">
            <path d="M -500 710 Q 0 680 500 710 T 1500 710 T 2500 710 L 2500 1200 L -500 1200 Z" fill="url(#seaGrad)" opacity="0.9"/>
        </g>
        <g class="wave" style="animation-direction: reverse; animation-duration: 4.5s;">
            <path d="M -500 730 Q 0 760 500 730 T 1500 730 T 2500 730 L 2500 1200 L -500 1200 Z" fill="#0077b6" opacity="0.8"/>
        </g>
        <g class="wave" style="animation-duration: 3s;">
            <path d="M -500 760 Q 0 730 500 760 T 1500 760 T 2500 760 L 2500 1200 L -500 1200 Z" fill="#03045e" opacity="0.9"/>
        </g>
    </svg>
</div>

<div id="right-ui">
    <div class="text-content">
        <p style="margin-bottom: 3vh;">
            Корабель по курсу веде <span class="scrambled-word unsolved" data-correct="штурман">(манштур)</span>. 
            За порядком на судні стежить <span class="scrambled-word unsolved" data-correct="боцман">(цманбо)</span>.
        </p>
        <p>
            Усю роботу на кораблі виконують <span class="scrambled-word unsolved" data-correct="матроси">(тромаси)</span>. 
            Їжу для команди готує <span class="scrambled-word unsolved" data-correct="кок">(окк)</span>.
        </p>
    </div>
</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function playDing() {
        if (!audioCtx) audioCtx = new AudioContext();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.6);
        gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.6);
    }

    function playWinChords() {
        if (!audioCtx) audioCtx = new AudioContext();
        const playChord = (freq, startTime) => {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 1.5);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + 1.5);
        };
        const now = audioCtx.currentTime;
        playChord(440, now); // A4
        playChord(554.37, now); // C#5
        playChord(659.25, now); // E5
        playChord(880, now + 0.2); // A5
    }

    const words = document.querySelectorAll('.scrambled-word');
    const leftScene = document.getElementById('left-scene'); 
    let solvedCount = 0;

    words.forEach(word => {
        word.addEventListener('click', function() {
            if (this.classList.contains('solved')) return;
            
            playDing();
            leftScene.classList.add('salute');
            
            this.textContent = this.dataset.correct;
            this.classList.remove('unsolved');
            this.classList.add('solved');
            
            solvedCount++;

            // Перевірка на фінал
            if (solvedCount === words.length) {
                setTimeout(() => {
                    playWinChords();
                    // Фінальний "живий" фідбек!
                    leftScene.classList.add('salute'); // Залишається з рукою біля кашкета
                    
                    // Сонце починає пульсувати та збільшується
                    const sun = document.querySelector('.sun');
                    sun.style.transform = 'scale(1.3)';
                    sun.style.filter = 'drop-shadow(0 0 50px #ffb703)';
                    
                    // Корабель починає хитатися швидше і веселіше
                    document.getElementById('ship-group').style.animationDuration = '2s';
                    
                }, 1200);
            } else {
                // Якщо ще не кінець гри, капітан опускає руку
                setTimeout(() => {
                    leftScene.classList.remove('salute');
                }, 1000);
            }
        });
    });
</script>
</body>
</html>
