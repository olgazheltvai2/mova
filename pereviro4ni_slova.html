<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Базові налаштування: Глибокий кибернетичний фон */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #010411; /* Глибокий синій/чорний */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: manipulation;
        }

        /* Контейнер гри */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Сюжетний фон: Кибер-сад */
        #background-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Анімація для фонових елементів (цифрові дані) */
        @keyframes float-data {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
        .data-stream {
            animation: float-data 3s infinite linear;
        }

        /* Анімації кибер-рослин */
        @keyframes plant-glow {
            0%, 100% { filter: drop-shadow(0 0 5px #00e5ff); }
            50% { filter: drop-shadow(0 0 15px #00e5ff); }
        }
        .fiber-optic-plant {
            animation: plant-glow 4s infinite ease-in-out;
        }

        /* Живий персонаж (Комп'ютерна мишка) */
        #character-container {
            position: absolute;
            bottom: 5%;
            right: 10%;
            width: 35vmin; /* Збільшений персонаж */
            height: 35vmin;
            z-index: 5;
            transition: all 0.3s ease;
        }

        /* Стан: Успіх (Підстрибування та миготіння) */
        .happy-mouse {
            animation: jump-click 0.5s ease-in-out infinite, plant-glow 0.3s infinite;
        }
        @keyframes jump-click {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* Стан: Помилка (Труситься) */
        .sad-mouse {
            animation: error-shake 0.4s ease-in-out;
        }
        @keyframes error-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-5deg); }
            75% { transform: translateX(15px) rotate(5deg); }
        }

        /* Інтерфейс завдання */
        #task-board {
            position: relative;
            z-index: 10;
            width: 80%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5vh;
        }

        /* Дошка з питанням (стилізація під кибер-панель) */
        #question-container {
            position: relative;
            width: 100%;
            min-height: 18vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #050a1f 0%, #0d1a4a 100%);
            border-radius: 35px;
            border: 8px solid #00c8ff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 25px rgba(0,200,255,0.4);
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* Візерунок схем на дошці */
        #question-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 27px;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 15px, rgba(0,200,255,0.05) 15px, rgba(0,200,255,0.05) 30px);
            pointer-events: none;
        }

        /* ДУЖЕ КРУПНИЙ шрифт для питання (Збільшено вдвічі) */
        #question-text {
            color: #fff;
            font-size: 12vmin; /* Збільшено вдвічі з 6vmin */
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0,200,255,1), 4px 4px 8px rgba(0,0,0,1);
            z-index: 2;
            letter-spacing: 3px;
        }

        /* Варіанти відповідей (стилізація під glowing hexagons) */
        #options-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4vmin;
            width: 100%;
        }

        .option-btn {
            position: relative;
            padding: 4vmin 6vmin;
            background: linear-gradient(145deg, #0d1a4a, #050a1f);
            border: 5px solid #00ff80; /* Зелений неон */
            border-radius: 20px 0 20px 0; /* Форма чіпа */
            cursor: pointer;
            box-shadow: 5px 15px 25px rgba(0,0,0,0.7), inset 0 0 15px rgba(0,255,128,0.2);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-btn:hover {
            transform: scale(1.08) translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(0,255,128,0.6);
            background: linear-gradient(145deg, #132a6e, #0d1a4a);
        }

        .option-btn:active {
            transform: scale(0.92);
        }

        /* ДУЖЕ КРУПНИЙ шрифт для відповідей (Збільшено вдвічі) */
        .option-text {
            color: #e8f5e9;
            font-size: 9vmin; /* Збільшено вдвічі з 4.5vmin */
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 5px rgba(255,255,255,0.5);
            z-index: 2;
        }

        /* Анімація успіху (пульсація чіпа) */
        @keyframes pulse-chip {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 128, 0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px 20px rgba(0, 255, 128, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 128, 0); }
        }
        .success-anim {
            animation: pulse-chip 1s ease-out !important;
            background: linear-gradient(145deg, #00ff80, #00c853) !important;
            border-color: #fff !important;
        }
        .success-anim .option-text { color: #010411; text-shadow: none; }

        /* Мінімалістичні кнопки навігації (стилізовані) */
        #nav-controls {
            position: absolute;
            top: 5%;
            left: 5%;
            right: 5%;
            display: flex;
            justify-content: space-between;
            z-index: 20;
            pointer-events: none;
        }

        .nav-btn {
            pointer-events: auto;
            background: rgba(0, 200, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(0, 200, 255, 0.3);
            border-radius: 50%;
            width: 9vmin;
            height: 9vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-btn:hover {
            background: rgba(0, 200, 255, 0.3);
            transform: scale(1.1) rotate(15deg);
        }
        .nav-btn svg {
            width: 50%;
            height: 50%;
            fill: #00e5ff;
            filter: drop-shadow(0 0 5px #00e5ff);
        }

        /* Екран завершення */
        #end-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            background: radial-gradient(circle, rgba(13,26,74,0.8) 0%, rgba(5,10,31,0.98) 100%);
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .end-icon {
            width: 40vmin;
            height: 40vmin;
            animation: plant-glow 2s infinite, jump-click 1.5s infinite;
        }
    </style>
</head>
<body>

    <svg id="background-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="cyber-sky" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#0d1a4a" />
                <stop offset="100%" stop-color="#010411" />
            </linearGradient>
            
            <radialGradient id="data-sun" cx="50%" cy="20%" r="60%">
                <stop offset="0%" stop-color="#00ffff" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
            </radialGradient>
            
            <g id="circuit-leaf">
                <path d="M50,100 C20,90 0,60 10,30 C20,0 50,0 50,0 C50,0 80,0 90,30 C100,60 80,90 50,100 Z" fill="#032111" stroke="#00e5ff" stroke-width="1"/>
                <circle cx="50" cy="50" r="5" fill="#00e5ff"/>
                <path d="M50,5 L50,95 M50,50 L20,30 M50,50 L80,30 M50,70 L25,90 M50,70 L75,90" stroke="#00e5ff" stroke-width="0.5"/>
            </g>

            <g id="fiber-plant-template">
                <path d="M0,0 Q10,25 -5,50 T5,100" stroke="#00c8ff" stroke-width="4" fill="none"/>
                <circle cx="5" cy="100" r="4" fill="#ff00ff" filter="blur(2px)"/>
            </g>
        </defs>

        <rect width="1000" height="600" fill="url(#cyber-sky)" />
        <rect width="1000" height="600" fill="url(#data-sun)" />

        <g class="data-stream" transform="translate(100, 500)">
            <text x="0" y="0" fill="#00ffff" font-size="20" font-family="monospace">10110</text>
        </g>
        <g class="data-stream" transform="translate(800, 450)" style="animation-delay: 1.5s;">
            <text x="0" y="0" fill="#00ffff" font-size="18" font-family="monospace">010011</text>
        </g>
        <g class="data-stream" transform="translate(500, 550)" style="animation-delay: 0.7s;">
            <text x="0" y="0" fill="#00ffff" font-size="22" font-family="monospace">110</text>
        </g>

        <use href="#circuit-leaf" x="50" y="400" transform="scale(2)" opacity="0.3"/>
        <use href="#circuit-leaf" x="700" y="350" transform="scale(2.5) rotate(-20)" opacity="0.2"/>
        
        <g class="fiber-optic-plant" transform="translate(150, 100) scale(1.5)">
            <use href="#fiber-plant-template" />
        </g>
        <g class="fiber-optic-plant" transform="translate(850, 80) scale(1.3) rotate(180) translate(-10, -100)">
            <use href="#fiber-plant-template" />
        </g>

        <use href="#circuit-leaf" x="-50" y="450" transform="scale(1.5) rotate(30)" fill="#004d40"/>
        <use href="#circuit-leaf" x="800" y="400" transform="scale(2) rotate(-45)" fill="#004d40"/>
        
        <path d="M700,600 Q800,500 1000,480" stroke="#00ff80" stroke-width="15" fill="none" stroke-linecap="round" filter="drop-shadow(0 0 10px #00ff80)"/>
        <circle cx="850" cy="540" r="10" fill="#00ff80"/>
        <circle cx="950" cy="490" r="8" fill="#00ff80"/>
    </svg>

    <div id="nav-controls">
        <div class="nav-btn" id="btn-prev">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </div>
        <div class="nav-btn" id="btn-next">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </div>
    </div>

    <div id="game-container">
        
        <div id="task-board">
            <div id="question-container">
                <div id="question-text"></div>
            </div>
            <div id="options-container">
                </div>
        </div>

        <div id="character-container">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <defs>
                    <linearGradient id="mouse-body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#1a1a1a"/>
                        <stop offset="100%" stop-color="#0d0d0d"/>
                    </linearGradient>
                </defs>
                <g id="mouse-group" transform="translate(0, 0)">
                    
                    <path d="M 50 90 C 20 90 10 70 10 50 Q 10 30 50 10 Q 90 30 90 50 C 90 70 80 90 50 90 Z" fill="url(#mouse-body-grad)" stroke="#1a1a1a" stroke-width="2"/>
                    
                    <ellipse cx="50" cy="85" rx="30" ry="8" fill="#1a1a1a"/>

                    <path d="M 15 50 Q 15 35 30 25 L 48 35 L 48 55 L 15 50 Z" fill="#262626" stroke="#1a1a1a" stroke-width="1"/>
                    
                    <path d="M 85 50 Q 85 35 70 25 L 52 35 L 52 55 L 85 50 Z" fill="#262626" stroke="#1a1a1a" stroke-width="1"/>
                    
                    <ellipse cx="50" cy="38" rx="6" ry="12" fill="#00ffff"/>
                    <rect x="47" y="30" width="6" height="16" fill="#00ffff" rx="1" filter="blur(1px)"/>
                    
                    <rect x="80" y="55" width="8" height="15" fill="#ff00ff" rx="2"/>

                    <g class="mouse-eyes">
                        <ellipse cx="38" cy="55" rx="5" ry="8" fill="#fff"/>
                        <circle cx="38" cy="55" r="3" fill="#000"/>
                        <ellipse cx="62" cy="55" rx="5" ry="8" fill="#fff"/>
                        <circle cx="62" cy="55" r="3" fill="#000"/>
                    </g>
                    
                    <path class="mouse-mouth" d="M 42 70 Q 50 78 58 70" stroke="#ff00ff" stroke-width="3" fill="none" stroke-linecap="round" style="transition: all 0.2s;"/>
                    
                    <path d="M 25 65 L 10 68 M 25 72 L 10 78" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
                    <path d="M 75 65 L 90 68 M 75 72 L 90 78" stroke="#00ffff" stroke-width="1" opacity="0.5"/>

                    <path class="mouse-tail" d="M 50 90 Q 50 100 70 110 Q 90 120 80 130" stroke="#0d0d0d" stroke-width="6" fill="none" stroke-linecap="round"/>
                    <rect x="75" y="125" width="10" height="15" fill="#1a1a1a" rx="1"/>
                </g>
            </svg>
        </div>
    </div>

    <div id="end-screen">
        <svg class="end-icon" viewBox="0 0 100 100">
            <path d="M50 5 L61 35 L93 35 L67 54 L77 84 L50 65 L23 84 L33 54 L7 35 L39 35 Z" fill="#00ff80" stroke="#fff" stroke-width="4" stroke-linejoin="round" filter="drop-shadow(0 0 10px #00ff80)"/>
            <path d="M 35 60 Q 50 75 65 60" stroke="#010411" stroke-width="5" fill="none" stroke-linecap="round"/>
        </svg>
    </div>

    <script>
        // 15 унікальних завдань на перевірку ненаголошених голосних
        const tasks = [
            { q: "б..реги, з..млистий", options: ["бережок, земля", "берег, землі", "набережна, підземелля"], a: 1 },
            { q: "в..сна, ст..пи", options: ["весни, степ", "весняний, степовий", "весною, степами"], a: 0 },
            { q: "с..ло, д..рева", options: ["селянин, дерев'яний", "селище, деревця", "села, дерево"], a: 2 },
            { q: "з..мовий, кн..жковий", options: ["зими, книжка", "зимовий, книжковий", "зимувати, книгарня"], a: 0 },
            { q: "л..сточок, м..довий", options: ["листок, медок", "листя, мед", "листування, медові"], a: 1 },
            { q: "в..шневий, ш..рокий", options: ["вишенька, широко", "вишні, широчина", "вишня, шир"], a: 2 },
            { q: "кр..латий, п..рвистий", options: ["крила, перший", "окрилений, передовий", "крило, першість"], a: 0 },
            { q: "т..мніти, с..віти", options: ["темрява, сивина", "темно, сивий", "темніє, сивіє"], a: 1 },
            { q: "гл..бокий, в..сокий", options: ["глиб, вись", "глибина, висота", "глибшати, височіти"], a: 0 },
            { q: "б..резовий, в..рбовий", options: ["березник, вербичка", "березонька, верболіз", "береза, верба"], a: 2 },
            { q: "кр..чати, ш..потіти", options: ["крик, шепіт", "крикун, шепоче", "кричу, шепотіння"], a: 0 },
            { q: "д..витися, т..хенько", options: ["дивувати, тиша", "дивний, тихо", "подив, стихнути"], a: 1 },
            { q: "гр..чаний, в..снянка", options: ["греча, весняний", "гречаники, весною", "гречка, весни"], a: 2 },
            { q: "л..гкий, м..литися", options: ["легко, милість", "легенький, милий", "легкість, милуватися"], a: 0 },
            { q: "в..черяти, п..ляти", options: ["вечір, пилка", "вечірній, пиляр", "навечір'я, спиляти"], a: 0 }
        ];

        let currentIndex = 0;
        let isAnimating = false;

        // Web Audio API
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'success') {
                // Кибернетичний арпеджіо
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                osc.frequency.exponentialRampToValueAtTime(1760, now + 0.2);
                
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.4, now + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'fail') {
                // Кибернетичний збій
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.2, now + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }

        // DOM Елементи
        const questionEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const characterEl = document.getElementById('character-container');
        const mouseMouthEl = document.querySelector('.mouse-mouth'); // Отримуємо рот мишки
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const endScreen = document.getElementById('end-screen');

        function shuffleArray(array) {
            let shuffled = array.map((item, index) => ({ item, index }));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function loadTask() {
            if (currentIndex >= tasks.length) {
                showEndScreen();
                return;
            }

            const task = tasks[currentIndex];
            questionEl.textContent = task.q;
            optionsContainer.innerHTML = '';

            const shuffledOptions = shuffleArray(task.options);

            shuffledOptions.forEach(optObj => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                
                const span = document.createElement('span');
                span.className = 'option-text';
                span.textContent = optObj.item;
                
                btn.appendChild(span);

                btn.addEventListener('click', () => {
                    if (isAnimating) return;
                    initAudio();
                    checkAnswer(btn, optObj.index === task.a);
                });

                optionsContainer.appendChild(btn);
            });

            // Скидання емоцій персонажа
            characterEl.className = '';
            // Скидання рота на нейтральний
            mouseMouthEl.setAttribute('d', 'M 42 70 Q 50 78 58 70');
        }

        function createParticles(x, y) {
            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                // Використовуємо кибер-символ
                p.textContent = '💾'; 
                p.style.position = 'absolute';
                p.style.pointerEvents = 'none';
                p.style.zIndex = '30';
                p.style.fontSize = '40px'; // Велика частинка
                p.style.left = (x + Math.random() * 80 - 40) + 'px';
                p.style.top = (y + Math.random() * 60 - 30) + 'px';
                p.style.animation = 'fall 1.8s linear forwards';
                
                document.body.appendChild(p);
                
                setTimeout(() => p.remove(), 1800);
            }
        }

        function checkAnswer(btnEl, isCorrect) {
            isAnimating = true;

            if (isCorrect) {
                playSound('success');
                btnEl.classList.add('success-anim');
                characterEl.className = 'happy-mouse';
                
                // Рот посміхається
                mouseMouthEl.setAttribute('d', 'M 38 65 Q 50 85 62 65');

                const rect = btnEl.getBoundingClientRect();
                createParticles(rect.left + rect.width / 2, rect.top);

                setTimeout(() => {
                    currentIndex++;
                    isAnimating = false;
                    loadTask();
                }, 1500);
            } else {
                playSound('fail');
                btnEl.classList.add('shake-error');
                characterEl.className = 'sad-mouse';
                
                // Рот сумний
                mouseMouthEl.setAttribute('d', 'M 40 78 Q 50 65 60 78');

                setTimeout(() => {
                    btnEl.classList.remove('shake-error');
                    characterEl.className = '';
                    // Рот нейтральний
                    mouseMouthEl.setAttribute('d', 'M 42 70 Q 50 78 58 70');
                    isAnimating = false;
                }, 800);
            }
        }

        function showEndScreen() {
            playSound('success');
            setTimeout(() => playSound('success'), 200);
            document.getElementById('task-board').style.display = 'none';
            document.getElementById('nav-controls').style.display = 'none';
            characterEl.style.bottom = '40%';
            characterEl.style.right = 'calc(50% - 17.5vmin)';
            characterEl.style.transform = 'scale(1.8)';
            characterEl.className = 'happy-mouse';
            
            // Салют з частинок
            let i = 0;
            const interval = setInterval(() => {
                createParticles(window.innerWidth/2, window.innerHeight/3);
                i++;
                if (i > 15) clearInterval(interval);
            }, 250);

            endScreen.style.display = 'flex';
        }

        // Навігація
        btnNext.addEventListener('click', () => {
            initAudio();
            if (isAnimating) return;
            if (currentIndex < tasks.length) {
                currentIndex++;
                loadTask();
            }
        });

        btnPrev.addEventListener('click', () => {
            initAudio();
            if (isAnimating) return;
            if (currentIndex > 0) {
                currentIndex--;
                loadTask();
            }
        });

        // Запуск
        window.addEventListener('load', loadTask);
        document.body.addEventListener('click', initAudio, { once: true });

    </script>
</body>
</html>
