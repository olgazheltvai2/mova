<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вправа</title>
    <style>
        /* Скидання відступів та повноекранний режим */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #87CEEB;
        }

        /* Головний контейнер гри */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Складний сюжетний фон - залишається "живим" та яскравим */
        #background-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Верхня панель: Кнопка Назад - Речення - Кнопка Далі */
        #top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1600px;
            gap: 20px;
            margin-top: 2vh;
            z-index: 15;
        }

        /* Контейнер для тексту завдання */
        #sentence-container {
            flex-grow: 1;
            position: relative;
            background: linear-gradient(to bottom, #8B4513, #5C3A21);
            padding: 25px 40px;
            border-radius: 20px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.6), inset 0 0 12px rgba(0,0,0,0.6);
            border: 5px solid #3E2723;
            text-align: center;
        }

        /* Цвяшки для таблички */
        .nail {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #555;
            border-radius: 50%;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.9), 1px 1px 3px rgba(255,255,255,0.4);
        }
        .nail.top-left { top: 12px; left: 12px; }
        .nail.top-right { top: 12px; right: 12px; }
        .nail.bottom-left { bottom: 12px; left: 12px; }
        .nail.bottom-right { bottom: 12px; right: 12px; }

        /* Текст завдання */
        #sentence-text {
            color: #FFF8DC;
            font-size: 3.5vw; /* Адаптивний розмір тексту */
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
            margin: 0;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        /* Виділення слова в дужках */
        .highlight {
            color: #FFD700;
            text-decoration: underline wavy #FF6347;
        }

        /* Стилізація кнопок навігації по боках */
        .control-btn {
            background: linear-gradient(145deg, #FF8C00, #FF4500);
            border: 5px solid #FFF;
            border-radius: 50%;
            min-width: 80px;
            height: 80px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        @media (min-width: 768px) {
            .control-btn {
                min-width: 100px;
                height: 100px;
            }
        }

        .control-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn svg {
            width: 50%;
            height: 50%;
            fill: white;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.4));
        }

        /* Нижня секція для поля вводу - займає весь вільний простір */
        #bottom-section {
            display: flex;
            flex-grow: 1;
            width: 100%;
            max-width: 1600px;
            margin-top: 30px;
            margin-bottom: 20px;
            z-index: 15;
        }

        /* Максимально велике поле вводу по ширині та висоті */
        #input-field {
            width: 100%;
            height: 100%;
            padding: 20px;
            font-size: 4vw; /* Дуже великий текст, що адаптується */
            font-family: inherit;
            background-color: #FFFFFF;
            border: 10px solid #FF8C00;
            border-radius: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6), inset 0 8px 12px rgba(0,0,0,0.1);
            outline: none;
            text-align: center;
            color: #333;
            box-sizing: border-box;
            transition: transform 0.1s, box-shadow 0.1s, border-color 0.2s, background-color 0.3s;
            resize: none; /* Відключаємо зміну розміру, якщо це textarea */
            /* Вирівнювання тексту по центру textarea */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #input-field:focus {
            transform: scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 8px 12px rgba(0,0,0,0.1);
            border-color: #FF4500;
        }

        /* Анімація помилки при натисканні Enter з неправильною відповіддю */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-20px); border-color: #FF0000; background-color: #ffe6e6; }
            40%, 80% { transform: translateX(20px); border-color: #FF0000; background-color: #ffe6e6; }
        }
        .error-shake {
            animation: shake 0.5s ease-in-out;
        }

        /* Canvas для ефектів конфетті */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <svg id="background-svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
        <defs>
            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#4facfe"/>
                <stop offset="100%" stop-color="#00f2fe"/>
            </linearGradient>
            <linearGradient id="hillGrad1" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#76b852"/>
                <stop offset="100%" stop-color="#8DC26F"/>
            </linearGradient>
            <linearGradient id="hillGrad2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#56ab2f"/>
                <stop offset="100%" stop-color="#a8e063"/>
            </linearGradient>
            <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#FFEA00"/>
                <stop offset="100%" stop-color="#FF9800"/>
            </radialGradient>
        </defs>

        <rect width="100%" height="100%" fill="url(#skyGrad)" />

        <g transform="translate(150, 150)">
            <circle cx="0" cy="0" r="80" fill="url(#sunGrad)" />
            <g opacity="0.5">
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
                <path d="M 0 -100 L 10 -80 L -10 -80 Z" fill="#FFD700" />
                <path d="M 0 100 L 10 80 L -10 80 Z" fill="#FFD700" />
                <path d="M 100 0 L 80 10 L 80 -10 Z" fill="#FFD700" />
                <path d="M -100 0 L -80 10 L -80 -10 Z" fill="#FFD700" />
                <path d="M 70 70 L 50 60 L 60 50 Z" fill="#FFD700" />
                <path d="M -70 -70 L -50 -60 L -60 -50 Z" fill="#FFD700" />
                <path d="M 70 -70 L 50 -60 L 60 -50 Z" fill="#FFD700" />
                <path d="M -70 70 L -50 60 L -60 50 Z" fill="#FFD700" />
            </g>
        </g>

        <g fill="#FFFFFF" opacity="0.8">
            <animateTransform attributeName="transform" type="translate" from="1920" to="-500" dur="40s" repeatCount="indefinite"/>
            <path d="M 200 150 Q 220 120 250 150 Q 280 130 300 160 Q 320 180 280 190 L 200 190 Q 170 180 200 150 Z" />
        </g>
        <g fill="#FFFFFF" opacity="0.6">
            <animateTransform attributeName="transform" type="translate" from="-300" to="1920" dur="55s" repeatCount="indefinite"/>
            <path d="M 1200 250 Q 1220 220 1250 250 Q 1280 230 1300 260 Q 1320 280 1280 290 L 1200 290 Q 1170 280 1200 250 Z" />
        </g>

        <path d="M 0 600 Q 400 400 960 600 T 1920 600 L 1920 1080 L 0 1080 Z" fill="url(#hillGrad1)" />
        
        <path d="M 0 800 Q 500 600 1000 800 T 1920 700 L 1920 1080 L 0 1080 Z" fill="url(#hillGrad2)" />

        <g transform="translate(300, 600)">
            <rect x="-10" y="0" width="20" height="150" fill="#5D4037" />
            <circle cx="0" cy="-20" r="60" fill="#2E7D32" />
            <circle cx="-30" cy="10" r="50" fill="#388E3C" />
            <circle cx="30" cy="10" r="50" fill="#4CAF50" />
        </g>
        <g transform="translate(1500, 500) scale(1.5)">
            <rect x="-10" y="0" width="20" height="150" fill="#4E342E" />
            <circle cx="0" cy="-20" r="60" fill="#1B5E20" />
            <circle cx="-30" cy="10" r="50" fill="#2E7D32" />
            <circle cx="30" cy="10" r="50" fill="#388E3C" />
        </g>

        <g transform="translate(400, 850)">
            <path d="M 0 0 Q -10 -20 0 -40" stroke="#2E7D32" stroke-width="4" fill="none" />
            <circle cx="0" cy="-40" r="10" fill="#FFEB3B" />
            <circle cx="-12" cy="-45" r="8" fill="#E91E63" />
            <circle cx="12" cy="-45" r="8" fill="#E91E63" />
            <circle cx="0" cy="-55" r="8" fill="#E91E63" />
            <circle cx="-8" cy="-30" r="8" fill="#E91E63" />
            <circle cx="8" cy="-30" r="8" fill="#E91E63" />
        </g>
        <g transform="translate(800, 950) scale(1.2)">
            <path d="M 0 0 Q 10 -20 0 -40" stroke="#2E7D32" stroke-width="4" fill="none" />
            <circle cx="0" cy="-40" r="10" fill="#FF9800" />
            <circle cx="-12" cy="-45" r="8" fill="#03A9F4" />
            <circle cx="12" cy="-45" r="8" fill="#03A9F4" />
            <circle cx="0" cy="-55" r="8" fill="#03A9F4" />
            <circle cx="-8" cy="-30" r="8" fill="#03A9F4" />
            <circle cx="8" cy="-30" r="8" fill="#03A9F4" />
        </g>
    </svg>

    <div id="game-container">
        
        <div id="top-section">
            <div class="control-btn" id="btn-prev">
                <svg viewBox="0 0 24 24">
                    <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>
                </svg>
            </div>
            
            <div id="sentence-container">
                <div class="nail top-left"></div>
                <div class="nail top-right"></div>
                <div class="nail bottom-left"></div>
                <div class="nail bottom-right"></div>
                <p id="sentence-text"></p>
            </div>

            <div class="control-btn" id="btn-next">
                <svg viewBox="0 0 24 24">
                    <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>
                </svg>
            </div>
        </div>

        <div id="bottom-section">
            <textarea id="input-field" autocomplete="off" spellcheck="false"></textarea>
        </div>

    </div>

    <canvas id="confetti-canvas"></canvas>

    <script>
        // --- 1. База Даних (30 речень, 3 клас, словникові слова, без повторів) ---
        const sentences = [
            { original: "Ми бачили великого (ведмідь).", correct: "Ми бачили великого ведмедя." },
            { original: "Діти гуляли на широкій (вулиця).", correct: "Діти гуляли на широкій вулиці." },
            { original: "Мій брат живе у (Київ).", correct: "Мій брат живе у Києві." },
            { original: "Мама купила солодкі (апельсин).", correct: "Мама купила солодкі апельсини." },
            { original: "Зошити лежать у новому (портфель).", correct: "Зошити лежать у новому портфелі." },
            { original: "На галявині ми побачили (заєць).", correct: "На галявині ми побачили зайця." },
            { original: "Хлопчик пишався золотою (медаль).", correct: "Хлопчик пишався золотою медаллю." },
            { original: "Ми грілися біля теплого (вогнище).", correct: "Ми грілися біля теплого вогнища." },
            { original: "Дідусь набрав води з (криниця).", correct: "Дідусь набрав води з криниці." },
            { original: "Ми милувалися золотою (пшениця).", correct: "Ми милувалися золотою пшеницею." },
            { original: "Ми довго сиділи за (комп'ютер).", correct: "Ми довго сиділи за комп'ютером." },
            { original: "Я подзвонив другу по (телефон).", correct: "Я подзвонив другу по телефону." },
            { original: "Вчора ми були в (театр).", correct: "Вчора ми були в театрі." },
            { original: "Кіт солодко спить на (диван).", correct: "Кіт солодко спить на дивані." },
            { original: "Діти гралися на пухнастому (килим).", correct: "Діти гралися на пухнастому килимі." },
            { original: "Вчителька попросила допомогти (черговий).", correct: "Вчителька попросила допомогти черговому." },
            { original: "Ми пишаємося нашою рідною (Україна).", correct: "Ми пишаємося нашою рідною Україною." },
            { original: "Батько працює головним (директор).", correct: "Батько працює головним директором." },
            { original: "Ластівки повертаються ранньою (весна).", correct: "Ластівки повертаються ранньою весною." },
            { original: "Жовте листя опадає пізньою (осінь).", correct: "Жовте листя опадає пізньою осінню." },
            { original: "Ми зліпили сніговика холодною (зима).", correct: "Ми зліпили сніговика холодною зимою." },
            { original: "Всі діти радіють теплому (літо).", correct: "Всі діти радіють теплому літу." },
            { original: "Песик сховався під великим (дерево).", correct: "Песик сховався під великим деревом." },
            { original: "Дівчинка намалювала дуже красиву (квітка).", correct: "Дівчинка намалювала дуже красиву квітку." },
            { original: "Маленькі пташки співають у (ліс).", correct: "Маленькі пташки співають у лісі." },
            { original: "Швидкі рибки плавають у (озеро).", correct: "Швидкі рибки плавають в озері." },
            { original: "Ми знайшли багато (гриб).", correct: "Ми знайшли багато грибів." },
            { original: "Зранку ми раділи теплому (сонце).", correct: "Зранку ми раділи теплому сонцю." },
            { original: "Хлопчик написав листа своєму (друг).", correct: "Хлопчик написав листа своєму другу." },
            { original: "Білка сховала горішки у (дупло).", correct: "Білка сховала горішки у дуплі." }
        ];

        // --- 2. Глобальні змінні ---
        let currentIndex = 0;
        let isAnimating = false; // Блокування вводу під час анімації успіху
        const textElement = document.getElementById('sentence-text');
        const inputField = document.getElementById('input-field');
        
        // --- 3. Web Audio API для генерації звуків "на льоту" ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(frequency, type, duration, vol=0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playSuccessSound() {
            setTimeout(() => playTone(523.25, 'sine', 0.3, 0.2), 0);   
            setTimeout(() => playTone(659.25, 'sine', 0.3, 0.2), 100); 
            setTimeout(() => playTone(783.99, 'sine', 0.3, 0.2), 200); 
            setTimeout(() => playTone(1046.50, 'sine', 0.5, 0.2), 300); 
        }

        function playErrorSound() {
            playTone(150, 'sawtooth', 0.4, 0.3);
            setTimeout(() => playTone(130, 'sawtooth', 0.5, 0.3), 150);
        }

        function playTypeSound() {
            playTone(800 + Math.random()*200, 'triangle', 0.05, 0.05);
        }

        // --- 4. Логіка гри ---

        function renderSentence() {
            isAnimating = false;
            const sentence = sentences[currentIndex].original;
            const formatted = sentence.replace(/\((.*?)\)/g, '<span class="highlight">$1</span>');
            textElement.innerHTML = formatted;
            inputField.value = "";
            inputField.style.borderColor = "#FF8C00";
            inputField.disabled = false;
            
            // Затримка для фокусу після перемалювання
            setTimeout(() => inputField.focus(), 50);
        }

        // Нормалізація рядків для порівняння
        function normalizeString(str) {
            return str.toLowerCase()
                      .replace(/[.,!?]/g, '')
                      .replace(/\n/g, ' ')
                      .replace(/\s+/g, ' ')
                      .replace(/ в /g, ' у ') 
                      .trim();
        }

        // Автоматична перевірка при введенні (без додаткової кнопки)
        function checkAnswerAuto() {
            if (isAnimating) return;
            const userText = inputField.value;
            const correctText = sentences[currentIndex].correct;
            
            // Якщо текст повністю збігається — одразу успіх!
            if (normalizeString(userText) === normalizeString(correctText)) {
                isAnimating = true;
                inputField.disabled = true; // Блокуємо, щоб дитина насолодилась перемогою
                inputField.style.borderColor = "#4CAF50"; // Зелена рамка
                
                playSuccessSound();
                shootConfetti();
                
                setTimeout(() => {
                    nextSentence();
                }, 2500);
            }
        }

        // Ручна перевірка, якщо дитина натисла Enter, а відповідь ще неповна чи з помилкою
        function checkAnswerManual() {
            if (isAnimating) return;
            const userText = inputField.value;
            const correctText = sentences[currentIndex].correct;
            
            if (normalizeString(userText) !== normalizeString(correctText)) {
                playErrorSound();
                inputField.classList.add('error-shake');
                setTimeout(() => {
                    inputField.classList.remove('error-shake');
                }, 500);
            }
        }

        function nextSentence() {
            currentIndex = (currentIndex + 1) % sentences.length;
            renderSentence();
        }

        function prevSentence() {
            currentIndex = (currentIndex - 1 + sentences.length) % sentences.length;
            renderSentence();
        }

        // --- 5. Обробники подій ---
        document.getElementById('btn-next').addEventListener('click', nextSentence);
        document.getElementById('btn-prev').addEventListener('click', prevSentence);

        inputField.addEventListener('input', () => {
            playTypeSound();
            checkAnswerAuto(); // Перевіряємо при кожному натисканні клавіші
        });

        inputField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // Забороняємо перенесення рядка
                checkAnswerManual(); // Перевіряємо на помилку (правильна відповідь вже зловиться в 'input')
            }
        });

        // --- 6. Система частинок (Конфетті) ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function shootConfetti() {
            const colors = ['#FFC107', '#FF5722', '#4CAF50', '#2196F3', '#E91E63'];
            for(let i=0; i<120; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height - 100,
                    r: Math.random() * 8 + 4,
                    dx: Math.random() * 30 - 15,
                    dy: Math.random() * -25 - 10,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0,
                    decay: Math.random() * 0.015 + 0.01
                });
            }
            animateConfetti();
        }

        function animateConfetti() {
            if (particles.length === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                
                p.x += p.dx;
                p.y += p.dy;
                p.dy += 0.5; // гравітація
                p.life -= p.decay;
                
                if(p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            ctx.globalAlpha = 1.0;
            requestAnimationFrame(animateConfetti);
        }

        // --- Ініціалізація гри ---
        renderSentence();

    </script>
</body>
</html>
