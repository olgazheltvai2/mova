<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Літнє завдання</title>
    <style>
        /* Скидання стандартних відступів та налаштування шрифтів */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB; /* Базовий колір неба */
        }

        /* Контейнер для SVG фону */
        #bg-svg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Анімація для сонячних променів */
        @keyframes rotateSun {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .sun-rays {
            transform-origin: 850px 150px;
            animation: rotateSun 40s linear infinite;
        }

        /* Анімація для хмар */
        @keyframes floatCloud {
            0% { transform: translateX(-200px); }
            100% { transform: translateX(1200px); }
        }
        .cloud {
            animation: floatCloud 60s linear infinite;
        }
        .cloud-slow {
            animation: floatCloud 90s linear infinite;
            animation-delay: -30s;
        }

        /* Анімація пульсації світіння сонця */
        @keyframes pulseGlow {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(1); }
        }
        .sun-glow-circle {
            transform-origin: 850px 150px;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        /* Контейнер для частинок (пилок, пелюстки) */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Щоб не блокувати кліки */
        }

        /* Головний контейнер для тексту (Стилізований під Glassmorphism, жодних білих прямокутників) */
        #text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            width: 80%;
            max-width: 900px;
            /* Складний напівпрозорий фон з градієнтом */
            background: linear-gradient(135deg, rgba(255, 235, 153, 0.85), rgba(255, 204, 153, 0.7));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2), 
                        inset 0 0 20px rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        /* Стилізація самого тексту */
        .task-text {
            font-size: 32px;
            line-height: 1.8;
            color: #4A2E15; /* Темно-коричневий для гарного контрасту та теплої атмосфери */
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            margin: 15px 0;
        }

        /* Стилізація пропусків для заповнення */
        .blank-line {
            display: inline-block;
            width: 180px;
            height: 35px;
            border-bottom: 4px dashed #D2691E; /* Колір стиглого апельсина/кориці */
            margin: 0 10px;
            vertical-align: bottom;
            position: relative;
        }

        /* Маленька анімація для пропусків, щоб вони виглядали "живими" */
        .blank-line::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 4px;
            background: #FF4500;
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.3s ease;
        }
        .blank-line:hover::after {
            transform: scaleX(1);
            animation: pulseGlow 1.5s infinite;
        }

        /* Адаптивність для менших екранів */
        @media (max-width: 768px) {
            .task-text { font-size: 22px; }
            .blank-line { width: 120px; }
            #text-container { padding: 30px; width: 90%; }
        }
    </style>
</head>
<body>

    <div id="bg-svg-container">
        <svg width="100%" height="100%" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
            <defs>
                <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#4DA8DA; stop-opacity:1" />
                    <stop offset="60%" style="stop-color:#90E0EF; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#FFE4B5; stop-opacity:1" />
                </linearGradient>
                
                <linearGradient id="hillGradBack" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#556B2F; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#2E8B57; stop-opacity:1" />
                </linearGradient>

                <linearGradient id="hillGradFront" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#7CFC00; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#32CD32; stop-opacity:1" />
                </linearGradient>

                <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#FFD700; stop-opacity:1" />
                    <stop offset="40%" style="stop-color:#FFA500; stop-opacity:0.8" />
                    <stop offset="100%" style="stop-color:#FF4500; stop-opacity:0" />
                </radialGradient>

                <filter id="blurFilter" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="5" />
                </filter>
            </defs>

            <rect width="1000" height="600" fill="url(#skyGrad)" />

            <g class="sun-group">
                <circle cx="850" cy="150" r="150" fill="url(#sunGlow)" class="sun-glow-circle" />
                <g class="sun-rays" stroke="#FFD700" stroke-width="4" stroke-linecap="round" opacity="0.6">
                    <line x1="850" y1="20" x2="850" y2="280" />
                    <line x1="720" y1="150" x2="980" y2="150" />
                    <line x1="758" y1="58" x2="942" y2="242" />
                    <line x1="758" y1="242" x2="942" y2="58" />
                    <line x1="800" y1="30" x2="900" y2="270" />
                    <line x1="900" y1="30" x2="800" y2="270" />
                    <line x1="730" y1="100" x2="970" y2="200" />
                    <line x1="730" y1="200" x2="970" y2="100" />
                </g>
                <circle cx="850" cy="150" r="45" fill="#FFFF00" filter="url(#blurFilter)" />
                <circle cx="850" cy="150" r="40" fill="#FFF8DC" />
            </g>

            <g class="cloud" fill="#FFFFFF" opacity="0.8" filter="url(#blurFilter)">
                <path d="M 150 180 Q 170 150 200 160 Q 230 130 270 150 Q 310 140 330 180 Q 360 190 340 220 L 140 220 Q 120 190 150 180 Z" />
            </g>
            <g class="cloud-slow" fill="#FFFFFF" opacity="0.6" filter="url(#blurFilter)" transform="scale(0.7) translate(400, 50)">
                <path d="M 150 180 Q 170 150 200 160 Q 230 130 270 150 Q 310 140 330 180 Q 360 190 340 220 L 140 220 Q 120 190 150 180 Z" />
            </g>

            <path d="M-50,450 Q200,320 500,420 T1050,380 L1050,650 L-50,650 Z" fill="url(#hillGradBack)" />
            
            <path d="M-100,550 Q250,400 650,520 T1100,480 L1100,650 L-100,650 Z" fill="url(#hillGradFront)" />

            <g transform="translate(180, 580)">
                <path d="M-25,0 C-25,-100 -40,-200 -70,-280 C-10,-240 0,-150 0,-100 C0,-150 30,-220 60,-270 C20,-200 15,-100 20,0 Z" fill="#5C4033" />
                <path d="M-5,-120 Q-30,-180 -80,-200" stroke="#5C4033" stroke-width="12" fill="none" stroke-linecap="round" />
                <path d="M10,-150 Q40,-200 90,-220" stroke="#5C4033" stroke-width="10" fill="none" stroke-linecap="round" />
                
                <circle cx="-70" cy="-280" r="70" fill="#2E8B57" opacity="0.95"/>
                <circle cx="-40" cy="-330" r="80" fill="#006400" opacity="0.9"/>
                <circle cx="30" cy="-310" r="75" fill="#228B22" opacity="0.95"/>
                <circle cx="60" cy="-260" r="65" fill="#008000" opacity="0.9"/>
                <circle cx="-10" cy="-250" r="90" fill="#2E8B57" opacity="0.95"/>
                <circle cx="0" cy="-360" r="85" fill="#006400" opacity="0.9"/>

                <g transform="translate(-50, -250)">
                    <path d="M0,0 Q10,-20 20,0" stroke="#32CD32" stroke-width="2" fill="none"/>
                    <circle cx="0" cy="0" r="7" fill="#8B0000" /> <circle cx="-2" cy="-2" r="2" fill="#FFC0CB" opacity="0.6" /> <circle cx="20" cy="0" r="7" fill="#8B0000" />
                    <circle cx="18" cy="-2" r="2" fill="#FFC0CB" opacity="0.6" />
                </g>
                <g transform="translate(30, -280) scale(1.2)">
                    <path d="M0,0 Q10,-20 20,0" stroke="#32CD32" stroke-width="2" fill="none"/>
                    <circle cx="0" cy="0" r="7" fill="#DC143C" /> <circle cx="-2" cy="-2" r="2" fill="#FFB6C1" opacity="0.8" />
                    <circle cx="20" cy="0" r="7" fill="#DC143C" />
                    <circle cx="18" cy="-2" r="2" fill="#FFB6C1" opacity="0.8" />
                </g>
                <g transform="translate(-20, -320) scale(0.9)">
                    <path d="M0,0 Q10,-20 20,0" stroke="#32CD32" stroke-width="2" fill="none"/>
                    <circle cx="0" cy="0" r="7" fill="#8B0000" />
                    <circle cx="20" cy="0" r="7" fill="#DC143C" />
                </g>
            </g>

            <path d="M800,580 Q850,520 900,560 Q950,510 1000,550 L1000,600 L800,600 Z" fill="#228B22" />
            <circle cx="830" cy="540" r="6" fill="#FF69B4" />
            <circle cx="880" cy="570" r="5" fill="#FFD700" />
            <circle cx="950" cy="530" r="7" fill="#FF69B4" />
            <circle cx="980" cy="560" r="5" fill="#8A2BE2" />
        </svg>
    </div>

    <canvas id="particles-canvas"></canvas>

    <div id="text-container">
        <div class="task-text">
            Настало <span class="blank-line"></span> літо.
        </div>
        <div class="task-text">
            На небі з'явилося <span class="blank-line"></span> сонечко.
        </div>
        <div class="task-text">
            У садах дозрівають <span class="blank-line"></span> вишні <br>
            та <span class="blank-line"></span> черешні.
        </div>
        <div class="task-text">
            Попереду на нас чекають <span class="blank-line"></span> канікули!
        </div>
    </div>

    <script>
        // --- КОД: Складний генератор частинок (пилок та пелюстки) ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        // Налаштування розміру полотна відповідно до вікна
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particlesArray = [];
        const numberOfParticles = 80; // Кількість одночасних частинок

        // Клас для створення об'єкта частинки
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Визначаємо тип: пилок (жовтий, маленький) або пелюстка (рожевий, падає)
                this.type = Math.random() > 0.7 ? 'petal' : 'pollen';
                
                if (this.type === 'pollen') {
                    this.size = Math.random() * 2.5 + 0.5;
                    this.speedX = Math.random() * 1 - 0.5;
                    this.speedY = Math.random() * -1 - 0.2; // Пилок летить вгору
                    this.color = `rgba(255, 223, 0, ${Math.random() * 0.6 + 0.2})`;
                } else {
                    this.size = Math.random() * 5 + 3;
                    this.speedX = Math.random() * 2 - 1;
                    this.speedY = Math.random() * 1.5 + 0.5; // Пелюстки падають вниз
                    this.color = `rgba(255, 182, 193, ${Math.random() * 0.7 + 0.3})`;
                    this.angle = Math.random() * 360; // Для обертання пелюстки
                    this.spin = Math.random() * 0.1 - 0.05;
                }
            }

            // Оновлення позиції частинки
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Додаємо легке погойдування (синусоїдальний рух)
                if (this.type === 'petal') {
                    this.x += Math.sin(this.y * 0.02) * 0.5;
                    this.angle += this.spin;
                } else {
                    this.x += Math.sin(this.y * 0.05) * 0.2;
                }

                // Перевірка виходу за межі екрану та респавн
                if (this.type === 'pollen' && this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                } else if (this.type === 'petal' && this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
            }

            // Відмальовка частинки на полотні
            draw() {
                ctx.save();
                ctx.beginPath();
                
                if (this.type === 'pollen') {
                    // Малюємо круглий пилок зі світінням
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = "yellow";
                    ctx.fill();
                } else {
                    // Малюємо овальну пелюстку
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.ellipse(0, 0, this.size, this.size / 2, 0, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                
                ctx.closePath();
                ctx.restore();
            }
        }

        // Ініціалізація масиву частинок
        function initParticles() {
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // Головний цикл анімації
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        // Запуск
        initParticles();
        animateParticles();
    </script>
</body>
</html>
