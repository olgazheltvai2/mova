<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детектив Лісу</title>
    <style>
        /* Основні стилі: скидання відступів, заборона виділення тексту, повноекранний режим */
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Жодних білих фонів - складний градієнт лісової галявини */
            background: radial-gradient(circle at 50% 100%, #1e5c3a 0%, #0d2b18 60%, #05140b 100%);
        }

        /* SVG Фон з анімаціями */
        #bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Персонаж Лис-Детектив */
        #character-svg {
            position: absolute;
            bottom: 20px;
            right: 5%;
            width: 350px;
            height: 450px;
            z-index: 10;
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        /* Анімація дихання та руху лиса */
        @keyframes breathe {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.02) translateY(-5px); }
        }
        .fox-body {
            animation: breathe 3s infinite ease-in-out;
            transform-origin: bottom center;
        }

        /* Головний контейнер гри */
        #game-container {
            position: absolute;
            top: 50%;
            left: 45%;
            transform: translate(-50%, -50%);
            width: 70%;
            max-width: 900px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Стилізована дошка для тексту (імітація магічного сувою/дерева). Збільшено шрифт */
        #text-board {
            background: linear-gradient(135deg, #d39c5b, #b07c41, #8b5a2b);
            border: 8px solid #5c3a21;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,0.5),
                0 15px 30px rgba(0,0,0,0.6),
                0 0 40px rgba(211, 156, 91, 0.4);
            color: #ffe6c2;
            font-size: 38px; /* Значно збільшений шрифт для дітей */
            line-height: 1.7;
            text-align: justify;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            position: relative;
            min-height: 300px;
            font-weight: 600;
        }

        /* Кожне слово можна натиснути */
        .word {
            display: inline-block;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0 6px;
            border-radius: 8px;
        }
        .word:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        .word.error-highlight {
            color: #ff6b6b;
            text-shadow: 0 0 15px #ff6b6b;
            animation: shake 0.5s;
        }
        .word.success-highlight {
            color: #51ff00;
            text-shadow: 0 0 15px #51ff00;
            font-weight: 800;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Панель з відповіддю, що з'являється. Збільшено шрифт */
        #correction-panel {
            margin-top: 25px;
            background: rgba(44, 62, 80, 0.95);
            border: 4px solid #3498db;
            border-radius: 15px;
            padding: 20px 30px;
            color: #ecf0f1;
            font-size: 30px; /* Збільшено шрифт пояснення */
            line-height: 1.4;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
            font-weight: 500;
            text-align: center;
        }
        #correction-panel.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Контейнер кнопок */
        #controls {
            display: flex;
            gap: 25px;
            margin-top: 35px;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        /* Мінімалістичні яскраві кнопки */
        button {
            background: linear-gradient(45deg, #2980b9, #8e44ad);
            border: none;
            border-radius: 50px;
            padding: 18px 35px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            outline: none;
        }
        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            background: linear-gradient(45deg, #3498db, #9b59b6);
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .nav-btn {
            background: linear-gradient(45deg, #c0392b, #d35400);
            width: 70px;
            height: 70px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
        }

        /* Контейнер для ефектів */
        #effects-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: fall 1s ease-out forwards;
        }

        @keyframes fall {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0) translateY(100px); opacity: 0; }
        }

    </style>
</head>
<body>

    <svg id="bg-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
        <defs>
            <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f1c40f" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#f1c40f" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="trunk" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#2c1e16"/>
                <stop offset="50%" stop-color="#4a3525"/>
                <stop offset="100%" stop-color="#1a120c"/>
            </linearGradient>
            <filter id="blur">
                <feGaussianBlur stdDeviation="3"/>
            </filter>
        </defs>
        
        <g opacity="0.4">
            <rect x="100" y="0" width="80" height="1080" fill="url(#trunk)"/>
            <rect x="400" y="0" width="120" height="1080" fill="url(#trunk)"/>
            <rect x="800" y="0" width="60" height="1080" fill="url(#trunk)"/>
            <rect x="1200" y="0" width="150" height="1080" fill="url(#trunk)"/>
            <rect x="1600" y="0" width="90" height="1080" fill="url(#trunk)"/>
        </g>
        
        <g opacity="0.8">
            <path d="M-50,0 L50,0 L80,1080 L-50,1080 Z" fill="url(#trunk)"/>
            <path d="M1850,0 L1950,0 L1980,1080 L1800,1080 Z" fill="url(#trunk)"/>
            <path d="M50,200 Q 250,100 350,250" fill="none" stroke="url(#trunk)" stroke-width="30" stroke-linecap="round"/>
            <path d="M1850,300 Q 1650,200 1550,450" fill="none" stroke="url(#trunk)" stroke-width="40" stroke-linecap="round"/>
        </g>

        <path d="M100,0 Q150,200 80,400 T120,800" fill="none" stroke="#27ae60" stroke-width="5" opacity="0.7"/>
        <path d="M1850,0 Q1800,300 1880,600 T1820,1000" fill="none" stroke="#2ecc71" stroke-width="8" opacity="0.6"/>

        <g>
            <circle cx="300" cy="500" r="10" fill="url(#glow)">
                <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
                <animate attributeName="cy" values="500;480;500" dur="4s" repeatCount="indefinite"/>
            </circle>
            <circle cx="1400" cy="300" r="15" fill="url(#glow)">
                <animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" repeatCount="indefinite" begin="1s"/>
                <animate attributeName="cx" values="1400;1420;1400" dur="5s" repeatCount="indefinite"/>
            </circle>
            <circle cx="800" cy="800" r="12" fill="url(#glow)">
                <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
            </circle>
            <circle cx="1000" cy="200" r="8" fill="url(#glow)">
                <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" begin="2s"/>
                <animate attributeName="cy" values="200;150;200" dur="6s" repeatCount="indefinite"/>
            </circle>
        </g>
    </svg>

    <svg id="character-svg" viewBox="0 0 350 450" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="fox-fur" x1="0%" y1="0%" x2="100%" y2="100%">

                <stop offset="100%" stop-color="#d35400"/>
            </linearGradient>
            <linearGradient id="fox-belly" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#fdf5e6"/>
                <stop offset="100%" stop-color="#ffe4b5"/>
            </linearGradient>
            <linearGradient id="coat" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#2c3e50"/>
                <stop offset="100%" stop-color="#1a252f"/>
            </linearGradient>
        </defs>

        <g>
            <animateTransform attributeName="transform" type="rotate" values="-5 175 350; 5 175 350; -5 175 350" dur="4s" repeatCount="indefinite"/>
            <path d="M 220 350 C 350 350, 400 200, 300 150 C 250 120, 200 250, 220 350 Z" fill="url(#fox-fur)"/>
            <path d="M 320 180 C 360 170, 380 200, 330 250 C 300 280, 280 220, 320 180 Z" fill="#fdf5e6"/>
        </g>

        <g class="fox-body">
            <path d="M 120 200 L 230 200 L 270 420 L 80 420 Z" fill="url(#coat)"/>
            <path d="M 150 200 L 200 200 L 220 420 L 130 420 Z" fill="#ecf0f1"/>
            <path d="M 165 210 L 185 210 L 175 280 Z" fill="#c0392b"/>
            
            <path d="M 90 420 L 110 420 L 100 440 Z" fill="#2c3e50"/>
            <path d="M 240 420 L 260 420 L 250 440 Z" fill="#2c3e50"/>

            <g>
                <animateTransform attributeName="transform" type="translate" values="0 0; -10 -15; 0 0" dur="5s" repeatCount="indefinite"/>
                <path d="M 100 250 C 50 280, 20 220, 60 180" fill="none" stroke="url(#fox-fur)" stroke-width="25" stroke-linecap="round"/>
                <circle cx="50" cy="170" r="30" fill="rgba(173, 216, 230, 0.4)" stroke="#7f8c8d" stroke-width="8"/>
                <line x1="25" y1="195" x2="-10" y2="230" stroke="#7f8c8d" stroke-width="12" stroke-linecap="round"/>
                <circle cx="40" cy="160" r="8" fill="rgba(255,255,255,0.8)"/>
            </g>

            <path d="M 250 250 C 300 280, 280 320, 250 350" fill="none" stroke="url(#fox-fur)" stroke-width="20" stroke-linecap="round"/>

            <g transform="translate(175, 140)">
                <animateTransform attributeName="transform" type="rotate" values="-2; 2; -2" dur="6s" repeatCount="indefinite" additive="sum"/>
                <path d="M -40 -30 L -70 -100 L -10 -50 Z" fill="url(#fox-fur)"/>
                <path d="M -45 -40 L -60 -85 L -20 -50 Z" fill="#2c3e50"/>
                <path d="M 40 -30 L 70 -100 L 10 -50 Z" fill="url(#fox-fur)"/>
                <path d="M 45 -40 L 60 -85 L 20 -50 Z" fill="#2c3e50"/>
                
                <path d="M -80 0 C -80 -60, 80 -60, 80 0 C 80 50, 20 80, 0 100 C -20 80, -80 50, -80 0 Z" fill="url(#fox-fur)"/>
                <path d="M -80 0 C -40 20, -20 50, 0 100 C -20 80, -80 50, -80 0 Z" fill="url(#fox-belly)"/>
                <path d="M 80 0 C 40 20, 20 50, 0 100 C 20 80, 80 50, 80 0 Z" fill="url(#fox-belly)"/>
                
                <circle cx="0" cy="95" r="8" fill="#111"/>
                
                <g>
                    <circle cx="-30" cy="0" r="15" fill="#fff"/>
                    <circle cx="30" cy="0" r="15" fill="#fff"/>
                    <circle cx="-28" cy="2" r="7" fill="#111"/>
                    <circle cx="28" cy="2" r="7" fill="#111"/>
                    <circle cx="-32" cy="-1" r="2" fill="#fff"/>
                    <circle cx="26" cy="-1" r="2" fill="#fff"/>
                    
                    <path d="M -50 -5 Q -30 -20 -10 -5 Q -30 -15 -50 -5 Z" fill="url(#fox-fur)">
                        <animate attributeName="d" 
                                 values="M -50 -5 Q -30 -20 -10 -5 Q -30 -15 -50 -5 Z; 
                                         M -50 0 Q -30 5 -10 0 Q -30 2 -50 0 Z; 
                                         M -50 -5 Q -30 -20 -10 -5 Q -30 -15 -50 -5 Z" 
                                 dur="4s" keyTimes="0; 0.05; 0.1" repeatCount="indefinite"/>
                    </path>
                    <path d="M 10 -5 Q 30 -20 50 -5 Q 30 -15 10 -5 Z" fill="url(#fox-fur)">
                        <animate attributeName="d" 
                                 values="M 10 -5 Q 30 -20 50 -5 Q 30 -15 10 -5 Z; 
                                         M 10 0 Q 30 5 50 0 Q 30 2 10 0 Z; 
                                         M 10 -5 Q 30 -20 50 -5 Q 30 -15 10 -5 Z" 
                                 dur="4s" keyTimes="0; 0.05; 0.1" repeatCount="indefinite"/>
                    </path>
                </g>
                
                <path d="M -70 -40 C -70 -60, 70 -60, 70 -40 L 50 -80 L -50 -80 Z" fill="#2c3e50"/>
                <path d="M -80 -40 L 80 -40 L 80 -30 L -80 -30 Z" fill="#e74c3c"/>
            </g>
        </g>
    </svg>

    <div id="game-container">
        <div id="text-board">
            </div>
        
        <div id="correction-panel">
            </div>

        <div id="controls">
            <button class="nav-btn" id="btn-prev" aria-label="Попереднє">&#9664;</button>
            <button id="btn-answer">Відповідь</button>
            <button class="nav-btn" id="btn-next" aria-label="Наступне">&#9654;</button>
        </div>
    </div>

    <div id="effects-layer"></div>

    <script>
        // --- ДАНІ ГРИ: 10 текстів із фактичними помилками ---
        const gameData = [
            {
                text: "В лісі жила маленька білочка. Вона дуже любила збирати горішки. Зимою білочка спала в барлозі і смоктала лапу. Навесні вона прокидалася голодною.",
                errorWords: ["спала", "в", "барлозі", "і", "смоктала", "лапу."],
                correction: "Білочки не сплять у барлозі і не смокчуть лапу! Це роблять ведмеді."
            },
            {
                text: "Настало спекотне літо. Діти взяли санчата і побігли на гірку. Вони ліпили сніговика до самого вечора. А потім пили чай, щоб зігрітися.",
                errorWords: ["взяли", "санчата", "і", "побігли", "на", "гірку.", "Вони", "ліпили", "сніговика"],
                correction: "Влітку не катаються на санчатах і не ліплять сніговиків, бо немає снігу!"
            },
            {
                text: "Хлопчик пішов до бібліотеки за новою книгою про динозаврів. Він довго вибирав найцікавішу. Коли він повернувся з басейну, мама запитала про книгу. Хлопчик з радістю почав читати.",
                errorWords: ["повернувся", "з", "басейну,"],
                correction: "Хлопчик пішов до бібліотеки, тому повернутися він мав з бібліотеки, а не з басейну."
            },
            {
                text: "Червона Шапочка взяла кошик з пиріжками і пішла до бабусі. Дорогою вона зустріла сірого вовка. Вовк запитав її про дорогу. І тоді Попелюшка розповіла йому про хворобу бабусі.",
                errorWords: ["Попелюшка"],
                correction: "До бабусі йшла Червона Шапочка, а не Попелюшка!"
            },
            {
                text: "Вранці я прокинувся, вмився і поснідав. Потім я надів улюблену піжаму і пішов до школи. На уроці ми розв'язували цікаві задачі. Вчителька мене дуже похвалила.",
                errorWords: ["надів", "улюблену", "піжаму", "і", "пішов", "до", "школи."],
                correction: "До школи не ходять у піжамі! Її одягають перед сном."
            },
            {
                text: "Кіт Мурчик сидів на ґанку і вмивався лапкою. Він чекав на свою улюблену їжу. Господиня винесла йому велику миску свіжої капусти. Мурчик голосно замурчав від задоволення.",
                errorWords: ["велику", "миску", "свіжої", "капусти."],
                correction: "Коти не їдять свіжу капусту. Вони люблять м'ясо або рибу!"
            },
            {
                text: "Ми вирішили поїхати на море. Зібрали валізи, взяли квитки на потяг і вирушили в дорогу. Через кілька годин наш потяг успішно приземлився в аеропорту. Ми були дуже щасливі.",
                errorWords: ["потяг", "успішно", "приземлився", "в", "аеропорту."],
                correction: "Потяги їздять по рейках! Приземляються в аеропорту літаки."
            },
            {
                text: "На вулиці пішов сильний дощ. Щоб не намокнути, дівчинка відкрила яскраву парасолю. Вона натягнула її на ноги і пішла по калюжах. Вода їй була зовсім не страшна.",
                errorWords: ["натягнула", "її", "на", "ноги"],
                correction: "Парасолю тримають над головою. На ноги одягають гумові чоботи!"
            },
            {
                text: "На фермі настав сонячний ранок. Півень виліз на високий паркан і голосно замукав. Всі тварини одразу прокинулися від цього звуку. Так починається день у селі.",
                errorWords: ["голосно", "замукав."],
                correction: "Півні кукурікають! Мукають корови."
            },
            {
                text: "Тато вирішив забити цвях у стіну. Він хотів повісити нову картину. Тато взяв пилку і сильно вдарив по цвяху. Картина тепер висіла ідеально рівно.",
                errorWords: ["взяв", "пилку", "і", "сильно", "вдарив"],
                correction: "Цвяхи забивають молотком, а не пилкою!"
            }
        ];

        let currentLevel = 0;
        let isAnswerRevealed = false;

        // --- AUDIO SYSTEM (Web Audio API для генерації звуків без файлів) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Створення звуку "Клік"
        function playClick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Створення звуку "Успіх" (арпеджіо)
        function playSuccess() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                const startTime = audioCtx.currentTime + i * 0.1;
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.3, startTime + 0.05);
                gain.gain.linearRampToValueAtTime(0, startTime + 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + 0.3);
            });
        }

        // Створення звуку "Помилка" (низький сигнал)
        function playError() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // --- ВІЗУАЛЬНІ ЕФЕКТИ ---
        function createParticles(x, y, color) {
            const container = document.getElementById('effects-layer');
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 10 + 5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.backgroundColor = color;
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                
                // Рандомний розльот
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 800 + Math.random() * 400,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                });

                container.appendChild(particle);
                setTimeout(() => particle.remove(), 1200);
            }
        }

        // --- ЛОГІКА ГРИ ---
        const board = document.getElementById('text-board');
        const correctionPanel = document.getElementById('correction-panel');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const btnAnswer = document.getElementById('btn-answer');
        const characterBody = document.querySelector('.fox-body');

        function loadLevel(index) {
            isAnswerRevealed = false;
            correctionPanel.classList.remove('visible');
            board.innerHTML = '';
            
            const levelData = gameData[index];
            const words = levelData.text.split(' ');

            words.forEach((wordText, i) => {
                const span = document.createElement('span');
                span.textContent = wordText + ' ';
                span.className = 'word';
                
                // Перевірка чи належить слово до помилкових (очищаємо від пунктуації для порівняння)
                const cleanWord = wordText.replace(/[.,]/g, '');
                const isErrorPart = levelData.errorWords.some(ew => ew.replace(/[.,]/g, '') === cleanWord);
                
                if (isErrorPart) {
                    span.dataset.isError = "true";
                }

                span.addEventListener('click', (e) => handleWordClick(e, span));
                board.appendChild(span);
            });

            // Анімація Лиса (радіє новому завданню)
            characterBody.style.transform = 'scaleY(1.1) translateY(-15px)';
            setTimeout(() => characterBody.style.transform = '', 300);
        }

        function handleWordClick(e, spanElement) {
            if (isAnswerRevealed) return;
            
            const rect = spanElement.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            if (spanElement.dataset.isError === "true") {
                spanElement.classList.add('success-highlight');
                playSuccess();
                createParticles(x, y, '#51ff00');
                
                // Якщо знайшли помилку, автоматично показуємо відповідь
                setTimeout(revealAnswer, 800);
            } else {
                spanElement.classList.add('error-highlight');
                playError();
                createParticles(x, y, '#ff6b6b');
                
                setTimeout(() => {
                    spanElement.classList.remove('error-highlight');
                }, 500);
            }
        }

        function revealAnswer() {
            if (isAnswerRevealed) return;
            isAnswerRevealed = true;
            playClick();
            
            // Підсвічуємо всі правильні (помилкові за сюжетом) слова
            const allWords = board.querySelectorAll('.word');
            allWords.forEach(w => {
                if (w.dataset.isError === "true") {
                    w.classList.add('error-highlight');
                    w.style.color = '#ff6b6b';
                    w.style.fontWeight = 'bold';
                    w.style.animation = 'none'; // вимикаємо тряску після показу
                }
            });

            correctionPanel.textContent = gameData[currentLevel].correction;
            correctionPanel.classList.add('visible');
            
            // Лис підстрибує
            characterBody.style.transform = 'translateY(-30px)';
            setTimeout(() => characterBody.style.transform = '', 400);
        }

        // Навігація
        btnNext.addEventListener('click', () => {
            playClick();
            currentLevel = (currentLevel + 1) % gameData.length;
            loadLevel(currentLevel);
        });

        btnPrev.addEventListener('click', () => {
            playClick();
            currentLevel = (currentLevel - 1 + gameData.length) % gameData.length;
            loadLevel(currentLevel);
        });

        btnAnswer.addEventListener('click', revealAnswer);

        // Ініціалізація
        loadLevel(currentLevel);

    </script>
</body>
</html>
