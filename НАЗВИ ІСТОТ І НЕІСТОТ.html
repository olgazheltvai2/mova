<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Фабрика Слів</title>
    <style>
        /* Основні стилі */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a0b2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
        }

        #bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Стилізована дошка з текстом - РОЗТЯГНУТА ТА ЗБІЛЬШЕНИЙ ШРИФТ */
        #text-board {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 96%; /* Розтягнуто по ширині */
            max-width: 1800px; /* Дуже великий максимум для широких екранів */
            min-height: 40%;
            height: auto;
            background: 
                radial-gradient(circle at top left, rgba(255, 160, 0, 0.2), transparent 70%),
                radial-gradient(circle at bottom right, rgba(255, 87, 34, 0.2), transparent 70%),
                url('data:image/svg+xml;utf8,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M20 0L40 20L20 40L0 20Z" fill="%23d84315" fill-opacity="0.1"/></svg>'),
                #ffb300;
            border: 6px solid #4e342e;
            border-radius: 20px;
            box-shadow: 
                inset 0 0 30px rgba(100, 50, 0, 0.6),
                0 15px 35px rgba(0, 0, 0, 0.8),
                0 0 0 10px #795548;
            padding: 40px 60px;
            color: #3e2723;
            font-size: 48px; /* Значно збільшено розмір шрифту */
            line-height: 1.8;
            font-weight: bold;
            z-index: 10;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 15px; /* Більша відстань між словами */
        }

        /* Болти на кутах дошки */
        .bolt {
            position: absolute;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #b0bec5, #455a64);
            border-radius: 50%;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.5), 2px 2px 4px rgba(0,0,0,0.5);
        }
        .bolt.tl { top: 15px; left: 15px; }
        .bolt.tr { top: 15px; right: 15px; }
        .bolt.bl { bottom: 15px; left: 15px; }
        .bolt.br { bottom: 15px; right: 15px; }

        /* Окремі слова в тексті */
        .word {
            display: inline-block;
            cursor: grab;
            padding: 4px 12px;
            border-radius: 12px;
            transition: all 0.2s ease;
            position: relative;
        }

        .word:hover {
            background-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.1) translateY(-4px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            color: #bf360c;
        }

        .word.found {
            opacity: 0.2;
            pointer-events: none;
            filter: grayscale(100%);
            transform: none;
        }

        /* Клон слова для перетягування */
        .drag-clone {
            position: absolute;
            pointer-events: none;
            z-index: 1000;
            font-size: 54px; /* Ще більший шрифт для клону */
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(45deg, #ff5722, #ff9800);
            padding: 10px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px #ffeb3b;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%) scale(1.1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            white-space: nowrap;
        }

        /* Колби-приймачі */
        .vat-container {
            position: absolute;
            bottom: 5%;
            width: 250px;
            height: 300px;
            z-index: 10;
        }

        #vat-animate {
            left: 10%;
        }

        #vat-inanimate {
            right: 10%;
        }

        /* Індикатори прогресу на колбах */
        .slots {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .slot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.5);
            border: 3px solid #fff;
            box-shadow: inset 0 0 10px #000;
            transition: all 0.3s ease;
        }

        #vat-animate .slot.filled {
            background-color: #00e676;
            box-shadow: 0 0 20px #00e676, inset 0 0 10px #fff;
            border-color: #b2ff59;
        }

        #vat-inanimate .slot.filled {
            background-color: #00b0ff;
            box-shadow: 0 0 20px #00b0ff, inset 0 0 10px #fff;
            border-color: #84ffff;
        }

        /* Кнопки навігації */
        #nav-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }

        .nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.5);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            outline: none;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .nav-btn svg {
            width: 30px;
            height: 30px;
            fill: white;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.5));
        }

        /* Сяйво для колб */
        .vat-glow-animate { filter: drop-shadow(0 0 30px #00e676); }
        .vat-glow-inanimate { filter: drop-shadow(0 0 30px #00b0ff); }
        
        /* Ефекти частинок */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 999;
            animation: particle-fade 1s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        @keyframes particle-fade {
            0% { transform: scale(1) translate(0, 0); opacity: 1; }
            100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <svg id="bg-svg" preserveAspectRatio="none" viewBox="0 0 1920 1080">
        <defs>
            <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#2a0845" />
                <stop offset="100%" stop-color="#6441A5" />
            </linearGradient>
            <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#11051f" />
                <stop offset="100%" stop-color="#3b1d5e" />
            </linearGradient>
            <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
                <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" />
            </pattern>
            <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#b26a00" />
                <stop offset="20%" stop-color="#ffb300" />
                <stop offset="80%" stop-color="#ff8f00" />
                <stop offset="100%" stop-color="#824a00" />
            </linearGradient>
            <linearGradient id="pipeGradV" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#b26a00" />
                <stop offset="20%" stop-color="#ffb300" />
                <stop offset="80%" stop-color="#ff8f00" />
                <stop offset="100%" stop-color="#824a00" />
            </linearGradient>
            
            <g id="gear">
                <circle cx="0" cy="0" r="40" fill="#455a64" stroke="#263238" stroke-width="5"/>
                <circle cx="0" cy="0" r="20" fill="#1a0b2e"/>
                <path d="M-10,-50 L10,-50 L15,-40 L-15,-40 Z" fill="#607d8b"/>
                <path d="M-10,50 L10,50 L15,40 L-15,40 Z" fill="#607d8b"/>
                <path d="M-50,-10 L-50,10 L-40,15 L-40,-15 Z" fill="#607d8b"/>
                <path d="M50,-10 L50,10 L40,15 L40,-15 Z" fill="#607d8b"/>
                <path d="M-35,-35 L-25,-45 L-20,-35 L-30,-25 Z" fill="#607d8b"/>
                <path d="M35,35 L25,45 L20,35 L30,25 Z" fill="#607d8b"/>
                <path d="M-35,35 L-45,25 L-35,20 L-25,30 Z" fill="#607d8b"/>
                <path d="M35,-35 L45,-25 L35,-20 L25,-30 Z" fill="#607d8b"/>
            </g>
        </defs>

        <rect width="1920" height="800" fill="url(#wallGrad)" />
        <rect width="1920" height="800" fill="url(#grid)" />
        <path d="M0,800 L1920,800 L1920,1080 L0,1080 Z" fill="url(#floorGrad)" />
        
        <rect x="150" y="-50" width="40" height="850" fill="url(#pipeGrad)" />
        <rect x="1750" y="-50" width="60" height="850" fill="url(#pipeGrad)" />
        <rect x="-50" y="200" width="2020" height="30" fill="url(#pipeGradV)" />
        <rect x="-50" y="600" width="2020" height="50" fill="url(#pipeGradV)" />

        <g transform="translate(350, 150)">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
            <use href="#gear" />
        </g>
        <g transform="translate(1550, 680) scale(1.5)">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite" />
            <use href="#gear" />
        </g>
    </svg>

    <div id="text-board">
        <div class="bolt tl"></div>
        <div class="bolt tr"></div>
        <div class="bolt bl"></div>
        <div class="bolt br"></div>
        <div id="text-content"></div>
    </div>

    <div id="vat-animate" class="vat-container">
        <svg viewBox="0 0 200 300" width="100%" height="100%">
            <defs>
                <linearGradient id="glassAnim" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
                    <stop offset="20%" stop-color="rgba(255,255,255,0.6)"/>
                    <stop offset="50%" stop-color="rgba(0, 230, 118, 0.3)"/>
                    <stop offset="80%" stop-color="rgba(255,255,255,0.1)"/>
                    <stop offset="100%" stop-color="rgba(0, 230, 118, 0.4)"/>
                </linearGradient>
            </defs>
            <ellipse cx="100" cy="270" rx="80" ry="20" fill="#37474f"/>
            <path d="M20,270 L20,285 Q100,310 180,285 L180,270 Z" fill="#263238"/>
            <path id="fluid-anim" d="M30,260 Q100,240 170,260 L170,150 Q100,160 30,150 Z" fill="rgba(0, 230, 118, 0.5)">
                <animate attributeName="d" values="M30,260 Q100,240 170,260 L170,150 Q100,160 30,150 Z; M30,260 Q100,280 170,260 L170,150 Q100,140 30,150 Z; M30,260 Q100,240 170,260 L170,150 Q100,160 30,150 Z" dur="3s" repeatCount="indefinite" />
            </path>
            <path d="M30,60 L30,260 Q100,290 170,260 L170,60 Q100,80 30,60 Z" fill="url(#glassAnim)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
            <ellipse cx="100" cy="60" rx="70" ry="15" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.8)" stroke-width="3"/>
            <g transform="translate(100, 160)" fill="#00e676" stroke="#fff" stroke-width="2" class="vat-glow-animate">
                <circle cx="0" cy="-30" r="20"/>
                <path d="M-35,20 Q0,-10 35,20 L40,40 L-40,40 Z"/>
                <animateTransform attributeName="transform" type="translate" values="100,160; 100,150; 100,160" dur="2s" repeatCount="indefinite"/>
            </g>
        </svg>
        <div class="slots" id="slots-animate">
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        </div>
    </div>

    <div id="vat-inanimate" class="vat-container">
        <svg viewBox="0 0 200 300" width="100%" height="100%">
            <defs>
                <linearGradient id="glassInanim" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
                    <stop offset="20%" stop-color="rgba(255,255,255,0.6)"/>
                    <stop offset="50%" stop-color="rgba(0, 176, 255, 0.3)"/>
                    <stop offset="80%" stop-color="rgba(255,255,255,0.1)"/>
                    <stop offset="100%" stop-color="rgba(0, 176, 255, 0.4)"/>
                </linearGradient>
            </defs>
            <ellipse cx="100" cy="270" rx="80" ry="20" fill="#37474f"/>
            <path d="M20,270 L20,285 Q100,310 180,285 L180,270 Z" fill="#263238"/>
            <path id="fluid-inanim" d="M30,260 Q100,240 170,260 L170,150 Q100,160 30,150 Z" fill="rgba(0, 176, 255, 0.5)">
                <animate attributeName="d" values="M30,260 Q100,240 170,260 L170,150 Q100,160 30,150 Z; M30,260 Q100,280 170,260 L170,150 Q100,140 30,150 Z; M30,260 Q100,240 170,260 L170,150 Q100,160 30,150 Z" dur="3.5s" repeatCount="indefinite" />
            </path>
            <path d="M30,60 L30,260 Q100,290 170,260 L170,60 Q100,80 30,60 Z" fill="url(#glassInanim)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
            <ellipse cx="100" cy="60" rx="70" ry="15" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.8)" stroke-width="3"/>
            <g transform="translate(100, 160)" fill="#00b0ff" stroke="#fff" stroke-width="2" class="vat-glow-inanimate">
                <path d="M0,-25 L30,-10 L30,20 L0,35 L-30,20 L-30,-10 Z" fill="rgba(0,176,255,0.8)"/>
                <path d="M0,-25 L0,5 L30,-10" fill="rgba(255,255,255,0.3)"/>
                <path d="M-30,-10 L0,5 L0,35" fill="rgba(0,0,0,0.2)"/>
                <animateTransform attributeName="transform" type="translate" values="100,160; 100,145; 100,160" dur="2.5s" repeatCount="indefinite"/>
            </g>
        </svg>
        <div class="slots" id="slots-inanimate">
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        </div>
    </div>

    <div id="nav-buttons">
        <button id="btn-prev" class="nav-btn">
            <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
        </button>
        <button id="btn-next" class="nav-btn">
            <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </button>
    </div>
</div>

<script>
    /* Дані рівнів */
    const levels = [
        {
            text: "Вранці пекар зайшов у кухню. На столі лежало свіже борошно. Маленька дівчинка чекала на свій торт. З духовки йшов приємний аромат. Раптом покупець постукав у двері. Смачний хліб був готовий.",
            animate: ["пекар", "дівчинка", "покупець"], 
            inanimate: ["кухню", "столі", "борошно", "торт", "духовки", "аромат", "двері", "хліб"] 
        },
        {
            text: "Водій зупинив великий автобус. На зупинці стояв школяр. Високий будинок закривав сонце. Учитель поспішав на перший урок. Широка вулиця була дуже галасливою.",
            animate: ["водій", "школяр", "учитель"],
            inanimate: ["автобус", "зупинці", "будинок", "сонце", "урок", "вулиця"]
        },
        {
            text: "Сусід посадив гарне дерево. Маленький хлопчик поливав квіти. Садівник обрізав сухі гілки. Яскраве сонце зігрівало землю. Довгий паркан відділяв ділянку.",
            animate: ["сусід", "хлопчик", "садівник"],
            inanimate: ["дерево", "квіти", "гілки", "сонце", "землю", "паркан", "ділянку"]
        },
        {
            text: "Лікар одягнув білий халат. У коридорі сидів пацієнт. Медсестра принесла новий шприц. На столі лежав зручний термометр. Швидка допомога приїхала вчасно.",
            animate: ["лікар", "пацієнт", "медсестра"],
            inanimate: ["халат", "коридорі", "шприц", "столі", "термометр", "допомога"]
        },
        {
            text: "Машиніст завів потужний потяг. Швидкий вагон стояв на колії. Касир продав останній квиток. Старий пасажир шукав своє місце. Велика станція була відкритою.",
            animate: ["машиніст", "касир", "пасажир"],
            inanimate: ["потяг", "вагон", "колії", "квиток", "місце", "станція"]
        }
    ];

    let currentLevel = 0;
    let foundAnimate = 0;
    let foundInanimate = 0;
    let isDragging = false;
    let dragClone = null;
    let dragSourceElement = null;
    let levelWon = false;

    // Звукова система Web Audio API
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTone(freq, type, duration, vol, slideFreq = null) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slideFreq) {
            osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration);
        }
        
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const sounds = {
        correctAnimate: () => playTone(600, 'sine', 0.4, 0.5, 1200),
        correctInanimate: () => playTone(400, 'triangle', 0.5, 0.6, 200),
        wrong: () => playTone(150, 'sawtooth', 0.4, 0.3, 100),
        click: () => playTone(800, 'sine', 0.1, 0.2),
        win: () => {
            setTimeout(() => playTone(400, 'sine', 0.2, 0.4, 600), 0);
            setTimeout(() => playTone(600, 'sine', 0.2, 0.4, 800), 150);
            setTimeout(() => playTone(800, 'sine', 0.4, 0.4, 1200), 300);
        }
    };

    // Очищення слова від пунктуації
    function cleanWord(w) {
        return w.toLowerCase().replace(/[^а-яієіїґ]/g, '');
    }

    // Ініціалізація рівня
    function initLevel(index) {
        if (index < 0) index = levels.length - 1;
        if (index >= levels.length) index = 0;
        currentLevel = index;
        foundAnimate = 0;
        foundInanimate = 0;
        levelWon = false;

        // Явно видаляємо всі застряглі клони, якщо вони є
        const existingClones = document.querySelectorAll('.drag-clone');
        existingClones.forEach(clone => clone.remove());

        const levelData = levels[currentLevel];
        const contentDiv = document.getElementById('text-content');
        contentDiv.innerHTML = '';

        // Очищаємо індикатори
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('filled'));

        // Розбираємо текст на слова з можливістю кліку
        const words = levelData.text.split(' ');
        words.forEach(w => {
            const clean = cleanWord(w);
            if (clean.length > 0) {
                const span = document.createElement('span');
                span.className = 'word';
                span.textContent = w;
                span.dataset.clean = clean;
                
                // Додаємо обробники для Drag & Drop
                span.addEventListener('pointerdown', handleDragStart);
                
                contentDiv.appendChild(span);
                contentDiv.appendChild(document.createTextNode(' ')); // Пробіл після слова
            } else {
                contentDiv.appendChild(document.createTextNode(w + ' '));
            }
        });
    }

    // Drag & Drop логіка
    function handleDragStart(e) {
        if (e.button !== 0 && e.type !== 'touchstart') return; // Тільки ліва кнопка або тач
        if (e.target.classList.contains('found')) return;
        
        sounds.click();
        isDragging = true;
        dragSourceElement = e.target;
        dragSourceElement.style.opacity = '0.2';

        dragClone = document.createElement('div');
        dragClone.className = 'drag-clone';
        // Видаляємо пунктуацію з відображуваного клону
        dragClone.textContent = dragSourceElement.textContent.replace(/[^а-яієіїґА-ЯІЄІЇҐ]/g, '');
        document.body.appendChild(dragClone);

        moveClone(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);

        document.addEventListener('pointermove', handleDragMove, {passive: false});
        document.addEventListener('pointerup', handleDragEnd);
        document.addEventListener('touchmove', preventDefaultScroll, {passive: false});
    }

    function preventDefaultScroll(e) {
        if (isDragging) e.preventDefault();
    }

    function moveClone(x, y) {
        if (dragClone) {
            dragClone.style.left = x + 'px';
            dragClone.style.top = y + 'px';
        }
    }

    function handleDragMove(e) {
        if (!isDragging) return;
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        moveClone(x, y);
    }

    function handleDragEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        document.removeEventListener('pointermove', handleDragMove);
        document.removeEventListener('pointerup', handleDragEnd);
        document.removeEventListener('touchmove', preventDefaultScroll);

        const x = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
        const y = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
        
        checkDropZone(x, y);
    }

    function isColliding(x, y, element) {
        const rect = element.getBoundingClientRect();
        return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }

    function checkDropZone(x, y) {
        const wordClean = dragSourceElement.dataset.clean;
        const levelData = levels[currentLevel];
        
        const vatAnimate = document.getElementById('vat-animate');
        const vatInanimate = document.getElementById('vat-inanimate');

        let isCorrect = false;

        // Перевірка на колбу істот (приймає всі правильні, навіть якщо вже зібрано 3)
        if (isColliding(x, y, vatAnimate)) {
            if (levelData.animate.includes(wordClean)) {
                isCorrect = true;
                foundAnimate++;
                if (foundAnimate <= 3) {
                    updateSlots('animate', foundAnimate);
                }
                sounds.correctAnimate();
                createParticles(x, y, '#00e676');
            }
        } 
        // Перевірка на колбу неістот (приймає всі правильні, навіть якщо вже зібрано 3)
        else if (isColliding(x, y, vatInanimate)) {
            if (levelData.inanimate.includes(wordClean)) {
                isCorrect = true;
                foundInanimate++;
                if (foundInanimate <= 3) {
                    updateSlots('inanimate', foundInanimate);
                }
                sounds.correctInanimate();
                createParticles(x, y, '#00b0ff');
            }
        }

        if (isCorrect) {
            dragSourceElement.classList.add('found');
            dragClone.remove(); // Видалити клон негайно
            checkWin();
        } else {
            // Негайне видалення клону при помилці
            sounds.wrong();
            
            // Відновити прозорість оригінального слова
            dragSourceElement.style.opacity = '1';
            
            // Видалити клон НЕГАЙНО
            if(dragClone) dragClone.remove();
        }
        
        dragClone = null;
        dragSourceElement = null;
    }

    function updateSlots(type, count) {
        const slots = document.querySelectorAll(`#slots-${type} .slot`);
        for(let i=0; i<count; i++) {
            if (slots[i]) slots[i].classList.add('filled');
        }
    }

    function checkWin() {
        if (!levelWon && foundAnimate >= 3 && foundInanimate >= 3) {
            levelWon = true; // Запобігаємо повторному запуску перемоги на тому ж рівні
            setTimeout(() => {
                sounds.win();
                for(let i=0; i<15; i++) { 
                    setTimeout(() => {
                        createParticles(
                            Math.random() * window.innerWidth, 
                            Math.random() * window.innerHeight * 0.8, 
                            ['#ff5722', '#ffeb3b', '#00e676', '#00b0ff', '#e040fb'][Math.floor(Math.random()*5)]
                        );
                    }, i * 120);
                }
            }, 500);
        }
    }

    // Частинки
    function createParticles(x, y, color) {
        for(let i=0; i<6; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.width = (Math.random() * 10 + 5) + 'px';
            p.style.height = p.style.width;
            p.style.backgroundColor = color;
            
            const tx = (Math.random() - 0.5) * 180;
            const ty = (Math.random() - 0.5) * 180;
            p.style.setProperty('--tx', `${tx}px`);
            p.style.setProperty('--ty', `${ty}px`);
            
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }
    }

    // Навігація
    document.getElementById('btn-prev').addEventListener('click', () => {
        sounds.click();
        initLevel(currentLevel - 1);
    });

    document.getElementById('btn-next').addEventListener('click', () => {
        sounds.click();
        initLevel(currentLevel + 1);
    });

    // Запуск першого рівня
    window.onload = () => {
        initLevel(0);
        // Запобігаємо контекстному меню на довгому тапі
        document.oncontextmenu = function() { return false; };
    };

</script>
</body>
</html>
