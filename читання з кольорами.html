<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Морозиво за Кольорами - Вафельні та Тихі</title>
    <style>
        /* Коментар: Глобальні стилі */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background-color: #4DB6AC; 
            touch-action: none;
        }

        /* Коментар: Сюжетний фон SVG */
        #game-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Коментар: Навігація */
        #controls {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 100;
            pointer-events: none;
        }

        .nav-btn {
            pointer-events: auto;
            background: linear-gradient(135deg, #FFD54F, #FF8F00);
            border: 4px solid #FFF;
            border-radius: 30px;
            padding: 12px 30px;
            font-size: 20px;
            font-weight: 900;
            color: #FFF;
            cursor: pointer;
            box-shadow: 0 6px 0 #E65100, 0 12px 15px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
            font-family: inherit;
        }

        .nav-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #E65100, 0 6px 6px rgba(0,0,0,0.3);
        }
        
        .nav-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Коментар: Ігрові елементи */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 80px;
        }

        #ice-creams {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 3vw;
            margin-bottom: 5vh;
            flex-wrap: wrap;
        }

        .ice-cream {
            position: relative;
            width: 130px;
            height: 195px;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.3));
            transition: transform 0.3s ease;
        }
        
        .ice-cream.highlight {
            transform: scale(1.08);
            filter: drop-shadow(0 20px 15px rgba(0,0,0,0.5));
        }

        .ice-cream svg {
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        #words {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Картки слів (збережений збільшений розмір) */
        .word-card {
            background: linear-gradient(135deg, #FFE082, #FFB300);
            border: 5px dashed #FF6F00;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 34px; 
            font-weight: 900;
            color: #4E342E;
            text-shadow: 1px 1px 0 #FFF;
            cursor: grab;
            user-select: none;
            box-shadow: 0 10px 0 #E65100, 0 15px 18px rgba(0,0,0,0.4);
            touch-action: none;
            transition: filter 0.2s, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .word-card:active {
            cursor: grabbing;
            filter: brightness(1.1);
        }

        /* Ефекти частинок */
        #particles {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .particle {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            animation: explode 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            box-shadow: 0 0 12px currentColor;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <svg id="game-bg" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1000 600">
        <defs>
            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#4FC3F7"/>
                <stop offset="100%" stop-color="#E1F5FE"/>
            </linearGradient>
            <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#8BC34A"/>
                <stop offset="100%" stop-color="#558B2F"/>
            </linearGradient>
            <pattern id="grassPattern" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M10,40 Q15,20 20,40 Q25,25 30,40" fill="none" stroke="#7CB342" stroke-width="2" opacity="0.5"/>
            </pattern>
        </defs>
        
        <rect width="1000" height="600" fill="url(#skyGrad)"/>
        
        <g transform="translate(850, 100)">
            <circle cx="0" cy="0" r="45" fill="#FFEE58"><animate attributeName="r" values="45;52;45" dur="3s" repeatCount="indefinite"/></circle>
            <circle cx="0" cy="0" r="70" fill="#FFF59D" opacity="0.3"><animate attributeName="r" values="70;85;70" dur="3s" repeatCount="indefinite"/></circle>
        </g>

        <g fill="#FFFFFF" opacity="0.8">
            <path d="M 150 120 Q 170 90 200 120 Q 230 90 260 120 Q 280 140 250 150 L 160 150 Q 130 140 150 120 Z">
                <animateTransform attributeName="transform" type="translate" values="0,0; -300,0" dur="20s" repeatCount="indefinite"/>
            </path>
            <path d="M 600 80 Q 620 50 650 80 Q 680 50 710 80 Q 730 100 700 110 L 610 110 Q 580 100 600 80 Z" transform="scale(0.9)">
                <animateTransform attributeName="transform" type="translate" values="0,0; -800,0" dur="35s" repeatCount="indefinite"/>
            </path>
        </g>

        <path d="M -100 600 L -100 380 Q 250 280 500 420 T 1100 380 L 1100 600 Z" fill="url(#grassGrad)"/>
        <path d="M -100 600 L -100 380 Q 250 280 500 420 T 1100 380 L 1100 600 Z" fill="url(#grassPattern)"/>
    </svg>

    <div id="controls">
        <button id="btn-back" class="nav-btn hidden" onclick="prevSlide()">&#8592; Назад</button>
        <button id="btn-next" class="nav-btn" onclick="nextSlide()">Далі &#8594;</button>
    </div>

    <div id="game-container">
        <div id="ice-creams"></div>
        <div id="words"></div>
    </div>

    <div id="particles"></div>

    <script>
        // Коментар: Дані слайдів
        const slidesData = [
            [
                { color: 'red', text: 'помідор', hex: '#FF3D00' },
                { color: 'grey', text: 'миша', hex: '#888888' },
                { color: 'green', text: 'жаба', hex: '#4CAF50' },
                { color: 'yellow', text: 'сонце', hex: '#FFEB3B' },
                { color: 'blue', text: 'море', hex: '#03A9F4' }
            ],
            [
                { color: 'orange', text: 'морква', hex: '#FB8C00' },
                { color: 'purple', text: 'баклажан', hex: '#8E24AA' },
                { color: 'brown', text: 'ведмідь', hex: '#795548' },
                { color: 'pink', text: 'фламінго', hex: '#F06292' },
                { color: 'white', text: 'сніг', hex: '#EFFFFF' }
            ],
            [
                { color: 'lightblue', text: 'небо', hex: '#81D4FA' },
                { color: 'lime', text: 'листок', hex: '#CDDC39' },
                { color: 'gold', text: 'монета', hex: '#FFC107' },
                { color: 'black', text: 'вугілля', hex: '#212121' },
                { color: 'teal', text: 'океан', hex: '#008080' }
            ]
        ];

        let currentSlide = 0;
        let matches = 0;
        let draggedEl = null;
        let startX = 0, startY = 0;

        // Коментар: Аудіо система (Збережена тиха гучність)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq1, freq2, type, duration, vol) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq1, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq2, audioCtx.currentTime + duration);
            
            gain.gain.setValueAtTime(vol * 0.25, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSuccessSound() { playTone(600, 1200, 'sine', 0.2, 0.4); setTimeout(() => playTone(900, 1800, 'triangle', 0.3, 0.3), 80); }
        function playErrorSound() { playTone(250, 120, 'sawtooth', 0.4, 0.3); }
        function playNavSound() { initAudio(); playTone(800, 800, 'sine', 0.1, 0.2); }
        function playWinGrand() {
            const notes = [500, 600, 700, 900, 1100, 1300];
            notes.forEach((freq, i) => setTimeout(() => playTone(freq, freq * 1.1, 'sine', 0.15, 0.4), i * 100));
        }

        // Коментар: Визначення візерунків SVG (Тільки лінії візерунку, тло буде суцільним)
        const svgDefs = `
            <svg style="display:none;">
                <defs>
                    <pattern id="waffle" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                        <path d="M0,0 L16,0 L16,16 L0,16 Z" fill="none" stroke="#D08832" stroke-width="2.5" opacity="0.8"/>
                    </pattern>
                </defs>
            </svg>
        `;
        document.body.insertAdjacentHTML('beforeend', svgDefs);

        // Коментар: Завантаження слайда
        function loadSlide(index) {
            currentSlide = index;
            matches = 0;
            const data = slidesData[index];
            
            playNavSound();
            document.getElementById('btn-back').classList.toggle('hidden', index === 0);
            document.getElementById('btn-next').classList.toggle('hidden', index === slidesData.length - 1);

            const iceCreamsContainer = document.getElementById('ice-creams');
            const wordsContainer = document.getElementById('words');
            iceCreamsContainer.innerHTML = '';
            wordsContainer.innerHTML = '';

            const shuffledForIce = [...data].sort(() => Math.random() - 0.5);
            const shuffledForWords = [...data].sort(() => Math.random() - 0.5);

            shuffledForIce.forEach(item => {
                const borderHex = isLight(item.hex) ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.4)';
                iceCreamsContainer.innerHTML += `
                    <div class="ice-cream" data-color="${item.color}">
                        <svg viewBox="0 0 100 160">
                            <polygon points="10,65 90,65 50,155" fill="#FFCC80" />
                            <polygon points="10,65 90,65 50,155" fill="url(#waffle)" />
                            <polygon points="10,65 90,65 50,155" fill="none" stroke="#A56A24" stroke-width="3" stroke-linejoin="round"/>
                            
                            <path d="M 5 65 C 5 -10, 95 -10, 95 65 Z" fill="${item.hex}" />
                            <path d="M 5 65 C 5 -10, 95 -10, 95 65 Z" fill="none" stroke="${borderHex}" stroke-width="3"/>
                            <path d="M 25 35 Q 35 20 55 20" stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round" fill="none" />
                        </svg>
                    </div>
                `;
            });

            shuffledForWords.forEach(item => {
                wordsContainer.innerHTML += `<div class="word-card" data-color="${item.color}">${item.text}</div>`;
            });

            addDragListeners();
        }

        function isLight(color) { return color === '#EFFFFF'; }

        function addDragListeners() {
            document.querySelectorAll('.word-card').forEach(card => card.addEventListener('pointerdown', onPointerDown));
        }

        function onPointerDown(e) {
            initAudio();
            draggedEl = e.currentTarget;
            startX = e.clientX;
            startY = e.clientY;
            draggedEl.style.transition = 'none';
            draggedEl.style.zIndex = 1000;
            draggedEl.setPointerCapture(e.pointerId);
            playTone(400, 480, 'sine', 0.1, 0.05);
            
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerup', onPointerUp);
        }

        function onPointerMove(e) {
            if (!draggedEl) return;
            draggedEl.style.transform = `translate(${e.clientX - startX}px, ${e.clientY - startY}px) scale(1.1) rotate(5deg)`;
            
            const overlapped = getOverlappedIceCream(draggedEl);
            document.querySelectorAll('.ice-cream').forEach(ic => ic.classList.remove('highlight'));
            if(overlapped) overlapped.classList.add('highlight');
        }

        function onPointerUp(e) {
            if (!draggedEl) return;
            draggedEl.releasePointerCapture(e.pointerId);
            document.removeEventListener('pointermove', onPointerMove);
            document.removeEventListener('pointerup', onPointerUp);
            document.querySelectorAll('.ice-cream').forEach(ic => ic.classList.remove('highlight'));

            const overlappedTarget = getOverlappedIceCream(draggedEl);

            if (overlappedTarget) {
                if (overlappedTarget.dataset.color === draggedEl.dataset.color) {
                    handleSuccess(draggedEl, overlappedTarget);
                } else {
                    handleError();
                    resetCard(draggedEl);
                }
            } else {
                playTone(300, 200, 'sine', 0.1, 0.02);
                resetCard(draggedEl);
            }
            draggedEl.style.zIndex = '';
            draggedEl = null;
        }

        // Коментар: РОЗШИРЕНА ЗОНА ПРИЛИПАННЯ (Використовуємо відстань між центрами замість перетину прямокутників)
        function getOverlappedIceCream(el) {
            const rect = el.getBoundingClientRect();
            // Центр картки, яку ми тягнемо
            const elCenterX = rect.left + rect.width / 2;
            const elCenterY = rect.top + rect.height / 2;
            
            let closestTarget = null;
            let minDistance = Infinity;
            
            const targets = document.querySelectorAll('.ice-cream');
            for(let target of targets) {
                const tRect = target.getBoundingClientRect();
                // Центр морозива
                const tCenterX = tRect.left + tRect.width / 2;
                const tCenterY = tRect.top + tRect.height / 2;
                
                // Рахуємо відстань
                const distance = Math.hypot(elCenterX - tCenterX, elCenterY - tCenterY);
                
                // Дуже щедра зона прилипання (150 пікселів від центру)
                if (distance < 150) {
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestTarget = target;
                    }
                }
            }
            return closestTarget;
        }

        function resetCard(card) {
            card.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
            card.style.transform = 'translate(0px, 0px) scale(1) rotate(0deg)';
        }

        function handleSuccess(card, target) {
            playSuccessSound();
            createParticles(target.getBoundingClientRect().left + target.getBoundingClientRect().width / 2, target.getBoundingClientRect().top + 70, target.dataset.color);
            
            target.appendChild(card);
            card.style.position = 'absolute';
            card.style.left = '50%';
            card.style.top = '38%';
            card.style.transition = 'transform 0.3s ease';
            card.style.transform = 'translate(-50%, -50%) rotate(-4deg) scale(0.6)';
            card.style.pointerEvents = 'none';
            card.style.boxShadow = '0 12px 25px rgba(0,0,0,0.5)';
            
            matches++;
            if(matches === slidesData[currentSlide].length) setTimeout(winSlide, 600);
        }

        function handleError() {
            playErrorSound();
            draggedEl.animate([
                { transform: draggedEl.style.transform + ' translateX(0px)' },
                { transform: draggedEl.style.transform + ' translateX(-10px)' },
                { transform: draggedEl.style.transform + ' translateX(10px)' },
                { transform: draggedEl.style.transform + ' translateX(0px)' }
            ], { duration: 300, iterations: 1 });
        }

        function createParticles(x, y, colorStr) {
            const container = document.getElementById('particles');
            const item = slidesData[currentSlide].find(i => i.color === colorStr);
            const baseColor = item ? item.hex : '#FFF';

            for(let i=0; i<18; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px'; particle.style.top = y + 'px';
                particle.style.color = baseColor; particle.style.backgroundColor = 'currentColor';
                if(colorStr === 'white') particle.style.stroke = 'rgba(0,0,0,0.2)'; 
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 100 + 40;
                particle.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
                
                container.appendChild(particle);
                setTimeout(() => particle.remove(), 1100);
            }
        }

        function winSlide() {
            playWinGrand();
            for(let i=0; i<3; i++) {
                setTimeout(() => {
                    const rx = Math.random() * window.innerWidth;
                    const ry = Math.random() * window.innerHeight * 0.5;
                    createParticles(rx, ry, slidesData[currentSlide][Math.floor(Math.random()*5)].color);
                }, i * 300);
            }
            if(currentSlide < slidesData.length - 1) document.getElementById('btn-next').animate([{ transform: 'scale(1)' }, { transform: 'scale(1.15)' }, { transform: 'scale(1)' }], { duration: 500, iterations: 3 });
        }

        function nextSlide() { if(currentSlide < slidesData.length - 1) loadSlide(currentSlide + 1); }
        function prevSlide() { if(currentSlide > 0) loadSlide(currentSlide - 1); }

        loadSlide(0);

    </script>
</body>
</html>
