<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        /* Базові налаштування: жодних білих фонів, усе на весь екран */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19; /* Глибокий темний колір для підстраховки */
            user-select: none;
        }

        /* Контейнер для складної SVG-графіки на фоні (сюжетний живий ліс/джунглі) */
        #svg-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Основний ігровий контейнер поверх фону */
        #game-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Контейнер для двох таблиць */
        .tables-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 5vmin;
            justify-content: center;
            align-items: center;
            margin-bottom: 5vmin;
        }

        /* Стилізація самих таблиць 2х2 */
        .grid-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 2vmin;
            padding: 2vmin;
            background: rgba(20, 40, 60, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 3vmin;
            box-shadow: 0 2vmin 5vmin rgba(0,0,0,0.5), inset 0 0 2vmin rgba(255,255,255,0.2);
            border: 0.5vmin solid rgba(255, 255, 255, 0.1);
        }

        /* Комірки з цифрами та літерами. Максимально крупний шрифт! */
        .cell {
            width: 20vmin;
            height: 20vmin;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12vmin;
            font-weight: 900;
            border-radius: 2.5vmin;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s;
            box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.4);
            color: #fff;
            text-shadow: 0 0.5vmin 1vmin rgba(0,0,0,0.5);
        }

        /* Унікальні градієнти для таблиці цифр */
        #number-grid .cell {
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            cursor: default; /* Цифри не клікабельні */
        }

        /* Унікальні градієнти для таблиці літер */
        #letter-grid .cell {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        #letter-grid .cell:hover {
            transform: scale(1.05) translateY(-1vmin);
            filter: brightness(1.2);
        }

        #letter-grid .cell:active {
            transform: scale(0.95);
        }

        /* Зона для збору слова */
        #answer-zone {
            display: flex;
            gap: 2vmin;
            height: 15vmin;
        }

        .slot {
            width: 12vmin;
            height: 12vmin;
            border-bottom: 1vmin solid #00f2fe;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-size: 10vmin;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0.5vmin 2vmin rgba(0,0,0,0.8);
            padding-bottom: 1vmin;
        }

        /* Мінімалістичні кнопки навігації */
        .controls {
            position: absolute;
            bottom: 4vmin;
            width: 90%;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 0.3vmin solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 2vmin 4vmin;
            font-size: 3vmin;
            font-weight: bold;
            border-radius: 5vmin;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.3);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-0.5vmin);
            box-shadow: 0 1.5vmin 3vmin rgba(0,0,0,0.5);
        }

        button:active {
            transform: translateY(0);
        }

        /* Анімація помилки (трясіння) */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-2vmin) rotate(-5deg); }
            40%, 80% { transform: translateX(2vmin) rotate(5deg); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%) !important;
        }

        /* Анімація правильної відповіді (пульсація) */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); filter: brightness(1.5); }
            100% { transform: scale(1); opacity: 0.5; }
        }
        .correct {
            animation: pop 0.4s forwards;
            pointer-events: none;
        }

        /* Анімація для фонових елементів */
        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(3deg); }
        }
        .leaf {
            transform-origin: bottom center;
            animation: sway 6s infinite ease-in-out alternate;
        }
        .leaf:nth-child(even) {
            animation-duration: 8s;
            animation-direction: alternate-reverse;
        }
        
        /* Система частинок (фідбек без слів) */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <svg id="svg-background" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
        <defs>
            <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#FF512F" />
                <stop offset="100%" stop-color="#DD2476" />
            </linearGradient>
            <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FDEB71" />
                <stop offset="100%" stop-color="#F8D800" />
            </linearGradient>
            <linearGradient id="leafGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#11998e" />
                <stop offset="100%" stop-color="#38ef7d" />
            </linearGradient>
            <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#0ba360" />
                <stop offset="100%" stop-color="#3cba92" />
            </linearGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="15" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>

        <rect width="1920" height="1080" fill="url(#sky)" />
        
        <circle cx="960" cy="540" r="300" fill="url(#sun)" filter="url(#glow)">
            <animate attributeName="r" values="300;320;300" dur="4s" repeatCount="indefinite" />
        </circle>

        <g class="leaf" transform="translate(-100, 200)">
            <path d="M100,900 C150,600 400,300 600,200 C500,400 300,700 100,900 Z" fill="url(#leafGrad1)" opacity="0.8"/>
            <path d="M100,900 C100,700 200,500 400,450 C300,600 200,750 100,900 Z" fill="url(#leafGrad2)"/>
        </g>
        
        <g class="leaf" transform="translate(1400, 100)">
            <path d="M400,1000 C300,700 0,400 -200,300 C-50,500 150,800 400,1000 Z" fill="url(#leafGrad1)" opacity="0.8"/>
            <path d="M400,1000 C350,800 200,600 0,550 C150,700 250,850 400,1000 Z" fill="url(#leafGrad2)"/>
        </g>

        <g class="leaf" transform="translate(400, 800)">
            <path d="M0,300 C50,150 200,0 350,-50 C250,50 150,150 0,300 Z" fill="url(#leafGrad2)" opacity="0.9"/>
        </g>
        <g class="leaf" transform="translate(1200, 750)">
            <path d="M200,350 C100,150 -100,0 -250,-50 C-100,50 0,200 200,350 Z" fill="url(#leafGrad1)" opacity="0.9"/>
        </g>
    </svg>

    <div id="game-layer">
        <div class="tables-wrapper">
            <div id="number-grid" class="grid-table"></div>
            <div id="letter-grid" class="grid-table"></div>
        </div>

        <div id="answer-zone"></div>

        <div class="controls">
            <button id="btn-prev">◄</button>
            <button id="btn-next">►</button>
        </div>
    </div>

    <script>
        // --- ДАНІ ГРИ ---
        // 20 слів з 4 літер
        const words = [
            "ЛІТО", "ЗИМА", "ЖАБА", "РИБА", "СОВА", 
            "ВОДА", "НЕБО", "СНІГ", "ДІТИ", "РУКА", 
            "НОГА", "ВУХО", "ЗУБИ", "МИЛО", "ШАФА", 
            "МОРЕ", "ГОРА", "РІКА", "ПОЛЕ", "ХЛІБ"
        ];
        
        let currentLevelIndex = 0;
        let expectedStep = 1; // Очікуємо натискання на літеру, що відповідає цифрі 1, потім 2...
        
        // Поточне розміщення елементів у сітках
        let currentLetterMap = []; 

        // --- ВУЗЛИ DOM ---
        const numberGrid = document.getElementById('number-grid');
        const letterGrid = document.getElementById('letter-grid');
        const answerZone = document.getElementById('answer-zone');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');

        // --- АУДІО СИСТЕМА (Web Audio API для складних синтезованих звуків без зовнішніх файлів) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // Функція генерації звуків
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            switch(type) {
                case 'pop': // Звук правильного натискання
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400 + expectedStep * 150, now);
                    osc.frequency.exponentialRampToValueAtTime(800 + expectedStep * 100, now + 0.1);
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;

                case 'error': // Звук помилки
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;

                case 'win': // Звук перемоги (арпеджіо)
                    const notes = [440, 554.37, 659.25, 880]; // A major chord
                    notes.forEach((freq, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.type = 'triangle';
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        
                        const time = now + (i * 0.1);
                        o.frequency.setValueAtTime(freq, time);
                        g.gain.setValueAtTime(0, time);
                        g.gain.linearRampToValueAtTime(0.3, time + 0.05);
                        g.gain.exponentialRampToValueAtTime(0.01, time + 0.5);
                        
                        o.start(time);
                        o.stop(time + 0.5);
                    });
                    break;
            }
        }

        // --- ВІЗУАЛЬНА СИСТЕМА (Частинки для фідбеку) ---
        function createParticles(x, y, color) {
            const numParticles = 30;
            for(let i=0; i<numParticles; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.backgroundColor = color;
                
                // Рандомні розміри та початкові позиції
                const size = Math.random() * 2 + 1;
                p.style.width = `${size}vmin`;
                p.style.height = `${size}vmin`;
                p.style.left = `${x}px`;
                p.style.top = `${y}px`;
                
                document.body.appendChild(p);
                
                // Фізика руху
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 15 + 5;
                const tx = Math.cos(angle) * velocity * 10;
                const ty = Math.sin(angle) * velocity * 10;
                
                p.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600 + Math.random() * 400,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => p.remove();
            }
        }

        // --- ЛОГІКА ГРИ ---

        function initLevel(index) {
            numberGrid.innerHTML = '';
            letterGrid.innerHTML = '';
            answerZone.innerHTML = '';
            expectedStep = 1;
            
            const word = words[index];
            
            // Створюємо порожні слоти для відповіді
            for(let i = 0; i < 4; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                answerZone.appendChild(slot);
            }

            // Масив позицій 0, 1, 2, 3
            let positions = [0, 1, 2, 3];
            // Складне перемішування Фішера-Йейтса
            for (let i = positions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [positions[i], positions[j]] = [positions[j], positions[i]];
            }

            // Структури для відтворення сіток
            const numbers = new Array(4);
            const letters = new Array(4);

            // Розподіляємо цифри (1-4) та відповідні літери слова по перемішаних позиціях
            for(let i = 0; i < 4; i++) {
                let pos = positions[i];
                numbers[pos] = i + 1;           // Цифра
                letters[pos] = word[i];         // Літера на ту ж саму позицію
                
                // Зберігаємо яка цифра очікується на цій позиції для перевірки кліку
                currentLetterMap[pos] = i + 1;  
            }

            // Рендер сіток
            for(let i = 0; i < 4; i++) {
                // Комірки з цифрами
                const numCell = document.createElement('div');
                numCell.className = 'cell';
                numCell.textContent = numbers[i];
                numberGrid.appendChild(numCell);

                // Комірки з літерами
                const letCell = document.createElement('div');
                letCell.className = 'cell';
                letCell.textContent = letters[i];
                
                // Додаємо обробник подій для літер
                letCell.addEventListener('pointerdown', (e) => handleLetterClick(e, i, letCell, letters[i]));
                letterGrid.appendChild(letCell);
            }
        }

        function handleLetterClick(e, positionIndex, cellElement, letter) {
            // Перевіряємо, чи правильну літеру (відповідно до цифри) обрав гравець
            if(currentLetterMap[positionIndex] === expectedStep) {
                // ПРАВИЛЬНО
                playSound('pop');
                cellElement.classList.add('correct');
                
                // Фейєрверк з частинок на місці кліку
                const rect = cellElement.getBoundingClientRect();
                createParticles(rect.left + rect.width/2, rect.top + rect.height/2, '#00f2fe');

                // Переносимо літеру в слот
                const slots = document.querySelectorAll('.slot');
                slots[expectedStep - 1].textContent = letter;
                
                // Анімація появи літери в слоті
                slots[expectedStep - 1].animate([
                    { transform: 'translateY(-20px) scale(0.5)', opacity: 0 },
                    { transform: 'translateY(0) scale(1)', opacity: 1 }
                ], { duration: 300, easing: 'ease-out' });

                expectedStep++;

                // Перевірка на завершення рівня
                if(expectedStep > 4) {
                    playSound('win');
                    // Великий фейєрверк посередині екрану
                    setTimeout(() => {
                        createParticles(window.innerWidth/2, window.innerHeight/2, '#FDEB71');
                        createParticles(window.innerWidth/2 - 100, window.innerHeight/2 + 50, '#FF512F');
                        createParticles(window.innerWidth/2 + 100, window.innerHeight/2 + 50, '#00f2fe');
                    }, 200);
                    
                    setTimeout(nextLevel, 1500); // Автоматичний перехід без слів
                }
            } else {
                // НЕПРАВИЛЬНО
                playSound('error');
                cellElement.classList.remove('shake');
                void cellElement.offsetWidth; // Trigger reflow для повторної анімації
                cellElement.classList.add('shake');
            }
        }

        // --- НАВІГАЦІЯ ---
        function nextLevel() {
            currentLevelIndex++;
            if(currentLevelIndex >= words.length) currentLevelIndex = 0;
            initLevel(currentLevelIndex);
        }

        function prevLevel() {
            currentLevelIndex--;
            if(currentLevelIndex < 0) currentLevelIndex = words.length - 1;
            initLevel(currentLevelIndex);
        }

        btnNext.addEventListener('click', () => {
            playSound('pop');
            nextLevel();
        });

        btnPrev.addEventListener('click', () => {
            playSound('pop');
            prevLevel();
        });

        // Ініціалізація першого рівня
        initLevel(currentLevelIndex);

        // Ініціалізація аудіо після першого кліку (політика браузерів)
        document.body.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });

    </script>
</body>
</html>
