<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gra</title>
    <style>
        /* Імпорт рукописного шрифту */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Caveat', cursive;
            user-select: none;
            background-color: #5c3a21; 
        }

        /* Текстура столу */
        .desk-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='wood'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.02 0.2' numOctaves='3' result='noise'/%3E%3CfeColorMatrix type='matrix' values='1 0 0 0 0.4 0 0.8 0 0 0.2 0 0 0.6 0 0.1 0 0 0 1 0' in='noise' result='coloredNoise'/%3E%3CfeComposite operator='in' in='coloredNoise' in2='SourceGraphic' result='woodTexture'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' fill='%236b4226' filter='url(%23wood)'/%3E%3C/svg%3E");
            background-size: cover;
        }

        /* Анімація пилинок */
        .dust-particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Зошит */
        .notebook-container {
            position: relative;
            z-index: 10;
            width: 85%;
            max-width: 900px;
            height: 75%;
            margin: 3% auto 0 auto;
            background-color: #fcf7e3; 
            border-radius: 5px 15px 15px 5px;
            box-shadow: 
                -10px 10px 20px rgba(0,0,0,0.6),
                inset 20px 0 30px rgba(200, 180, 150, 0.4);
            transform: rotate(-1deg);
            background-image: 
                linear-gradient(90deg, transparent 69px, #ff8c8c 69px, #ff8c8c 71px, transparent 71px),
                linear-gradient(#a3d2e6 1px, transparent 1px);
            background-size: 100% 55px; /* Збільшена відстань між рядками */
            background-position: 0 45px;
            padding: 50px 40px 40px 90px;
            box-sizing: border-box;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s;
        }

        /* Анімація перегортання сторінки */
        .page-turn {
            transform: rotate(-5deg) translateX(-100px) scale(0.95);
            opacity: 0;
        }

        /* Текст завдання */
        .text-content {
            font-size: 38px; /* Збільшений шрифт */
            line-height: 55px; /* Збільшений міжрядковий інтервал */
            color: #1a1a1a;
            word-wrap: break-word;
        }

        /* Збільшена відстань між словами */
        .word {
            display: inline-block;
            margin-right: 18px; 
            margin-bottom: 5px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            position: relative;
        }

        .word:hover {
            transform: scale(1.08);
            color: #0056b3;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px) rotate(-3deg); }
            50% { transform: translateX(4px) rotate(3deg); }
            75% { transform: translateX(-4px) rotate(-3deg); }
            100% { transform: translateX(0); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
            color: #8b0000 !important;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #008000; }
            100% { transform: scale(1); color: #1a1a1a; }
        }
        .corrected {
            animation: pop 0.5s ease-out;
            color: #1a1a1a !important;
            cursor: default;
        }
        .corrected:hover {
            transform: none;
        }

        /* Лічильник помилок */
        .mistake-counter {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 16px;
            color: rgba(0, 0, 0, 0.1); 
            font-family: sans-serif;
            pointer-events: none;
            z-index: 15;
            transition: color 0.3s;
        }

        /* Індикатори рівнів */
        .level-dots {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .dot.active {
            background: rgba(0,0,0,0.4);
            transform: scale(1.3);
        }

        /* Декорації */
        .decoration {
            position: absolute;
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.5));
        }
        .pencil { bottom: 3%; left: 8%; width: 220px; transform: rotate(12deg); }
        .ruler { top: 3%; right: 4%; width: 260px; transform: rotate(-8deg); opacity: 0.85; }

        /* Живий персонаж - Сонечко */
        .bug-character {
            position: absolute;
            top: 20px;
            left: 100px;
            width: 40px;
            height: 40px;
            z-index: 20;
            pointer-events: none;
            transition: transform 0.5s ease;
            filter: drop-shadow(2px 5px 3px rgba(0,0,0,0.3));
        }

        @keyframes bugWalk {
            0% { transform: translate(0, 0) rotate(90deg); }
            25% { transform: translate(10px, -2px) rotate(95deg); }
            50% { transform: translate(20px, 0) rotate(90deg); }
            75% { transform: translate(30px, -2px) rotate(85deg); }
            100% { transform: translate(40px, 0) rotate(90deg); }
        }

        @keyframes bugHappy {
            0%, 100% { transform: scale(1) rotate(90deg); }
            50% { transform: scale(1.3) rotate(450deg); }
        }

        @keyframes bugSad {
            0%, 100% { transform: translateX(0) rotate(90deg); }
            25% { transform: translateX(-5px) rotate(80deg); }
            75% { transform: translateX(5px) rotate(100deg); }
        }

        .walking { animation: bugWalk 2s infinite linear alternate; }
        .happy-bug { animation: bugHappy 0.6s ease-in-out; }
        .sad-bug { animation: bugSad 0.4s ease-in-out; }

        /* Навігація */
        .nav-btn {
            position: absolute;
            bottom: 25px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }
        .nav-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .nav-btn svg { width: 28px; height: 28px; fill: #fff; }
        .btn-prev { left: 25px; }
        .btn-next { right: 25px; }

        /* Частинки */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .particle {
            position: absolute;
            width: 15px;
            height: 15px;
            opacity: 1;
        }
    </style>
</head>

        // Ініціалізація аудіо
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playTone(freq, type, duration, vol=0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playCorrect() {
            playTone(600, 'sine', 0.1, 0.2);
            setTimeout(() => playTone(800, 'sine', 0.2, 0.2), 100);
        }

        function playWrong() { playTone(200, 'triangle', 0.3, 0.2); }

        function playWin() {
            let delay = 0;
            [400, 500, 600, 800, 1000].forEach(f => {
                setTimeout(() => playTone(f, 'square', 0.15, 0.1), delay);
                delay += 100;
            });
        }

        function playPageTurn() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // Анімація частинок
        function spawnParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.innerHTML = `<svg viewBox="0 0 24 24" fill="#ffb703"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9"/></svg>`;
                particlesContainer.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 30 + Math.random() * 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 600 + Math.random() * 400, easing: 'cubic-bezier(0, .9, .57, 1)' }).onfinish = () => particle.remove();
            }
        }

        // Емоції сонечка
        function bugReact(isHappy) {
            bug.classList.remove('walking', 'happy-bug', 'sad-bug');
            void bug.offsetWidth; // Тригер
            bug.classList.add(isHappy ? 'happy-bug' : 'sad-bug');
            setTimeout(() => {
                bug.classList.remove('happy-bug', 'sad-bug');
                bug.classList.add('walking');
            }, isHappy ? 600 : 400);
        }

        function updateCounter() {
            counterEl.innerText = errorsLeft;
            if (errorsLeft === 0) {
                counterEl.style.color = "#2b9348";
                playWin();
                notebook.style.transform = "rotate(0deg) scale(1.02)";
            } else {
                counterEl.style.color = "rgba(0, 0, 0, 0.1)";
            }
        }

        function buildDots() {
            dotsContainer.innerHTML = '';
            levelsData.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = 'dot' + (idx === currentLevel ? ' active' : '');
                dotsContainer.appendChild(dot);
            });
        }

        function renderLevel(levelIndex) {
            currentLevel = levelIndex;
            // Глибока копія даних, щоб можна було грати знову
            currentLevelData = JSON.parse(JSON.stringify(levelsData[currentLevel]));
            errorsLeft = currentLevelData.filter(item => item.err).length;
            
            textField.innerHTML = '';
            currentLevelData.forEach((item, index) => {
                const span = document.createElement('span');
                span.className = 'word';
                span.innerText = item.w;
                
                span.addEventListener('click', function(e) {
                    if (this.classList.contains('corrected')) return;

                    if (item.err) {
                        this.innerText = item.c;
                        this.classList.add('corrected');
                        item.err = false;
                        errorsLeft--;
                        playCorrect();
                        spawnParticles(e.clientX, e.clientY);
                        bugReact(true);
                        updateCounter();
                    } else {
                        this.classList.remove('shake');
                        void this.offsetWidth;
                        this.classList.add('shake');
                        playWrong();
                        bugReact(false);
                    }
                });
                textField.appendChild(span);
            });

            updateCounter();
            buildDots();
            notebook.style.transform = "rotate(-1deg)";
            
            document.getElementById('btnPrev').classList.toggle('disabled', currentLevel === 0);
            document.getElementById('btnNext').classList.toggle('disabled', currentLevel === levelsData.length - 1);
        }

        function changeLevel(dir) {
            const newLevel = currentLevel + dir;
            if (newLevel >= 0 && newLevel < levelsData.length) {
                playPageTurn();
                notebook.classList.add('page-turn');
                setTimeout(() => {
                    renderLevel(newLevel);
                    notebook.classList.remove('page-turn');
                }, 300);
            }
        }

        document.getElementById('btnPrev').addEventListener('click', () => changeLevel(-1));
        document.getElementById('btnNext').addEventListener('click', () => changeLevel(1));

        // Анімація пилинок
        const canvas = document.getElementById('dust');
        const ctx = canvas.getContext('2d');
        let dustArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class DustParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.3;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 245, 200, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) dustArray.push(new DustParticle());

        function animateDust() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dustArray.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateDust);
        }
        animateDust();

        // Запуск першого рівня
        renderLevel(0);

    </script>
</body>
</html>
