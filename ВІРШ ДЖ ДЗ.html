<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гра: Дж чи Дз</title>
    <style>
        /* Базові налаштування сторінки */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
            background-color: #87CEEB; /* Колір неба */
        }

        /* Фоновий контейнер з небом та хмарами */
        #sky-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
        }

        /* Контейнер для квітів внизу екрану */
        #flowers-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35vh; /* Квіти займають нижню частину */
            z-index: -1;
            pointer-events: none;
        }

        /* Ігрове поле (стилізована дошка) */
        #game-board {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px; 
            max-width: 95%;
            background: linear-gradient(135deg, #FFF8DC 0%, #F5DEB3 100%);
            border: 10px solid #D2691E;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 0 40px rgba(139,69,19,0.2);
            padding: 40px 60px;
            font-size: 38px; 
            color: #3E2723;
            line-height: 1.8;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Рядок вірша */
        .line {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
        }

        /* Контейнер для кнопок вибору */
        .choice-container {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            border: 3px dashed #CD853F;
            border-radius: 15px;
            padding: 2px 5px;
            margin: 0 8px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        /* Сама кнопка вибору */
        .choice-btn {
            background: linear-gradient(to bottom, #FFD700, #FFA500);
            border: none;
            border-radius: 10px;
            padding: 5px 12px;
            font-size: 34px; 
            font-family: inherit;
            font-weight: bold;
            color: #4B0082;
            cursor: pointer;
            box-shadow: 0 4px 0 #CD853F;
            transition: all 0.1s;
            margin: 0 5px;
        }

        .choice-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #CD853F;
        }

        .choice-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        /* Розділювач між варіантами */
        .choice-separator {
            color: #8B4513;
            font-weight: bold;
            font-size: 30px;
            opacity: 0.5;
        }

        /* Стиль для правильної відповіді */
        .solved-text {
            color: #228B22;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(34, 139, 34, 0.3);
            margin: 0 5px;
            animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop-in {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        /* Анімація помилки */
        .error-shake {
            animation: error-shake 0.4s;
            background: linear-gradient(to bottom, #FF6347, #DC143C) !important;
            color: white !important;
            box-shadow: 0 4px 0 #8B0000 !important;
        }

        @keyframes error-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        /* Контейнер для бджілок, щоб вони літали над усіма елементами */
        #bees-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* Маленька бджілка */
        .bee {
            position: absolute;
            width: 80px;
            height: 80px;
            transition: transform 0.5s;
        }

        /* Анімації польоту бджілок */
        .flying-1 { animation: flyOne 15s linear infinite; }
        .flying-2 { animation: flyTwo 20s ease-in-out infinite alternate; }
        .flying-3 { animation: flyThree 12s ease-in-out infinite alternate; }

        @keyframes flyOne {
            0% { transform: translate(-100px, 10vh) rotate(10deg); }
            25% { transform: translate(30vw, 20vh) rotate(-5deg); }
            50% { transform: translate(60vw, 5vh) rotate(15deg); }
            75% { transform: translate(90vw, 30vh) rotate(0deg); }
            100% { transform: translate(110vw, 15vh) rotate(10deg); }
        }

        @keyframes flyTwo {
            0% { transform: translate(110vw, 70vh) scaleX(-1) rotate(-10deg); }
            33% { transform: translate(70vw, 60vh) scaleX(-1) rotate(20deg); }
            66% { transform: translate(30vw, 80vh) scaleX(-1) rotate(-15deg); }
            100% { transform: translate(-10vw, 65vh) scaleX(-1) rotate(10deg); }
        }

        @keyframes flyThree {
            0% { transform: translate(10vw, 85vh) rotate(5deg); }
            50% { transform: translate(50vw, 75vh) rotate(-15deg); }
            100% { transform: translate(80vw, 80vh) rotate(10deg); }
        }

        /* Емоції бджілок при відповідях */
        .bee.happy { animation: happyFlip 0.8s ease-in-out !important; }
        .bee.sad { animation: sadShake 0.5s ease-in-out !important; }

        @keyframes happyFlip {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.5); filter: drop-shadow(0 0 10px yellow); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes sadShake {
            0%, 100% { transform: translateX(0) scale(1); }
            25% { transform: translateX(-15px) rotate(-10deg) scale(0.9); }
            75% { transform: translateX(15px) rotate(10deg) scale(0.9); }
        }

        /* Частинки для конфетті */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 999;
        }

        /* Анімація крилець */
        @keyframes flap {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.2); }
        }
        .wing {
            transform-origin: center;
            animation: flap 0.05s infinite linear;
        }

        /* Анімація хитання квітів */
        .swaying {
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite alternate;
        }
        .swaying-delayed {
            transform-origin: bottom center;
            animation: sway 5s ease-in-out infinite alternate-reverse;
        }

        @keyframes sway {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }
    </style>
</head>
<body>

    <svg id="sky-bg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
        <defs>
            <linearGradient id="sky-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#87CEFA" />

        <g transform="translate(1700, 150)">
            <circle r="80" fill="#FFD700">
                <animate attributeName="r" values="80; 85; 80" dur="4s" repeatCount="indefinite"/>
            </circle>

            </g>

                <circle cx="0" cy="0" r="30"/>
                <circle cx="25" cy="-15" r="35"/>
                <circle cx="50" cy="5" r="25"/>
                <rect x="0" y="-5" width="50" height="35" rx="10"/>
                <animateTransform attributeName="transform" type="translate" values="1200,120; 1150,120; 1200,120" dur="18s" repeatCount="indefinite"/>
            </g>
        </g>

        <path d="M0,750 Q400,600 960,750 T1920,650 L1920,1080 L0,1080 Z" fill="url(#hill-grad)" opacity="0.8"/>
    </svg>

        </div>

                    <path d="M0,-50 Q-30,-70 -40,-40 Q-20,-30 0,-50" fill="#32CD32"/> <path d="M0,-80 Q30,-100 40,-70 Q20,-60 0,-80" fill="#32CD32"/> <g transform="translate(0, -150)">
                        <circle cx="0" cy="-20" r="20" fill="#FF69B4"/>

            <g transform="translate(100, 400)" class="swaying">

    <div id="bees-container">
        <div class="bee flying-1" id="bee1">

                <g transform="translate(50, 50)">
                    <ellipse class="wing" cx="-10" cy="-20" rx="10" ry="25" fill="rgba(255,255,255,0.8)" stroke="#ADD8E6"/>

                    <circle cx="25" cy="-2" r="12" fill="#333"/>
                    <circle cx="28" cy="-5" r="3" fill="#FFF"/> <path d="M25,-14 Q30,-25 35,-20" fill="none" stroke="#333" stroke-width="2"/>
                    <path d="M-25,0 L-35,0" stroke="#333" stroke-width="3"/>
                </g>

        </div>

        <div class="bee flying-2" id="bee2">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <g transform="translate(50, 50) scale(0.8)">
                    <ellipse class="wing" cx="-10" cy="-20" rx="10" ry="25" fill="rgba(255,255,255,0.8)" stroke="#ADD8E6"/>
                    <ellipse class="wing" cx="10" cy="-20" rx="10" ry="25" fill="rgba(255,255,255,0.8)" stroke="#ADD8E6"/>
                    <ellipse cx="0" cy="0" rx="25" ry="18" fill="#FFD700" />
                    <path d="M-10,-16 L-10,16 M0,-18 L0,18 M10,-16 L10,16" stroke="#333" stroke-width="4"/>
                    <circle cx="25" cy="-2" r="12" fill="#333"/>
                    <circle cx="28" cy="-5" r="3" fill="#FFF"/>
                    <path d="M25,-14 Q30,-25 35,-20" fill="none" stroke="#333" stroke-width="2"/>
                    <path d="M-25,0 L-35,0" stroke="#333" stroke-width="3"/>

            </svg>
        </div>

        <div class="bee flying-3" id="bee3">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <g transform="translate(50, 50) scale(1.2)">
                    <ellipse class="wing" cx="-10" cy="-20" rx="10" ry="25" fill="rgba(255,255,255,0.8)" stroke="#ADD8E6"/>
                    <ellipse class="wing" cx="10" cy="-20" rx="10" ry="25" fill="rgba(255,255,255,0.8)" stroke="#ADD8E6"/>
                    <ellipse cx="0" cy="0" rx="25" ry="18" fill="#FFD700" />

                    <circle cx="25" cy="-2" r="12" fill="#333"/>
                    <circle cx="28" cy="-5" r="3" fill="#FFF"/>
                    <path d="M25,-14 Q30,-25 35,-20" fill="none" stroke="#333" stroke-width="2"/>

    <script>
        // --- Аудіо Синтезатор (Web Audio API) для звуків ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Магічний звук правильної відповіді
        function playSuccessSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const freqs = [523.25, 659.25, 880.00]; // Радісний акорд
            freqs.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.value = freq;
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                const now = audioCtx.currentTime + (index * 0.1);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.2, now + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                
                osc.start(now);
                osc.stop(now + 0.5);
            });
        }

        // Кумедний звук помилки (ніби бджілка гуде)
        function playErrorSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.3);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // Переможна мелодія
        function playWinSound() {
            setTimeout(() => { playSuccessSound(); }, 0);
            setTimeout(() => { playSuccessSound(); }, 200);
            setTimeout(() => { playSuccessSound(); }, 400);
        }

        // --- Логіка Ігрового Поля ---
        // Масив з текстом вірша. Кожен елемент - об'єкт (текст або пропуск)
        const poemLines = [
            [{ type: 'gap', correct: 'Дж', alt: 'Дз' }, { type: 'text', val: 'міль на склянку з ' }, { type: 'gap', correct: 'дж', alt: 'дз' }, { type: 'text', val: 'емом сів,' }],
            [{ type: 'text', val: 'ґе' }, { type: 'gap', correct: 'дз', alt: 'дж' }, { type: 'text', val: 'ь до нього підлетів.' }],
            [{ type: 'text', val: 'І ' }, { type: 'gap', correct: 'дз', alt: 'дж' }, { type: 'text', val: 'вінка пішла розмова.' }],
            [{ type: 'text', val: 'Першим ґе' }, { type: 'gap', correct: 'дз', alt: 'дж' }, { type: 'text', val: 'ь промовив слово:' }],
            [{ type: 'text', val: '— Що, солодкий ' }, { type: 'gap', correct: 'дж', alt: 'дз' }, { type: 'text', val: 'ем із грушки?' }],
            [{ type: 'text', val: '— З’їм його я самотужки, —' }],
            [{ type: 'gap', correct: 'дж', alt: 'дз' }, { type: 'text', val: 'міль ' }, { type: 'gap', correct: 'дз', alt: 'дж' }, { type: 'text', val: 'ижчав, що було сили,' }],
            [{ type: 'text', val: 'поки склянку не закрили.' }]
        ];

        const board = document.getElementById('game-board');
        let totalGaps = 0;
        let solvedGaps = 0;

        // Генерація елементів на дошці
        function renderBoard() {
            board.innerHTML = '';
            totalGaps = 0;
            solvedGaps = 0;

            poemLines.forEach(lineData => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line';

                lineData.forEach(item => {
                    if (item.type === 'text') {
                        const span = document.createElement('span');
                        span.textContent = item.val;
                        lineDiv.appendChild(span);
                    } else if (item.type === 'gap') {
                        totalGaps++;
                        const gapContainer = createChoiceContainer(item.correct, item.alt);
                        lineDiv.appendChild(gapContainer);
                    }
                });

                board.appendChild(lineDiv);
            });
        }

        // Створення блоку вибору [ Дж | Дз ]
        function createChoiceContainer(correct, alt) {
            const container = document.createElement('div');
            container.className = 'choice-container';

            // Рандомізація позиції правильної відповіді
            const opts = Math.random() > 0.5 ? [correct, alt] : [alt, correct];

            opts.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = opt;
                
                btn.addEventListener('click', () => {
                    handleChoice(btn, container, opt, correct);
                });
                
                container.appendChild(btn);

                // Додаємо розділювач "|"
                if (index === 0) {
                    const separator = document.createElement('span');
                    separator.className = 'choice-separator';
                    separator.textContent = '|';
                    container.appendChild(separator);
                }
            });

            return container;
        }

        // Обробка кліку
        function handleChoice(btnElement, container, selected, correct) {
            if (selected === correct) {
                // Правильно
                playSuccessSound();
                createParticles(btnElement);
                animateBees('happy');
                
                // Перетворюємо блок з кнопками на просто зелений текст
                const solvedSpan = document.createElement('span');
                solvedSpan.className = 'solved-text';
                solvedSpan.textContent = correct;
                
                container.parentNode.replaceChild(solvedSpan, container);
                
                solvedGaps++;
                if (solvedGaps === totalGaps) {
                    setTimeout(() => {
                        playWinSound();
                        animateBees('happy', true); // Довга радість в кінці
                    }, 500);
                }
            } else {
                // Неправильно
                playErrorSound();
                animateBees('sad');
                
                // Анімація трусіння кнопки
                btnElement.classList.remove('error-shake');
                void btnElement.offsetWidth; // Скидання анімації (Reflow)
                btnElement.classList.add('error-shake');
            }
        }

        // --- Емоції літаючих бджілок ---
        function animateBees(emotion, hold = false) {
            const bees = document.querySelectorAll('.bee');
            bees.forEach(bee => {
                // Зберігаємо поточний клас польоту, щоб не зламати траєкторію
                const currentFlyClass = Array.from(bee.classList).find(c => c.startsWith('flying-'));
                
                bee.className = `bee ${currentFlyClass} ${emotion}`;
                
                if (!hold) {
                    setTimeout(() => {
                        bee.className = `bee ${currentFlyClass}`;
                    }, emotion === 'happy' ? 800 : 500);
                }
            });
        }

        // --- Система частинок (конфетті з квітів) ---
        function createParticles(element) {
            const rect = element.getBoundingClientRect();
            const colors = ['#FF69B4', '#FFD700', '#00FF00', '#FFA500', '#9370DB']; // Кольори квітів
            
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const color = colors[Math.floor(Math.random() * colors.length)];
                const size = Math.random() * 12 + 8; // Трохи більші конфетті
                
                particle.style.backgroundColor = color;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                // Робимо частинки схожими на пелюстки
                particle.style.borderRadius = Math.random() > 0.5 ? '50% 0 50% 0' : '50%';
                
                const startX = rect.left + rect.width / 2;
                const startY = rect.top + rect.height / 2;
                particle.style.left = startX + 'px';
                particle.style.top = startY + 'px';
                
                document.body.appendChild(particle);
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 150 + 80;
                const destX = startX + Math.cos(angle) * distance;
                const destY = startY + Math.sin(angle) * distance;
                
                const animation = particle.animate([
                    { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${destX - startX}px, ${destY - startY}px) scale(0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 600 + 600,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });
                
                animation.onfinish = () => particle.remove();
            }
        }

        // Запуск гри
        renderBoard();

    </script>
</body>
</html>
