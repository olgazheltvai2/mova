<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гра: Пилосос і літери (Оновлена)</title>
    <style>
        /* Базові налаштування */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #2a0845, #6441A5);
            font-family: 'Comic Sans MS', 'Fredoka One', cursive, sans-serif;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Деталізований килим */
        .rug {
            position: absolute;
            bottom: -10%;
            width: 120%;
            height: 50%;
            background: repeating-linear-gradient(
                45deg,
                #ff9a9e,
                #ff9a9e 20px,
                #fecfef 20px,
                #fecfef 40px
            );
            border-radius: 50% 50% 0 0;
            transform: perspective(500px) rotateX(45deg);
            z-index: 0;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
        }

        .mote {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-100px) translateX(50px); }
        }

        /* Персонаж - Пилосос */
        #vacuum-character {
            position: absolute;
            left: 5%;
            bottom: 15%;
            width: 300px;
            height: 350px;
            z-index: 10;
            filter: drop-shadow(5px 15px 10px rgba(0,0,0,0.4));
            transition: transform 0.3s ease;
        }

        .breathing { animation: breathe 2s infinite alternate ease-in-out; }
        @keyframes breathe {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.02) translateY(-5px); }
        }

        .happy-vacuum { animation: jump 0.5s ease; }
        .sad-vacuum { animation: shake 0.4s ease; }

        @keyframes jump {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-5deg); }
            75% { transform: translateX(15px) rotate(5deg); }
        }

        #eyes { animation: blink 4s infinite; transform-origin: center; }
        @keyframes blink {
            0%, 95%, 100% { transform: scaleY(1); }
            97.5% { transform: scaleY(0.1); }
        }

        /* КОНТЕЙНЕР ДЛЯ ЛІТЕР ЗВЕРХУ */
        #letters-container {
            position: absolute;
            top: 5%;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 60px;
            z-index: 20;
        }

        .letter-source {
            position: relative;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #fff200, #ff9000);
            border: 5px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: bold;
            color: #d32f2f;
            cursor: grab;
            box-shadow: 0 0 20px #ff9000;
            user-select: none;
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px #ff9000; transform: scale(1); }
            100% { box-shadow: 0 0 30px #fff200; transform: scale(1.1); }
        }

        .drag-clone {
            position: absolute;
            pointer-events: none;
            z-index: 1000;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #00f2fe, #4facfe);
            border: 4px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* Область слів трохи опущена, щоб не перекривати літери */
        #words-area {
            position: absolute;
            right: 5%;
            top: 25%;
            width: 60%;
            height: 60%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 20px;
            z-index: 15;
        }

        .word-blob {
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            padding: 15px 30px;
            font-size: 36px;
            font-weight: bold;
            color: #4a148c;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            box-shadow: 5px 10px 15px rgba(0,0,0,0.3), inset -5px -5px 15px rgba(255,255,255,0.4);
            transition: all 0.3s;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 5px;
        }

        .word-blob:nth-child(even) { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%; }
        .word-blob:nth-child(3n) { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); border-radius: 50% 50% 60% 40% / 40% 40% 60% 60%; }

        .drop-zone {
            display: inline-block;
            width: 40px;
            height: 40px;
            border-bottom: 5px dashed #4a148c;
            margin: 0 5px;
            text-align: center;
            line-height: 40px;
            color: transparent;
            transition: color 0.3s;
        }

        .drop-zone.filled {
            border-bottom: none;
            color: #d32f2f;
            text-shadow: 0 0 10px #fff;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .word-blob.solved {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            transform: scale(1.05);
            box-shadow: 0 0 20px #fda085;
            pointer-events: none;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }

        /* Частинки пилу, які засмоктує пилосос */
        .sucked-dust {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #aaaaaa, #444444);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* Вибух конфеті при правильній відповіді */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 999;
            animation: explode 0.6s forwards ease-out;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Кнопки навігації */
        .nav-btn {
            position: absolute;
            bottom: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 50;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.1); }
        .nav-btn svg { width: 30px; height: 30px; fill: #fff; }
        #btn-prev { left: 30px; }
        #btn-next { right: 30px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="rug"></div>

        <div id="letters-container">
            <div id="source-a" class="letter-source" data-letter="а">а</div>
            <div id="source-e" class="letter-source" data-letter="е">е</div>
        </div>

        <svg id="vacuum-character" class="breathing" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ff7eb3"/>
                    <stop offset="100%" stop-color="#ff758c"/>
                </linearGradient>
                <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
                    <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
                </linearGradient>
                <radialGradient id="wheelGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#555"/>
                    <stop offset="100%" stop-color="#111"/>
                </radialGradient>
            </defs>

            <path id="hose" d="M 300 250 C 380 280, 390 100, 320 80 C 260 60, 200 150, 180 150" fill="none" stroke="#4a4a4a" stroke-width="25" stroke-linecap="round" stroke-linejoin="round"/>
            <path id="hose-ridges" d="M 300 250 C 380 280, 390 100, 320 80 C 260 60, 200 150, 180 150" fill="none" stroke="#222" stroke-width="25" stroke-dasharray="5 10"/>
            
            <polygon id="nozzle" points="180,135 150,180 210,180" fill="#ff758c" stroke="#fff" stroke-width="3"/>

            <circle cx="120" cy="330" r="40" fill="url(#wheelGrad)"/>
            <circle cx="280" cy="330" r="40" fill="url(#wheelGrad)"/>
            <circle cx="120" cy="330" r="15" fill="#ffd700"/>
            <circle cx="280" cy="330" r="15" fill="#ffd700"/>

            <path d="M 70 200 C 70 100, 330 100, 330 200 C 330 320, 70 320, 70 200 Z" fill="url(#bodyGrad)"/>
            
            <circle cx="200" cy="220" r="80" fill="url(#glassGrad)" stroke="#fff" stroke-width="4"/>
            <path d="M 140 180 Q 200 140 260 180" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="8" stroke-linecap="round"/>

            <g id="eyes">
                <circle cx="160" cy="140" r="15" fill="#fff"/>
                <circle cx="240" cy="140" r="15" fill="#fff"/>
                <circle cx="160" cy="140" r="6" fill="#000"/>
                <circle cx="240" cy="140" r="6" fill="#000"/>
            </g>
            <path id="mouth" d="M 180 160 Q 200 175 220 160" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
        </svg>

        <div id="words-area"></div>

        <div id="btn-prev" class="nav-btn">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </div>
        <div id="btn-next" class="nav-btn">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </div>
    </div>

    <script>
        // --- ДАНІ ГРИ ---
        const allWords = [
            { p1: 'с', ans: 'а', p2: 'ло' }, { p1: 'с', ans: 'е', p2: 'ло' },
            { p1: 'м', ans: 'а', p2: 'к' },  { p1: 'м', ans: 'е', p2: 'д' },
            { p1: 'в', ans: 'а', p2: 'за' }, { p1: 'в', ans: 'е', p2: 'зе' },
            { p1: 'м', ans: 'е', p2: 'та' }, { p1: 'т', ans: 'е', p2: 'ма' },
            { p1: 'с', ans: 'а', p2: 'ни' }, { p1: 'р', ans: 'а', p2: 'на' },
            { p1: 'к', ans: 'е', p2: 'кс' }, { p1: 'к', ans: 'а', p2: 'рп' },
            { p1: 'кр', ans: 'е', p2: 'м' }, { p1: 'ст', ans: 'а', p2: 'в' },
            { p1: 'н', ans: 'е', p2: 'рв' }, { p1: 'бр', ans: 'а', p2: 'т' },
            { p1: 'дж', ans: 'е', p2: 'м' }, { p1: 'б', ans: 'а', p2: 'нт' },
            { p1: 'в', ans: 'е', p2: 'рх' }, { p1: 'б', ans: 'а', p2: 'нк' },
            { p1: 'вд', ans: 'е', p2: 'нь' }, { p1: 'в', ans: 'а', p2: 'льс' },
            { p1: 'авж', ans: 'е', p2: 'ж' }, { p1: 'пл', ans: 'а', p2: 'н' }
        ];

        allWords.sort(() => Math.random() - 0.5);
        const wordsPerLevel = 6;
        let currentLevel = 0;
        let wordsSolved = 0;

        // Пил на фоні
        for(let i=0; i<20; i++) {
            let mote = document.createElement('div');
            mote.className = 'mote';
            mote.style.width = Math.random() * 10 + 5 + 'px';
            mote.style.height = mote.style.width;
            mote.style.left = Math.random() * 100 + '%';
            mote.style.top = Math.random() * 100 + '%';
            mote.style.animationDelay = Math.random() * 5 + 's';
            mote.style.animationDuration = Math.random() * 10 + 10 + 's';
            document.getElementById('game-container').appendChild(mote);
        }

        // --- АУДІО СИСТЕМА ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.4, now + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'vacuum') {
                // Звук засмоктування пилососом (шум)
                const bufferSize = audioCtx.sampleRate * 0.5; 
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(500, now);
                filter.frequency.exponentialRampToValueAtTime(2000, now + 0.2);
                filter.frequency.exponentialRampToValueAtTime(100, now + 0.5);

                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0, now);
                noiseGain.gain.linearRampToValueAtTime(0.5, now + 0.1);
                noiseGain.gain.linearRampToValueAtTime(0, now + 0.5);

                noise.connect(filter);
                filter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start(now);
            }
        }

        const wordsArea = document.getElementById('words-area');
        const vacuum = document.getElementById('vacuum-character');
        const mouth = document.getElementById('mouth');

        function loadLevel() {
            wordsArea.innerHTML = '';
            wordsSolved = 0;
            const startIdx = currentLevel * wordsPerLevel;
            const endIdx = Math.min(startIdx + wordsPerLevel, allWords.length);
            const levelWords = allWords.slice(startIdx, endIdx);

            levelWords.forEach(item => {
                const blob = document.createElement('div');
                blob.className = 'word-blob';
                blob.innerHTML = `<span>${item.p1}</span><div class="drop-zone" data-ans="${item.ans}">${item.ans}</div><span>${item.p2}</span>`;
                wordsArea.appendChild(blob);
            });
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            initAudio();
            if ((currentLevel + 1) * wordsPerLevel < allWords.length) { currentLevel++; loadLevel(); }
        });
        document.getElementById('btn-prev').addEventListener('click', () => {
            initAudio();
            if (currentLevel > 0) { currentLevel--; loadLevel(); }
        });

        // --- АНІМАЦІЯ ЗАСМОКТУВАННЯ ПИЛУ ---
        function suckDust(startX, startY) {
            playSound('vacuum');
            const vacuumRect = vacuum.getBoundingClientRect();
            // Обчислюємо приблизні координати насадки пилососа на екрані
            const targetX = vacuumRect.left + (vacuumRect.width * (180 / 400));
            const targetY = vacuumRect.top + (vacuumRect.height * (160 / 400));

            for(let i=0; i<20; i++) {
                let dust = document.createElement('div');
                dust.className = 'sucked-dust';
                document.body.appendChild(dust);
                
                // Розкидаємо пил навколо слова
                let x = startX + (Math.random() * 120 - 60);
                let y = startY + (Math.random() * 120 - 60);
                
                dust.style.left = x + 'px';
                dust.style.top = y + 'px';

                let animation = dust.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${targetX - x}px, ${targetY - y}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 400 + Math.random() * 300,
                    easing: 'cubic-bezier(0.5, 0, 0.8, 1)'
                });

                animation.onfinish = () => dust.remove();
            }

            // Пилосос підстрибує від радості при всмоктуванні
            vacuum.classList.remove('breathing');
            vacuum.classList.add('happy-vacuum');
            mouth.setAttribute('d', 'M 170 150 Q 200 190 230 150');
            
            setTimeout(() => {
                vacuum.classList.remove('happy-vacuum');
                vacuum.classList.add('breathing');
                mouth.setAttribute('d', 'M 180 160 Q 200 175 220 160');
            }, 500);
        }

        // --- DRAG & DROP ---
        let activeClone = null;
        let currentLetter = '';

        document.querySelectorAll('.letter-source').forEach(src => {
            src.addEventListener('mousedown', startDrag);
            src.addEventListener('touchstart', startDrag, {passive: false});
        });

        function startDrag(e) {
            initAudio();
            currentLetter = e.target.getAttribute('data-letter');
            activeClone = document.createElement('div');
            activeClone.className = 'drag-clone';
            activeClone.innerText = currentLetter;
            document.body.appendChild(activeClone);
            moveClone(e);
            mouth.setAttribute('d', 'M 180 160 Q 200 190 220 160'); // Відкриває рота
        }

        function moveClone(e) {
            if (!activeClone) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            activeClone.style.left = clientX + 'px';
            activeClone.style.top = clientY + 'px';
        }

        function endDrag(e) {
            if (!activeClone) return;
            const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            
            const target = document.elementFromPoint(clientX, clientY);
            let dropZone = null;
            if (target && target.classList.contains('drop-zone')) dropZone = target;
            if (target && target.closest('.word-blob')) dropZone = target.closest('.word-blob').querySelector('.drop-zone');

            if (dropZone && !dropZone.classList.contains('filled')) {
                const correctAns = dropZone.getAttribute('data-ans');
                
                if (currentLetter === correctAns) {
                    // ПРАВИЛЬНО - запускаємо пилосос!
                    playSound('success');
                    dropZone.classList.add('filled');
                    dropZone.parentElement.classList.add('solved');
                    
                    // Викликаємо функцію засмоктування пилу
                    const dropRect = dropZone.getBoundingClientRect();
                    suckDust(dropRect.left + dropRect.width/2, dropRect.top + dropRect.height/2);

                    wordsSolved++;
                } else {
                    // НЕПРАВИЛЬНО
                    playSound('error');
                    vacuum.classList.remove('breathing');
                    vacuum.classList.add('sad-vacuum');
                    mouth.setAttribute('d', 'M 180 170 Q 200 150 220 170'); 
                    
                    dropZone.parentElement.style.animation = 'shake 0.4s';
                    setTimeout(() => dropZone.parentElement.style.animation = '', 400);

                    setTimeout(() => {
                        vacuum.classList.remove('sad-vacuum');
                        vacuum.classList.add('breathing');
                        mouth.setAttribute('d', 'M 180 160 Q 200 175 220 160');
                    }, 400);
                }
            } else {
                 mouth.setAttribute('d', 'M 180 160 Q 200 175 220 160');
            }

            activeClone.remove();
            activeClone = null;
        }

        document.addEventListener('mousemove', moveClone);
        document.addEventListener('touchmove', (e) => { if(activeClone) { e.preventDefault(); moveClone(e); } }, {passive: false});
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        loadLevel();
    </script>
</body>
</html>
