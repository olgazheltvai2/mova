<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Королівські Слова - Ідеальний Контраст</title>
    <style>
        /* Глибокий королівський зелений фон */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #113811 0%, #030a03 100%);
            font-family: 'Times New Roman', serif;
            user-select: none;
        }

        /* Головна сцена */
        #main-stage {
            position: relative;
            width: 1100px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Контейнер таблички */
        #royal-board {
            position: relative;
            width: 1000px;
            height: 400px;
            cursor: pointer;
        }

        /* SVG фону таблички */
        #royal-board svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; 
        }

        /* АБСОЛЮТНО ЦЕНТРОВАНЕ СЛОВО З ІДЕАЛЬНИМ КОНТРАСТОМ */
        #word-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            z-index: 20;
            font-size: 85px;
            font-weight: 900;
            color: #ffd700; /* Яскраве золото */
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 6px;
            white-space: nowrap; 
            /* Жорстка темна тінь для максимального контрасту */
            text-shadow: 
                3px 3px 0px #220000,
                -1px -1px 0px #550000,
                0px 8px 20px rgba(0, 0, 0, 0.9),
                0px 0px 30px rgba(255, 215, 0, 0.4);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #word-text.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Кнопки навігації */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 30;
            transition: transform 0.2s, filter 0.2s;
        }

        .nav-btn:hover { 
            transform: translateY(-50%) scale(1.15); 
            filter: drop-shadow(0 0 15px #ffd700);
        }
        .nav-btn:active { 
            transform: translateY(-50%) scale(0.95); 
        }

        #btn-prev { left: -30px; }
        #btn-next { right: -30px; }

        /* Ефект взаємодії (спалах) */
        @keyframes flash-glow {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.2) drop-shadow(0 0 20px rgba(255, 215, 0, 0.6)); }
            100% { filter: brightness(1); }
        }
        .animate-glow {
            animation: flash-glow 0.4s ease-out;
        }
    </style>
</head>
<body>

    <div id="main-stage">
        
        <svg id="btn-prev" class="nav-btn" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="#113811" stroke="#ffd700" stroke-width="4"/>
            <path d="M60 25 L35 50 L60 75" fill="none" stroke="#ffd700" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <div id="royal-board">
            
            <svg viewBox="0 0 1000 400">
                <defs>
                    <linearGradient id="gold-base" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#fff5d7" />
                        <stop offset="30%" stop-color="#ffd700" />
                        <stop offset="80%" stop-color="#b8860b" />
                        <stop offset="100%" stop-color="#4a3300" />
                    </linearGradient>
                    
                    <linearGradient id="ruby-velvet" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#4a0000" />
                        <stop offset="50%" stop-color="#220000" />
                        <stop offset="100%" stop-color="#110000" />
                    </linearGradient>

                    <filter id="shadow">
                        <feDropShadow dx="0" dy="20" stdDeviation="15" flood-color="#000" flood-opacity="0.9"/>
                    </filter>
                    
                    <filter id="inner-shadow">
                        <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.8" />
                    </filter>
                </defs>
                
                <rect x="250" y="-50" width="14" height="100" fill="#4a3300" />
                <rect x="740" y="-50" width="14" height="100" fill="#4a3300" />

                <rect x="50" y="50" width="900" height="300" rx="30" fill="url(#gold-base)" filter="url(#shadow)" stroke="#2a1a00" stroke-width="8"/>
                
                <rect x="75" y="75" width="850" height="250" rx="20" fill="url(#ruby-velvet)" stroke="#5c4008" stroke-width="4" filter="url(#inner-shadow)"/>

                <path d="M 110 110 Q 150 150 110 190 Q 70 150 110 110 Z" fill="none" stroke="#b8860b" stroke-width="3" opacity="0.6"/>
                <path d="M 890 110 Q 930 150 890 190 Q 850 150 890 110 Z" fill="none" stroke="#b8860b" stroke-width="3" opacity="0.6"/>
                <path d="M 110 290 Q 150 250 110 210 Q 70 250 110 290 Z" fill="none" stroke="#b8860b" stroke-width="3" opacity="0.6"/>
                <path d="M 890 290 Q 930 250 890 210 Q 850 250 890 290 Z" fill="none" stroke="#b8860b" stroke-width="3" opacity="0.6"/>

                <g transform="translate(500, 48)">
                    <path d="M-35 0 L-25 -30 L0 -15 L25 -30 L35 0 Z" fill="url(#gold-base)" stroke="#2a1a00" stroke-width="3"/>
                    <circle cx="-25" cy="-30" r="6" fill="#ff0000" />
                    <circle cx="25" cy="-30" r="6" fill="#00aaff" />
                    <circle cx="0" cy="-15" r="8" fill="#00ff00" />
                </g>
            </svg>
            
            <div id="word-text"></div>

        </div>

        <svg id="btn-next" class="nav-btn" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="#113811" stroke="#ffd700" stroke-width="4"/>
            <path d="M40 25 L65 50 L40 75" fill="none" stroke="#ffd700" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

    </div>

    <script>
        // Словник (30 слів без повторів)
        const dictionary = [
            "Зимовий", "Працювати", "Сонячний", "Малювати", "Вечірній",
            "Співати", "Радісний", "Читати", "Квітковий", "Танцювати",
            "Сніжний", "Бігати", "Морський", "Літати", "Кам'яний",
            "Плавати", "Лісовий", "Сміятися", "Залізний", "Стрибати",
            "Нічний", "Кричати", "Золотий", "Спати", "Паперовий",
            "Мріяти", "Весняний", "Будувати", "Скляний", "Жартувати"
        ];

        let queue = [];
        let history = []; 
        let isAnimating = false;

        const wordEl = document.getElementById('word-text');
        const boardEl = document.getElementById('royal-board');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        
        let audioCtx = null;

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function refreshQueue() {
            let indices = Array.from({length: dictionary.length}, (_, i) => i);
            queue = shuffle(indices);
        }

        function playInteractionSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function showWord(wordIndex) {
            if (isAnimating) return;
            isAnimating = true;

            wordEl.classList.remove('active');
            
            boardEl.classList.remove('animate-glow');
            void boardEl.offsetWidth; 
            boardEl.classList.add('animate-glow');

            setTimeout(() => {
                wordEl.textContent = dictionary[wordIndex];
                wordEl.classList.add('active');
                playInteractionSound();
                
                setTimeout(() => {
                    isAnimating = false;
                }, 300); 
            }, 150); 
        }

        function goNext() {
            if (isAnimating) return;
            if (queue.length === 0) refreshQueue(); 
            
            const nextIdx = queue.shift();
            history.push(nextIdx);
            showWord(nextIdx);
        }

        function goBack() {
            if (isAnimating || history.length <= 1) return;
            
            const currentIdx = history.pop();
            queue.unshift(currentIdx);
            
            const prevIdx = history[history.length - 1];
            showWord(prevIdx);
        }

        boardEl.addEventListener('click', goNext);
        btnNext.addEventListener('click', goNext);
        btnPrev.addEventListener('click', goBack);

        refreshQueue();
        goNext();
    </script>
</body>
</html>
