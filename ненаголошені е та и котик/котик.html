<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гра: Знайди помилку</title>
    <style>
        /* Скидання стилів */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* Загальний фон квартири */
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e8f0eb 0%, #d1e0d7 60%, #b89976 60%, #8f6c47 100%);
        }

        /* Декорації кімнати */
        .scenery {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Смугасті шпалери на стіні */
        .wallpaper-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.3) 40px, rgba(255,255,255,0.3) 80px);
        }

        /* Плінтус */
        .baseboard {
            position: absolute;
            top: 60%;
            left: 0;
            width: 100%;
            height: 4vh;
            background: linear-gradient(to bottom, #f0e6d2 0%, #d4c8b2 100%);
            border-bottom: 3px solid #5a432b;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        /* ➡️ 🔴 КИЛИМОК */
        .carpet {
            position: absolute;
            bottom: -5vh;
            left: 70%; 
            transform: translateX(-50%) scaleY(0.4);
            width: 45vw;
            height: 35vh;
            background: radial-gradient(ellipse, #ff7e67 0%, #d9534f 80%);
            border-radius: 50%;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,0,0,0.2);
            border: 8px dashed #ff9e8f;
        }

        /* Вікно на стіні */
        .window {
            position: absolute;
            top: 10vh;
            right: 10vw;
            width: 20vw;
            height: 35vh;
            background: linear-gradient(to bottom, #87CEEB, #e0f6ff);
            border: 12px solid #fff;
            border-radius: 5px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 15px rgba(255,255,255,0.8);
            overflow: hidden;
        }

        .window::before { content: ''; position: absolute; top: 0; left: 50%; width: 8px; height: 100%; background: #fff; transform: translateX(-50%); box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .window::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 8px; background: #fff; transform: translateY(-50%); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Кімнатна рослина */
        svg.plant {
            position: absolute;
            bottom: 35vh;
            left: 5vw;
            width: 120px;
            z-index: 2;
        }
        svg.plant path[fill="#e67e22"] { fill: #e67e22; }
        svg.plant path[fill="#d35400"] { fill: #d35400; }
        svg.plant path[fill="#2ecc71"] { fill: #2ecc71; }
        svg.plant path[fill="#27ae60"] { fill: #27ae60; }
        svg.plant path[fill="#229954"] { fill: #229954; }

        /* ➡️ 👇 🐱 КОТИК */
        #cat-wrapper {
            position: absolute;
            bottom: 8vh; 
            left: 70%;   
            width: 1200px;
            height: 1200px;
            transform: translateX(-50%) scale(0.33); 
            transform-origin: bottom center;
            z-index: 10;
            animation: breathe 5s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: translateX(-50%) scale(0.33) translateY(0); }
            50% { transform: translateX(-50%) scale(0.335) translateY(-10px); }
        }

        /* Деталі котика */
        .cat-part {
            position: absolute;
            transition: transform 0.7s ease-in-out; 
        }

        /* Класи для анімації частин тіла */
        .twitch-ear-l { transform: rotate(-12deg); }
        .twitch-ear-r { transform: rotate(12deg); }
        .twitch-paw { transform: translateY(-20px) rotate(-8deg); }
        .twitch-tail { transform: rotate(15deg); }

        /* Ігровий інтерфейс */
        #ui-layer {
            position: absolute;
            top: 15vh;
            left: 5vw;
            width: 40vw;
            height: auto; 
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            pointer-events: none; 
        }

        /* Дошка для тексту */
        #sentence-board {
            pointer-events: auto;
            width: 100%;
            background: linear-gradient(145deg, #fcebb6, #f3d994);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.2),
                inset 0 0 0 8px #d4af37,
                inset 0 0 15px rgba(139, 69, 19, 0.3);
            text-align: center;
            border: 4px solid #8b4513;
            position: relative;
        }

        /* Кнопки "цвяшки" на дошці */
        #sentence-board::before, #sentence-board::after {
            content: '';
            position: absolute;
            top: 15px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #a0a0a0, #404040);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        #sentence-board::before { left: 15px; }
        #sentence-board::after { right: 15px; }

        .sentence-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        /* Інтерактивні слова */
        .word {
            display: inline-block;
            font-size: 30px;
            font-weight: 800;
            color: #2c3e50;
            background: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 0 #cfd8dc, 0 8px 12px rgba(0,0,0,0.1);
            transition: all 0.1s ease-in-out;
        }

        .word:hover {
            transform: translateY(-4px);
            box-shadow: 0 9px 0 #b0bec5, 0 12px 18px rgba(0,0,0,0.2);
            color: #d35400;
        }

        .word:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 transparent;
        }

        /* ⬆️ 🔘 КНОПКИ НАВІГАЦІЇ */
        .controls {
            pointer-events: auto;
            position: relative;
            margin-top: 5vh; 
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            background: linear-gradient(145deg, #74ebd5, #4ca1af);
            border: 4px solid #fff;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(76, 161, 175, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 12px 22px rgba(76, 161, 175, 0.6);
            background: linear-gradient(145deg, #4ca1af, #74ebd5);
        }

        .nav-btn:active {
            transform: scale(0.92);
        }

        .nav-btn svg { width: 32px; height: 32px; fill: #fff; }

        /* Анімації помилок і мишок */
        .shake { animation: shake 0.3s; }
        @keyframes shake {
            0% { transform: translateX(0) }
            25% { transform: translateX(10px) rotate(1deg) }
            50% { transform: translateX(-10px) rotate(-1deg) }
            75% { transform: translateX(10px) rotate(1deg) }
            100% { transform: translateX(0) }
        }

        .mouse-particle {
            position: absolute;
            width: 45px;
            height: 45px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="scenery">
        <div class="wallpaper-pattern"></div>
        <div class="baseboard"></div>
        
        <div class="window">
            <svg style="position: absolute; top: 20%; left: 10%; width: 60px; opacity: 0.9;" viewBox="0 0 200 100" fill="#ffffff">
                <path d="M50,60 a20,20 0 0,1 40,-10 a30,30 0 0,1 60,10 a20,20 0 0,1 -10,30 l-80,0 a20,20 0 0,1 -10,-30 z" />
            </svg>
            <svg style="position: absolute; top: 60%; right: -10%; width: 80px; opacity: 0.7;" viewBox="0 0 200 100" fill="#ffffff">
                <path d="M50,60 a20,20 0 0,1 40,-10 a30,30 0 0,1 60,10 a20,20 0 0,1 -10,30 l-80,0 a20,20 0 0,1 -10,-30 z" />
            </svg>
        </div>

        <svg class="plant" viewBox="0 0 200 300">
            <path d="M40,200 L160,200 L140,290 L60,290 Z" fill="#e67e22"/>
            <path d="M30,200 L170,200 L170,220 L30,220 Z" fill="#d35400"/>
            <path d="M100,200 Q50,150 20,80 Q70,90 100,180" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
            <path d="M100,200 Q150,150 180,80 Q130,90 100,180" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
            <path d="M100,200 Q80,100 100,20 Q120,100 100,200" fill="#27ae60" stroke="#2ecc71" stroke-width="2"/>
            <path d="M100,200 Q40,180 10,140 Q60,140 100,190" fill="#229954" stroke="#1e8449" stroke-width="2"/>
            <path d="M100,200 Q160,180 190,140 Q140,140 100,190" fill="#229954" stroke="#1e8449" stroke-width="2"/>
        </svg>

        <div class="carpet"></div>
    </div>

    <div id="cat-wrapper"></div>

    <div id="ui-layer">
        <div id="sentence-board">
            <div id="sentence-container" class="sentence-container"></div>
        </div>

        <div class="controls">
            <button class="nav-btn" id="prevBtn">
                <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
            </button>
            <button class="nav-btn" id="nextBtn">
                <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
            </button>
        </div>
    </div>

<script>
// --- Конфігурація котика ---
const catData = [
  { id: 'ear-l', file: "ліве вухо.png", x: 254, y: 101, z: 40, pivotX: 55.5, pivotY: 71.4, width: 185, height: 178, classTwitch: 'twitch-ear-l' },
  { id: 'ear-r', file: "праве вухо.png", x: 567, y: 86, z: 41, pivotX: 45, pivotY: 74, width: 185, height: 178, classTwitch: 'twitch-ear-r' },
  { id: 'leg', file: "нога.png", x: 597, y: 854, z: 77, pivotX: 50, pivotY: 11, width: 336, height: 357, classTwitch: 'twitch-paw' },
  { id: 'paw-r', file: "права лапа.png", x: 691, y: 590, z: 79, pivotX: 14, pivotY: 18, width: 303, height: 429, classTwitch: 'twitch-paw' },
  { id: 'paw-l', file: "ліва лапа.png", x: 87, y: 614, z: 49, pivotX: 38, pivotY: 7, width: 332, height: 399, classTwitch: 'twitch-paw' },
  { id: 'tail', file: "хвіст.png", x: 907, y: 356, z: 46, pivotX: 8, pivotY: 93, width: 371, height: 580, classTwitch: 'twitch-tail' },
  { id: 'body', file: "тіло.png", x: 97, y: 149, z: 50, pivotX: 50, pivotY: 50, width: 929, height: 994, classTwitch: '' }
];

// --- Завдання ---
const levels = [
    { text: "На дворі розквітли висняні квіти.", index: 3 },
    { text: "Пташки весело щибечуть на гілках.", index: 2 },
    { text: "Лесичка хитро дивиться з-за куща.", index: 0 },
    { text: "У шерокому полі пасеться лоша.", index: 1 },
    { text: "Хлопчик шведко побіг до школи.", index: 1 },
    { text: "Стиповий вітер хилить високі трави.", index: 0 },
    { text: "Дівчинка нисе воду з криниці.", index: 1 },
    { text: "Глебоке озеро виблискує на сонці.", index: 0 },
    { text: "Мидова крапля впала на зелену траву.", index: 0 },
    { text: "Земовий ранок був напрочуд холодним.", index: 0 },
    { text: "Систричка зробила дуже гарний малюнок.", index: 0 },
    { text: "Весока гора ховалася у густих хмарах.", index: 0 },
    { text: "Діти радісно гралися на бирежку.", index: 4 },
    { text: "Швидко тимніє небо перед великою грозою.", index: 1 },
    { text: "В лісі сховалося багато гребів після дощу.", index: 4 }
];

let currentLevel = 0;
let isAnimating = false;

// Звукові ефекти 
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    
    if (type === 'error') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } 
    else if (type === 'success') {
        const notes = [523.25, 659.25, 783.99, 1046.50]; 
        notes.forEach((freq, i) => {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }, i * 70);
        });
    }
}

// Збираємо котика
function buildCat() {
    const wrapper = document.getElementById('cat-wrapper');
    catData.forEach(part => {
        const img = document.createElement('img');
        img.src = part.file;
        img.id = part.id;
        img.className = 'cat-part';
        img.style.left = `${part.x}px`;
        img.style.top = `${part.y}px`;
        img.style.zIndex = part.z;
        img.style.width = `${part.width}px`;
        img.style.height = `${part.height}px`;
        img.style.transformOrigin = `${part.pivotX}% ${part.pivotY}%`;
        wrapper.appendChild(img);
    });
}

// Плавний цикл рухів
function continuousCatMotion() {
    const parts = catData.filter(p => p.classTwitch !== '');
    const randomPartInfo = parts[Math.floor(Math.random() * parts.length)];
    const el = document.getElementById(randomPartInfo.id);
    
    if (el) {
        el.classList.add(randomPartInfo.classTwitch);
        setTimeout(() => {
            el.classList.remove(randomPartInfo.classTwitch);
            setTimeout(continuousCatMotion, 100); 
        }, 700);
    }
}

// Логіка гри
function loadLevel(levelIndex) {
    if (levelIndex < 0) levelIndex = levels.length - 1;
    if (levelIndex >= levels.length) levelIndex = 0;
    
    currentLevel = levelIndex;
    isAnimating = false;
    const container = document.getElementById('sentence-container');
    container.innerHTML = '';
    
    const levelData = levels[currentLevel];
    const formattedText = levelData.text.charAt(0).toUpperCase() + levelData.text.slice(1);
    const words = formattedText.split(' ');

    words.forEach((wordText, i) => {
        const wordEl = document.createElement('div');
        wordEl.className = 'word';
        wordEl.innerText = wordText;
        
        wordEl.onclick = () => {
            if(isAnimating) return;
            checkAnswer(i, wordEl, levelData.index);
        };
        container.appendChild(wordEl);
    });
}

function checkAnswer(clickedIndex, element, correctIndex) {
    if (clickedIndex === correctIndex) {
        isAnimating = true;
        playSound('success');
        
        element.style.background = '#81c784';
        element.style.color = '#fff';
        element.style.transform = 'scale(1.2)';
        element.style.boxShadow = '0 15px 30px rgba(76, 175, 80, 0.4)';
        
        explodeMice();
        setTimeout(() => loadLevel(currentLevel + 1), 2000);
    } else {
        playSound('error');
        element.classList.add('shake');
        element.style.color = '#d32f2f';
        element.style.boxShadow = '0 5px 0 #ffcdd2, 0 8px 12px rgba(0,0,0,0.1)';
        
        setTimeout(() => {
            element.classList.remove('shake');
            element.style.color = '';
            element.style.boxShadow = '';
        }, 300);
    }
}

// Вибух мишок
function explodeMice() {
    const totalMice = 45;
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;
    
    for (let i = 0; i < totalMice; i++) {
        const mouse = document.createElement('div');
        mouse.className = 'mouse-particle';
        mouse.innerHTML = `
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <path d="M50,75 Q70,95 85,85 T95,100" fill="none" stroke="#636e72" stroke-width="4" stroke-linecap="round"/>
                <ellipse cx="50" cy="50" rx="25" ry="35" fill="#b2bec3"/>
                <circle cx="35" cy="30" r="12" fill="#636e72"/>
                <circle cx="65" cy="30" r="12" fill="#636e72"/>
                <circle cx="35" cy="30" r="6" fill="#ffb8b8"/>
                <circle cx="65" cy="30" r="6" fill="#ffb8b8"/>
                <circle cx="43" cy="45" r="3" fill="#2d3436"/>
                <circle cx="57" cy="45" r="3" fill="#2d3436"/>
                <circle cx="50" cy="55" r="4" fill="#ff7675"/>
            </svg>
        `;
        document.body.appendChild(mouse);
        
        mouse.style.left = `${centerX - 22}px`;
        mouse.style.top = `${centerY - 22}px`;
        
        const angle = Math.random() * Math.PI * 2;
        const velocity = 280 + Math.random() * 550; 
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;
        const rot = Math.random() * 1100 - 550;
        
        const anim = mouse.animate([
            { transform: `translate(0px, 0px) rotate(0deg) scale(0.2)`, opacity: 1 },
            { transform: `translate(${tx}px, ${ty}px) rotate(${rot}deg) scale(1.3)`, opacity: 0 }
        ], {
            duration: 1100 + Math.random() * 900,
            easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)',
            fill: 'forwards'
        });
        
        anim.onfinish = () => mouse.remove();
    }
}

// Навігація
document.getElementById('nextBtn').addEventListener('click', () => {
    if(!isAnimating) { audioCtx.resume(); loadLevel(currentLevel + 1); }
});
document.getElementById('prevBtn').addEventListener('click', () => {
    if(!isAnimating) { audioCtx.resume(); loadLevel(currentLevel - 1); }
});

// Ініціалізація
window.onload = () => {
    buildCat();
    setTimeout(continuousCatMotion, 600); 
    loadLevel(0);
};
</script>
</body>
</html>
