<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вербова пригода</title>
    <style>
        :root {
            --plate-1: #0e4b77; /* Глибокий синій для води */
            --plate-2: #4e342e; /* Темна кора дерева */
            --accent: #ffcc00;  /* Сонячний жовтий */
            --correct: #27ae60; /* Зелений успіх */
            --wrong: #c0392b;   /* Червона помилка */
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            background: #000;
        }

        #stage {
            position: relative;
            width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.5s ease;
        }

        /* Текстовий блок - контрастний та з великим інтервалом */
        #text-box {
            display: none; 
            background-color: var(--plate-1);
            background-image: radial-gradient(#1a5276 2px, transparent 2px);
            background-size: 30px 30px;
            border: 12px solid var(--accent);
            border-radius: 45px;
            padding: 60px;
            max-width: 85%;
            color: #fff;
            font-size: 3.8rem;
            line-height: 1.8; /* Збільшена відстань між рядками */
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            pointer-events: auto;
            text-align: center;
        }

        /* Блок вікторини */
        #quiz-box {
            display: none;
            flex-direction: column;
            align-items: center;
            background-color: var(--plate-2);
            background-image: repeating-linear-gradient(45deg, #3e2723 25%, transparent 25%, transparent 50%, #3e2723 50%, #3e2723 75%, transparent 75%, transparent);
            background-size: 50px 50px;
            border: 12px solid #e67e22;
            border-radius: 45px;
            padding: 60px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            pointer-events: auto;
        }

        .q-title {
            font-size: 4.8rem;
            color: var(--accent);
            margin-bottom: 50px;
            text-shadow: 6px 6px 0 #000;
            text-align: center;
        }

        .ans-btn {
            background: #fff;
            border: 6px solid #000;
            color: #000;
            font-size: 3.8rem;
            padding: 25px 80px;
            margin: 15px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.2s;
        }

        .ans-btn:hover { background: var(--accent); transform: translateY(-5px); }

        /* Мінімалістичні навігаційні кнопки */
        .nav {
            position: absolute;
            bottom: 40px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.15);
            border: 2px solid #fff;
            border-radius: 50%;
            color: #fff;
            font-size: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
        }

        .nav:hover { background: var(--accent); color: #000; }
        #back { left: 40px; display: none; }
        #next { right: 40px; display: none; }

        /* Вибір літер */
        .pair {
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            border: 4px solid var(--accent);
            margin: 0 10px;
            display: inline-block;
            vertical-align: middle;
        }

        .letter {
            cursor: pointer;
            padding: 0 8px;
        }

        .ok { color: var(--correct); font-weight: bold; pointer-events: none; }
        .no { color: var(--wrong); animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

<div id="stage">
    <canvas id="fx"></canvas>

    <div id="text-box">
        Ді(<span class="pair"><span class="letter" onclick="check(this,'д')">д</span> <span class="letter" onclick="check(this,'д')">т</span></span>) Іван і Фе(<span class="pair"><span class="letter" onclick="check(this,'д')">д</span> <span class="letter" onclick="check(this,'д')">т</span></span>)ько взяли ву(<span class="pair"><span class="letter" onclick="check(this,'д')">д</span> <span class="letter" onclick="check(this,'д')">т</span></span>)ки. <br>
        Пішли на бере(<span class="pair"><span class="letter" onclick="check(this,'г')">г</span> <span class="letter" onclick="check(this,'г')">х</span></span>) річки. Спустились уни(<span class="pair"><span class="letter" onclick="check(this,'з')">з</span> <span class="letter" onclick="check(this,'з')">с</span></span>). <br>
        Ро(<span class="pair"><span class="letter" onclick="check(this,'з')">з</span> <span class="letter" onclick="check(this,'з')">с</span></span>)клали снасті. Ловлять ри(<span class="pair"><span class="letter" onclick="check(this,'б')">б</span> <span class="letter" onclick="check(this,'б')">п</span></span>)ку.
    </div>

    <div id="quiz-box">
        <div class="q-title">Як називаються квіти верби?</div>
        <button class="ans-btn" onclick="verify(false)">песики</button>
        <button class="ans-btn" onclick="verify(false)">зайчики</button>
        <button class="ans-btn" onclick="verify(true)">котики</button>
    </div>

    <div id="back" class="nav" onclick="change(1)">←</div>
    <div id="next" class="nav" onclick="change(2)">→</div>
</div>

<script>
    let slide = 1;
    let done = 0;
    const total = 7;
    const audio = new (window.AudioContext || window.webkitAudioContext)();

    // Синтез звуків
    function beep(f, t) {
        const o = audio.createOscillator();
        const g = audio.createGain();
        o.type = t; o.frequency.value = f;
        g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.3);
        o.connect(g); g.connect(audio.destination);
        o.start(); o.stop(audio.currentTime + 0.3);
    }

    // Показати/сховати контент по кліку на фон
    document.getElementById('stage').addEventListener('click', (e) => {
        if (e.target.id === 'stage') {
            const box = slide === 1 ? document.getElementById('text-box') : document.getElementById('quiz-box');
            const isHidden = box.style.display === 'none' || box.style.display === '';
            box.style.display = isHidden ? (slide === 1 ? 'block' : 'flex') : 'none';
            beep(500, 'sine');
        }
    });

    // Перевірка літер
    function check(el, target) {
        if (el.innerText === target) {
            el.classList.add('ok');
            beep(900, 'triangle');
            const p = el.parentElement;
            [...p.children].forEach(c => { if(c !== el) c.style.display = 'none'; });
            done++;
            if (done >= total) document.getElementById('next').style.display = 'flex';
        } else {
            el.classList.add('no');
            beep(200, 'square');
            setTimeout(() => el.classList.remove('no'), 300);
        }
    }

    // Вікторина
    function verify(win) {
        if (win) {
            beep(1100, 'sine');
            spawnFlowers();
        } else {
            beep(150, 'sawtooth');
            document.getElementById('quiz-box').style.animation = 'shake 0.4s';
            setTimeout(() => document.getElementById('quiz-box').style.animation = '', 400);
        }
    }

    // Навігація
    function change(n) {
        slide = n;
        document.getElementById('stage').style.backgroundImage = `url('${n}.webp')`;
        document.getElementById('text-box').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('back').style.display = (n === 2) ? 'flex' : 'none';
        document.getElementById('next').style.display = (n === 1 && done >= total) ? 'flex' : 'none';
    }

    // Конфеті: Великі квіти верби
    const canvas = document.getElementById('fx');
    const ctx = canvas.getContext('2d');
    let flowers = [];

    function spawnFlowers() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i=0; i<35; i++) {
            flowers.push({
                x: Math.random() * canvas.width,
                y: -100,
                s: 20 + Math.random() * 25, // Квіти стали значно більшими
                v: 2 + Math.random() * 3,
                rot: Math.random() * Math.PI,
                spin: (Math.random() - 0.5) * 0.05
            });
        }
        animate();
    }

    function drawFlower(f) {
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rot);
        
        ctx.fillStyle = "#ffffff";
        // Малюємо 6 пухнастих пелюсток
        for(let i=0; i<6; i++) {
            ctx.beginPath();
            ctx.ellipse(0, -f.s, f.s * 0.8, f.s * 1.2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.rotate(Math.PI / 3);
        }
        // Золота серединка
        ctx.beginPath();
        ctx.arc(0, 0, f.s * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = "#ffcc00";
        ctx.fill();
        
        ctx.restore();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        flowers.forEach((f, i) => {
            f.y += f.v;
            f.x += Math.sin(f.y / 50) * 2;
            f.rot += f.spin;
            drawFlower(f);
            if(f.y > canvas.height + 100) flowers.splice(i, 1);
        });
        if(flowers.length > 0) requestAnimationFrame(animate);
    }

    change(1);
</script>

</body>
</html>
