<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Королівський М'якуш: Оновлення</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0c2461;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }

        #game-stage {
            position: relative;
            width: 1000px;
            height: 700px;
            background: linear-gradient(180deg, #0984e3 0%, #74b9ff 100%);
            border: 15px solid #ff9f43;
            border-radius: 60px;
            box-shadow: 0 0 100px rgba(0,0,0,0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .high-grass {
            position: absolute;
            bottom: 100px; 
            width: 100%;
            height: 420px;
            z-index: 1;
            pointer-events: none;
        }

        #word-container {
            display: flex;
            gap: 20px;
            margin-top: 80px;
            z-index: 10;
        }

        .word-item {
            background: #ffffff;
            padding: 25px 45px;
            font-size: 40px;
            font-weight: 900;
            color: #2c3e50;
            border-radius: 30px;
            border: 6px solid #e67e22;
            box-shadow: 0 10px 0 #a04000;
            position: relative;
            transition: 0.2s;
        }

        #character-wrap {
            position: absolute;
            bottom: 30px; 
            left: 50%;
            transform: translateX(-50%);
            width: 450px;
            height: 450px;
            z-index: 5;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-controls {
            position: absolute;
            bottom: 50px;
            right: 50px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 20;
        }

        .choice-btn {
            width: 110px;
            height: 110px;
            cursor: pointer;
            filter: drop-shadow(0 8px 0 rgba(0,0,0,0.3));
            transition: transform 0.1s, filter 0.2s;
        }

        .choice-btn:hover { transform: scale(1.05); filter: brightness(1.1) drop-shadow(0 8px 0 rgba(0,0,0,0.3)); }
        .choice-btn:active { transform: scale(0.95) translateY(4px); filter: brightness(1.1) drop-shadow(0 4px 0 rgba(0,0,0,0.3)); }

        @keyframes celebrate { 0%, 100% { transform: translateX(-50%) scale(1) rotate(0); } 50% { transform: translateX(-50%) scale(1.1) translateY(-30px) rotate(5deg); } }
        @keyframes oops { 0%, 100% { transform: translateX(-50%) rotate(0); } 25% { transform: translateX(-53%) rotate(-5deg); } 75% { transform: translateX(-47%) rotate(5deg); } }
        .happy-anim { animation: celebrate 0.5s ease-out 2; }
        .sad-anim { animation: oops 0.3s ease-in-out 2; }

    </style>
</head>
<body>

<div id="game-stage">
    <svg style="position:absolute; opacity:0.15" width="100%" height="100%">
        <pattern id="star-p" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M25 5 L28 18 L40 20 L30 28 L33 40 L25 33 L17 40 L20 28 L10 20 L22 18 Z" fill="white"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#star-p)"/>
    </svg>

    <svg class="high-grass" viewBox="0 0 1000 420" preserveAspectRatio="none">
        <defs>
            <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#2ecc71"/>
                <stop offset="100%" stop-color="#27ae60"/>
            </linearGradient>
        </defs>
        <path d="M0 420 L0 180 Q250 80 500 230 T1000 130 L1000 420 Z" fill="url(#grassGrad)"/>
    </svg>

    <div id="word-container"></div>

    <div id="character-wrap">
        <svg id="m-svg" viewBox="0 0 200 220" width="100%" height="100%" style="overflow: visible;">
            <g id="group_ym372" transform="translate(-5.25, 3.94)">
                <path id="body_main" d="M40 170 Q10 170 10 110 Q10 30 100 30 Q190 30 190 110 Q190 170 160 170 Z" fill="#ff9f43" stroke="#c0392b" stroke-width="5"></path>
                
                <g id="lvl-1" style="display:none;">
                    <circle cx="70" cy="90" r="16" fill="white" stroke="#2c3e50" stroke-width="3"></circle>
                    <circle cx="130" cy="90" r="16" fill="white" stroke="#2c3e50" stroke-width="3"></circle>
                    <circle cx="72" cy="93" r="7" fill="#2c3e50"></circle>
                    <circle cx="132" cy="93" r="7" fill="#2c3e50"></circle>
                </g>

                <path id="lvl-2" d="M70 130 Q100 155 130 130" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" style="display:none;"></path>

                <g id="lvl-3" style="display:none;">
                    <ellipse cx="45" cy="120" rx="14" ry="8" fill="#ff9ff3" opacity="0.6"></ellipse>
                    <ellipse cx="155" cy="120" rx="14" ry="8" fill="#ff9ff3" opacity="0.6"></ellipse>
                </g>

                <path id="lvl-4" d="M40 170 H80 V185 Q40 195 40 175 Z" fill="#0984e3" stroke="white" stroke-width="3" transform="translate(0.65, 4.6)" style="display:none;"></path>

                <path id="lvl-5" d="M120 170 H160 V185 Q160 195 120 185 Z" fill="#0984e3" stroke="white" stroke-width="3" transform="translate(0.32, 4.27)" style="display:none;"></path>

                <g id="lvl-6" style="display:none;" transform="translate(0.65, -7.23)">
                    <path d="M60 50 L45 15 L75 35 L100 5 L125 35 L155 15 L140 50 Z" fill="#f1c40f" stroke="#e67e22" stroke-width="4"></path>
                    <circle cx="100" cy="5" r="4" fill="#d63031"></circle>
                    <circle cx="45" cy="15" r="3" fill="#0984e3"></circle>
                    <circle cx="155" cy="15" r="3" fill="#0984e3"></circle>
                </g>

                <path id="lvl-7" d="M85 155 L115 175 L115 155 L85 175 Z" fill="#6c5ce7" stroke="#4834d4" stroke-width="2" style="display:none;"></path>

                <g id="lvl-8" style="display:none;">
                    <path d="M190 110 Q215 110 215 135" stroke="#e67e22" stroke-width="12" fill="none" stroke-linecap="round" transform="translate(-5,0)"></path>
                    <path d="M10 110 Q-15 110 -15 135" stroke="#e67e22" stroke-width="12" fill="none" stroke-linecap="round" transform="translate(5,0)"></path>
                </g>

                <g id="lvl-9" style="display:none;" transform="translate(-0.65, -2.95)">
                    <rect x="52" y="78" width="45" height="30" rx="10" fill="#2c3e50" opacity="0.95" stroke="#7f8c8d" stroke-width="2"></rect>
                    <rect x="103" y="78" width="45" height="30" rx="10" fill="#2c3e50" opacity="0.95" stroke="#7f8c8d" stroke-width="2"></rect>
                    <path d="M97 90 H103" stroke="#7f8c8d" stroke-width="4"></path>
                </g>

                <g id="lvl-10" style="display:none;">
                    <path d="M30 120 C -10 140, -10 90, 20 80" fill="#ee5253" stroke="#c0392b" stroke-width="3"></path>
                    <circle cx="20" cy="80" r="8" fill="#ee5253" stroke="#c0392b" stroke-width="3"></circle>
                    <path d="M170 120 C 210 140, 210 90, 180 80" fill="#ee5253" stroke="#c0392b" stroke-width="3"></path>
                    <circle cx="180" cy="80" r="8" fill="#ee5253" stroke="#c0392b" stroke-width="3"></circle>
                </g>
            </g>
        </svg>
    </div>

    <div class="game-controls">
        <svg class="choice-btn" onclick="process(true)" viewBox="0 0 100 100">
            <rect width="100" height="100" rx="25" fill="#2ecc71"/>
            <path d="M25 50 L45 70 L75 30" fill="none" stroke="white" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="choice-btn" onclick="process(false)" viewBox="0 0 100 100">
            <rect width="100" height="100" rx="25" fill="#e74c3c"/>
            <path d="M30 30 L70 70 M70 30 L30 70" fill="none" stroke="white" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
</div>

<script>
    const levelsData = [
        { w: ["Автобус", "Велосипед", "Трамвай"], a: true },
        { w: ["Яблуко", "Банан", "Апельсин"], a: false },
        { w: ["Гриб", "Дерево", "Квітка"], a: true },
        { w: ["Їжак", "Заєць", "Вовк"], a: false },
        { w: ["Кішка", "Собака", "Тигр"], a: true },
        { w: ["Огірок", "Помідор", "Капуста"], a: false },
        { w: ["Ручка", "Олівець", "Зошит"], a: false },
        { w: ["Стіл", "Стілець", "Шафа"], a: true },
        { w: ["Хліб", "Молоко", "Сир"], a: false },
        { w: ["Чай", "Кава", "Сік"], a: false }
    ];

    let currentStep = 0;
    let visualProgress = 0;

    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, dur) {
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audio.currentTime);
        gain.gain.setValueAtTime(0.3, audio.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + dur);
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start();
        osc.stop(audio.currentTime + dur);
    }

    function renderLevel() {
        const container = document.getElementById('word-container');
        container.innerHTML = '';
        if (currentStep >= levelsData.length) currentStep = 0;

        levelsData[currentStep].w.forEach((word, index) => {
            const div = document.createElement('div');
            div.className = 'word-item';
            div.textContent = word;
            div.style.transform = `rotate(${(index - 1) * 2}deg)`;
            container.appendChild(div);
        });
        updateCharacterVisuals();
    }

    function process(userChoice) {
        const wrap = document.getElementById('character-wrap');
        if (userChoice === levelsData[currentStep].a) {
            playSound(500, 'sine', 0.1); 
            setTimeout(() => playSound(800, 'sine', 0.3), 100);
            wrap.classList.add('happy-anim');
            if (visualProgress <= currentStep && visualProgress < 10) {
                visualProgress++;
            }
            setTimeout(() => {
                wrap.classList.remove('happy-anim');
                currentStep++;
                renderLevel();
            }, 1000);
        } else {
            playSound(120, 'sawtooth', 0.5);
            wrap.classList.add('sad-anim');
            setTimeout(() => wrap.classList.remove('sad-anim'), 600);
        }
    }

    function updateCharacterVisuals() {
        for (let i = 1; i <= 10; i++) {
            const part = document.getElementById(`lvl-${i}`);
            if (part) {
                part.style.display = i <= visualProgress ? 'block' : 'none';
            }
        }
    }

    renderLevel();
</script>

</body>
</html>
