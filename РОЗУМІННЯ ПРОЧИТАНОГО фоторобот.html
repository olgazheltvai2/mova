<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Базові налаштування, скидання відступів */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        /* Складний сюжетний фон: Лісова галявина (жодних білих прямокутників) */
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: 
                radial-gradient(circle at 15% 50%, rgba(133, 222, 119, 0.4), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 223, 100, 0.3), transparent 50%),
                linear-gradient(to bottom, #114B3A 0%, #082E22 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Декоративні ліани на фоні за допомогою повторюваних градієнтів */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.15;
            background: 
                linear-gradient(135deg, #186A46 25%, transparent 25%) -50px 0,
                linear-gradient(225deg, #186A46 25%, transparent 25%) -50px 0,
                linear-gradient(315deg, #186A46 25%, transparent 25%),
                linear-gradient(45deg, #186A46 25%, transparent 25%);
            background-size: 100px 100px;
            z-index: -1;
        }

        /* Стилізований блок для речення (дерев'яна дощечка) */
        #sentence-box {
            background: linear-gradient(to bottom, #8B5A2B, #6b4421);
            border: 4px solid #4a2e15;
            border-radius: 20px;
            padding: 30px 60px; /* Збільшено відступи для великого тексту */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.2);
            margin-bottom: 50px;
            position: relative;
            transform: rotate(-1deg);
            z-index: 10;
            max-width: 95vw; /* Розширено для великого тексту */
            text-align: center;
        }

        #sentence-text {
            color: #FFF8DC;
            font-size: 64px; /* Збільшено вдвічі */
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.6);
            letter-spacing: 1px;
            line-height: 1.2;
        }

        /* Контейнер для трьох облич */
        #faces-container {
            display: flex;
            gap: 50px;
            z-index: 10;
        }

        /* Картка з обличчям (стилізована рамка з листя) */
        .face-card {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, #FFE4B5 0%, #F4A460 100%);
            border: 8px solid #2E8B57;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .face-card:hover {
            transform: scale(1.08) translateY(-10px);
            filter: brightness(1.1);
            border-color: #3CB371;
        }

        /* SVG всередині картки */
        .face-svg {
            width: 90%;
            height: 90%;
        }

        /* Персонаж (Лисеня) */
        #character {
            position: absolute;
            bottom: 20px;
            right: 40px;
            width: 200px;
            height: 200px;
            z-index: 20;
            transition: transform 0.3s;
            pointer-events: none;
        }

        /* Анімації Лисеняти */
        @keyframes idleBreathe {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.03) translateY(-2px); }
        }
        @keyframes tailWag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }
        @keyframes happyJump {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1) rotate(5deg); }
        }
        @keyframes sadHide {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(30px) scale(0.9); }
        }

        .anim-idle { animation: idleBreathe 3s infinite ease-in-out; }
        .anim-jump { animation: happyJump 0.6s ease-in-out; }
        .anim-sad { animation: sadHide 0.8s ease-in-out; }

        /* Мінімалістичні кнопки навігації (тільки символи) */
        .nav-btn {
            position: absolute;
            bottom: 40px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border: 4px solid #B8860B;
            color: #5C4033;
            font-size: 36px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: transform 0.2s, background 0.2s;
            z-index: 30;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            background: radial-gradient(circle, #FFF8DC, #FFD700);
        }

        .nav-btn:active { transform: scale(0.9); }
        
        #prev-btn { left: 50px; }
        #next-btn { right: 280px; /* Відступ, щоб не закривати лисеня */ }

        /* Ефект затемнення екрану на фіналі */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="sentence-box">
        <div id="sentence-text"></div>
    </div>

    <div id="faces-container"></div>

    <div id="prev-btn" class="nav-btn">⟵</div>
    <div id="next-btn" class="nav-btn">⟶</div>

    <div id="character" class="anim-idle">
        <svg viewBox="0 0 200 200" width="100%" height="100%">
            <g style="transform-origin: 140px 140px; animation: tailWag 2s infinite ease-in-out;">
                <path d="M120 140 C 180 180, 220 90, 180 60 C 150 40, 130 100, 120 140" fill="#D2691E" stroke="#8B4513" stroke-width="4"/>
                <path d="M180 60 C 160 50, 140 80, 145 100 C 160 85, 175 75, 180 60" fill="#FFF8DC"/>
            </g>
            <ellipse cx="100" cy="130" rx="45" ry="55" fill="#D2691E" stroke="#8B4513" stroke-width="4"/>
            <ellipse cx="100" cy="140" rx="25" ry="35" fill="#FFF8DC"/>
            <ellipse cx="70" cy="180" rx="15" ry="10" fill="#8B4513"/>
            <ellipse cx="130" cy="180" rx="15" ry="10" fill="#8B4513"/>
            <g id="fox-head" style="transition: transform 0.3s;">
                <polygon points="40,30 70,70 50,90" fill="#D2691E" stroke="#8B4513" stroke-width="4"/>
                <polygon points="160,30 130,70 150,90" fill="#D2691E" stroke="#8B4513" stroke-width="4"/>
                <polygon points="45,35 65,65 52,78" fill="#FFF8DC"/>
                <polygon points="155,35 135,65 148,78" fill="#FFF8DC"/>
                <ellipse cx="100" cy="85" rx="55" ry="45" fill="#D2691E" stroke="#8B4513" stroke-width="4"/>
                <path d="M 50 95 Q 100 140 150 95 Q 100 85 50 95" fill="#FFF8DC"/>
                <ellipse cx="75" cy="80" rx="6" ry="10" fill="#000" id="eye-l"/>
                <ellipse cx="125" cy="80" rx="6" ry="10" fill="#000" id="eye-r"/>
                <circle cx="100" cy="110" r="8" fill="#000"/>
            </g>
        </svg>
    </div>

    <div id="overlay">
        <svg viewBox="0 0 200 200" width="300" height="300" style="animation: tailWag 5s infinite linear;">
            <defs>
                <radialGradient id="starGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#FFF" />
                    <stop offset="50%" stop-color="#FFD700" />
                    <stop offset="100%" stop-color="#FF8C00" />
                </radialGradient>
            </defs>
            <path d="M100 10 L120 70 L190 70 L135 110 L155 180 L100 135 L45 180 L65 110 L10 70 L80 70 Z" fill="url(#starGrad)" stroke="#FFF" stroke-width="4"/>
        </svg>
    </div>

<script>
/**
 * ГЕНЕРАТОР ОБЛИЧ (Складний параметричний SVG)
 * Малює різні типи облич за допомогою коду.
 */
const FaceEngine = {
    draw: function(cfg) {
        // Базові кольори шкіри
        const skinColors = {
            light: { main: '#FFDFC4', dark: '#E5C8B0' },
            medium: { main: '#D2B48C', dark: '#C19A6B' }
        };
        const skin = skinColors[cfg.skin] || skinColors.light;

        let svg = `<svg class="face-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">`;

        // 1. Задня частина волосся (хвостики, довге)
        if (cfg.hairStyle === 'tails') {
            svg += `<circle cx="40" cy="100" r="30" fill="${cfg.hairColor}" />`;
            svg += `<circle cx="160" cy="100" r="30" fill="${cfg.hairColor}" />`;
        } else if (cfg.hairStyle === 'long') {
            svg += `<path d="M 50 60 C 20 100, 30 180, 50 200 L 150 200 C 170 180, 180 100, 150 60 Z" fill="${cfg.hairColor}" />`;
        } else if (cfg.hairStyle === 'bun') {
            svg += `<circle cx="100" cy="30" r="35" fill="${cfg.hairColor}" />`;
        }

        // 2. Шия та плечі
        svg += `<rect x="85" y="140" width="30" height="40" fill="${skin.dark}" rx="10"/>`;
        svg += `<path d="M 40 200 C 40 160, 160 160, 160 200" fill="${cfg.shirtColor || '#4682B4'}" />`;

        // 3. Базове обличчя
        svg += `<ellipse cx="100" cy="100" rx="55" ry="65" fill="${skin.main}" />`;

        // 4. Очі
        const eyeY = 95;
        svg += `<circle cx="75" cy="${eyeY}" r="12" fill="white" />`;
        svg += `<circle cx="125" cy="${eyeY}" r="12" fill="white" />`;
        svg += `<circle cx="75" cy="${eyeY}" r="6" fill="${cfg.eyeColor}" />`;
        svg += `<circle cx="125" cy="${eyeY}" r="6" fill="${cfg.eyeColor}" />`;
        svg += `<circle cx="77" cy="${eyeY-2}" r="2" fill="white" />`; // Блік
        svg += `<circle cx="127" cy="${eyeY-2}" r="2" fill="white" />`;

        // 5. Рот (посмішка за замовчуванням, або велика)
        if (cfg.mouth === 'big') {
            svg += `<path d="M 80 130 Q 100 160 120 130 Z" fill="#8B0000" />`;
            svg += `<path d="M 85 130 Q 100 140 115 130 Z" fill="white" />`; // зуби
        } else {
            svg += `<path d="M 85 135 Q 100 150 115 135" stroke="#8B0000" stroke-width="3" fill="none" stroke-linecap="round"/>`;
        }

        // 6. Аксесуари на обличчі (до волосся)
        if (cfg.beard) {
            svg += `<path d="M 50 110 C 50 170, 150 170, 150 110 C 130 130, 70 130, 50 110 Z" fill="${cfg.beardColor}" />`;
        }
        if (cfg.mustache) {
            svg += `<path d="M 75 125 Q 100 115 125 125 Q 100 135 75 125 Z" fill="${cfg.beardColor}" />`;
        }
        if (cfg.cheeks) {
            svg += `<circle cx="65" cy="115" r="8" fill="#FF69B4" opacity="0.6"/>`;
            svg += `<circle cx="135" cy="115" r="8" fill="#FF69B4" opacity="0.6"/>`;
        }
        if (cfg.patch) {
            svg += `<rect x="90" y="105" width="20" height="8" fill="#F4A460" transform="rotate(-10 100 105)" />`;
        }

        // 7. Переднє волосся / Зачіска
        if (cfg.hairStyle === 'short' || cfg.hairStyle === 'long' || cfg.hairStyle === 'tails' || cfg.hairStyle === 'bun') {
            svg += `<path d="M 45 80 C 45 30, 155 30, 155 80 C 130 50, 70 50, 45 80 Z" fill="${cfg.hairColor}" />`;
        } else if (cfg.hairStyle === 'curly') {
            // Кучері (прості кола)
            [50, 70, 90, 110, 130, 150].forEach(x => {
                svg += `<circle cx="${x}" cy="45" r="18" fill="${cfg.hairColor}" />`;
                svg += `<circle cx="${x-10}" cy="65" r="15" fill="${cfg.hairColor}" />`;
            });
        }
        
        // 8. Додаткові аксесуари
        if (cfg.accessory === 'blue-glasses') {
            svg += `<rect x="55" y="80" width="35" height="25" rx="5" fill="rgba(173,216,230,0.3)" stroke="blue" stroke-width="4"/>`;
            svg += `<rect x="110" y="80" width="35" height="25" rx="5" fill="rgba(173,216,230,0.3)" stroke="blue" stroke-width="4"/>`;
            svg += `<line x1="90" y1="90" x2="110" y2="90" stroke="blue" stroke-width="4"/>`;
        } else if (cfg.accessory === 'pink-bow') {
            svg += `<path d="M 90 30 Q 100 40 110 30 Q 120 10 100 20 Q 80 10 90 30 Z" fill="deeppink" />`;
        } else if (cfg.accessory === 'blue-hat') {
            svg += `<path d="M 40 50 Q 100 0 160 50 Z" fill="blue" />`;
            svg += `<ellipse cx="100" cy="50" rx="70" ry="10" fill="darkblue" />`;
        } else if (cfg.accessory === 'red-earrings') {
            svg += `<circle cx="45" cy="120" r="6" fill="red" />`;
            svg += `<circle cx="155" cy="120" r="6" fill="red" />`;
        }

        svg += `</svg>`;
        return svg;
    }
};

/**

const gameData = [

        ]
    },
    {

        faces: [
            { skin: 'light', hairStyle: 'short', hairColor: '#D2691E', eyeColor: '#2E8B57' },
            { skin: 'light', hairStyle: 'short', hairColor: '#2C1A10', eyeColor: '#8B4513', patch: true },

        ]
    },
    {
        sentence: "Це бабуся з білим пучком і окулярами.",
        faces: [
            { skin: 'light', hairStyle: 'bun', hairColor: '#FFF', eyeColor: '#8B4513' },
            { skin: 'light', hairStyle: 'bun', hairColor: '#2C1A10', eyeColor: '#8B4513', accessory: 'blue-glasses' },

        ]
    },
    {

        faces: [

            { skin: 'light', hairStyle: 'long', hairColor: '#8B4513', eyeColor: '#2E8B57', cheeks: true },

        ]
    },
    {

        faces: [
            { skin: 'medium', hairStyle: 'bald', hairColor: '#111', eyeColor: '#111' },
            { skin: 'medium', hairStyle: 'short', hairColor: '#111', eyeColor: '#111', mustache: true, beardColor: '#111' },
            { skin: 'medium', hairStyle: 'bald', hairColor: '#111', eyeColor: '#111', mustache: true, beardColor: '#111', isCorrect: true }
        ]
    },
    {

            { skin: 'light', hairStyle: 'long', hairColor: '#2C1A10', eyeColor: '#8B4513', accessory: 'blue-hat' },
            { skin: 'light', hairStyle: 'long', hairColor: '#FFD700', eyeColor: '#4682B4', accessory: 'blue-hat', isCorrect: true }
        ]
    },
    {
        sentence: "Це хлопчик з чорним волоссям і бантиком.",

        ]
    }
];

/**
 * ЛОГІКА ГРИ
 */
class FacesGame {
    constructor() {
        this.currentLevel = 0;
        
        // Звуковий контекст для безсловесних реакцій
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Перемішуємо рівні перед початком
        this.levels = [...gameData].sort(() => Math.random() - 0.5);

        this.ui = {
            sentence: document.getElementById('sentence-text'),
            facesContainer: document.getElementById('faces-container'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            character: document.getElementById('character'),
            overlay: document.getElementById('overlay')
        };

        this.initEvents();
        this.renderLevel();
    }

    initEvents() {
        this.ui.prevBtn.addEventListener('click', () => {
            if (this.currentLevel > 0) {
                this.currentLevel--;
                this.renderLevel();
                this.playTone(300, 'triangle', 0.1);
            }
        });

        this.ui.nextBtn.addEventListener('click', () => {
            if (this.currentLevel < this.levels.length - 1) {
                this.currentLevel++;
                this.renderLevel();
                this.playTone(400, 'triangle', 0.1);
            }
        });
    }

    renderLevel() {
        const levelData = this.levels[this.currentLevel];
        
        // Анімація зникнення/появи
        this.ui.facesContainer.style.opacity = 0;
        this.ui.sentence.style.opacity = 0;

        setTimeout(() => {
            this.ui.sentence.textContent = levelData.sentence;
            this.ui.facesContainer.innerHTML = '';

            // Перемішуємо 3 обличчя, щоб правильне було в різних місцях
            const shuffledFaces = [...levelData.faces].sort(() => Math.random() - 0.5);

            shuffledFaces.forEach(faceData => {
                const card = document.createElement('div');
                card.className = 'face-card';
                card.innerHTML = FaceEngine.draw(faceData);
                
                card.addEventListener('click', () => this.handleChoice(faceData.isCorrect, card));
                this.ui.facesContainer.appendChild(card);
            });

            // Ховаємо кнопку "назад" на першому рівні
            this.ui.prevBtn.style.visibility = this.currentLevel === 0 ? 'hidden' : 'visible';

            this.ui.facesContainer.style.opacity = 1;
            this.ui.sentence.style.opacity = 1;
        }, 300);
    }

    handleChoice(isCorrect, cardEl) {
        // Блокуємо кліки
        this.ui.facesContainer.style.pointerEvents = 'none';

        if (isCorrect) {
            // АКТИВНИЙ ПОЗИТИВ (Звук, анімація картки та лисеняти)
            this.playTone(600, 'sine', 0.1);
            setTimeout(() => this.playTone(800, 'sine', 0.2), 100);
            
            cardEl.style.transform = 'scale(1.1) translateY(-20px)';
            cardEl.style.borderColor = '#00FF00';
            cardEl.style.boxShadow = '0 0 30px #00FF00';

            this.setFoxAnimation('anim-jump');

            setTimeout(() => {
                this.ui.facesContainer.style.pointerEvents = 'auto';
                if (this.currentLevel < this.levels.length - 1) {
                    this.currentLevel++;
                    this.renderLevel();
                } else {
                    this.showWinScreen();
                }
                this.setFoxAnimation('anim-idle');
            }, 1200);

        } else {
            // АКТИВНИЙ НЕГАТИВ
            this.playTone(200, 'sawtooth', 0.3);
            
            // Трясіння картки
            cardEl.animate([
                { transform: 'translateX(-10px)' },
                { transform: 'translateX(10px)' },
                { transform: 'translateX(-10px)' },
                { transform: 'translateX(0)' }
            ], { duration: 300 });
            cardEl.style.borderColor = '#FF0000';
            cardEl.style.filter = 'grayscale(100%)';

            this.setFoxAnimation('anim-sad');

            setTimeout(() => {
                cardEl.style.borderColor = '#2E8B57';
                cardEl.style.filter = 'none';
                this.ui.facesContainer.style.pointerEvents = 'auto';
                this.setFoxAnimation('anim-idle');
            }, 800);
        }
    }

    setFoxAnimation(animClass) {
        this.ui.character.className = '';
        void this.ui.character.offsetWidth; // trigger reflow
        this.ui.character.classList.add(animClass);
    }

    showWinScreen() {
        this.ui.overlay.style.display = 'flex';
        // Мелодія перемоги
        [523, 659, 783, 1046].forEach((freq, i) => {
            setTimeout(() => this.playTone(freq, 'sine', 0.2), i * 150);
        });
    }

    // Синтезатор звуків (Без аудіофайлів)
    playTone(freq, type, duration) {
        const osc = this.audioCtx.createOscillator();
        const gain = this.audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, this.audioCtx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(this.audioCtx.destination);
        
        osc.start();
        osc.stop(this.audioCtx.currentTime + duration);
    }
}

// Запуск при завантаженні
window.onload = () => new FacesGame();
</script>
