<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --sand: #f2d2a9;
            --ocean: #0077be;
            --coconut-brown: #6d4c41;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--sand);
            font-family: 'Arial Black', sans-serif;
        }

        /* Атмосферний фон пляжу */
        #beach-arena {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 50% 120%, #ffcc80 0%, transparent 60%),
                linear-gradient(to bottom, #4fc3f7 0%, #29b6f6 40%, #f2d2a9 45%, #e1c198 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Текстура піску (SVG шум) */
        .sand-texture {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            pointer-events: none;
        }

        /* Хвилі, що рухаються */
        .waves {
            position: absolute;
            top: 40%;
            left: 0;
            width: 100%;
            height: 50px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.3" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,149.3C672,149,768,203,864,197.3C960,192,1056,128,1152,117.3C1248,107,1344,149,1392,170.7L1440,192L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path></svg>');
            animation: moveWaves 10s linear infinite;
        }

        @keyframes moveWaves {
            0% { background-position-x: 0; }
            100% { background-position-x: 1440px; }
        }

        /* Кокоси-склади */
        .coconut-container {
            display: flex;
            gap: 40px;
            z-index: 10;
        }

        .coconut {
            width: 160px;
            height: 180px;
            background: var(--coconut-brown);
            border-radius: 50% 50% 45% 45%;
            border: 6px solid #3e2723;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: #fff;
            cursor: pointer;
            box-shadow: 10px 15px 0 rgba(0,0,0,0.2);
            transition: 0.2s;
            user-select: none;
            /* Текстура волокон кокоса */
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 11px);
        }

        .coconut:hover { transform: scale(1.05) rotate(2deg); }
        .coconut.picked {
            background: #8bc34a;
            transform: translateY(10px);
            box-shadow: 0 5px 0 #33691e;
        }

        /* Персонаж Краб */
        #crab-svg {
            width: 400px;
            height: 250px;
            margin-top: 50px;
            z-index: 5;
            transition: 0.5s;
        }

        /* Навігація */
        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            box-sizing: border-box;
        }

        .nav-btn {
            background: #ff5722;
            border: 4px solid #bf360c;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #bf360c;
        }

        .nav-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #bf360c; }
    </style>
</head>
<body>

<div id="beach-arena">
    <div class="waves"></div>
    <svg class="sand-texture"><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/></filter><rect width='100%' height='100%' filter='url(#n)'/></svg>

    <div class="coconut-container" id="game-box"></div>

    <svg id="crab-svg" viewBox="0 0 400 200">
        <ellipse cx="200" cy="140" rx="80" ry="50" fill="#f44336" stroke="#b71c1c" stroke-width="3" />
        <line x1="170" y1="100" x2="170" y2="80" stroke="#b71c1c" stroke-width="4" />
        <line x1="230" y1="100" x2="230" y2="80" stroke="#b71c1c" stroke-width="4" />
        <circle cx="170" cy="75" r="12" fill="white" stroke="#b71c1c" />
        <circle id="eye-l" cx="172" cy="75" r="5" fill="black" />
        <circle cx="230" cy="75" r="12" fill="white" stroke="#b71c1c" />
        <circle id="eye-r" cx="232" cy="75" r="5" fill="black" />
        <g id="claw-l">
            <path d="M130,140 Q80,140 60,100 Q90,70 120,100" fill="#f44336" stroke="#b71c1c" stroke-width="3" />
        </g>
        <g id="claw-r">
            <path d="M270,140 Q320,140 340,100 Q310,70 280,100" fill="#f44336" stroke="#b71c1c" stroke-width="3" />
        </g>
        <path d="M140,170 L110,190 M160,185 L140,200 M240,185 L260,200 M260,170 L290,190" stroke="#b71c1c" stroke-width="5" stroke-linecap="round" />
        <path id="crab-mouth" d="M185,155 Q200,165 215,155" fill="none" stroke="white" stroke-width="2" />
    </svg>

    <div class="controls">
        <button class="nav-btn" id="prev">◀</button>
        <button class="nav-btn" id="next">▶</button>
    </div>
</div>

<script>
    // 30 тематичних та загальних слів (2 склади, без повторів)
    const wordsList = [
        ["МО", "РЕ"], ["РИ", "БА"], ["ПІ", "СОК"], ["ПАЛЬ", "МА"], ["ЛІ", "ТО"],
        ["ХВИ", "ЛЯ"], ["ЧАЙ", "КА"], ["СОН", "ЦЕ"], ["ЧО", "ВЕН"], ["ПЛО", "ТИ"],
        ["МОР", "ЖІ"], ["МАС", "КА"], ["ЛАС", "ТИ"], ["КИ", "ТИ"], ["ПЕР", "ЛИ"],
        ["БЕ", "РЕГ"], ["СІТ", "КА"], ["ВУД", "КА"], ["КРАП", "ЛЯ"], ["КУЛЬ", "КА"],
        ["ШЛЯ", "ПА"], ["СУМ", "КА"], ["ПА", "РУС"], ["КА", "ТЕР"], ["О", "СТРІВ"],
        ["КО", "КОС"], ["КРА", "БИК"], ["МУШ", "ЛЯ"], ["КРИ", "ЛО"], ["РІ", "КА"]
    ];

    let level = 0;
    let selected = [];
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Соковиті звуки прибою та взаємодії
    function soundEffect(type) {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g);
        g.connect(ctx.destination);

        if (type === 'pop') { // Натискання
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
            g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
        } else if (type === 'win') { // Успіх
            osc.type = 'square';
            [440, 554, 659].forEach((f, i) => {
                setTimeout(() => {
                    const o = ctx.createOscillator();
                    o.connect(g);
                    o.frequency.value = f;
                    o.start(); o.stop(ctx.currentTime + 0.2);
                }, i * 100);
            });
            g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
        } else { // Помилка
            osc.frequency.setValueAtTime(150, ctx.currentTime);
            osc.type = 'sawtooth';
            g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
        }
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
    }

    // Жива міміка Крабича
    function crabDance(isHappy) {
        const mouth = document.getElementById('crab-mouth');
        const clawL = document.getElementById('claw-l');
        const clawR = document.getElementById('claw-r');
        const pupils = [document.getElementById('eye-l'), document.getElementById('eye-r')];

        if (isHappy) {
            mouth.setAttribute('d', 'M180,150 Q200,180 220,150'); // Широка посмішка
            clawL.style.transform = "rotate(-30deg) translate(-20px, -20px)";
            clawR.style.transform = "rotate(30deg) translate(20px, -20px)";
            pupils.forEach(p => p.setAttribute('r', '7'));
        } else {
            mouth.setAttribute('d', 'M185,165 Q200,155 215,165'); // Сумний
            document.getElementById('crab-svg').style.transform = "translateX(15px)";
            setTimeout(() => document.getElementById('crab-svg').style.transform = "none", 100);
        }

        setTimeout(() => {
            mouth.setAttribute('d', 'M185,155 Q200,165 215,155');
            clawL.style.transform = "none";
            clawR.style.transform = "none";
            pupils.forEach(p => p.setAttribute('r', '5'));
        }, 800);
    }

    function initLevel() {
        const box = document.getElementById('game-box');
        box.innerHTML = '';
        selected = [];

        // Беремо склади та перемішуємо їх
        const pair = wordsList[level];
        const shuffled = [...pair].sort(() => Math.random() - 0.5);

        shuffled.forEach(s => {
            const el = document.createElement('div');
            el.className = 'coconut';
            el.innerText = s;
            el.onclick = () => {
                if (el.classList.contains('picked')) return;
                soundEffect('pop');
                el.classList.add('picked');
                selected.push(s);

                if (selected.length === 2) checkAnswer();
            };
            box.appendChild(el);
        });
    }

    function checkAnswer() {
        const correct = wordsList[level].join('');
        const user = selected.join('');

        if (user === correct) {
            soundEffect('win');
            crabDance(true);
            setTimeout(() => {
                if (level < wordsList.length - 1) {
                    level++;
                    initLevel();
                } else {
                    document.getElementById('game-box').innerHTML = "🏝️🏆🦀";
                }
            }, 1000);
        } else {
            soundEffect('fail');
            crabDance(false);
            setTimeout(() => {
                document.querySelectorAll('.coconut').forEach(c => c.classList.remove('picked'));
                selected = [];
            }, 600);
        }
    }

    // Навігація
    document.getElementById('next').onclick = () => { level = (level + 1) % wordsList.length; initLevel(); };
    document.getElementById('prev').onclick = () => { level = (level - 1 + wordsList.length) % wordsList.length; initLevel(); };

    initLevel();
</script>
</body>
</html>
