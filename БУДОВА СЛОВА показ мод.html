<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Показ Мод: Будова Слова</title>
    <style>
        /* Скидання стилів та налаштування повноекранного режиму */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a001a;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        /* Головна сцена - подіум */
        #stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            perspective: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Задня стіна подіуму з градієнтом та екраном */
        #backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: radial-gradient(circle at 50% 50%, #4a004a 0%, #1a0033 60%, #000 100%);
            z-index: 1;
            box-shadow: inset 0 -20px 50px rgba(0,0,0,0.8);
        }

        /* Складні SVG куліси */
        .curtain {
            position: absolute;
            top: -5%;
            width: 30%;
            height: 70%;
            z-index: 5;
            filter: drop-shadow(10px 0 20px rgba(0,0,0,0.8));
        }
        #curtain-left { left: -5%; }
        #curtain-right { right: -5%; transform: scaleX(-1); }

        /* Анімовані прожектори */
        .spotlight {
            position: absolute;
            top: -10%;
            width: 150px;
            height: 120vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, rgba(255,105,180,0.1) 50%, transparent 100%);
            transform-origin: top center;
            z-index: 4;
            mix-blend-mode: screen;
            border-radius: 50% / 10%;
            pointer-events: none;
        }
        .spot1 { left: 20%; animation: sweep1 6s infinite alternate ease-in-out; }
        .spot2 { right: 20%; animation: sweep2 7s infinite alternate ease-in-out; }

        @keyframes sweep1 {
            0% { transform: rotate(-30deg); }
            100% { transform: rotate(10deg); }
        }
        @keyframes sweep2 {
            0% { transform: rotate(30deg); }
            100% { transform: rotate(-10deg); }
        }

        /* Сам подіум (доріжка) */
        #runway {
            position: absolute;
            bottom: -10%;
            width: 60%;
            height: 60%;
            background: linear-gradient(180deg, #ff007f 0%, #330066 100%);
            transform: rotateX(70deg);
            box-shadow: 0 0 50px #ff007f, inset 0 0 20px #fff;
            z-index: 2;
            border-left: 10px solid #ff66b2;
            border-right: 10px solid #ff66b2;
        }

        /* Екран для слова (неонова вивіска) */
        #word-display {
            position: relative;
            margin-top: 5vh;
            font-size: 5vw;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
            z-index: 10;
            background: rgba(0, 10, 30, 0.6);
            padding: 20px 60px;
            border: 4px solid #00ffff;
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.5), 0 0 30px rgba(0, 255, 255, 0.8);
            animation: pulseNeon 2s infinite alternate;
        }

        @keyframes pulseNeon {
            0% { box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.5), 0 0 30px rgba(0, 255, 255, 0.6); text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            100% { box-shadow: inset 0 0 30px rgba(0, 255, 255, 0.8), 0 0 50px rgba(0, 255, 255, 1); text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 60px #fff; }
        }

        /* Контейнер для варіантів будови слова */
        #options-container {
            display: flex;
            justify-content: center;
            gap: 5vw;
            margin-top: 15vh;
            z-index: 15;
            width: 100%;
        }

        /* Стенди з варіантами */
        .option-card {
            background: linear-gradient(135deg, rgba(255, 0, 127, 0.2), rgba(75, 0, 130, 0.8));
            border: 3px solid #ff007f;
            border-radius: 15px;
            padding: 20px 40px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255, 0, 127, 0.4), inset 0 0 15px rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        .option-card:hover {
            transform: translateY(-20px) scale(1.1);
            box-shadow: 0 20px 50px rgba(255, 0, 127, 0.8), inset 0 0 25px rgba(255,255,255,0.5);
            border-color: #ff66b2;
        }

        .option-card:active {
            transform: scale(0.95);
        }

        /* SVG для схем будови слова */
        .schema-svg {
            height: 80px;
            filter: drop-shadow(0 0 5px #fff);
        }

        /* Навігаційні кнопки */
        .nav-btn {
            position: absolute;
            bottom: 40px;
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            border: 2px solid #00ffff;
            transition: all 0.3s;
        }
        .nav-btn:hover { transform: scale(1.2); background: rgba(0, 255, 255, 0.5); box-shadow: 0 0 30px #00ffff; }
        .nav-btn svg { width: 30px; height: 30px; fill: #fff; }
        
        #btn-prev { left: 30px; }
        #btn-next { right: 30px; }

        /* Ефект фотоспалахів камер */
        #camera-flashes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25;
            background: white;
            opacity: 0;
        }

        /* Анімації результатів */
        .flash-anim { animation: cameraFlash 0.5s ease-out; }
        .shake-anim { animation: errorShake 0.4s ease-in-out; border-color: #ff0000 !important; box-shadow: 0 0 30px #ff0000 !important; }

        @keyframes cameraFlash {
            0% { opacity: 1; }
            10% { opacity: 0; }
            20% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-5deg); }
            75% { transform: translateX(15px) rotate(5deg); }
        }

        /* Фінальна сцена */
        #finale {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .firework {
            position: absolute;
            border-radius: 50%;
            animation: explode 1s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="stage">
    <div id="backdrop"></div>
    <div id="runway"></div>
    
    <div class="spotlight spot1"></div>
    <div class="spotlight spot2"></div>

    <svg class="curtain" id="curtain-left" viewBox="0 0 100 300" preserveAspectRatio="none">
        <defs>
            <linearGradient id="curtainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#2a0033" />
                <stop offset="30%" stop-color="#660066" />
                <stop offset="50%" stop-color="#99004d" />
                <stop offset="70%" stop-color="#660066" />
                <stop offset="100%" stop-color="#1a001a" />
            </linearGradient>
        </defs>
        <path d="M0,0 L100,0 C80,50 90,150 70,200 C50,250 60,300 0,300 Z" fill="url(#curtainGrad)"/>
        <path d="M10,0 C30,50 20,150 40,200 C30,250 20,300 0,300" fill="none" stroke="#4a004a" stroke-width="2"/>
        <path d="M30,0 C50,50 40,150 60,200 C50,250 40,300 0,300" fill="none" stroke="#330033" stroke-width="3"/>
    </svg>
    <svg class="curtain" id="curtain-right" viewBox="0 0 100 300" preserveAspectRatio="none">
        <path d="M0,0 L100,0 C80,50 90,150 70,200 C50,250 60,300 0,300 Z" fill="url(#curtainGrad)"/>
        <path d="M10,0 C30,50 20,150 40,200 C30,250 20,300 0,300" fill="none" stroke="#4a004a" stroke-width="2"/>
        <path d="M30,0 C50,50 40,150 60,200 C50,250 40,300 0,300" fill="none" stroke="#330033" stroke-width="3"/>
    </svg>

    <div id="word-display"></div>

    <div id="options-container"></div>

    <div id="camera-flashes"></div>

    <div class="nav-btn" id="btn-prev">
        <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
    </div>
    <div class="nav-btn" id="btn-next">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
    </div>
</div>

<div id="finale"></div>

<script>
    // Аудіо контекст для генерації звуків "показу мод"
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;

        if (type === 'flash') {
            // Звук спалаху камери (білий шум + короткий спад)
            const bufferSize = audioCtx.sampleRate * 0.2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 1000;
            const gain = audioCtx.createGain();
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            noise.start(now);
        } else if (type === 'error') {
            // Низький звук помилки
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.linearRampToValueAtTime(50, now + 0.3);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'click') {
            // Легкий клік
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now);
            osc.stop(now + 0.05);
        } else if (type === 'finale') {
            // Арпеджіо для фіналу
            [300, 400, 500, 600, 800, 1000].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, now + i*0.1);
                gain.gain.linearRampToValueAtTime(0.2, now + i*0.1 + 0.05);
                gain.gain.linearRampToValueAtTime(0, now + i*0.1 + 0.3);
                osc.start(now + i*0.1);
                osc.stop(now + i*0.1 + 0.3);
            });
        }
    }

    // Дані: 10 слів та їх правильна будова. 
    // parts: p - префікс, r - корінь, s - суфікс, e - закінчення, z - нульове закінчення
    const wordsData = [
        { word: 'поїздка', correct: ['p', 'r', 's', 'e'] },
        { word: 'вода', correct: ['r', 'e'] },
        { word: 'лісовий', correct: ['r', 's', 'e'] },
        { word: 'безмежний', correct: ['p', 'r', 's', 'e'] },
        { word: 'дуб', correct: ['r', 'z'] },
        { word: 'перехід', correct: ['p', 'r', 'z'] },
        { word: 'братик', correct: ['r', 's', 'z'] },
        { word: 'хмарка', correct: ['r', 's', 'e'] },
        { word: 'заміський', correct: ['p', 'r', 's', 'e'] },
        { word: 'рука', correct: ['r', 'e'] }
    ];

    // Набір можливих структур для генерації неправильних варіантів
    const allSchemas = [
        ['r', 'e'], ['r', 'z'], ['p', 'r', 'e'], ['p', 'r', 'z'], 
        ['r', 's', 'e'], ['r', 's', 'z'], ['p', 'r', 's', 'e'], ['p', 'r', 's', 'z']
    ];

    let currentLevel = 0;

    // Генерація складного SVG для схеми
    function generateSchemaSVG(parts) {
        const partWidth = 40;
        const svgWidth = parts.length * partWidth;
        const svgHeight = 60;
        
        let paths = '';
        let currentX = 0;
        let baseWidth = 0;

        parts.forEach(part => {
            const cx = currentX + partWidth/2;
            if (part === 'p') {
                paths += `<path d="M ${currentX+5} 35 L ${currentX+5} 15 L ${currentX+35} 15" stroke="#00ffff" stroke-width="4" fill="none" stroke-linejoin="round"/>`;
                baseWidth += partWidth;
            } else if (part === 'r') {
                paths += `<path d="M ${currentX+5} 35 Q ${cx} 5 ${currentX+35} 35" stroke="#ff007f" stroke-width="4" fill="none" stroke-linecap="round"/>`;
                baseWidth += partWidth;
            } else if (part === 's') {
                paths += `<path d="M ${currentX+5} 35 L ${cx} 15 L ${currentX+35} 35" stroke="#ffff00" stroke-width="4" fill="none" stroke-linejoin="round"/>`;
                baseWidth += partWidth;
            } else if (part === 'e') {
                paths += `<rect x="${currentX+5}" y="15" width="30" height="20" stroke="#fff" stroke-width="4" fill="none" rx="4"/>`;
            } else if (part === 'z') {
                paths += `<rect x="${currentX+5}" y="15" width="30" height="20" stroke="#fff" stroke-width="4" fill="none" rx="4" stroke-dasharray="4,4"/>`;
            }
            currentX += partWidth;
        });

        // Лінія основи (підкреслює все крім закінчень)
        if (baseWidth > 0) {
            paths += `<path d="M 5 45 L ${baseWidth-5} 45 L ${baseWidth-5} 50 M 5 45 L 5 50" stroke="#ff66b2" stroke-width="3" fill="none"/>`;
        }

        return `<svg class="schema-svg" viewBox="0 0 ${svgWidth} ${svgHeight}" style="width:${svgWidth}px;">${paths}</svg>`;
    }

    // Завантаження рівня
    function loadLevel() {
        if (currentLevel >= wordsData.length) {
            showFinale();
            return;
        }

        const data = wordsData[currentLevel];
        document.getElementById('word-display').innerText = data.word;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // Формування 3 варіантів (1 правильний, 2 випадкових неправильних)
        let options = [data.correct];
        while (options.length < 3) {
            const randomSchema = allSchemas[Math.floor(Math.random() * allSchemas.length)];
            // Перевіряємо, щоб не було дублікатів (порівнюємо масиви через JSON)
            if (!options.some(opt => JSON.stringify(opt) === JSON.stringify(randomSchema))) {
                options.push(randomSchema);
            }
        }
        
        // Перемішування варіантів
        options.sort(() => Math.random() - 0.5);

        options.forEach(schema => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerHTML = generateSchemaSVG(schema);
            
            card.onclick = () => {
                if (JSON.stringify(schema) === JSON.stringify(data.correct)) {
                    // Правильно
                    playSound('flash');
                    triggerFlash();
                    setTimeout(() => {
                        currentLevel++;
                        loadLevel();
                    }, 800);
                } else {
                    // Неправильно
                    playSound('error');
                    card.classList.remove('shake-anim');
                    void card.offsetWidth; // скидання анімації
                    card.classList.add('shake-anim');
                }
            };
            container.appendChild(card);
        });
    }

    // Ефект фотоспалахів
    function triggerFlash() {
        const flashEl = document.getElementById('camera-flashes');
        flashEl.classList.remove('flash-anim');
        void flashEl.offsetWidth;
        flashEl.classList.add('flash-anim');
    }

    // Фінальна сцена
    function showFinale() {
        playSound('finale');
        document.getElementById('stage').style.display = 'none';
        const finaleEl = document.getElementById('finale');
        finaleEl.style.display = 'flex';
        
        // Генерація постійних феєрверків
        setInterval(() => {
            const fw = document.createElement('div');
            fw.className = 'firework';
            const size = Math.random() * 50 + 20;
            fw.style.width = size + 'px';
            fw.style.height = size + 'px';
            fw.style.left = Math.random() * 100 + 'vw';
            fw.style.top = Math.random() * 100 + 'vh';
            
            const colors = ['#ff007f', '#00ffff', '#ffff00', '#ff00ff', '#ffffff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            fw.style.background = `radial-gradient(circle, ${color} 0%, transparent 60%)`;
            fw.style.boxShadow = `0 0 20px ${color}, 0 0 40px ${color}`;
            
            finaleEl.appendChild(fw);
            setTimeout(() => fw.remove(), 1000);
        }, 150);
    }

    // Навігація
    document.getElementById('btn-next').addEventListener('click', () => { 
        playSound('click'); 
        currentLevel = Math.min(currentLevel + 1, wordsData.length);
        loadLevel(); 
    });
    
    document.getElementById('btn-prev').addEventListener('click', () => { 
        playSound('click'); 
        currentLevel = Math.max(currentLevel - 1, 0);
        document.getElementById('stage').style.display = 'flex';
        document.getElementById('finale').style.display = 'none';
        loadLevel(); 
    });

    // Запуск
    window.onload = loadLevel;

</script>
</body>
</html>
