<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Гра: Будова слова (Стиль Морозива)</title>
    <style>
        /* Скидання стилів та налаштування екрану для уникнення білих полів */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(180deg, #ffc0cb 0%, #ffebd6 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Контейнер для процедурно згенерованого SVG фону (світ морозива) */
        #icecream-bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Головний ігровий контейнер */
        #game-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Ігрова дошка у вигляді великої вафлі з шоколадною глазур'ю */
        #waffle-board {
            width: 85%;
            max-width: 950px;
            min-height: 350px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            border-radius: 20px;
            /* Вафельний патерн через CSS градієнти */
            background-color: #f4c478;
            background-image: 
                linear-gradient(45deg, #d99a45 25%, transparent 25%, transparent 75%, #d99a45 75%, #d99a45), 
                linear-gradient(45deg, #d99a45 25%, transparent 25%, transparent 75%, #d99a45 75%, #d99a45);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            box-shadow: 
                0 20px 50px rgba(100, 50, 0, 0.4),
                inset 0 0 0 15px rgba(255, 215, 150, 0.8),
                inset 0 0 20px 15px #b07020;
        }

        /* Декоративна шоколадна глазур, що стікає з вафлі */
        .chocolate-drip {
            position: absolute;
            top: -5px;
            left: 0;
            width: 100%;
            height: 60px;
            background-image: radial-gradient(circle at 20px 0, transparent 20px, #4a2511 21px);
            background-size: 40px 100%;
            background-repeat: repeat-x;
            border-radius: 20px 20px 0 0;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }

        /* Контейнер для візуалізації будови слова (іконки зі смаком шоколаду) */
        #structure-display {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            height: 70px;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
        }

        /* Контейнер для речення */
        #sentence {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        /* Кожне слово стилізоване під кульку морозива */
        .word {
            font-size: 30px;
            font-weight: 900;
            color: #fff;
            padding: 20px 30px;
            border-radius: 50% 50% 15px 15px; /* Форма кульки морозива */
            background: linear-gradient(135deg, #ff8da1, #ff5e7e);
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #ff3b60;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,0.2),
                inset 5px 5px 15px rgba(255,255,255,0.6),
                0 10px 15px rgba(0,0,0,0.2);
        }

        /* Різні смаки (кольори) для різних слів через nth-child */
        .word:nth-child(2n) { background: linear-gradient(135deg, #8decff, #38c8ff); border-color: #00a8e8; }
        .word:nth-child(3n) { background: linear-gradient(135deg, #a1ff8d, #5eff5e); border-color: #32cd32; }
        .word:nth-child(4n) { background: linear-gradient(135deg, #ffd166, #ffb703); border-color: #fb8500; }
        .word:nth-child(5n) { background: linear-gradient(135deg, #d0a3ff, #aa5cff); border-color: #8a2be2; }

        .word:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,0.2),
                inset 5px 5px 15px rgba(255,255,255,0.6),
                0 20px 25px rgba(0,0,0,0.3);
        }

        /* Анімації помилки (морозиво "тане/трясеться") */
        .word.wrong {
            animation: melt-shake 0.5s;
            filter: grayscale(0.8) brightness(0.7);
            border-color: #555;
        }

        /* Анімації успіху (морозиво радісно стрибає) */
        .word.correct {
            animation: ice-pop 0.6s;
            filter: brightness(1.2) contrast(1.2);
            pointer-events: none;
            z-index: 100;
        }

        /* Мінімалістичні кнопки навігації (як маленькі печивця) */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            display: flex;
            gap: 20px;
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #d99a45;
            border: 4px solid #b07020;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3), inset 0 0 10px rgba(255,255,255,0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover { transform: scale(1.1); background: #edaf5f; }
        .btn:active { transform: scale(0.9); }

        .btn svg {
            width: 30px;
            height: 30px;
            fill: none;
            stroke: #4a2511;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Частинки — цукрова кондитерська посипка (різнокольорові палички) */
        .sprinkle {
            position: absolute;
            width: 6px;
            height: 18px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 100;
            animation: sprinkle-fly 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Ключові кадри анімацій */
        @keyframes sprinkle-fly {
            0% { transform: scale(1) translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: scale(0.5) translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
        }

        @keyframes melt-shake {
            0%, 100% { transform: translateX(0) scaleY(1); }
            20% { transform: translateX(-10px) scaleY(0.9) rotate(-3deg); }
            40% { transform: translateX(10px) scaleY(0.95) rotate(3deg); }
            60% { transform: translateX(-10px) scaleY(0.9) rotate(-3deg); }
            80% { transform: translateX(10px) scaleY(0.95) rotate(3deg); }
        }

        @keyframes ice-pop {
            0% { transform: scale(1); }
            40% { transform: scale(1.3) translateY(-20px) rotate(5deg); }
            70% { transform: scale(0.9) translateY(5px) rotate(-3deg); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="icecream-bg-container">
        <svg id="icecream-bg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
            <defs>
                <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#ff9a9e"/>
                    <stop offset="100%" stop-color="#fecfef"/>
                </linearGradient>
                <linearGradient id="hillMint" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#84fab0"/>
                    <stop offset="100%" stop-color="#8fd3f4"/>
                </linearGradient>
                <linearGradient id="hillStrawberry" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#ff758c"/>
                    <stop offset="100%" stop-color="#ff7eb3"/>
                </linearGradient>
                <linearGradient id="riverCaramel" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#f6d365"/>
                    <stop offset="50%" stop-color="#fda085"/>
                    <stop offset="100%" stop-color="#f6d365"/>
                </linearGradient>
            </defs>
            <rect width="1920" height="1080" fill="url(#skyGrad)"/>
            
            <g transform="translate(1600, 250)">
                <circle cx="0" cy="0" r="150" fill="#ffef96">
                    <animate attributeName="r" values="150;160;150" dur="4s" repeatCount="indefinite"/>
                </circle>
                <path d="M-150,0 Q0,100 150,0 Q0,-100 -150,0 Z" fill="#ff5e7e" opacity="0.6">
                    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
                </path>
                <path d="M0,-150 Q100,0 0,150 Q-100,0 0,-150 Z" fill="#ff5e7e" opacity="0.6">
                    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
                </path>
            </g>

            <path d="M200,300 Q250,250 300,300 Q350,260 400,320 Q350,350 300,340 Q250,360 200,300 Z" fill="#fff" opacity="0.8">
                <animateTransform attributeName="transform" type="translate" values="0,0; 50,-10; 0,0" dur="6s" repeatCount="indefinite"/>
            </path>
            <path d="M1200,150 Q1250,100 1300,150 Q1350,110 1400,170 Q1350,200 1300,190 Q1250,210 1200,150 Z" fill="#fff" opacity="0.8">
                <animateTransform attributeName="transform" type="translate" values="0,0; -40,15; 0,0" dur="8s" repeatCount="indefinite"/>
            </path>

            <path d="M-200,1080 Q300,600 800,1080 Z" fill="url(#hillMint)"/>
            <path d="M600,1080 Q1200,500 1920,1080 Z" fill="url(#hillStrawberry)"/>

            <path d="M-100,1080 Q400,800 800,950 T1920,900 L1920,1080 Z" fill="url(#riverCaramel)"/>

            <g id="decorations-group"></g>
        </svg>
    </div>

    <div id="game-container">
        <div id="waffle-board">
            <div class="chocolate-drip"></div>
            
            <div id="structure-display"></div>
            <div id="sentence"></div>
        </div>

        <div id="controls">
            <div class="btn" id="btn-prev">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <div class="btn" id="btn-next">
                <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
            </div>
        </div>
    </div>

    <script>
        // База даних рівнів: 15 речень.
        // P: Префікс (¬), R: Корінь (⌒), S: Суфікс (^), E: Закінчення (□).
        // Увага: У кожному реченні під схему ідеально підходить РІВНО ОДНЕ слово.
        const levels = [
            { s: "Мала рибка пливе дуже швидко", correct: 1, t: ['R', 'S', 'E'] },       
            { s: "Тут росте старий дуб", correct: 3, t: ['R'] },                         
            { s: "Море сьогодні таке спокійне", correct: 0, t: ['R', 'E'] },             
            { s: "Брат знайшов гарний підсніжник", correct: 3, t: ['P', 'R', 'S'] },     
            { s: "Він виніс пухнастий килим", correct: 1, t: ['P', 'R'] },               
            { s: "Падає білий сніжок", correct: 2, t: ['R', 'S'] },                      
            { s: "Мама читає нову записку", correct: 3, t: ['P', 'R', 'S', 'E'] },       
            { s: "Тепле літо швидко минуло", correct: 1, t: ['R', 'E'] },                
            { s: "Ми пішли на довгу прогулянку", correct: 4, t: ['P', 'R', 'S', 'E'] },  
            { s: "Солодко спить рудий котик", correct: 3, t: ['R', 'S'] },               
            { s: "Сьогодні тато приніс торт", correct: 2, t: ['P', 'R'] },               
            { s: "Гарне село стоїть біля річки", correct: 1, t: ['R', 'E'] },            
            { s: "Небо закрила темна хмарка", correct: 3, t: ['R', 'S', 'E'] },          
            { s: "Наш кіт п'є молоко", correct: 1, t: ['R'] },                           
            { s: "Зранку випав густий сніг", correct: 3, t: ['R'] }                      
        ];

        let currentLevelIndex = 0;
        const sentenceContainer = document.getElementById('sentence');
        const structureContainer = document.getElementById('structure-display');

        // Web Audio API: Солодкі, "цукрові" звуки
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                // Дзвінкий, позитивний звук (ніби ксилофон)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, t); // A5
                osc.frequency.exponentialRampToValueAtTime(1760, t + 0.2); // A6
                gain.gain.setValueAtTime(0.6, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                osc.start(t);
                osc.stop(t + 0.4);
                
                // Швидке арпеджіо для додаткової активності
                setTimeout(() => playArp(1108.73, 'sine'), 50);  // C#6
                setTimeout(() => playArp(1318.51, 'sine'), 100); // E6
                setTimeout(() => playArp(1760.00, 'sine'), 150); // A6
            } else if (type === 'wrong') {
                // Глухий, м'який звук (ніби морозиво впало)
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.3);
                gain.gain.setValueAtTime(0.5, t);
                gain.gain.linearRampToValueAtTime(0.01, t + 0.3);
                osc.start(t);
                osc.stop(t + 0.3);
            }
        }

        function playArp(freq, type) {
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, t);
            gain.gain.setValueAtTime(0.4, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.2);
        }

        // Генерація SVG для символів будови слова (мальовані шоколадом)
        function getSymbolSVG(type) {
            const baseProps = 'fill="none" stroke="#4a2511" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"';
            const highlightProps = 'fill="none" stroke="#6b3a1d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
            // Додаємо тінь для ефекту об'єму глазурі
            const dropShadow = 'filter="drop-shadow(2px 2px 0px rgba(255,255,255,0.8))"';
            
            let path = '';
            switch(type) {
                // Виправлений префікс (¬), горизонтальна лінія зверху і палка справа вниз
                case 'P': path = 'M5,10 L30,10 L30,30'; break;       
                case 'R': path = 'M5,30 Q25,-10 45,30'; break;       // Корінь
                case 'S': path = 'M5,30 L15,5 L25,30'; break;        // Суфікс
                case 'E': path = 'M5,5 L25,5 L25,25 L5,25 Z'; break; // Закінчення
            }
            
            const width = type === 'R' ? 50 : 35;
            
            return `
                <svg viewBox="0 0 ${width} 35" width="${width + 10}" height="45" style="overflow:visible" ${dropShadow}>
                    <path d="${path}" ${baseProps} />
                    <path d="${path}" ${highlightProps} />
                </svg>
            `;
        }

        // Додавання деталей на задній фон (вишеньки, вафлі)
        function setupBackgroundDecorations() {
            const group = document.getElementById('decorations-group');
            let decorSVG = '';
            
            // Вишеньки
            for(let i=0; i<8; i++) {
                const x = Math.random() * 1900;
                const y = 800 + Math.random() * 200;
                decorSVG += `
                    <g transform="translate(${x}, ${y}) scale(${0.5 + Math.random()*0.5})">
                        <path d="M0,0 Q20,-30 40,-10" fill="none" stroke="#4caf50" stroke-width="4"/>
                        <circle cx="0" cy="0" r="15" fill="#e53935"/>
                        <circle cx="40" cy="-10" r="15" fill="#e53935"/>
                        <circle cx="-5" cy="-5" r="4" fill="#fff" opacity="0.6"/>
                        <circle cx="35" cy="-15" r="4" fill="#fff" opacity="0.6"/>
                    </g>
                `;
            }
            group.innerHTML = decorSVG;
        }

        // Система частинок (кондитерська посипка)
        function createSprinkles(x, y) {
            const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#f9bec7', '#8338ec', '#3a86ff', '#fb5607', '#ffbe0b'];
            
            for(let i=0; i<40; i++) {
                const p = document.createElement('div');
                p.className = 'sprinkle';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 250;
                p.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                p.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1200);
            }
        }

        // Завантаження рівня
        function loadLevel() {
            if (currentLevelIndex >= levels.length) {
                endGame();
                return;
            }

            const level = levels[currentLevelIndex];
            
            // Рендер будови (шоколадні символи)
            structureContainer.innerHTML = level.t.map(getSymbolSVG).join('');
            
            // Рендер речення (морозиво-слова)
            sentenceContainer.innerHTML = '';
            const words = level.s.split(' ');
            
            words.forEach((wordText, index) => {
                const wordEl = document.createElement('div');
                wordEl.className = 'word';
                wordEl.textContent = wordText;
                
                wordEl.addEventListener('click', (e) => {
                    handleWordClick(index, level.correct, wordEl);
                });
                
                sentenceContainer.appendChild(wordEl);
            });
        }

        // Логіка кліку
        let isAnimating = false;
        function handleWordClick(clickedIndex, correctIndex, element) {
            if(isAnimating) return;

            if (clickedIndex === correctIndex) {
                // Правильно
                isAnimating = true;
                playSound('correct');
                element.classList.add('correct');
                
                // Вибух посипки з центру кульки морозива
                const rect = element.getBoundingClientRect();
                createSprinkles(rect.left + rect.width/2, rect.top + rect.height/2);

                setTimeout(() => {
                    isAnimating = false;
                    currentLevelIndex++;
                    loadLevel();
                }, 1200); // Швидкий перехід

            } else {
                // Неправильно
                playSound('wrong');
                element.classList.add('wrong');
                
                setTimeout(() => {
                    element.classList.remove('wrong');
                }, 500);
            }
        }

        // Кінець гри (Свято морозива)
        function endGame() {
            const board = document.getElementById('waffle-board');
            board.innerHTML = '';
            document.getElementById('controls').style.display = 'none';
            
            // Постійний феєрверк із посипки по всьому екрану
            setInterval(() => {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * (window.innerHeight / 2);
                createSprinkles(x, y);
                playSound('correct');
            }, 800);
        }

        // Кнопки навігації
        document.getElementById('btn-next').addEventListener('click', () => {
            if(isAnimating) return;
            currentLevelIndex++;
            loadLevel();
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if(isAnimating || currentLevelIndex === 0) return;
            currentLevelIndex--;
            loadLevel();
        });

        // Ініціалізація
        setupBackgroundDecorations();
        loadLevel();

    </script>
</body>
</html>
