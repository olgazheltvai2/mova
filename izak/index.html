<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КОД: Світ Їжачка (Повна гра)</title>
    <style>
        /* Базові налаштування для обох ігор */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- СТИЛІ ГРИ 1 (Вірш) --- */
        .game1-body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-image: url('1.webp'), radial-gradient(circle at 50% 50%, #3e5f41, #102111);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        #game1-ui {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .game-container-1 {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            pointer-events: none;
        }

        .planks-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .plank {
            padding: 20px 35px;
            font-size: 40px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 5px #000000, -1px -1px 3px #000000;
            background: rgba(40, 20, 10, 0.85);
            border: 3px solid #5c3a21;
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.7), inset 0 2px 5px rgba(255,255,255,0.1);
            cursor: grab;
            position: relative;
            touch-action: none;
            opacity: 0;
            transition: box-shadow 0.2s, background 0.3s, border-color 0.3s;
            pointer-events: auto;
        }

        @keyframes flyInLeft { 0% { transform: translateX(-100vw); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes flyInRight { 0% { transform: translateX(100vw); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes flyOutLeft { 0% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(-100vw); opacity: 0; } }
        @keyframes flyOutRight { 0% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(100vw); opacity: 0; } }

        .plank.dragging {
            transform: scale(1.05) rotate(2deg) !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            cursor: grabbing;
            z-index: 100;
            border-color: #ffaa00;
            background: rgba(60, 30, 15, 0.95);
        }

        .plank.drop-target {
            border-style: dashed;
            border-color: #ffcc00;
            background: rgba(80, 40, 20, 0.9);
        }

        .success-animate {
            background: rgba(46, 139, 87, 0.95) !important;
            border-color: #3cb371 !important;
            box-shadow: 0 0 20px #2e8b57;
        }

        .leaf {
            position: absolute;
            top: -10vh;
            pointer-events: none;
            z-index: 20;
            animation: fall linear forwards, swing ease-in-out infinite alternate;
            opacity: 0.9;
        }

        @keyframes fall { to { top: 110vh; } }
        @keyframes swing {
            from { transform: translateX(-40px) rotate(-30deg); }
            to { transform: translateX(40px) rotate(30deg); }
        }

        .controls {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 30;
        }

        .btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            padding: 10px 30px;
            border-radius: 35px;
            font-size: 20px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: lowercase;
            pointer-events: auto;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }

        /* --- СТИЛІ ГРИ 2 (Інтерв'ю) --- */
        .game2-body {
            background-color: #111;
            cursor: none;
        }

        #game2-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: none; /* Приховано до старту другої частини */
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .question-text {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Sniglet', 'Fredoka One', 'Baloo 2', 'Comfortaa', sans-serif;
            font-size: 75px; 
            font-weight: bold;
            color: #4a2511;
            text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.8);
            padding: 40px 80px;
            box-sizing: border-box;
            line-height: 1.3;
        }
    </style>
</head>
<body class="game1-body">

    <div id="game1-ui">
        <div class="controls">
            <button class="btn" onclick="goToGame2(event)">далі</button>
        </div>
        <div id="leaves-container"></div>
        <div class="game-container-1" id="game-zone">
            <div class="planks-list" id="planks-list"></div>
        </div>
    </div>

    <div id="game2-container">
        <svg id="game-svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
            <defs>
                <radialGradient id="lensFlare" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                    <stop offset="20%" stop-color="#ffffcc" stop-opacity="0.9" />
                    <stop offset="50%" stop-color="#ffcc00" stop-opacity="0.5" />
                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                </radialGradient>
                
                <pattern id="paperTexture" patternUnits="userSpaceOnUse" width="200" height="200">
                    <circle cx="100" cy="100" r="80" fill="#ffffff" opacity="0.05" />
                    <path d="M0 0 Q 100 100 200 0" stroke="#fff" fill="none" opacity="0.05" stroke-width="2"/>
                </pattern>
            </defs>
        </svg>
    </div>

    <script>
        // === СПІЛЬНІ ДАНІ ТА АУДІО ===
        const AudioContextWindow = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContextWindow();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        // === ЛОГІКА ГРИ 1 (Вірш) ===
        const correctPoem = [
            "Ішов лісом їжачок,",
            "За плечима рюкзачок.",
            "Він збира грибочки,",
            "Насипає в бочку,",
            "Солить їх на зиму",
            "І ласує ними."
        ];

        let game1Started = false;
        let leafInterval;
        let draggingElement = null;

        function playFeedbackSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'start') {
                const freqs = [300, 400, 500, 600];
                freqs.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.value = f;
                    g.gain.setValueAtTime(0, now + i*0.1);
                    g.gain.linearRampToValueAtTime(0.3, now + i*0.1 + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.3);
                    o.start(now + i*0.1); o.stop(now + i*0.1 + 0.4);
                });
            } else if (type === 'dragStart') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(450, now + 0.05);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'drop') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.setValueAtTime(120, now + 0.05);
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'win') {
                const notes = [440, 554.37, 659.25, 880];
                notes.forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sine';
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0, now + i*0.1);
                    g.gain.linearRampToValueAtTime(0.4, now + i*0.1 + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.6);
                    o.start(now + i*0.1);
                    o.stop(now + i*0.1 + 0.7);
                });
            }
        }

        document.getElementById('game1-ui').addEventListener('pointerdown', (e) => {
            if(e.target.classList.contains('btn') || game1Started) return;
            game1Started = true;
            document.body.style.cursor = 'default';
            startGame1();
        });

        function startGame1() {
            initAudio();
            playFeedbackSound('start');
            const gameZone = document.getElementById('game-zone');
            gameZone.style.pointerEvents = 'auto';
            initPlanks();
        }

        function initPlanks() {
            const list = document.getElementById('planks-list');
            list.innerHTML = '';
            const shuffledPoem = [...correctPoem].sort(() => Math.random() - 0.5);
            
            shuffledPoem.forEach((text, index) => {
                const plank = document.createElement('div');
                plank.className = 'plank';
                plank.textContent = text;
                plank.draggable = true;
                
                const animName = index % 2 === 0 ? 'flyInLeft' : 'flyInRight';
                plank.style.animation = `${animName} 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards`;
                plank.style.animationDelay = `${index * 0.15}s`;
                
                plank.addEventListener('animationend', (e) => {
                    if (e.animationName.includes('flyIn')) {
                        plank.style.animation = ''; 
                        plank.style.opacity = '1'; 
                    }
                });
                
                setupDragAndDropHandlers(plank);
                list.appendChild(plank);
            });
        }

        function setupDragAndDropHandlers(element) {
            element.addEventListener('dragstart', (e) => {
                initAudio();
                draggingElement = element;
                playFeedbackSound('dragStart');
                setTimeout(() => element.classList.add('dragging'), 0);
                if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
            });

            element.addEventListener('dragend', () => {
                draggingElement = null;
                element.classList.remove('dragging');
                document.querySelectorAll('.plank').forEach(p => p.classList.remove('drop-target'));
                checkCorrectness();
            });

            element.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (!draggingElement || draggingElement === element) return;
                e.dataTransfer.dropEffect = 'move';
                element.classList.add('drop-target');
            });

            element.addEventListener('dragleave', () => {
                element.classList.remove('drop-target');
            });

            element.addEventListener('drop', (e) => {
                e.preventDefault();
                if (!draggingElement || draggingElement === element) return;
                
                element.classList.remove('drop-target');
                playFeedbackSound('drop');
                
                const list = document.getElementById('planks-list');
                const allPlanks = [...list.querySelectorAll('.plank')];
                const draggingIndex = allPlanks.indexOf(draggingElement);
                const targetIndex = allPlanks.indexOf(element);
                
                if (draggingIndex < targetIndex) {
                    list.insertBefore(draggingElement, element.nextSibling);
                } else {
                    list.insertBefore(draggingElement, element);
                }
            });
        }

        function checkCorrectness() {
            const currentPlanks = document.querySelectorAll('.plank');
            let isCorrect = true;
            
            currentPlanks.forEach((plank, index) => {
                if (plank.textContent !== correctPoem[index]) {
                    isCorrect = false;
                }
            });

            if (isCorrect) {
                playFeedbackSound('win');
                
                currentPlanks.forEach((plank, index) => {
                    plank.classList.add('success-animate');
                    plank.draggable = false;
                    
                    setTimeout(() => {
                        const exitAnimName = index % 2 === 0 ? 'flyOutLeft' : 'flyOutRight';
                        plank.style.animation = `${exitAnimName} 1s cubic-bezier(0.4, 0, 0.2, 1) forwards`;
                    }, 1000 + (index * 150)); 
                });
                
                const totalExitTime = 1000 + (currentPlanks.length * 150) + 1000;
                setTimeout(() => {
                    document.getElementById('planks-list').style.pointerEvents = 'none';
                    startContinuousLeaves();
                }, totalExitTime);
            }
        }

        function startContinuousLeaves() {
            for(let i=0; i<5; i++) spawnLeaf();
            leafInterval = setInterval(spawnLeaf, 800);
        }

        function spawnLeaf() {
            const container = document.getElementById('leaves-container');
            if(!container) return;

            const leafPaths = [
                `<path d="M 25,50 C 23,40 20,30 25,20 C 15,25 5,15 10,5 C 20,10 25,0 30,5 C 40,0 45,15 35,25 C 45,20 45,35 30,35 L 28,50 Z" fill="#c94c4c"/>`,
                `<path d="M 25,50 C 23,40 23,30 25,25 C 10,25 5,15 15,10 C 25,5 30,10 30,15 C 40,5 45,15 35,25 C 50,30 40,40 28,35 L 28,50 Z" fill="#e28743"/>`,
                `<path d="M 25,50 C 24,40 20,35 15,30 C 5,20 15,5 25,0 C 35,5 45,20 35,30 C 30,35 26,40 25,50 Z" fill="#eab676"/>`
            ];

            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.style.left = `${Math.random() * 90 + 5}vw`;
            
            const scale = Math.random() * 0.7 + 0.5;
            const fallDuration = Math.random() * 6 + 10; 
            const swingDuration = Math.random() * 2 + 2; 
            
            leaf.style.animationDuration = `${fallDuration}s, ${swingDuration}s`;
            
            const hueRotate = Math.random() * 40 - 20; 
            leaf.style.filter = `drop-shadow(2px 5px 3px rgba(0,0,0,0.4)) hue-rotate(${hueRotate}deg)`;
            
            const randomPath = leafPaths[Math.floor(Math.random() * leafPaths.length)];
            
            leaf.innerHTML = `<svg viewBox="0 0 50 50" width="${50 * scale}px" height="${50 * scale}px">${randomPath}</svg>`;
            
            container.appendChild(leaf);
            
            setTimeout(() => {
                if(leaf && leaf.parentNode) leaf.parentNode.removeChild(leaf);
            }, fallDuration * 1000);
        }

        // === ПЕРЕХІД МІЖ ІГРАМИ ===
        function goToGame2(e) {
            e.stopPropagation(); 
            initAudio();
            playFeedbackSound('drop');
            
            // Зупиняємо листопад
            clearInterval(leafInterval);

            // Перемикаємо стилі фону
            document.body.classList.remove('game1-body');
            document.body.classList.add('game2-body');

            // Ховаємо першу гру, показуємо другу
            document.getElementById('game1-ui').style.display = 'none';
            document.getElementById('game2-container').style.display = 'block';

            // Запускаємо другу гру
            renderScene();
        }


        // === ЛОГІКА ГРИ 2 (Інтерв'ю) ===
        const рівніДані = [
            { файлНазва: "2.webp", питання: "Яка на смак змія і чи справді вона смачніша за дощового черв'яка?" },
            { файлНазва: "3.webp", питання: "Як ви реагуєте, коли люди намагаються пригостити вас блюдцем молока, знаючи, що воно вам шкодить?" },
            { файлНазва: "4.webp", питання: "Чи траплялося вам колись випадково вколоти самого себе, коли ви згортаєтесь у клубок?" },
            { файлНазва: "5.webp", питання: "Що ви робите найпершим ділом, коли прокидаєтеся після довгої зими?" },
            { файлНазва: "6.webp", питання: "Ви такий гучний тупотун! Це спеціальна тактика, щоб налякати ворогів?" },
            { файлНазва: "7.webp", питання: "Що б ви порадили людям, які зустріли вас у парку, щоб ви обоє залишилися задоволеними?" },
            { файлНазва: "8.webp", питання: "Який шампунь ви використовуєте для об'єму своїх п'яти тисяч голок?" },
            { файлНазва: "9.webp", питання: "Як ви чухаєте собі спинку, якщо там стільки колючок?" }
        ];

        let поточнийРівень = 0;
        let чиПоказанеПитання = false;
        let чиЙдеАнімація = false;

        const svgNS = "http://www.w3.org/2000/svg";
        const svgElement = document.getElementById('game-svg');
        const defs = svgElement.querySelector("defs");

        function playSoundG2(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 0.05); 
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'shutter') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gainNode.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        function renderScene() {
            svgElement.innerHTML = '';
            svgElement.appendChild(defs);

            const imageElement = document.createElementNS(svgNS, "image");
            imageElement.setAttribute("href", рівніДані[поточнийРівень].файлНазва);
            imageElement.setAttribute("width", "1920");
            imageElement.setAttribute("height", "1080");
            imageElement.setAttribute("preserveAspectRatio", "xMidYMid slice");
            svgElement.appendChild(imageElement);

            const clickZone = document.createElementNS(svgNS, "rect");
            clickZone.setAttribute("width", "1920");
            clickZone.setAttribute("height", "1080");
            clickZone.setAttribute("fill", "transparent");
            clickZone.style.cursor = "pointer";
            clickZone.onclick = handleMainClick;
            svgElement.appendChild(clickZone);

            if (чиПоказанеПитання) {
                drawQuestion();
            }

            drawLeafButtons();
        }

        function drawQuestion() {
            const questionGroup = document.createElementNS(svgNS, "g");
            
            const bgGroup = document.createElementNS(svgNS, "g");
            bgGroup.setAttribute("opacity", "0.9"); 
            
            const path = document.createElementNS(svgNS, "path");
            path.setAttribute("d", "M 250 350 C 250 200, 450 250, 960 250 C 1470 250, 1670 200, 1670 350 L 1670 730 C 1670 880, 1470 830, 960 830 C 450 830, 250 880, 250 730 Z");
            path.setAttribute("fill", "#fceabb");
            path.setAttribute("stroke", "#8b4513");
            path.setAttribute("stroke-width", "15");
            bgGroup.appendChild(path);

            const innerPath = document.createElementNS(svgNS, "path");
            innerPath.setAttribute("d", "M 280 370 C 280 240, 460 280, 960 280 C 1460 280, 1640 240, 1640 370 L 1640 710 C 1640 840, 1460 800, 960 800 C 460 800, 280 840, 280 710 Z");
            innerPath.setAttribute("fill", "url(#paperTexture)");
            innerPath.setAttribute("stroke", "#cd853f");
            innerPath.setAttribute("stroke-width", "4");
            innerPath.setAttribute("stroke-dasharray", "15, 10");
            bgGroup.appendChild(innerPath);

            questionGroup.appendChild(bgGroup);

            const foreignObject = document.createElementNS(svgNS, "foreignObject");
            foreignObject.setAttribute("x", "300");
            foreignObject.setAttribute("y", "280");
            foreignObject.setAttribute("width", "1320");
            foreignObject.setAttribute("height", "520");

            const textDiv = document.createElement("div");
            textDiv.className = "question-text";
            textDiv.innerText = рівніДані[поточнийРівень].питання;
            foreignObject.appendChild(textDiv);
            
            questionGroup.appendChild(foreignObject);

            questionGroup.setAttribute("opacity", "0");
            questionGroup.setAttribute("transform", "scale(0.8)");
            questionGroup.style.transformOrigin = "center";
            svgElement.appendChild(questionGroup);

            requestAnimationFrame(() => {
                questionGroup.style.transition = "all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
                questionGroup.setAttribute("opacity", "1"); 
                questionGroup.setAttribute("transform", "scale(1)");
            });
        }

        function drawLeafButtons() {
            const btnGroup = document.createElementNS(svgNS, "g");

            if (поточнийРівень > 0 || чиПоказанеПитання) {
                const backBtn = document.createElementNS(svgNS, "g");
                backBtn.style.cursor = "pointer";
                backBtn.setAttribute("opacity", "0.85");
                backBtn.onclick = (e) => { e.stopPropagation(); goBack(); };
                
                const leafPathBack = document.createElementNS(svgNS, "path");
                leafPathBack.setAttribute("d", "M 50 880 Q 150 780 250 880 Q 150 980 50 880 Z");
                leafPathBack.setAttribute("fill", "#cd853f"); 
                leafPathBack.setAttribute("stroke", "#5c3317");
                leafPathBack.setAttribute("stroke-width", "6");
                backBtn.appendChild(leafPathBack);

                const veinBack = document.createElementNS(svgNS, "path");
                veinBack.setAttribute("d", "M 50 880 L 220 880 M 120 880 L 150 850 M 120 880 L 150 910");
                veinBack.setAttribute("stroke", "#5c3317");
                veinBack.setAttribute("stroke-width", "3");
                backBtn.appendChild(veinBack);
                
                const backText = document.createElementNS(svgNS, "text");
                backText.setAttribute("x", "150");
                backText.setAttribute("y", "895");
                backText.setAttribute("font-family", "sans-serif");
                backText.setAttribute("font-size", "45");
                backText.setAttribute("font-weight", "bold");
                backText.setAttribute("fill", "#fff");
                backText.setAttribute("text-anchor", "middle");
                backText.textContent = "❮";
                backBtn.appendChild(backText);
                
                btnGroup.appendChild(backBtn);
            }

            if (поточнийРівень < рівніДані.length - 1 || !чиПоказанеПитання) {
                const nextBtn = document.createElementNS(svgNS, "g");
                nextBtn.style.cursor = "pointer";
                nextBtn.setAttribute("opacity", "0.85");
                nextBtn.onclick = (e) => { e.stopPropagation(); goNext(); };
                
                const leafPathNext = document.createElementNS(svgNS, "path");
                leafPathNext.setAttribute("d", "M 1870 880 Q 1770 780 1670 880 Q 1770 980 1870 880 Z");
                leafPathNext.setAttribute("fill", "#d2691e"); 
                leafPathNext.setAttribute("stroke", "#5c3317");
                leafPathNext.setAttribute("stroke-width", "6");
                nextBtn.appendChild(leafPathNext);

                const veinNext = document.createElementNS(svgNS, "path");
                veinNext.setAttribute("d", "M 1870 880 L 1700 880 M 1800 880 L 1770 850 M 1800 880 L 1770 910");
                veinNext.setAttribute("stroke", "#5c3317");
                veinNext.setAttribute("stroke-width", "3");
                nextBtn.appendChild(veinNext);
                
                const nextText = document.createElementNS(svgNS, "text");
                nextText.setAttribute("x", "1770");
                nextText.setAttribute("y", "895");
                nextText.setAttribute("font-family", "sans-serif");
                nextText.setAttribute("font-size", "45");
                nextText.setAttribute("font-weight", "bold");
                nextText.setAttribute("fill", "#fff");
                nextText.setAttribute("text-anchor", "middle");
                nextText.textContent = "❯";
                nextBtn.appendChild(nextText);
                
                btnGroup.appendChild(nextBtn);
            }

            svgElement.appendChild(btnGroup);
        }

        function handleMainClick() {
            if (чиЙдеАнімація) return; 

            if (!чиПоказанеПитання) {
                чиПоказанеПитання = true;
                playSoundG2('pop');
                renderScene();
            } else {
                goNext();
            }
        }

        function goNext() {
            if (чиЙдеАнімація) return;

            if (!чиПоказанеПитання) {
                чиПоказанеПитання = true;
                playSoundG2('pop');
                renderScene();
            } else {
                if (поточнийРівень < рівніДані.length - 1) {
                    поточнийРівень++;
                    чиПоказанеПитання = false;
                    flashEffect(() => renderScene());
                } else {
                    // Фінальний спалах і кінець гри (пустий екран)
                    flashEffect(() => {
                        svgElement.innerHTML = ''; 
                    });
                }
            }
        }

        function goBack() {
            if (чиЙдеАнімація) return;

            if (чиПоказанеПитання) {
                чиПоказанеПитання = false;
                renderScene();
            } else if (поточнийРівень > 0) {
                поточнийРівень--;
                чиПоказанеПитання = true;
                flashEffect(() => renderScene());
            }
        }

        function flashEffect(callback) {
            чиЙдеАнімація = true;
            
            const cameraGroup = document.createElementNS(svgNS, "g");
            
            const camImg = document.createElementNS(svgNS, "image");
            camImg.setAttribute("href", "фото.webp");
            camImg.setAttribute("x", "660"); 
            camImg.setAttribute("y", "240"); 
            camImg.setAttribute("width", "600");
            camImg.setAttribute("height", "600");
            cameraGroup.appendChild(camImg);

            const flare = document.createElementNS(svgNS, "circle");
            flare.setAttribute("cx", "960");
            flare.setAttribute("cy", "540");
            flare.setAttribute("r", "0");
            flare.setAttribute("fill", "url(#lensFlare)");
            cameraGroup.appendChild(flare);

            cameraGroup.setAttribute("opacity", "0");
            cameraGroup.style.transformOrigin = "960px 540px";
            cameraGroup.style.transform = "scale(0)";
            cameraGroup.style.transition = "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease-out";
            
            svgElement.appendChild(cameraGroup);

            requestAnimationFrame(() => {
                cameraGroup.setAttribute("opacity", "1");
                cameraGroup.style.transform = "scale(1)";

                setTimeout(() => {
                    playSoundG2('shutter');

                    flare.style.transition = "r 0.15s ease-in, opacity 0.15s ease-in";
                    flare.setAttribute("r", "1500");
                    
                    setTimeout(() => {
                        const whiteOverlay = document.createElementNS(svgNS, "rect");
                        whiteOverlay.setAttribute("width", "1920");
                        whiteOverlay.setAttribute("height", "1080");
                        whiteOverlay.setAttribute("fill", "#FFFFFF");
                        svgElement.appendChild(whiteOverlay);
                        
                        callback();
                        
                        const fadeOutFlash = document.createElementNS(svgNS, "rect");
                        fadeOutFlash.setAttribute("width", "1920");
                        fadeOutFlash.setAttribute("height", "1080");
                        fadeOutFlash.setAttribute("fill", "#FFFFFF");
                        fadeOutFlash.style.transition = "opacity 0.6s ease-out";
                        svgElement.appendChild(fadeOutFlash);
                        
                        requestAnimationFrame(() => {
                            fadeOutFlash.setAttribute("opacity", "0");
                            setTimeout(() => {
                                if (svgElement.contains(fadeOutFlash)) svgElement.removeChild(fadeOutFlash);
                                чиЙдеАнімація = false;
                            }, 600);
                        });
                            
                    }, 100); 
                }, 600); 
            });
        }

    </script>
</body>
</html>
