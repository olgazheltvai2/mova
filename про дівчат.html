<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Girls Quiz</title>
    <style>
        /* Базові налаштування */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1b2a; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Контейнер гри з глибоким градієнтом */
        #game-container {
            position: relative;
            width: 1000px;
            height: 600px;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 215, 0, 0.2);
            overflow: hidden;
            background: radial-gradient(circle at 30% 70%, #4a192c, #1b0c24);
        }

        /* Задній фон */
        #bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Анімація мерехтіння світла */
        @keyframes gentle-glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(255, 182, 193, 0.4)); }
            50% { filter: drop-shadow(0 0 30px rgba(255, 182, 193, 0.8)); }
        }
        .lamp-glow {
            animation: gentle-glow 4s infinite ease-in-out;
        }

        /* Персонаж */
        #character-svg {
            position: absolute;
            bottom: 20px;
            left: 60px;
            width: 320px;
            height: 460px;
            z-index: 5;
            transform-origin: bottom center;
            transition: transform 0.3s;
        }

        /* Дихання персонажа */
        @keyframes breathe {
            0%, 100% { transform: scaleY(1) translateY(0); }
            50% { transform: scaleY(1.02) translateY(-4px); }
        }
        .anim-idle {
            animation: breathe 3.5s infinite ease-in-out;
        }

        /* Рух очей (замість кліпання) */
        @keyframes gaze {
            0%, 10% { transform: translateX(0px); }
            15%, 35% { transform: translateX(-4px); }
            40%, 60% { transform: translateX(5px); }
            65%, 85% { transform: translateX(-2px) translateY(-2px); }
            90%, 100% { transform: translateX(0px); }
        }
        .anim-gaze {
            animation: gaze 7s infinite ease-in-out;
        }

        /* Реакції персонажа (Стрибок/Радість) */
        @keyframes jump-joy {
            0%, 100% { transform: translateY(0) scale(1); }
            20% { transform: translateY(-45px) scale(1.05); }
            40% { transform: translateY(0) scale(1); }
            60% { transform: translateY(-25px) scale(1.02); }
            80% { transform: translateY(0) scale(1); }
        }
        .anim-success {
            animation: jump-joy 1s ease-in-out;
        }

        /* Реакції персонажа (Сум) */
        @keyframes sad-shake {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            20% { transform: rotate(-8deg) translateY(5px); }
            40% { transform: rotate(8deg) translateY(5px); }
            60% { transform: rotate(-4deg) translateY(5px); }
            80% { transform: rotate(4deg) translateY(5px); }
        }
        .anim-fail {
            animation: sad-shake 0.8s ease-in-out;
            filter: brightness(80%);
        }

        /* Динамічний рот */
        .mouth-idle { 
            d: path("M 135 160 Q 160 170 185 160 Q 160 165 135 160 Z"); 
            fill: #ff6b81; 
        }
        .mouth-smile { 
            d: path("M 130 160 Q 160 185 190 160 Q 160 175 130 160 Z"); 
            fill: #ff3366; 
        }
        .mouth-sad { 
            d: path("M 140 160 Q 160 155 180 160 Q 160 158 140 160 Z"); 
            fill: #cc0000; 
        }

        /* UI Вікторини */
        #quiz-ui {
            position: absolute;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            width: 530px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Стилізований блок питання без білих прямокутників */
        #question-box {
            background: linear-gradient(135deg, rgba(255, 117, 140, 0.95), rgba(255, 126, 179, 0.95));
            border: 4px solid #fff200;
            border-radius: 25px;
            padding: 25px 35px;
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.4);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }

        /* Відповіді */
        #options-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            border: 3px solid #b388ff;
            border-radius: 20px;
            padding: 16px 25px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .option-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .option-btn:hover {
            transform: translateX(12px) scale(1.03);
            border-color: #ffd700;
            box-shadow: 0 12px 25px rgba(255,215,0,0.4);
            background: linear-gradient(90deg, #7c22df, #3681ff);
        }

        .option-btn:hover::after {
            left: 150%;
        }

        .option-btn:active {
            transform: scale(0.95);
        }

        .option-correct {
            background: linear-gradient(90deg, #00b09b, #96c93d) !important;
            border-color: #fff !important;
            box-shadow: 0 0 30px #96c93d !important;
            pointer-events: none;
            transform: scale(1.05);
        }

        .option-wrong {
            background: linear-gradient(90deg, #ff416c, #ff4b2b) !important;
            border-color: #fff !important;
            box-shadow: 0 0 30px #ff4b2b !important;
            pointer-events: none;
            transform: scale(0.95);
        }

        /* Навігаційні кнопки */
        #controls {
            position: absolute;
            bottom: 25px;
            right: 40px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .nav-btn svg {
            width: 28px;
            height: 28px;
            fill: #fff;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: #ffd700;
            border-color: #fff;
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 0 20px #ffd700;
        }

        .nav-btn:hover svg {
            fill: #4a192c;
        }

        .nav-btn:active {
            transform: scale(0.9);
        }

        /* Частинки */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 20;
        }
    </style>
</head>
<body>

<div id="game-container">

        <defs>

            <rect x="-2" y="0" width="4" height="120" fill="#fff"/>

    <svg id="character-svg" class="anim-idle" viewBox="0 0 320 460">

            <ellipse cx="160" cy="210" rx="5" ry="7" fill="#ff0844"/>

            <ellipse cx="150" cy="220" rx="7" ry="5" fill="#ff0844"/>
            <ellipse cx="170" cy="220" rx="7" ry="5" fill="#ff0844"/>

    <div id="quiz-ui">

            <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>

</div>

<script>
    // --- 1. База даних ---
    const quizData = [
        {
            q: "Яка шкільна форма для дівчаток найвідоміша в Японії?",
            options: ["Сукня в горошок", "Матроска", "Червоний сарафан", "Костюм з краваткою-метеликом"],
            correct: 1
        },
        {
            q: "Як називається традиційна індійська прикраса — маленька кольорова крапка на лобі?",
            options: ["Бінді", "Тіара", "Мандала", "Сарі"],
            correct: 0
        },
        {
            q: "У якій країні дівчата на свята одягають гарне шовкове кімоно з широким поясом?",
            options: ["Китай", "Таїланд", "Японія", "В'єтнам"],
            correct: 2
        },
        {
            q: "Як називається тепле і м'яке взуття з овечої вовни, яке спочатку придумали в Австралії?",
            options: ["Уггі", "Валянки", "Мокасини", "Сабо"],
            correct: 0
        },
        {
            q: "У якій країні дівчата танцюють танець фламенко в гарних сукнях з пишними оборками?",
            options: ["Італія", "Франція", "Бразилія", "Іспанія"],
            correct: 3
        },
        {
            q: "З чого роблять традиційні черевички «кломпи», які раніше носили в Нідерландах?",
            options: ["Зі скла", "Зі щільної тканини", "З дерева", "З гуми"],
            correct: 2
        },
        {
            q: "У якій країні традиційним одягом вважається яскраве тепле пончо з вовни альпаки?",
            options: ["Мексика", "Перу", "Єгипет", "Канада"],
            correct: 1
        },
        {
            q: "Як називається м'який головний убір без козирка, який міцно асоціюється з Францією та художниками?",
            options: ["Циліндр", "Кепка", "Берет", "Панама"],
            correct: 2
        },
        {
            q: "У якій країні дівчата плетуть пишні вінки з польових квітів із різнокольоровими стрічками на національні свята?",
            options: ["Україна", "Англія", "Швеція", "Греція"],
            correct: 0
        },
        {
            q: "Який одяг спочатку був робочою формою для фермерів у США, а тепер його носять дівчата в усьому світі?",
            options: ["Спортивні костюми", "Джинси", "Вовняні светри", "Шорти"],
            correct: 1
        },
        {
            q: "Як називається традиційна корейська сукня із завищеною талією та дуже пишною спідницею?",
            options: ["Ханбок", "Кімоно", "Сарі", "Аозай"],
            correct: 0
        },
        {
            q: "У якій країні тканина в клітинку (тартан) означає, до якої сім'ї (клану) належить людина?",
            options: ["Швейцарія", "Ірландія", "Шотландія", "Фінляндія"],
            correct: 2
        },
        {
            q: "У якій країні з'явилася мода на дуже тонкі та красиво розписані паперові віяла?",
            options: ["Китай", "Індія", "Греція", "Італія"],
            correct: 0
        },
        {
            q: "Яку прикрасу з живих квітів дівчата на Гаваях одягають на шию гостям на знак привітання?",
            options: ["Намисто", "Леї", "Вінок", "Браслет"],
            correct: 1
        },
        {
            q: "У якій країні дуже популярно носити милі обідки з котячими вушками або бантиками навіть просто на прогулянку?",
            options: ["США", "Південна Корея", "Німеччина", "Австралія"],
            correct: 1
        }
    ];

    // --- 2. Стан гри ---
    let currentQuestionIndex = 0;
    let isAnimating = false;

    const questionBox = document.getElementById('question-box');
    const optionsBox = document.getElementById('options-box');
    const character = document.getElementById('character-svg');
    const charMouth = document.getElementById('char-mouth');
    const gameContainer = document.getElementById('game-container');

    // --- 3. Аудіо система ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
    }

    function playClick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playSuccess() {
        if (!audioCtx) return;
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            const startTime = audioCtx.currentTime + i * 0.08;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.2, startTime + 0.04);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + 0.2);
        });
    }

    function playFail() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    // --- 4. Ефекти частинок ---
    function spawnParticles(x, y, isSuccess) {
        const colors = isSuccess ? ['#ff0', '#0f0', '#0ff', '#f0f'] : ['#555', '#222', '#ff416c'];
        for (let i = 0; i < (isSuccess ? 40 : 15); i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 12 + 4;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.left = `${x}px`;
            p.style.top = `${y}px`;
            
            const angle = Math.random() * Math.PI * 2;
            const vel = Math.random() * 120 + 40;
            const tx = Math.cos(angle) * vel;
            const ty = Math.sin(angle) * vel;

            p.animate([
                { transform: `translate(0, 0) scale(1)`, opacity: 1 },
                { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
            ], {
                duration: Math.random() * 600 + 400,
                easing: 'cubic-bezier(0, .9, .57, 1)'
            });
            gameContainer.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }
    }

    // --- 5. Логіка гри ---
    function loadQuestion() {
        const currentData = quizData[currentQuestionIndex];
        
        questionBox.style.opacity = 0;
        optionsBox.style.opacity = 0;
        
        setTimeout(() => {
            questionBox.textContent = currentData.q;
            optionsBox.innerHTML = '';

            currentData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.textContent = opt;
                
                btn.addEventListener('click', (e) => {
                    if (isAnimating) return;
                    initAudio();
                    checkAnswer(index, btn, e);
                });
                
                optionsBox.appendChild(btn);
            });

            questionBox.style.transition = 'opacity 0.4s';
            optionsBox.style.transition = 'opacity 0.4s';
            questionBox.style.opacity = 1;
            optionsBox.style.opacity = 1;

            character.className = 'anim-idle';
            charMouth.className.baseVal = 'mouth-idle';
        }, 200);
    }

    function checkAnswer(selectedIndex, btnElement, event) {
        isAnimating = true;
        const currentData = quizData[currentQuestionIndex];
        const isCorrect = (selectedIndex === currentData.correct);

        const rect = gameContainer.getBoundingClientRect();
        const clickX = event.clientX - rect.left;
        const clickY = event.clientY - rect.top;

        if (isCorrect) {
            btnElement.classList.add('option-correct');
            playSuccess();
            spawnParticles(clickX, clickY, true);
            
            character.className = 'anim-success';
            charMouth.className.baseVal = 'mouth-smile';
        } else {
            btnElement.classList.add('option-wrong');
            optionsBox.children[currentData.correct].classList.add('option-correct');
            playFail();
            spawnParticles(clickX, clickY, false);
            
            character.className = 'anim-fail';
            charMouth.className.baseVal = 'mouth-sad';
        }

        setTimeout(() => {
            isAnimating = false;
            nextQuestion();
        }, 1600);
    }

    function nextQuestion() {
        currentQuestionIndex = (currentQuestionIndex + 1) % quizData.length;
        loadQuestion();
    }

    function prevQuestion() {
        currentQuestionIndex = (currentQuestionIndex - 1 + quizData.length) % quizData.length;
        loadQuestion();
    }

    document.getElementById('btn-next').addEventListener('click', () => {
        if (isAnimating) return;
        initAudio();
        playClick();
        nextQuestion();
    });

    document.getElementById('btn-back').addEventListener('click', () => {
        if (isAnimating) return;
        initAudio();
        playClick();
        prevQuestion();
    });

    // Старт
    window.onload = loadQuestion;
</script>
</body>
