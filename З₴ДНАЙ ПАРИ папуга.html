<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КОД: Справжні Джунглі Читання</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #061e0b;
            font-family: 'Nunito', sans-serif;
            touch-action: none;
            display: flex; flex-direction: column;
        }

        /* --- БАГАТОШАРОВИЙ SVG ФОН --- */
        #bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
        }
        
        .leaf-sway { transform-origin: center bottom; animation: sway 5s ease-in-out infinite alternate; }
        .vine-sway { transform-origin: top center; animation: swayVine 6s ease-in-out infinite alternate; }
        .sun-spin { transform-origin: center center; animation: spin 40s linear infinite; }
        .glow-pulse { animation: pulse 4s ease-in-out infinite alternate; }

        @keyframes sway { 0% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } }
        @keyframes swayVine { 0% { transform: rotate(-2deg); } 100% { transform: rotate(2deg); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 0.8; } }

        /* --- ІГРОВИЙ МАКЕТ --- */
        #main-layout {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: row; align-items: stretch;
            padding: 2vh 2vw; gap: 2vw;
        }

        /* Зона персонажа (завжди видима) */
        #character-zone {
            flex: 0 0 300px; /* Фіксована ширина на ПК */
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            position: relative;
        }

        /* SVG Папуги */
        #parrot {
            width: 100%; max-height: 400px; overflow: visible;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6));
            transition: all 0.3s ease;
        }

        /* Анімації Папуги */
        .parrot-idle { transform-origin: center bottom; animation: breathe 3s ease-in-out infinite; }
        .wing-l, .wing-r, .parrot-head, .parrot-eye { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @keyframes breathe { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.04); } }

        /* Емоції */
        .state-happy { animation: jump 0.4s ease-out infinite alternate; }
        .state-happy .wing-l { transform: rotate(40deg) translateY(-20px) !important; animation: flapL 0.2s linear infinite alternate; }
        .state-happy .wing-r { transform: rotate(-40deg) translateY(-20px) !important; animation: flapR 0.2s linear infinite alternate; }
        .state-happy .parrot-eye { transform: scaleY(0.2); }
        
        .state-sad { filter: grayscale(0.8) brightness(0.7) !important; transform: scaleY(0.9) translateY(30px); animation: none; }
        .state-sad .parrot-head { transform: translateY(20px) rotate(-15deg); }
        .state-sad .wing-l { transform: rotate(-20deg) translateY(10px); }
        .state-sad .wing-r { transform: rotate(20deg) translateY(10px); }
        .state-sad .parrot-eye { transform: translateY(10px) scale(1.3); }

        @keyframes jump { to { transform: translateY(-30px); } }
        @keyframes flapL { to { transform: rotate(70deg) translateY(-30px); } }
        @keyframes flapR { to { transform: rotate(-70deg) translateY(-30px); } }

        /* Зона карток зі словами */
        #game-board {
            flex: 1; display: flex; justify-content: space-around; align-items: center;
            position: relative; padding: 20px;
        }

        .word-column {
            display: flex; flex-direction: column; justify-content: space-evenly;
            height: 100%; width: 40%; max-width: 400px; z-index: 15; gap: 20px;
        }

        /* Картки */
        .card {
            background: linear-gradient(145deg, #795548, #4e342e);
            border: 5px solid #3e2723; border-radius: 25px;
            box-shadow: inset 0 4px 6px rgba(255,255,255,0.1), 0 10px 20px rgba(0,0,0,0.5);
            color: #fff9c4; font-size: clamp(2.2rem, 5vw, 3.8rem);
            text-align: center; padding: 20px 10px; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center; min-height: 120px;
            text-shadow: 2px 2px 0 #21100b;
        }
        
        .card::before { /* Текстура дерева */
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 15px);
            pointer-events: none;
        }

        .card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 15px 25px rgba(0,0,0,0.6); }
        .card:active { transform: scale(0.95); }
        
        .card.selected {
            background: linear-gradient(145deg, #ffca28, #f57f17);
            border-color: #e65100; color: #3e2723; text-shadow: none;
            box-shadow: 0 0 30px #ffca28, inset 0 2px 10px rgba(255,255,255,0.5);
            transform: scale(1.05);
        }
        .card.matched { background: #33691e; border-color: #1b5e20; opacity: 0.5; pointer-events: none; transform: scale(0.95); box-shadow: none; }
        .card.error { animation: shake 0.5s; background: linear-gradient(145deg, #e53935, #b71c1c); border-color: #4a148c; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px) rotate(-2deg); } 75% { transform: translateX(15px) rotate(2deg); } }

        /* Лінії з'єднання */
        #svg-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .match-line {
            stroke: #64dd17; stroke-width: 14; stroke-linecap: round;
            stroke-dasharray: 20 15; animation: dashMove 0.8s linear infinite;
            filter: drop-shadow(0 0 12px #64dd17);
        }
        @keyframes dashMove { to { stroke-dashoffset: -35; } }

        /* Навігація */
        .nav-container {
            position: absolute; bottom: 3vh; right: 5vw;
            display: flex; gap: 20px; z-index: 30;
        }
        .nav-btn {
            width: 70px; height: 70px; background: radial-gradient(circle, #ffb300, #f57f17);
            border: 4px solid #bf360c; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 8px 0 #870000, 0 10px 15px rgba(0,0,0,0.6);
            transition: transform 0.1s;
        }
        .nav-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #870000, 0 5px 10px rgba(0,0,0,0.5); }
        .nav-btn svg { width: 40px; height: 40px; fill: #3e2723; }

        /* Частинки */
        .particle {
            position: absolute; pointer-events: none; border-radius: 50%; z-index: 50;
            animation: pop 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes pop { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }

        /* Адаптація для телефонів (вертикальна орієнтація) */
        @media (max-width: 800px) {
            #main-layout { flex-direction: column; }
            #character-zone { flex: 0 0 25vh; /* Папуга зверху на телефоні */ }
            #parrot { max-height: 25vh; }
            #game-board { flex-direction: row; padding: 10px; }
            .card { font-size: clamp(1.5rem, 4vw, 2.5rem); min-height: 80px; padding: 10px; }
            .nav-container { right: auto; left: 50%; transform: translateX(-50%); bottom: 1vh; }
        }
    </style>
</head>
<body>

    <svg id="bg-layer" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
        <defs>
            <radialGradient id="sun-grad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff9c4" stop-opacity="1"/>
                <stop offset="40%" stop-color="#ffeb3b" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#f57f17" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#81c784"/>
                <stop offset="100%" stop-color="#1b5e20"/>
            </linearGradient>
            <clipPath id="monstera-clip">
                <path d="M100,0 C180,50 200,150 150,250 C100,350 0,300 -50,200 C-100,100 -50,-50 100,0 Z"/>
            </clipPath>
        </defs>

        <rect width="1920" height="1080" fill="url(#sky)"/>

        <g transform="translate(960, 200)">
            <circle cx="0" cy="0" r="300" fill="url(#sun-grad)" class="glow-pulse"/>
            <g class="sun-spin">
                <polygon points="-500,-20 500,-20 500,20 -500,20" fill="#fff" opacity="0.05"/>
                <polygon points="-20,-500 20,-500 20,500 -20,500" fill="#fff" opacity="0.05"/>
                <polygon points="-400,-400 400,400" stroke="#fff" stroke-width="40" opacity="0.05"/>
                <polygon points="-400,400 400,-400" stroke="#fff" stroke-width="40" opacity="0.05"/>
            </g>
        </g>

        <path d="M200,1080 L250,400 L300,1080 Z" fill="#144517" opacity="0.7"/>
        <path d="M1500,1080 L1550,300 L1600,1080 Z" fill="#144517" opacity="0.7"/>
        
        <g class="vine-sway" fill="none" stroke="#2e7d32" stroke-width="8">
            <path d="M 400,-50 Q 450,300 380,800"/>
            <path d="M 1400,-50 Q 1350,400 1450,900" stroke-width="12"/>
            <path d="M 800,-50 Q 850,200 820,500" stroke-width="5"/>
        </g>

        <g class="leaf-sway" transform="translate(100, 1080)">
            <path d="M0,0 C-100,-200 -200,-400 0,-600 C200,-400 100,-200 0,0" fill="#0c3b14"/>
            <path d="M0,0 C-50,-200 -100,-400 0,-550 C100,-400 50,-200 0,0" fill="#1b5e20"/>
            <circle cx="-50" cy="-300" r="30" fill="url(#sky)"/>
            <circle cx="50" cy="-400" r="40" fill="url(#sky)"/>
        </g>
        
        <g class="leaf-sway" transform="translate(1800, 1080)">
            <path d="M0,0 Q-150,-300 -300,-700 Q-100,-500 0,0" fill="#2e7d32"/>
            <path d="M0,0 Q-50,-300 -200,-650 Q-50,-400 0,0" fill="#388e3c"/>
            <path d="M0,0 Q-250,-200 -400,-500 Q-150,-300 0,0" fill="#1b5e20"/>
        </g>

        <g class="leaf-sway" transform="translate(1600, 900)">
            <path d="M0,0 Q-50,-100 0,-200 Q50,-100 0,0" fill="#d32f2f"/>
            <circle cx="0" cy="-180" r="15" fill="#ffeb3b"/>
        </g>
        <g class="leaf-sway" transform="translate(300, 850)">
            <path d="M0,0 Q30,-80 80,-120 Q30,-40 0,0" fill="#ab47bc"/>
            <circle cx="60" cy="-100" r="10" fill="#ffeb3b"/>
        </g>
    </svg>

    <div id="main-layout">
        
        <div id="character-zone">
            <svg id="parrot" viewBox="0 0 400 500">
                <path d="M-50,400 Q200,350 450,400 L450,450 Q200,400 -50,450 Z" fill="#5d4037" stroke="#3e2723" stroke-width="6"/>
                
                <g class="parrot-idle">
                    <path d="M200,300 L150,480 L200,450 L250,480 Z" fill="#ffc107" stroke="#ff8f00" stroke-width="5"/>
                    
                    <ellipse cx="200" cy="220" rx="80" ry="120" fill="#f44336" stroke="#c62828" stroke-width="6"/>
                    <ellipse cx="200" cy="250" rx="50" ry="80" fill="#ffca28"/> <g class="wing-l" transform="translate(120, 180)">
                        <path d="M0,0 C-80,20 -80,150 0,160 Z" fill="#29b6f6" stroke="#0277bd" stroke-width="5"/>
                    </g>
                    <g class="wing-r" transform="translate(280, 180)">
                        <path d="M0,0 C80,20 80,150 0,160 Z" fill="#29b6f6" stroke="#0277bd" stroke-width="5"/>
                    </g>
                    
                    <circle cx="160" cy="360" r="15" fill="#ff8f00" stroke="#bf360c" stroke-width="4"/>
                    <circle cx="240" cy="360" r="15" fill="#ff8f00" stroke="#bf360c" stroke-width="4"/>

                    <g class="parrot-head" transform="translate(200, 90)">
                        <circle cx="0" cy="0" r="80" fill="#f44336" stroke="#c62828" stroke-width="6"/>
                        
                        <path d="M0,-80 Q30,-140 70,-110 Q40,-100 20,-75" fill="#29b6f6" stroke="#0277bd" stroke-width="4"/>
                        <path d="M-20,-75 Q-10,-130 30,-100 Q10,-90 -10,-70" fill="#ffca28" stroke="#ff8f00" stroke-width="4"/>

                        <circle cx="-35" cy="-15" r="22" fill="#fff" stroke="#c62828" stroke-width="3"/>
                        <circle class="parrot-eye" cx="-35" cy="-15" r="10" fill="#000"/>
                        <circle cx="-38" cy="-20" r="4" fill="#fff"/> <circle cx="35" cy="-15" r="22" fill="#fff" stroke="#c62828" stroke-width="3"/>
                        <circle class="parrot-eye" cx="35" cy="-15" r="10" fill="#000"/>
                        <circle cx="32" cy="-20" r="4" fill="#fff"/> <path d="M-20,25 L20,25 L0,55 Z" fill="#ff8f00"/>
                        <path d="M-30,25 L30,25 Q30,-15 0,-15 Q-30,-15 -30,25 Z" fill="#ffca28" stroke="#ff8f00" stroke-width="4"/>
                    </g>
                </g>
            </svg>
        </div>

        <div id="game-board">
            <svg id="svg-lines"></svg>
            <div class="word-column" id="col-left"></div>
            <div class="word-column" id="col-right"></div>
        </div>

    </div>

    <div class="nav-container">
        <div class="nav-btn" id="btn-prev">
            <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
        </div>
        <div class="nav-btn" id="btn-next">
            <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </div>
    </div>

<script>
    /* --- АУДІО (Web Audio API) --- */
    let actx = null; 

    function initAudio() {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        if (actx.state === 'suspended') actx.resume();
    }

    function playTone(freq, type, dur, vol, delay = 0) {
        if (!actx) return;
        setTimeout(() => {
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = type; 
            osc.frequency.setValueAtTime(freq, actx.currentTime);
            gain.gain.setValueAtTime(vol, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
            osc.connect(gain); gain.connect(actx.destination);
            osc.start(); osc.stop(actx.currentTime + dur);
        }, delay);
    }

    function sndClick() { playTone(900, 'sine', 0.1, 0.3); } 
    function sndWin() { 
        playTone(523.25, 'sine', 0.15, 0.3); 
        playTone(659.25, 'sine', 0.15, 0.3, 100); 
        playTone(783.99, 'sine', 0.15, 0.3, 200);
        playTone(1046.50, 'sine', 0.3, 0.4, 300);
    }
    function sndErr() { 
        playTone(200, 'sawtooth', 0.2, 0.4); 
        playTone(150, 'sawtooth', 0.3, 0.5, 150); 
    }
    function sndLevelUp() {
        for(let i=0; i<12; i++) playTone(400 + Math.random()*800, 'triangle', 0.4, 0.2, i*100);
    }

    /* --- 10 РІВНІВ ГРИ --- */
    const gameData = [
        [{l: "кіт", r: "спить"}, {l: "тато", r: "працює"}],
        [{l: "мама", r: "готує"}, {l: "собака", r: "біжить"}],
        [{l: "дівчинка", r: "співає"}, {l: "хлопчик", r: "грає"}],
        [{l: "риба", r: "пливе"}, {l: "птах", r: "летить"}],
        [{l: "сонце", r: "світить"}, {l: "дощ", r: "іде"}],
        [{l: "бабуся", r: "в'яже"}, {l: "дідусь", r: "читає"}],
        [{l: "авто", r: "їде"}, {l: "поїзд", r: "гуде"}],
        [{l: "вітер", r: "дує"}, {l: "хмара", r: "повзе"}],
        [{l: "квітка", r: "пахне"}, {l: "бджола", r: "дзижчить"}],
        [{l: "жаба", r: "стрибає"}, {l: "миша", r: "біжить"}]
    ];

    let currentLevel = 0; 
    let selLeft = null; 
    let selRight = null; 
    let links = []; 

    const colL = document.getElementById('col-left');
    const colR = document.getElementById('col-right');
    const svgLines = document.getElementById('svg-lines');
    const parrot = document.getElementById('parrot');

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function renderLevel() {
        colL.innerHTML = ''; colR.innerHTML = ''; svgLines.innerHTML = '';
        links = []; selLeft = null; selRight = null;
        parrot.className = ''; // Скинути емоцію

        if (currentLevel >= gameData.length) {
            sndLevelUp();
            parrot.className = 'state-happy';
            for(let i=0; i<8; i++) setTimeout(() => spawnParticles(window.innerWidth/2, window.innerHeight/2, 40, '#ffca28'), i*300);
            return;
        }

        const pairs = gameData[currentLevel];
        let arrL = shuffle(pairs.map(p => ({w: p.l, m: p.r}))); 
        let arrR = shuffle(pairs.map(p => p.r));

        arrL.forEach(item => colL.appendChild(makeCard(item.w, 'left', item.m)));
        arrR.forEach(word => colR.appendChild(makeCard(word, 'right')));
    }

    function makeCard(text, side, match = null) {
        const div = document.createElement('div');
        div.className = 'card'; div.innerText = text;
        if (side === 'left') div.dataset.match = match; else div.dataset.word = text;
        div.onclick = () => selectCard(div, side);
        return div;
    }

    function selectCard(el, side) {
        initAudio(); sndClick();
        parrot.className = ''; 

        if (side === 'left') {
            if (selLeft) selLeft.classList.remove('selected');
            selLeft = el; selLeft.classList.add('selected');
        } else {
            if (selRight) selRight.classList.remove('selected');
            selRight = el; selRight.classList.add('selected');
        }

        if (selLeft && selRight) setTimeout(checkMatch, 150);
    }

    function checkMatch() {
        if (selLeft.dataset.match === selRight.dataset.word) {
            sndWin();
            parrot.className = 'state-happy';
            
            selLeft.classList.remove('selected'); selRight.classList.remove('selected');
            selLeft.classList.add('matched'); selRight.classList.add('matched');
            
            drawLine(selLeft, selRight);
            links.push({l: selLeft, r: selRight});
            
            spawnParticles(selRight.getBoundingClientRect().left, selRight.getBoundingClientRect().top + 50, 20, '#76ff03');

            selLeft = null; selRight = null;

            if (links.length === gameData[currentLevel].length) setTimeout(() => { currentLevel++; renderLevel(); }, 1500);
        } else {
            sndErr();
            parrot.className = 'state-sad';
            selLeft.classList.add('error'); selRight.classList.add('error');
            
            setTimeout(() => {
                selLeft.classList.remove('error', 'selected'); selRight.classList.remove('error', 'selected');
                selLeft = null; selRight = null;
                if(parrot.className === 'state-sad') parrot.className = ''; 
            }, 600);
        }
    }

    function drawLine(el1, el2) {
        const board = document.getElementById('game-board').getBoundingClientRect();
        const r1 = el1.getBoundingClientRect();
        const r2 = el2.getBoundingClientRect();

        const x1 = r1.right - board.left - 10; 
        const y1 = r1.top + r1.height/2 - board.top;
        const x2 = r2.left - board.left + 10;
        const y2 = r2.top + r2.height/2 - board.top;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('class', 'match-line');
        svgLines.appendChild(line);
    }

    window.addEventListener('resize', () => {
        svgLines.innerHTML = ''; links.forEach(c => drawLine(c.l, c.r));
    });

    function spawnParticles(x, y, count, color) {
        for(let i=0; i<count; i++) {
            const p = document.createElement('div');
            p.className = 'particle'; p.style.left = x + 'px'; p.style.top = y + 'px';
            p.style.width = p.style.height = (Math.random()*15 + 8) + 'px';
            p.style.background = color; p.style.boxShadow = `0 0 10px ${color}`;
            
            const angle = Math.random() * Math.PI * 2; const dist = Math.random() * 250 + 100; 
            p.style.setProperty('--dx', Math.cos(angle)*dist + 'px'); p.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
            
            document.body.appendChild(p); setTimeout(() => p.remove(), 800);
        }
    }

    document.getElementById('btn-prev').onclick = () => { initAudio(); if(currentLevel > 0) { currentLevel--; renderLevel(); } };
    document.getElementById('btn-next').onclick = () => { initAudio(); currentLevel++; renderLevel(); };

    renderLevel();

</script>
</body>
</html>
