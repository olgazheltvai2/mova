<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гра</title>
    <style>
        /* Скидання стилів та загальні налаштування */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* Темний, глибокий фон містичного лісу */
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #091a28, #113a2e, #0a1f18);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ігровий контейнер без білих елементів */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 1100px;
            height: 100%;
            max-height: 750px;
            box-shadow: 0 0 60px rgba(0, 255, 150, 0.2);
            border-radius: 40px;
            overflow: hidden;
            background: radial-gradient(circle at center, #1b4b3b 0%, #0d261e 100%);
            border: 2px solid #287a5c;
        }

        /* Векторний фон лісу */
        #background-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Анімація світлячків на фоні */
        @keyframes float-firefly {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
            33% { transform: translate(20px, -30px) scale(1.2); opacity: 1; }
            66% { transform: translate(-15px, 20px) scale(0.9); opacity: 0.5; }
        }

        .firefly {
            animation: float-firefly 6s infinite ease-in-out;
            transform-origin: center;
        }
        .ff-1 { animation-delay: 0s; animation-duration: 5s; }
        .ff-2 { animation-delay: -2s; animation-duration: 7s; }
        .ff-3 { animation-delay: -4s; animation-duration: 6s; }

        /* Контейнер інтерфейсу */
        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 20px;
        }

        /* Зона слів (стилізовано під стародавні камені) */
        #words-area {
            display: flex;
            gap: 50px;
            margin-top: 10px;
        }

        .word-stone {
            background: linear-gradient(145deg, #2a3b32, #1d2a23);
            border: 3px solid #3c5e4a;
            border-radius: 20px;
            padding: 20px 40px;
            font-size: 3.5rem;
            font-weight: 900;
            color: #7affc6;
            box-shadow: 0 15px 25px rgba(0,0,0,0.6), inset 0 2px 10px rgba(122, 255, 198, 0.2);
            display: flex;
            gap: 15px;
            align-items: center;
            text-shadow: 0 0 10px rgba(122, 255, 198, 0.5);
            text-transform: uppercase;
        }

        .gap-socket {
            width: 60px;
            height: 70px;
            background: linear-gradient(to bottom, #0a1410, #13271f);
            border-radius: 10px;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.8), 0 2px 0 #3c5e4a;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 3.5rem;
            color: transparent;
        }

        /* Варіанти відповідей (магічні сфери) */
        #options-area {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
        }

        .option-orb {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 30% 30%, #5bffb9, #00b377, #004d33);
            border: none;
            border-radius: 50%;
            font-size: 3rem;
            font-weight: bold;
            color: #052618;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0, 77, 51, 0.6), inset -5px -5px 15px rgba(0,0,0,0.4), inset 5px 5px 15px rgba(255,255,255,0.4);
            text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase;
        }

        .option-orb:active {
            transform: translateY(10px) scale(0.95);
            box-shadow: 0 5px 15px rgba(0, 77, 51, 0.4), inset -2px -2px 10px rgba(0,0,0,0.4), inset 2px 2px 10px rgba(255,255,255,0.4);
        }

        /* Анімації персонажа */
        @keyframes idle-breathe {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.02, 0.98) translateY(8px); }
        }

        @keyframes happy-bounce {
            0% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-70px) scale(0.9, 1.1) rotate(10deg); }
            50% { transform: translateY(0) scale(1.1, 0.9); }
            70% { transform: translateY(-30px) scale(0.95, 1.05) rotate(-5deg); }
            100% { transform: translateY(0) scale(1); }
        }

        @keyframes sad-shake {
            0%, 100% { transform: translateX(0); filter: hue-rotate(0deg); }
            25% { transform: translateX(-20px) rotate(-10deg); filter: hue-rotate(-30deg); }
            75% { transform: translateX(20px) rotate(10deg); filter: hue-rotate(-30deg); }
        }

        /* Персонаж - Дослідник */
        #character {
            width: 250px;
            height: 250px;
            animation: idle-breathe 4s infinite ease-in-out;
            filter: drop-shadow(0 20px 15px rgba(0,0,0,0.5));
            transform-origin: bottom center;
        }

        .anim-happy { animation: happy-bounce 0.8s cubic-bezier(0.28, 0.84, 0.42, 1) !important; }
        .anim-sad { animation: sad-shake 0.5s ease-in-out !important; }

        /* Навігація */
        #nav-area {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 20;
        }

        .nav-btn {
            background: linear-gradient(135deg, #1d4032, #0d2119);
            border: 2px solid #287a5c;
            width: 60px;
            height: 60px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 10px 0 #08140f, 0 15px 20px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
        }

        .nav-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #08140f, 0 5px 10px rgba(0,0,0,0.5);
        }

        .nav-icon {
            fill: #7affc6;
            width: 35px;
            height: 35px;
            filter: drop-shadow(0 0 5px rgba(122, 255, 198, 0.6));
        }
    </style>
</head>
<body>

<div id="game-container">
    <svg id="background-svg" viewBox="0 0 1100 750" preserveAspectRatio="xMidYMid slice">
        <defs>
            <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#40ffaa" stop-opacity="0.3" />
                <stop offset="100%" stop-color="#0a1f18" stop-opacity="0" />
            </radialGradient>
            <linearGradient id="leafGrad1" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#144d36" />
                <stop offset="100%" stop-color="#092117" />
            </linearGradient>
            <linearGradient id="leafGrad2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1c6b4b" />
                <stop offset="100%" stop-color="#0b2e20" />
            </linearGradient>
        </defs>

        <circle cx="550" cy="375" r="500" fill="url(#glow)" />

        <path d="M100,-50 Q120,200 80,400 T150,800" fill="none" stroke="#0a1c14" stroke-width="30" stroke-linecap="round"/>
        <path d="M900,-50 Q850,300 950,500 T900,800" fill="none" stroke="#0d261b" stroke-width="40" stroke-linecap="round"/>
        <path d="M300,-50 Q350,150 250,350" fill="none" stroke="#123626" stroke-width="15" stroke-linecap="round"/>

        <path d="M-50,600 Q150,400 300,550 Q150,700 -50,600 Z" fill="url(#leafGrad1)" opacity="0.8"/>
        <path d="M1150,500 Q900,350 750,550 Q950,750 1150,500 Z" fill="url(#leafGrad1)" opacity="0.8"/>

        <g fill="#a3ffce">
            <circle cx="200" cy="200" r="4" class="firefly ff-1" filter="drop-shadow(0 0 8px #7affc6)"/>
            <circle cx="850" cy="150" r="5" class="firefly ff-2" filter="drop-shadow(0 0 10px #7affc6)"/>
            <circle cx="700" cy="600" r="3" class="firefly ff-3" filter="drop-shadow(0 0 6px #7affc6)"/>
            <circle cx="350" cy="550" r="6" class="firefly ff-1" filter="drop-shadow(0 0 12px #7affc6)"/>
            <circle cx="500" cy="100" r="4" class="firefly ff-2" filter="drop-shadow(0 0 8px #7affc6)"/>
        </g>

        <path d="M-20,750 Q100,500 400,750 Z" fill="url(#leafGrad2)"/>
        <path d="M1120,750 Q900,450 600,750 Z" fill="url(#leafGrad2)"/>
        <path d="M-50,-50 Q200,50 150,-50 Z" fill="url(#leafGrad2)"/>
        <path d="M1150,-50 Q900,100 950,-50 Z" fill="url(#leafGrad2)"/>
    </svg>

    <div id="ui-layer">
        
        <div id="words-area">
            </div>

        <svg id="character" viewBox="0 0 250 250">
            <defs>
                <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ffdfc4" />
                    <stop offset="100%" stop-color="#e0ac82" />
                </radialGradient>
                <linearGradient id="hatGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#d4a373" />
                    <stop offset="100%" stop-color="#a67c52" />
                </linearGradient>
                <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fffb8f" stop-opacity="0.9"/>
                    <stop offset="50%" stop-color="#ffa940" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#ff7a45" stop-opacity="0"/>
                </radialGradient>
            </defs>

            <ellipse cx="125" cy="235" rx="70" ry="12" fill="rgba(0,0,0,0.6)" />
            
            <path d="M85,150 Q125,130 165,150 L180,230 L70,230 Z" fill="#4a5d23" />
            <path d="M125,150 L125,230" stroke="#2c3815" stroke-width="4" />
            <circle cx="125" cy="170" r="3" fill="#ffd700" />
            <circle cx="125" cy="200" r="3" fill="#ffd700" />

            <path d="M160,160 Q190,180 180,200" fill="none" stroke="#e0ac82" stroke-width="12" stroke-linecap="round" />
            <circle cx="185" cy="215" r="35" fill="url(#lanternGlow)" />
            <rect x="175" y="200" width="20" height="30" rx="3" fill="#5c3a21" />
            <rect x="178" y="205" width="14" height="20" fill="#fffb8f" />
            <path d="M172,198 L198,198 L190,190 L180,190 Z" fill="#3a2313" />

            <path d="M90,160 Q60,180 70,210" fill="none" stroke="#e0ac82" stroke-width="12" stroke-linecap="round" />

            <circle cx="125" cy="110" r="45" fill="url(#faceGrad)" />
            
            <ellipse cx="105" cy="105" rx="8" ry="12" fill="#2d1b0e" />
            <ellipse cx="145" cy="105" rx="8" ry="12" fill="#2d1b0e" />
            <circle cx="103" cy="100" r="3" fill="#fff" />
            <circle cx="143" cy="100" r="3" fill="#fff" />
            
            <path d="M120,115 Q125,122 130,115" fill="none" stroke="#c48a60" stroke-width="3" stroke-linecap="round" />
            
            <path id="mouth" d="M115,130 Q125,140 135,130" fill="none" stroke="#8a4735" stroke-width="4" stroke-linecap="round" />

            <ellipse cx="125" cy="70" rx="65" ry="15" fill="url(#hatGrad)" />
            <path d="M85,68 Q125,20 165,68 Z" fill="url(#hatGrad)" />
            <path d="M85,65 Q125,75 165,65" fill="none" stroke="#5c3a21" stroke-width="6" />
        </svg>

        <div id="options-area">
            </div>

    </div>

    <div id="nav-area">
        <button class="nav-btn" id="btn-prev">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z" /></svg>
        </button>
        <button class="nav-btn" id="btn-next">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z" /></svg>
        </button>
    </div>
</div>

<script>
    // 30 пар слів (3 літери), де пропущена літера є ОДНАКОВОЮ ПРИГОЛОСНОЮ
    // Пропускаємо першу літеру для більшої візуальної цілісності
    const levels = [
        { w1: ['_', 'ак'], w2: ['_', 'ир'], ans: 'м', opts: ['м', 'л', 'с'] }, // мак, мир
        { w1: ['_', 'он'], w2: ['_', 'ік'], ans: 'с', opts: ['с', 'д', 'р'] }, // сон, сік
        { w1: ['_', 'ім'], w2: ['_', 'ар'], ans: 'д', opts: ['д', 'б', 'п'] }, // дім, дар
        { w1: ['_', 'ік'], w2: ['_', 'ак'], ans: 'р', opts: ['р', 'л', 'к'] }, // рік, рак
        { w1: ['_', 'ік'], w2: ['_', 'ас'], ans: 'б', opts: ['б', 'т', 'з'] }, // бік, бас
        { w1: ['_', 'іч'], w2: ['_', 'ар'], ans: 'п', opts: ['п', 'ш', 'ч'] }, // піч, пар
        { w1: ['_', 'іс'], w2: ['_', 'ак'], ans: 'л', opts: ['л', 'м', 'г'] }, // ліс, лак
        { w1: ['_', 'іт'], w2: ['_', 'ум'], ans: 'к', opts: ['к', 'в', 'н'] }, // кіт, кум
        { w1: ['_', 'ік'], w2: ['_', 'он'], ans: 'т', opts: ['т', 'с', 'д'] }, // тік, тон
        { w1: ['_', 'уб'], w2: ['_', 'ал'], ans: 'з', opts: ['з', 'р', 'б'] }, // зуб, зал
        { w1: ['_', 'ум'], w2: ['_', 'ок'], ans: 'ш', opts: ['ш', 'п', 'л'] }, // шум, шок
        { w1: ['_', 'ас'], w2: ['_', 'ай'], ans: 'ч', opts: ['ч', 'к', 'т'] }, // час, чай
        { w1: ['_', 'аз'], w2: ['_', 'ул'], ans: 'г', opts: ['г', 'з', 'ш'] }, // газ, гул
        { w1: ['_', 'із'], w2: ['_', 'ал'], ans: 'в', opts: ['в', 'м', 'с'] }, // віз, вал
        { w1: ['_', 'іч'], w2: ['_', 'іс'], ans: 'н', opts: ['н', 'д', 'р'] }, // ніч, ніс
        { w1: ['_', 'іф'], w2: ['_', 'ур'], ans: 'м', opts: ['м', 'б', 'п'] }, // міф, мур
        { w1: ['_', 'ад'], w2: ['_', 'ум'], ans: 'с', opts: ['с', 'л', 'к'] }, // сад, сум
        { w1: ['_', 'ух'], w2: ['_', 'им'], ans: 'д', opts: ['д', 'т', 'з'] }, // дух, дим
        { w1: ['_', 'ух'], w2: ['_', 'іч'], ans: 'р', opts: ['р', 'ш', 'ч'] }, // рух, річ
        { w1: ['_', 'ук'], w2: ['_', 'ік'], ans: 'б', opts: ['б', 'в', 'н'] }, // бук, бік
        { w1: ['_', 'іл'], w2: ['_', 'ух'], ans: 'п', opts: ['п', 'м', 'с'] }, // піл, пух
        { w1: ['_', 'ід'], w2: ['_', 'ук'], ans: 'л', opts: ['л', 'д', 'р'] }, // лід, лук
        { w1: ['_', 'уб'], w2: ['_', 'ут'], ans: 'к', opts: ['к', 'б', 'п'] }, // куб, кут
        { w1: ['_', 'ип'], w2: ['_', 'ік'], ans: 'т', opts: ['т', 'л', 'к'] }, // тип, тік
        { w1: ['_', 'ір'], w2: ['_', 'уб'], ans: 'з', opts: ['з', 'т', 'д'] }, // зір, зуб
        { w1: ['_', 'ов'], w2: ['_', 'ар'], ans: 'ш', opts: ['ш', 'с', 'з'] }, // шов, шар
        { w1: ['_', 'ин'], w2: ['_', 'іп'], ans: 'ч', opts: ['ч', 'ш', 'п'] }, // чин, чіп
        { w1: ['_', 'ук'], w2: ['_', 'ул'], ans: 'г', opts: ['г', 'в', 'н'] }, // гук, гул
        { w1: ['_', 'ир'], w2: ['_', 'ід'], ans: 'в', opts: ['в', 'м', 'с'] }, // вир, від
        { w1: ['_', 'іж'], w2: ['_', 'іс'], ans: 'н', opts: ['н', 'д', 'р'] }  // ніж, ніс
    ];

    let currentLevel = 0;
    const wordsArea = document.getElementById('words-area');
    const optionsArea = document.getElementById('options-area');
    const character = document.getElementById('character');
    const mouth = document.getElementById('mouth');

    // Аудіо контекст для синтезу звуків
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Генерація звуку
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const t = audioCtx.currentTime;

        if (type === 'click') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, t);
            osc.frequency.exponentialRampToValueAtTime(800, t + 0.1);
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.1);
        } else if (type === 'success') {
            const freqs = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6 (мажорне арпеджіо)
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = f;
                gain.gain.setValueAtTime(0, t + i * 0.1);
                gain.gain.linearRampToValueAtTime(0.15, t + i * 0.1 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.1 + 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(t + i * 0.1);
                osc.stop(t + i * 0.1 + 0.3);
            });
        } else if (type === 'error') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, t);
            osc.frequency.linearRampToValueAtTime(100, t + 0.3);
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.3);
        }
    }

    // Перемішування варіантів
    function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
    }

    // Завантаження рівня
    function loadLevel(index) {
        if (index < 0) index = 0;
        if (index >= levels.length) index = levels.length - 1;
        currentLevel = index;

        const data = levels[currentLevel];

        // Рендер слів з пропуском на початку
        wordsArea.innerHTML = `
            <div class="word-stone"><span class="gap-socket" id="gap1"></span>${data.w1[1]}</div>
            <div class="word-stone"><span class="gap-socket" id="gap2"></span>${data.w2[1]}</div>
        `;

        // Рендер кнопок
        optionsArea.innerHTML = '';
        let opts = shuffle([...data.opts]);
        opts.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'option-orb';
            btn.textContent = letter;
            btn.onclick = () => checkAnswer(letter, data.ans);
            optionsArea.appendChild(btn);
        });

        // Скидання емоції
        mouth.setAttribute('d', 'M115,130 Q125,140 135,130');
    }

    // Перевірка відповіді
    function checkAnswer(selected, correct) {
        const gap1 = document.getElementById('gap1');
        const gap2 = document.getElementById('gap2');

        if (selected === correct) {
            playSound('success');
            
            // Заповнення каменів
            gap1.textContent = correct;
            gap2.textContent = correct;
            gap1.style.color = '#fff';
            gap2.style.color = '#fff';
            gap1.style.background = 'linear-gradient(to bottom, #00b377, #004d33)';
            gap2.style.background = 'linear-gradient(to bottom, #00b377, #004d33)';
            gap1.style.boxShadow = '0 0 20px #5bffb9';
            gap2.style.boxShadow = '0 0 20px #5bffb9';

            // Емоція та анімація (Усмішка та стрибок)
            mouth.setAttribute('d', 'M110,125 Q125,145 140,125');
            character.classList.remove('anim-happy');
            void character.offsetWidth; 
            character.classList.add('anim-happy');

            // Автоматичний перехід
            setTimeout(() => {
                if (currentLevel < levels.length - 1) {
                    loadLevel(currentLevel + 1);
                } else {
                    loadLevel(0); // Зациклюємо гру
                }
            }, 1200);

        } else {
            playSound('error');
            
            // Емоція та анімація (Сум і труска)
            mouth.setAttribute('d', 'M115,135 Q125,125 135,135');
            character.classList.remove('anim-sad');
            void character.offsetWidth;
            character.classList.add('anim-sad');
            
            gap1.style.background = 'linear-gradient(to bottom, #731212, #380303)';
            gap2.style.background = 'linear-gradient(to bottom, #731212, #380303)';
            
            setTimeout(() => {
                gap1.style.background = 'linear-gradient(to bottom, #0a1410, #13271f)';
                gap2.style.background = 'linear-gradient(to bottom, #0a1410, #13271f)';
                mouth.setAttribute('d', 'M115,130 Q125,140 135,130'); // Повернення до нормального рота
            }, 500);
        }
    }

    // Кнопки управління
    document.getElementById('btn-prev').addEventListener('click', () => {
        if (currentLevel > 0) {
            playSound('click');
            loadLevel(currentLevel - 1);
        }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
        if (currentLevel < levels.length - 1) {
            playSound('click');
            loadLevel(currentLevel + 1);
        }
    });

    // Старт
    loadLevel(0);
</script>
</body>
</html>
