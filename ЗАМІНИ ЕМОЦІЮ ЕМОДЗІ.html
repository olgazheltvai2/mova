<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Емоційна Подорож</title>
    <style>
        /* Базові стилі, щоб прибрати все біле і нудне. Тільки яскраві кольори! */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2c3e50;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            user-select: none;
        }

        #gameArea {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Сюжетний фон позаду гри */
        #gameBackground {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Стилізована дошка з реченням */
        #sentenceBoard {
            position: relative;
            z-index: 10;
            margin-top: 10vh;
            width: 80%;
            max-width: 800px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border: 8px solid #ff758c;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            font-size: 3rem;
            color: #4a4a4a;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .gap {
            display: inline-block;
            min-width: 80px;
            border-bottom: 5px dashed #ff758c;
            color: transparent;
            margin: 0 10px;
            text-align: center;
            transition: all 0.3s;
        }

        .gap.filled {
            border-bottom: none;
            color: inherit;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* Вибір емодзі - круглі п'єдестали */
        #choicesContainer {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 30px;
            margin-top: 5vh;
        }

        .choice-pedestal {
            width: 120px;
            height: 120px;
            background: linear-gradient(to bottom, #a18cd1 0%, #fbc2eb 100%);
            border-radius: 50%;
            border: 6px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }

        .choice-pedestal:hover {
            transform: scale(1.1) translateY(-10px);
        }

        .choice-pedestal.wrong {
            filter: grayscale(80%) hue-rotate(90deg);
            transform: scale(0.9);
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) scale(0.9); }
            25% { transform: translateX(-10px) scale(0.9); }
            75% { transform: translateX(10px) scale(0.9); }
        }

        /* Персонаж (Хмаринка) */
        #characterContainer {
            position: absolute;
            bottom: 5vh;
            left: 5vw;
            width: 250px;
            height: 250px;
            z-index: 20;
            transition: transform 0.3s;
        }

        .cloud-bounce {
            animation: bounce 2s infinite ease-in-out;
        }

        /* Анімація радості (підстрибування) */
        .cloud-jump {
            animation: jumpJoy 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes jumpJoy {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-50px) scale(1.1); }
        }

        /* Мінімалістична Навігація */
        #navButtons {
            position: absolute;
            bottom: 5vh;
            right: 5vw;
            z-index: 30;
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            transform: scale(1.1);
        }
        
        #prevBtn { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }

        /* Екран фіналу */
        #endScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, #d4fc79 0%, #96e6a1 100%);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10rem;
        }
    </style>
</head>
<body>

<div id="gameArea">
    <div id="gameBackground">
        <svg width="100%" height="100%" preserveAspectRatio="none">
            <defs>
                <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
                </linearGradient>
                <pattern id="leafPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M10,20 Q20,0 30,20 Q20,40 10,20 Z" fill="#4caf50" opacity="0.4"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#skyGrad)"/>
            <circle cx="90%" cy="15%" r="8%" fill="#ffeb3b" filter="drop-shadow(0 0 20px #ffc107)"/>
            <path d="M0,100% L20%,50% L40%,100% Z" fill="#8d6e63" opacity="0.8"/>
            <path d="M30%,100% L60%,40% L100%,100% Z" fill="#795548" opacity="0.9"/>
            <rect x="0" y="70%" width="100%" height="30%" fill="#8bc34a"/>
            <rect x="0" y="70%" width="100%" height="30%" fill="url(#leafPattern)"/>
        </svg>
    </div>

    <div id="sentenceBoard"></div>
    <div id="choicesContainer"></div>

    <div id="characterContainer" class="cloud-bounce"></div>

    <div id="navButtons">
        <button id="prevBtn" onclick="changeLevel(-1)">⬅️</button>
        <button id="nextBtn" onclick="changeLevel(1)">➡️</button>
    </div>

    <div id="endScreen">
        🎉🏆🌈
    </div>
</div>

<script>
    // --- ДАНІ ГРИ (Оновлені речення за твоєю вказівкою) ---
    const SENTENCES = [
        { text: "Мені сумно, бо йде [?]", correct: 0, choices: ["🌧️", "☀️", "☁️"] },
        { text: "Я радію, коли світить [?]", correct: 1, choices: ["⛈️", "☀️", "❄️"] },
        { text: "Мені страшно, коли гримить [?]", correct: 2, choices: ["🌈", "💨", "⛈️"] },
        { text: "Я веселий, бо співають [?]", correct: 1, choices: ["🐌", "🐦", "🦗"] },
        { text: "Я здивований, що випав [?]", correct: 0, choices: ["❄️", "🍂", "☀️"] },
        // Оновлене 6 речення (Море)
        { text: "Влітку я плавав у [?]", correct: 0, choices: ["🌊", "🌋", "🏜️"] },
        { text: "Я мрійливий, бо дивлюся на [?]", correct: 1, choices: ["🌳", "☁️", "🏘️"] },
        { text: "Я сердитий, бо зламався [?]", correct: 0, choices: ["🚲", "🍕", "🎈"] },
        // ОНОВЛЕНЕ 9 речення (Зовсім інше з новими емодзі)
        { text: "Я плачу, бо впало [?]", correct: 2, choices: ["📖", "⚽", "🍦"] },
        { text: "Я щасливий, коли бачу [?]", correct: 1, choices: ["🌙", "🌈", "🎈"] },
        { text: "Я втомлений, бо ходив у [?]", correct: 0, choices: ["⛰️", "🛋️", "🍎"] },
        { text: "Мені тепло, бо на вулиці [?]", correct: 1, choices: ["❄️", "☀️", "🌧️"] }
    ];

    let currentLevel = 0;

    // --- АУДІО ДВИЖОК (Генерація звуків кодом) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'win') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.setValueAtTime(400, now + 0.1);
            osc.frequency.setValueAtTime(500, now + 0.2);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        }
    }

    // --- ВІЗУАЛ ПЕРСОНАЖА (SVG Код) ---
    function getCloudSvg(emotion = 'normal') {
        let eyes = '<circle cx="35" cy="45" r="5" fill="#000"/><circle cx="65" cy="45" r="5" fill="#000"/>';
        let mouth = '<path d="M 40 60 Q 50 70 60 60" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>'; 

        if (emotion === 'happy') {
            eyes = '<path d="M 30 45 Q 35 35 40 45" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/><path d="M 60 45 Q 65 35 70 45" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>';
            mouth = '<path d="M 40 60 Q 50 80 60 60 Z" fill="#ff5252" stroke="#000" stroke-width="2"/>';
        } else if (emotion === 'sad') {
            mouth = '<path d="M 40 65 Q 50 55 60 65" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>';
        }

        return `
        <svg viewBox="0 0 100 100" width="100%" height="100%">
            <path d="M 25 50 A 20 20 0 0 1 50 30 A 25 25 0 0 1 80 50 A 20 20 0 0 1 75 85 L 30 85 A 20 20 0 0 1 25 50 Z" 
                  fill="#ffffff" stroke="#bbdefb" stroke-width="3" filter="drop-shadow(0px 10px 10px rgba(0,0,0,0.2))"/>
            ${eyes}
            ${mouth}
            <ellipse cx="25" cy="60" rx="6" ry="3" fill="#ffcdd2" opacity="0.8"/>
            <ellipse cx="75" cy="60" rx="6" ry="3" fill="#ffcdd2" opacity="0.8"/>
        </svg>
        `;
    }

    // --- ЛОГІКА МАЛЮВАННЯ ТА ПЕРЕВІРОК ---
    function renderLevel() {
        if (currentLevel >= SENTENCES.length) {
            document.getElementById('endScreen').style.display = 'flex';
            playSound('win');
            return;
        }

        const data = SENTENCES[currentLevel];
        
        // Малюємо речення
        const board = document.getElementById('sentenceBoard');
        board.innerHTML = data.text.replace('[?]', '<span class="gap" id="gapElement">?</span>');
        
        // Малюємо кнопки-емодзі
        const container = document.getElementById('choicesContainer');
        container.innerHTML = '';
        data.choices.forEach((emoji, index) => {
            const div = document.createElement('div');
            div.className = 'choice-pedestal';
            div.innerHTML = emoji;
            div.onclick = () => checkAnswer(index, div, emoji);
            container.appendChild(div);
        });

        // Скидаємо стан персонажа
        const character = document.getElementById('characterContainer');
        character.innerHTML = getCloudSvg('normal');
        character.classList.remove('cloud-jump');
        
        // Логіка кнопок "назад" і "далі"
        document.getElementById('prevBtn').style.opacity = currentLevel === 0 ? '0.3' : '1';
        document.getElementById('prevBtn').style.pointerEvents = currentLevel === 0 ? 'none' : 'auto';
    }

    function checkAnswer(selectedIndex, element, emoji) {
        const data = SENTENCES[currentLevel];
        const gap = document.getElementById('gapElement');
        const character = document.getElementById('characterContainer');

        if (selectedIndex === data.correct) {
            // ПРАВИЛЬНО: Звук, емоція, стрибок!
            playSound('correct');
            character.innerHTML = getCloudSvg('happy');
            
            // Запускаємо анімацію стрибка
            character.classList.remove('cloud-bounce');
            character.classList.add('cloud-jump');
            
            // Заповнюємо пропуск
            gap.innerHTML = emoji;
            gap.classList.add('filled');
            element.style.transform = 'scale(1.3)';
            
            // Перехід на наступний рівень
            setTimeout(() => {
                currentLevel++;
                renderLevel();
                character.classList.remove('cloud-jump');
                character.classList.add('cloud-bounce');
            }, 1200);

            // Блокуємо повторні кліки
            document.querySelectorAll('.choice-pedestal').forEach(el => el.onclick = null);
        } else {
            // НЕПРАВИЛЬНО: Звук, сум, труситься кнопка
            playSound('wrong');
            character.innerHTML = getCloudSvg('sad');
            element.classList.add('wrong');
            
            setTimeout(() => {
                if(character.innerHTML.includes('sad')) {
                    character.innerHTML = getCloudSvg('normal');
                }
                element.classList.remove('wrong');
            }, 800);
        }
    }

    function changeLevel(dir) {
        currentLevel += dir;
        if (currentLevel < 0) currentLevel = 0;
        renderLevel();
    }

    // Запуск!
    window.onload = renderLevel;
</script>

</body>
</html>
