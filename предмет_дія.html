<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Брутальна Книга: Рандомне Сортування</title>
    <style>
        :root {
            --bg: #2d3831; 
            --paper: #fff9e3; 
            --ink: #101010;
            --accent: #ffff00;
            --btn-next: #50fa7b;
            --btn-prev: #ffb86c;
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
            background-color: var(--bg);
            background-image: radial-gradient(#1e2621 2px, transparent 2px);
            background-size: 30px 30px;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }

        #book-viewport {
            position: relative;
            width: 1000px;
            height: 600px;
            z-index: 2;
        }

        #book-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(20px 20px 0px #000);
        }

        #active-word-area {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .sticker {
            padding: 20px 40px;
            background: var(--accent);
            border: 6px solid var(--ink);
            box-shadow: 10px 10px 0px #000;
            font-size: 40px;
            cursor: grab;
            user-select: none;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .sticker:active { transform: scale(1.1); }

        .placed-sticker {
            position: absolute;
            padding: 12px 24px;
            background: #fff;
            border: 4px solid var(--ink);
            box-shadow: 5px 5px 0px #000;
            font-size: 26px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 5;
        }

        .nav-btn {
            position: absolute;
            bottom: 30px;
            padding: 15px 35px;
            font-size: 22px;
            font-weight: 900;
            border: 5px solid var(--ink);
            box-shadow: 8px 8px 0px #000;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .nav-btn:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0px #000; }
        #btn-back { left: 40px; background: var(--btn-prev); }
        #btn-forth { right: 40px; background: var(--btn-next); }

        .drop-zone {
            position: absolute;
            top: 60px;
            width: 430px;
            height: 480px;
            z-index: 4;
        }
        #zone-noun { left: 60px; }
        #zone-verb { left: 510px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="book-viewport">
        <svg id="book-svg" viewBox="0 0 1000 600">
            <rect x="40" y="40" width="920" height="520" fill="#4e342e" stroke="#000" stroke-width="8" rx="10" />
            <rect x="60" y="60" width="430" height="480" fill="#fff9e3" stroke="#000" stroke-width="4" />
            <rect x="510" y="60" width="430" height="480" fill="#fff9e3" stroke="#000" stroke-width="4" />
            <rect x="490" y="40" width="20" height="520" fill="#3e2723" stroke="#000" stroke-width="2" />
            <text x="275" y="140" font-family="Arial Black" font-size="50" text-anchor="middle" fill="#000">ПРЕДМЕТ</text>
            <text x="725" y="140" font-family="Arial Black" font-size="50" text-anchor="middle" fill="#000">ДІЯ</text>
            <line x1="100" y1="160" x2="450" y2="160" stroke="#000" stroke-width="6" />
            <line x1="550" y1="160" x2="900" y2="160" stroke="#000" stroke-width="6" />
        </svg>

        <div id="zone-noun" class="drop-zone" data-type="noun"></div>
        <div id="zone-verb" class="drop-zone" data-type="verb"></div>
        
        <div id="sticker-container" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></div>
    </div>

    <div id="active-word-area"></div>

    <button id="btn-back" class="nav-btn">назад</button>
    <button id="btn-forth" class="nav-btn">далі</button>
</div>

<script>
    // Повний масив слів
    const rawDictionary = [
        {w: "Олівець", t: "noun"}, {w: "Малює", t: "verb"}, {w: "Школа", t: "noun"}, {w: "Вчиться", t: "verb"},
        {w: "Друг", t: "noun"}, {w: "Грається", t: "verb"}, {w: "Сонце", t: "noun"}, {w: "Світить", t: "verb"},
        {w: "Дерево", t: "noun"}, {w: "Росте", t: "verb"}, {w: "Кіт", t: "noun"}, {w: "Стрибає", t: "verb"},
        {w: "Книга", t: "noun"}, {w: "Читає", t: "verb"}, {w: "Літак", t: "noun"}, {w: "Летить", t: "verb"},
        {w: "Дощ", t: "noun"}, {w: "Іде", t: "verb"}, {w: "Яблуко", t: "noun"}, {w: "Падає", t: "verb"},
        {w: "Вітер", t: "noun"}, {w: "Дує", t: "verb"}, {w: "Річка", t: "noun"}, {w: "Тече", t: "verb"},
        {w: "Зірка", t: "noun"}, {w: "Мерехтить", t: "verb"}, {w: "Учень", t: "noun"}, {w: "Пише", t: "verb"},
        {w: "Трава", t: "noun"}, {w: "Зеленіє", t: "verb"}
    ];

    // РАНДОМІЗАЦІЯ: перемішуємо список перед початком гри
    const dictionary = rawDictionary.sort(() => Math.random() - 0.5);

    let currentIdx = 0;
    const audio = new (window.AudioContext || window.webkitAudioContext)();

    // Звукові ефекти (фідбек без слів)
    function playSfx(freq, dur, type = 'square') {
        const o = audio.createOscillator();
        const g = audio.createGain();
        o.type = type;
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.1, audio.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + dur);
        o.connect(g);
        g.connect(audio.destination);
        o.start();
        o.stop(audio.currentTime + dur);
    }

    // Виведення поточного слова
    function renderActive() {
        const area = document.getElementById('active-word-area');
        area.innerHTML = '';
        if (currentIdx >= dictionary.length) return;

        const item = dictionary[currentIdx];
        const el = document.createElement('div');
        el.className = 'sticker';
        el.textContent = item.w;
        el.dataset.type = item.t;
        el.draggable = true;

        el.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', 'active');
        });
        area.appendChild(el);
    }

    // Обробка сторінок книги
    document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.addEventListener('dragover', (e) => e.preventDefault());
        
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            const original = document.querySelector('.sticker');
            if (!original) return;

            if (original.dataset.type === zone.dataset.type) {
                // Правильно: приклеюємо та переходимо до наступного
                stickWord(original, e.clientX, e.clientY);
                playSfx(600, 0.2);
                currentIdx++;
                renderActive();
            } else {
                // Помилка: візуальне трясіння
                original.style.animation = 'shake 0.3s';
                setTimeout(() => original.style.animation = '', 300);
                playSfx(150, 0.4, 'sawtooth');
            }
        });
    });

    // Закріплення слова на сторінці
    function stickWord(el, mouseX, mouseY) {
        const container = document.getElementById('sticker-container');
        const bookRect = document.getElementById('book-viewport').getBoundingClientRect();
        
        const copy = document.createElement('div');
        copy.className = 'placed-sticker';
        copy.textContent = el.textContent;
        copy.dataset.idx = currentIdx;

        // Позиція відносно сторінок книги
        const x = mouseX - bookRect.left - 60; 
        const y = mouseY - bookRect.top - 20;

        copy.style.left = x + 'px';
        copy.style.top = y + 'px';
        copy.style.transform = `rotate(${Math.random() * 16 - 8}deg)`;
        
        container.appendChild(copy);
    }

    // Навігація
    document.getElementById('btn-forth').onclick = () => {
        if (currentIdx < dictionary.length) {
            currentIdx++;
            renderActive();
            playSfx(800, 0.05);
        }
    };

    document.getElementById('btn-back').onclick = () => {
        if (currentIdx > 0) {
            currentIdx--;
            const container = document.getElementById('sticker-container');
            if (container.lastChild) container.removeChild(container.lastChild);
            renderActive();
            playSfx(300, 0.05);
        }
    };

    // Анімація для помилки (Нео-бруталізм любить різкі рухи)
    const style = document.createElement('style');
    style.innerHTML = `@keyframes shake { 0%, 100% {transform:translateX(0);} 25% {transform:translateX(-15px);} 75% {transform:translateX(15px);} }`;
    document.head.appendChild(style);

    // Старт гри
    renderActive();
</script>
</body>
</html>
