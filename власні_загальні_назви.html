<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гра: Власні та загальні назви</title>
    <style>
        /* Коментар: Основні стилі тіла та скидання відступів */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom, #4CA1AF, #C4E0E5);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: manipulation;
        }

        /* Коментар: Контейнер гри */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* Коментар: Анімований сюжетний фон */
        .sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(180deg, #1A2980 0%, #26D0CE 100%);
            z-index: 1;
        }

        .sun {
            position: absolute;
            top: 10%;
            left: 15%; /* Сонце перемістили вліво для балансу */
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #FFD700 30%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 50px #FF8C00;
            animation: pulseSun 4s infinite alternate;
            z-index: 2;
        }

        @keyframes pulseSun {
            from { transform: scale(1); box-shadow: 0 0 40px #FF8C00; }
            to { transform: scale(1.1); box-shadow: 0 0 80px #FFD700; }
        }

        .mountains {
            position: absolute;
            bottom: 30%;
            width: 100%;
            height: 40%;
            z-index: 3;
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #56AB2F, #A8E063);
            z-index: 4;
            border-top: 8px solid #3E8E41;
        }

        /* Коментар: Залізниця */
        .railway {
            position: absolute;
            bottom: 10%;
            width: 100%;
            height: 60px;
            z-index: 5;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 40px,
                    #4A3018 40px,
                    #4A3018 60px
                );
            border-top: 6px solid #B0BEC5;
            border-bottom: 6px solid #B0BEC5;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.4);
        }

        /* Коментар: Контейнер потягу (ховаємо за правий край екрану) */
        .train-wrapper {
            position: absolute;
            bottom: calc(10% + 50px);
            left: 0;
            width: 100%;
            display: flex;
            align-items: flex-end;
            z-index: 6;
            transform: translateX(100vw); /* Початкова позиція справа */
        }

        /* Коментар: Локомотив віддзеркалений, щоб дивитись вліво */
        .locomotive {
            position: relative;
            width: 350px;
            height: 280px;
            flex-shrink: 0;
            transform: scaleX(-1); /* Розвертаємо локомотив */
        }

        /* Коментар: Платформа з вантажем */
        .flatbed {
            position: relative;
            width: 1000px; /* Трохи розширили платформу для великого тексту */
            height: 50px;
            background: linear-gradient(to bottom, #37474F, #263238);
            border-top: 6px solid #546E7A;
            border-radius: 5px;
            margin-left: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 50px; 
            box-shadow: inset 0px -5px 10px rgba(0,0,0,0.5), 0px 10px 20px rgba(0,0,0,0.4);
        }

        .flatbed::before, .flatbed::after {
            content: '';
            position: absolute;
            bottom: -35px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #78909C 20%, #212121 80%);
            border: 4px solid #424242;
            border-radius: 50%;
        }
        .flatbed::before { left: 10%; }
        .flatbed::after { right: 10%; }
        .flatbed-wheel-spin::before, .flatbed-wheel-spin::after {
            animation: spin 1s linear infinite reverse; /* Крутимо в зворотній бік через рух вліво */
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Коментар: Ящики зі словами - збільшений шрифт */
        .cargo-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 95%;
            position: absolute;
            bottom: 20px;
        }

        .word-box {
            background: repeating-linear-gradient(45deg, #8B5A2B, #8B5A2B 10px, #A0522D 10px, #A0522D 20px);
            border: 5px solid #5C3A21;
            border-radius: 12px;
            padding: 20px 30px;
            color: #FFD700;
            font-size: 40px; /* Збільшений розмір шрифту */
            font-weight: 900;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            cursor: pointer;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.6), inset 0px 0px 15px rgba(0,0,0,0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .word-box::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px; right: 3px; bottom: 3px;
            border: 2px dashed rgba(255,255,255,0.3);
            pointer-events: none;
            border-radius: 8px;
        }

        .word-box:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0px 18px 25px rgba(0,0,0,0.8);
        }

        .word-box.selected {
            background: repeating-linear-gradient(45deg, #2E7D32, #2E7D32 10px, #43A047 10px, #43A047 20px);
            border-color: #1B5E20;
            transform: translateY(-12px) scale(1.1);
            box-shadow: 0px 0px 35px #76FF03, inset 0px 0px 20px rgba(0,0,0,0.6);
            color: #FFF;
        }

        /* Коментар: Анімації стану */
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        .success-glow { animation: glowWin 1s ease-in-out infinite alternate; }
        @keyframes glowWin {
            from { box-shadow: 0 0 20px #FFD700; }
            to { box-shadow: 0 0 70px #FFEA00; transform: scale(1.15); }
        }

        /* Коментар: Навігація */
        .nav-btn {
            position: absolute;
            top: 30px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #FF9800, #E65100);
            border: 4px solid #BF360C;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.4);
            transition: transform 0.2s, filter 0.2s;
        }
        .nav-btn:hover { transform: scale(1.1); filter: brightness(1.2); }
        .nav-btn:active { transform: scale(0.95); }
        #btn-prev { left: 30px; }
        #btn-next { right: 30px; }

        .nav-icon {
            width: 35px;
            height: 35px;
            fill: #FFF;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* Коментар: Дим */
        .smoke {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(200,200,200,0));
            border-radius: 50%;
            top: 20px;
            left: 280px;
            opacity: 0;
            z-index: 10;
        }
        .puff { animation: smokePuff 2.5s ease-out forwards; }
        @keyframes smokePuff {
            0% { transform: scale(1) translate(0, 0); opacity: 0.9; }
            /* Трансформація диму з урахуванням віддзеркаленого локомотиву (х піде вправо) */
            100% { transform: scale(6) translate(60px, -120px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="sky"></div>
        <div class="sun"></div>
        
        <svg class="mountains" viewBox="0 0 1000 300" preserveAspectRatio="none">
            <defs>
                <linearGradient id="mtnGrad1" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#455A64" />
                    <stop offset="100%" stop-color="#263238" />
                </linearGradient>
                <linearGradient id="mtnGrad2" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#607D8B" />
                    <stop offset="100%" stop-color="#37474F" />
                </linearGradient>
            </defs>
            <path d="M0,300 L0,150 L150,50 L300,200 L450,80 L600,250 L800,40 L1000,180 L1000,300 Z" fill="url(#mtnGrad1)"/>
            <path d="M0,300 L100,220 L250,100 L400,260 L550,130 L750,280 L900,110 L1000,240 L1000,300 Z" fill="url(#mtnGrad2)" opacity="0.8"/>
        </svg>

        <div class="ground"></div>
        <div class="railway"></div>

        <div class="nav-btn" id="btn-prev">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </div>
        <div class="nav-btn" id="btn-next">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </div>

        <div class="train-wrapper" id="train-wrapper">
            
            <div class="locomotive" id="locomotive">
                <svg width="350" height="280" viewBox="0 0 350 280">
                    <defs>
                        <linearGradient id="boiler" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#D32F2F"/>
                            <stop offset="50%" stop-color="#F44336"/>
                            <stop offset="100%" stop-color="#B71C1C"/>
                        </linearGradient>
                        <linearGradient id="cabin" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="#1976D2"/>
                            <stop offset="100%" stop-color="#0D47A1"/>
                        </linearGradient>
                        <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#FFF59D"/>
                            <stop offset="50%" stop-color="#FFD54F"/>
                            <stop offset="100%" stop-color="#F57F17"/>
                        </linearGradient>
                        <g id="trainWheel">
                            <circle cx="0" cy="0" r="30" fill="#424242" stroke="#B0BEC5" stroke-width="4"/>
                            <circle cx="0" cy="0" r="10" fill="#FFC107"/>
                            <line x1="-30" y1="0" x2="30" y2="0" stroke="#78909C" stroke-width="3"/>
                            <line x1="0" y1="-30" x2="0" y2="30" stroke="#78909C" stroke-width="3"/>
                        </g>
                    </defs>

                    <rect x="260" y="80" width="40" height="70" fill="url(#gold)" rx="5"/>
                    <path d="M250,80 L310,80 L320,50 L240,50 Z" fill="#212121"/>
                    
                    <rect x="130" y="120" width="160" height="100" fill="url(#boiler)" rx="20"/>
                    <rect x="150" y="120" width="10" height="100" fill="url(#gold)"/>
                    <rect x="220" y="120" width="10" height="100" fill="url(#gold)"/>
                    
                    <path d="M30,70 L130,70 L130,220 L30,220 Z" fill="url(#cabin)"/>
                    <path d="M20,60 L140,60 L140,80 L20,80 Z" fill="url(#gold)"/>
                    <path d="M30,220 L290,220 L290,240 L30,240 Z" fill="#212121"/>

                    <rect x="50" y="90" width="60" height="70" fill="#81D4FA" stroke="#455A64" stroke-width="4" rx="10"/>

                    <g id="bear" transform="translate(80, 150)">
                        <circle cx="-25" cy="-45" r="12" fill="#5D4037"/>
                        <circle cx="25" cy="-45" r="12" fill="#5D4037"/>
                        <circle cx="-25" cy="-45" r="6" fill="#8D6E63"/>
                        <circle cx="25" cy="-45" r="6" fill="#8D6E63"/>
                        
                        <circle cx="0" cy="-20" r="30" fill="#6D4C41"/>
                        
                        <ellipse cx="0" cy="-10" rx="16" ry="12" fill="#D7CCC8"/>
                        <circle cx="0" cy="-15" r="5" fill="#212121"/>
                        <path d="M -5 -8 Q 0 -3 5 -8" fill="none" stroke="#212121" stroke-width="2"/>
                        
                        <g id="bear-eyes-normal">
                            <circle cx="-12" cy="-25" r="4" fill="#212121"/>
                            <circle cx="12" cy="-25" r="4" fill="#212121"/>
                            <circle cx="-13" cy="-26" r="1.5" fill="#FFF"/>
                            <circle cx="11" cy="-26" r="1.5" fill="#FFF"/>
                        </g>

                        <g id="bear-eyes-happy" style="display: none;">
                            <path d="M -18 -25 Q -12 -32 -6 -25" fill="none" stroke="#212121" stroke-width="3" stroke-linecap="round"/>
                            <path d="M 6 -25 Q 12 -32 18 -25" fill="none" stroke="#212121" stroke-width="3" stroke-linecap="round"/>
                        </g>

                        <g id="bear-eyes-sad" style="display: none;">
                            <line x1="-16" y1="-28" x2="-8" y2="-22" stroke="#212121" stroke-width="3" stroke-linecap="round"/>
                            <line x1="-16" y1="-22" x2="-8" y2="-28" stroke="#212121" stroke-width="3" stroke-linecap="round"/>
                            <line x1="8" y1="-28" x2="16" y2="-22" stroke="#212121" stroke-width="3" stroke-linecap="round"/>
                            <line x1="8" y1="-22" x2="16" y2="-28" stroke="#212121" stroke-width="3" stroke-linecap="round"/>
                        </g>

                        <path d="M -35 -40 Q 0 -60 35 -40 L 40 -35 L -40 -35 Z" fill="#1565C0"/>
                        <path d="M -35 -35 Q 0 -20 35 -35 L -35 -35 Z" fill="#0D47A1"/>
                        <circle cx="0" cy="-42" r="5" fill="#FFD54F"/>

                        <g id="bear-paws" style="transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                            <circle cx="-20" cy="10" r="12" fill="#5D4037"/>
                            <circle cx="20" cy="10" r="12" fill="#5D4037"/>
                            <line x1="-24" y1="18" x2="-24" y2="22" stroke="#3E2723" stroke-width="2"/>
                            <line x1="-20" y1="19" x2="-20" y2="23" stroke="#3E2723" stroke-width="2"/>
                            <line x1="-16" y1="18" x2="-16" y2="22" stroke="#3E2723" stroke-width="2"/>
                            <line x1="16" y1="18" x2="16" y2="22" stroke="#3E2723" stroke-width="2"/>
                            <line x1="20" y1="19" x2="20" y2="23" stroke="#3E2723" stroke-width="2"/>
                            <line x1="24" y1="18" x2="24" y2="22" stroke="#3E2723" stroke-width="2"/>
                        </g>
                    </g>

                    <path d="M290,240 L340,240 L320,280 L290,280 Z" fill="#424242"/>

                    <g transform="translate(80, 240)"><g class="train-wheel-spin"><use href="#trainWheel"/></g></g>
                    <g transform="translate(160, 240)"><g class="train-wheel-spin"><use href="#trainWheel"/></g></g>
                    <g transform="translate(240, 240)"><g class="train-wheel-spin"><use href="#trainWheel"/></g></g>

                    <rect id="connectingRod" x="50" y="235" width="190" height="10" fill="#B0BEC5" rx="5"/>
                </svg>
            </div>

            <div class="flatbed" id="flatbed">
                <div class="cargo-container" id="cargo-container"></div>
            </div>
        </div>

    </div>

    <script>
        // Коментар: 15 різних речень
        const levels = [
            { words: ["Хлопчик", "Тарас", "любить", "читати", "книги."], targets: [0, 1] },
            { words: ["Швидка", "річка", "Десна", "тече", "лісом."], targets: [1, 2] },
            { words: ["Моє", "улюблене", "місто", "Львів", "дуже", "гарне."], targets: [2, 3] },
            { words: ["Маленький", "песик", "Бровко", "голосно", "гавкає."], targets: [1, 2] },
            { words: ["Гора", "Говерла", "найвища", "в", "країні."], targets: [0, 1] },
            { words: ["Пухнаста", "кішка", "Мурка", "спить", "на", "дивані."], targets: [1, 2] },
            { words: ["Дівчинка", "Оленка", "малює", "красиву", "картину."], targets: [0, 1] },
            { words: ["Глибоке", "озеро", "Світязь", "має", "чисту", "воду."], targets: [1, 2] },
            { words: ["Веселий", "папуга", "Кеша", "смішно", "говорить."], targets: [1, 2] },
            { words: ["Великий", "пес", "Рекс", "охороняє", "наш", "двір."], targets: [1, 2] },
            { words: ["Моя", "подруга", "Катруся", "прийшла", "в", "гості."], targets: [1, 2] },
            { words: ["Широке", "море", "Чорне", "дуже", "тепле", "влітку."], targets: [1, 2] },
            { words: ["Мудрий", "дідусь", "Іван", "розповідає", "цікаві", "казки."], targets: [1, 2] },
            { words: ["Красива", "вулиця", "Хрещатик", "в", "центрі."], targets: [1, 2] },
            { words: ["Сильний", "кінь", "Орлик", "швидко", "скаче", "полем."], targets: [1, 2] }
        ];

        let currentLevel = 0;
        let selectedIndices = [];
        let isAnimating = false;
        let isFirstLoad = true;

        // Коментар: Web Audio API - Зроблено значно тихіше
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playTone(freq, type, duration, vol = 0.02) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playClickSound() { playTone(400, 'sine', 0.1, 0.03); }

        function playSuccessSound() {
            playTone(440, 'square', 0.6, 0.02);
            playTone(554.37, 'square', 0.6, 0.02);
            setTimeout(() => {
                playTone(554.37, 'square', 0.8, 0.03); 
                playTone(659.25, 'square', 0.8, 0.03);
            }, 200);
        }

        function playErrorSound() {
            playTone(150, 'sawtooth', 0.4, 0.04);
            setTimeout(() => playTone(100, 'sawtooth', 0.4, 0.04), 150);
        }

        const cargoContainer = document.getElementById('cargo-container');
        const trainWrapper = document.getElementById('train-wrapper');
        const locomotive = document.getElementById('locomotive');
        const flatbed = document.getElementById('flatbed');
        
        const bearEyesNormal = document.getElementById('bear-eyes-normal');
        const bearEyesHappy = document.getElementById('bear-eyes-happy');
        const bearEyesSad = document.getElementById('bear-eyes-sad');
        const bearPaws = document.getElementById('bear-paws');

        // Коментар: Оновлення вмісту слів
        function updateContent(index) {
            cargoContainer.innerHTML = '';
            const levelData = levels[index];
            levelData.words.forEach((word, i) => {
                const box = document.createElement('div');
                box.className = 'word-box';
                box.textContent = word;
                box.dataset.index = i;
                box.addEventListener('click', () => handleWordClick(box, i));
                cargoContainer.appendChild(box);
            });
            setBearEmotion('normal');
        }

        // Коментар: Логіка переміщення потягу справа наліво
        function loadLevel(index) {
            if (index < 0) index = levels.length - 1;
            if (index >= levels.length) index = 0;
            currentLevel = index;
            selectedIndices = [];
            isAnimating = true;

            if (isFirstLoad) {
                // Коментар: Перший запуск - потяг заїжджає з правого краю
                updateContent(currentLevel);
                trainWrapper.style.transition = 'transform 2s ease-out';
                trainWrapper.style.transform = 'translateX(0)';
                startTrainWheels();
                
                setTimeout(() => {
                    stopTrainWheels();
                    isAnimating = false;
                    isFirstLoad = false;
                }, 2000);
            } else {
                // Коментар: Потяг продовжує рух вліво (від'їзд)
                trainWrapper.style.transition = 'transform 1.5s ease-in';
                trainWrapper.style.transform = 'translateX(-100vw)';
                startTrainWheels();

                setTimeout(() => {
                    // Коментар: Миттєво перекидаємо потяг назад на праву сторону екрану за кадром
                    trainWrapper.style.transition = 'none';
                    trainWrapper.style.transform = 'translateX(100vw)';
                    updateContent(currentLevel);
                    
                    // Коментар: Даємо браузеру час застосувати позицію і заїжджаємо знову
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            trainWrapper.style.transition = 'transform 1.5s ease-out';
                            trainWrapper.style.transform = 'translateX(0)';
                            
                            setTimeout(() => {
                                stopTrainWheels();
                                isAnimating = false;
                            }, 1500);
                        });
                    });
                }, 1500);
            }
        }

        function handleWordClick(box, index) {
            if (isAnimating) return;
            const idx = selectedIndices.indexOf(index);
            
            if (idx > -1) {
                selectedIndices.splice(idx, 1);
                box.classList.remove('selected');
                playClickSound();
                return;
            }

            if (selectedIndices.length < 2) {
                selectedIndices.push(index);
                box.classList.add('selected');
                playClickSound();
            }

            if (selectedIndices.length === 2) {
                checkResult();
            }
        }

        function checkResult() {
            isAnimating = true;
            const levelData = levels[currentLevel];
            const isCorrect = selectedIndices.includes(levelData.targets[0]) && 
                              selectedIndices.includes(levelData.targets[1]);

            if (isCorrect) {
                playSuccessSound();
                setBearEmotion('happy');
                createSmoke();
                
                const selectedBoxes = cargoContainer.querySelectorAll('.selected');
                selectedBoxes.forEach(box => box.classList.add('success-glow'));

                setTimeout(() => { loadLevel(currentLevel + 1); }, 2000);

            } else {
                playErrorSound();
                setBearEmotion('sad');
                
                const selectedBoxes = cargoContainer.querySelectorAll('.selected');
                selectedBoxes.forEach(box => box.classList.add('shake'));

                setTimeout(() => {
                    selectedBoxes.forEach(box => {
                        box.classList.remove('shake', 'selected');
                    });
                    selectedIndices = [];
                    setBearEmotion('normal');
                    isAnimating = false;
                }, 1000);
            }
        }

        function setBearEmotion(emotion) {
            bearEyesNormal.style.display = 'none';
            bearEyesHappy.style.display = 'none';
            bearEyesSad.style.display = 'none';
            bearPaws.style.transform = 'translateY(0)';

            if (emotion === 'normal') {
                bearEyesNormal.style.display = 'block';
            } else if (emotion === 'happy') {
                bearEyesHappy.style.display = 'block';
                bearPaws.style.transform = 'translateY(-20px)';
            } else if (emotion === 'sad') {
                bearEyesSad.style.display = 'block';
                bearPaws.style.transform = 'translateY(-10px) rotate(-5deg)';
            }
        }

        // Коментар: Анімація коліс обертається в інший бік через те, що SVG віддзеркалений
        let wheelAnimInterval;
        let wheelAngle = 0;
        function startTrainWheels() {
            const wheels = document.querySelectorAll('.train-wheel-spin');
            const rod = document.getElementById('connectingRod');
            flatbed.classList.add('flatbed-wheel-spin');
            clearInterval(wheelAnimInterval);
            
            wheelAnimInterval = setInterval(() => {
                wheelAngle += 10; // Змінено напрямок обертання
                wheels.forEach(w => w.setAttribute('transform', `rotate(${wheelAngle})`));
                const rodY = 235 + Math.sin(wheelAngle * Math.PI / 180) * 10;
                const rodX = 50 + Math.cos(wheelAngle * Math.PI / 180) * 10;
                rod.setAttribute('x', rodX);
                rod.setAttribute('y', rodY);
            }, 20);
        }

        function stopTrainWheels() {
            clearInterval(wheelAnimInterval);
            flatbed.classList.remove('flatbed-wheel-spin');
        }

        function createSmoke() {
            const smoke = document.createElement('div');
            smoke.className = 'smoke puff';
            locomotive.appendChild(smoke);
            setTimeout(() => { smoke.remove(); }, 2500);
        }

        setInterval(() => {
            if (!isAnimating && bearEyesNormal.style.display !== 'none') {
                bearEyesNormal.style.display = 'none';
                bearEyesSad.style.display = 'block'; 
                setTimeout(() => {
                    bearEyesSad.style.display = 'none';
                    bearEyesNormal.style.display = 'block';
                }, 150);
            }
        }, 4000);

        document.getElementById('btn-prev').addEventListener('click', () => {
            if(!isAnimating) loadLevel(currentLevel - 1);
        });
        
        document.getElementById('btn-next').addEventListener('click', () => {
            if(!isAnimating) loadLevel(currentLevel + 1);
        });

        // Коментар: Старт гри
        loadLevel(0);

    </script>
</body>
</html>
