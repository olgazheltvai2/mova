<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фонетичний бенкет Грізлі: Версія ПРО</title>
<style>
    body { margin: 0; padding: 0; overflow: hidden; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; }
    
    #game-container {
        width: 100vw;
        height: 56.25vw; /* 16:9 Aspect Ratio */
        max-height: 100vh;
        max-width: 177.78vh;
        position: relative;
        background: #000;
        box-shadow: 0 0 50px rgba(0,0,0,0.8);
    }

    svg { width: 100%; height: 100%; display: block; }

    .nav-btn {
        position: absolute;
        bottom: 25px;
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, #ff9f43, #ee5253);
        border: 4px solid #333;
        border-radius: 20px;
        cursor: pointer;
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 6px 0 #333;
        color: white;
        font-size: 30px;
        transition: all 0.1s;
    }
    .nav-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #333; }
    #btn-prev { left: 30px; }
    #btn-next { right: 30px; }

    /* Прибрали CSS transition для transform, бо керуємо математично через JS */
    .food-item { cursor: pointer; filter: drop-shadow(4px 4px 4px rgba(0,0,0,0.4)); }
</style>
</head>
<body>

<div id="game-container">
    <button id="btn-prev" class="nav-btn">⬅</button>
    <button id="btn-next" class="nav-btn">➡</button>

    <svg id="canvas" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <radialGradient id="caveGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:#4834d4" />
                <stop offset="100%" style="stop-color:#130f40" />
            </radialGradient>
            
            <pattern id="woodPattern" x="0" y="0" width="200" height="100" patternUnits="userSpaceOnUse">
                <rect width="200" height="100" fill="#8e6e46"/>
                <path d="M0 20 Q 50 30, 100 20 T 200 20 M0 50 Q 50 60, 100 50 T 200 50 M0 80 Q 50 90, 100 80 T 200 80" stroke="#6d5434" fill="none" stroke-width="2"/>
            </pattern>
            
            <filter id="trueShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
                <feOffset dx="0" dy="12" result="offsetBlur" />
                <feFlood flood-color="#000000" flood-opacity="0.45" result="shadowColor" />
                <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
                <feMerge>
                    <feMergeNode in="shadow" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <pattern id="wallpaperPattern" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse">
                <path d="M75 10 A30 30 0 0 0 75 70 A30 30 0 0 0 75 10" fill="none" stroke="#8181ff" stroke-width="2" opacity="0.4"/>
                <circle cx="75" cy="40" r="3" fill="#8181ff" opacity="0.4"/>
                <path d="M20 100 A15 15 0 0 1 20 130" fill="none" stroke="#8181ff" stroke-width="1" opacity="0.3"/>
                <path d="M130 100 A15 15 0 0 1 130 130" fill="none" stroke="#8181ff" stroke-width="1" opacity="0.3"/>
                <circle cx="20" cy="115" r="1.5" fill="#8181ff" opacity="0.3"/>
                <circle cx="130" cy="115" r="1.5" fill="#8181ff" opacity="0.3"/>
            </pattern>
        </defs>

        <rect width="1600" height="900" fill="url(#caveGrad)"/>
        <rect width="1600" height="900" fill="url(#wallpaperPattern)"/>
        
        <rect x="150" y="80" width="1300" height="600" fill="#30336b" opacity="0.3" rx="20"/>
        
        <rect x="250" y="120" width="280" height="280" rx="10" fill="#fab1a0" stroke="#2c3e50" stroke-width="8"/>
        <line x1="390" y1="120" x2="390" y2="400" stroke="#2c3e50" stroke-width="8"/>
        <line x1="250" y1="260" x2="530" y2="260" stroke="#2c3e50" stroke-width="8"/>

        <rect id="word-board" x="750" y="100" width="650" height="200" rx="20" fill="#2d3436" stroke="#f1c40f" stroke-width="10"/>
        <text id="word-display" x="1075" y="225" text-anchor="middle" font-size="85" fill="white" font-family="Arial Black">ЯБЛУКО</text>

        <g id="monster" transform="translate(800, 720)" filter="url(#trueShadow)">
            <path id="body" d="M-140 0 C-210 -150, -160 -380, 0 -380 C160 -380, 210 -150, 140 0 Z" fill="#6c5ce7" stroke="#4834d4" stroke-width="6"/>
            <ellipse cx="0" cy="-120" rx="80" ry="100" fill="#a29bfe" opacity="0.6"/>
            
            <g id="eyes" transform="translate(0, -250)">
                <ellipse cx="-50" cy="0" rx="35" ry="45" fill="white" stroke="#333" stroke-width="4"/>
                <circle id="pupil-l" cx="-50" cy="0" r="14" fill="#333"/>
                <ellipse cx="50" cy="0" rx="35" ry="45" fill="white" stroke="#333" stroke-width="4"/>
                <circle id="pupil-r" cx="50" cy="0" r="14" fill="#333"/>
            </g>
            
            <g id="mouth-box" transform="translate(0, -140)">
                <path id="m-closed" d="M-75 0 Q 0 35, 75 0" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round"/>
                <path id="m-open" d="M-75 0 A75 85 0 0 0 75 0 Z" fill="#ff7675" stroke="#333" stroke-width="4" visibility="hidden"/>
                <path id="teeth" d="M-55 0 L-40 25 L-25 0 L-10 25 L5 0 L20 25 L35 0 L50 25 L65 0" fill="white" stroke="#333" visibility="hidden"/>
            </g>
            
            <path id="hand-l" d="M-150 -130 Q-200 -100, -180 -40" fill="none" stroke="#6c5ce7" stroke-width="20" stroke-linecap="round"/>
            <path id="hand-r" d="M150 -130 Q200 -100, 180 -40" fill="none" stroke="#6c5ce7" stroke-width="20" stroke-linecap="round"/>
        </g>

        <path d="M50 680 L1550 680 L1600 900 L0 900 Z" fill="url(#woodPattern)" stroke="#333" stroke-width="4"/>

        <g id="table-food"></g>
    </svg>
</div>

<script>
/**
 * КОД: Версія з Ідеальним Математичним Польотом та Монстром ЗА столом.
 */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const words = [
    "ЯБЛУКО", "КЛЮЧ", "ЄНОТ", "МАЯК", "СІМ'Я", "В'ЮН", "ШИЯ", "ЗАЄЦЬ", "ОБ'ЄМ", "ЮРБА",
    "ЯЛИНА", "ЮНГА", "ЄВРОПА", "МОЄ", "ВОЛЯ", "ЯМА", "ЮЛЯ", "ОЛЯ", "ПОДІЯ", "МАРІЯ",
    "М'ЯЧ", "ЮРІЙ", "ЯКІР", "ЛЯЛЬКА", "ТЮЛЬПАН", "ЛЮДИНА", "ПІСНЯ", "МОРЯК", "БУРЯК", "ЗОЗУЛЯ"
];

let wordIdx = 0;
let isEating = false;

// Точні координати центру рота Грізлі
const TARGET_X = 800;
const TARGET_Y = 580;

const foodGraphics = [
    `<g><circle r="35" fill="#ff4d4d" stroke="#333" stroke-width="2"/><path d="M0 -35 L5 -45" stroke="#8e6e46" stroke-width="4"/><path d="M3 -40 Q 15 -50, 22 -35 Z" fill="#2ecc71" stroke="#333"/></g>`, // Яблуко
    `<g><path d="M-35 -15 Q 0 25, 35 -15 L 30 -22 Q 0 10, -30 -22 Z" fill="#ffeaa7" stroke="#333" stroke-width="2"/><path d="M-35 -15 L-42 -22" stroke="#8e6e46" stroke-width="3"/></g>`, // Банан
    `<g><path d="M-35 -30 L35 -30 L0 35 Z" fill="#fab1a0" stroke="#333" stroke-width="2"/><path d="M-35 -30 L35 -30 L25 -30 L-25 -30 Z" fill="#e17055" stroke="#333" stroke-width="2"/><circle cx="0" cy="0" r="6" fill="#ff7675" stroke="#333"/><circle cx="-12" cy="-12" r="5" fill="#ff7675" stroke="#333"/></g>`, // Піца
    `<g><ellipse cx="0" cy="18" rx="35" ry="12" fill="#e67e22" stroke="#333" stroke-width="2"/><rect x="-35" y="5" width="70" height="13" rx="3" fill="#e74c3c" stroke="#333"/><path d="M-35 5 A35 25 0 0 1 35 5 Z" fill="#e67e22" stroke="#333"/></g>`, // Бургер
    `<g><circle r="32" fill="#fd79a8" stroke="#333" stroke-width="3"/><circle r="30" fill="#fd79a8" clip-path="circle(30px at 0 0)"/><circle r="12" fill="#fab1a0" stroke="#333" stroke-width="3"/></g>`, // Пончик
    `<g><path d="M-40 0 A40 40 0 0 0 40 0 Z" fill="#ff7675" stroke="#333" stroke-width="2"/><path d="M-40 0 A40 45 0 0 0 40 0 L 45 8 A45 50 0 0 1 -45 8 Z" fill="#2ecc71" stroke="#333" stroke-width="2"/><circle cx="-12" cy="12" r="2.5" fill="#333"/><circle cx="12" cy="18" r="2.5" fill="#333"/></g>`, // Кавун
    `<g><path d="M-15 0 L15 0 L0 45 Z" fill="#e67e22" stroke="#333"/><circle cy="-10" r="22" fill="#55efc4" stroke="#333"/><circle cy="-30" r="8" fill="#ff7675" stroke="#333"/></g>`, // Морозиво
    `<g><path d="M-25 30 L25 30 L30 0 L-30 0 Z" fill="#fab1a0" stroke="#333"/><path d="M-30 0 Q 0 -50, 30 0 Z" fill="#ffeaa7" stroke="#333"/><circle cy="-35" r="8" fill="#e74c3c" stroke="#333"/></g>`, // Кекс
    `<g><path d="M-40 0 Q -20 -25, 0 -25 T 40 0 T 0 25 T -40 0 Z" fill="#74b9ff" stroke="#333"/><path d="M40 0 L60 -20 V20 Z" fill="#0984e3" stroke="#333"/><circle cx="-25" cy="-5" r="3.5" fill="#333"/></g>`, // Риба
    `<g><path d="M-10 10 L-10 40 Q-20 50, -30 30 Z" fill="#fab1a0" stroke="#333"/><ellipse cx="18" cy="0" rx="35" ry="25" fill="#e67e22" stroke="#333" transform="rotate(-20)"/></g>`, // Ніжка
    `<g><rect x="-6" y="10" width="12" height="25" fill="#8e6e46" stroke="#333"/><circle r="22" cy="-5" fill="#2ecc71" stroke="#333"/><circle cx="-12" cy="12" r="16" fill="#2ecc71" stroke="#333"/><circle cx="12" cy="18" r="16" fill="#2ecc71" stroke="#333"/></g>`, // Брокколі
    `<g><path d="M-35 -20 L35 -20 L45 20 L-25 20 Z" fill="#f1c40f" stroke="#333" stroke-width="2"/><circle cx="0" cy="0" r="6" fill="#d35400" opacity="0.3"/></g>` // Сир
];

function init() {
    renderFood();
    updateWord();
    
    document.getElementById('btn-next').onclick = () => changeWord(1);
    document.getElementById('btn-prev').onclick = () => changeWord(-1);
    
    setInterval(blink, 4000); 
}

function renderFood() {
    const container = document.getElementById('table-food');
    container.innerHTML = '';
    
    foodGraphics.forEach((def, i) => {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "food-item");
        
        const x = 200 + (i % 6) * 240;
        const y = 780 + (i >= 6 ? 60 : -10); 
        
        g.dataset.x = x;
        g.dataset.y = y;
        
        g.setAttribute("transform", `translate(${x}, ${y})`);
        g.innerHTML = def + `<circle r="60" fill="transparent"/>`; 
        
        // Встановлюємо ефект збільшення при наведенні через JS
        g.onmouseenter = () => { if(!isEating) g.setAttribute("transform", `translate(${x}, ${y}) scale(1.1)`); };
        g.onmouseleave = () => { if(!isEating) g.setAttribute("transform", `translate(${x}, ${y}) scale(1)`); };
        g.onclick = () => feed(g);
        
        container.appendChild(g);
    });
}

function updateWord() {
    document.getElementById('word-display').textContent = words[wordIdx];
}

// Математичний політ
function feed(el) {
    if (isEating) return;
    isEating = true;

    const startX = parseFloat(el.dataset.x);
    const startY = parseFloat(el.dataset.y);

    playSound(440, 0.1, 'triangle');
    lookAt(TARGET_X - startX, TARGET_Y - startY);

    let startTime = null;
    const duration = 600; // Мілісекунди

    function animateFlight(timestamp) {
        if (!startTime) startTime = timestamp;
        let progress = (timestamp - startTime) / duration;
        if (progress > 1) progress = 1;

        // Плавність польоту (Cubic Ease-In-Out)
        const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;

        const currentX = startX + (TARGET_X - startX) * ease;
        const currentY = startY + (TARGET_Y - startY) * ease;
        const currentScale = 1 - (0.8 * ease); // Зменшуємо до 0.2
        const currentRotation = 720 * ease; // Крутиться 2 рази

        el.setAttribute("transform", `translate(${currentX}, ${currentY}) scale(${currentScale}) rotate(${currentRotation})`);
        el.style.opacity = 1 - (ease * 0.5);

        // Відкриваємо рот на половині шляху
        if (progress > 0.5 && document.getElementById('m-open').getAttribute('visibility') === 'hidden') {
            openMouth(true);
        }

        if (progress < 1) {
            requestAnimationFrame(animateFlight);
        } else {
            // Закінчення польоту
            if (el.parentNode) el.parentNode.removeChild(el);
            openMouth(false);
            lookAt(0, 0);
            
            chewCycle(4); 
            setTimeout(() => {
                changeWord(1);
                if (document.getElementById('table-food').children.length === 0) renderFood(); 
            }, 1200);
        }
    }

    requestAnimationFrame(animateFlight);
}

function chewCycle(count) {
    if (count <= 0) {
        playSound(220, 0.3, 'sine');
        isEating = false;
        return;
    }

    const mClosed = document.getElementById('m-closed');
    const teeth = document.getElementById('teeth');
    
    mClosed.setAttribute('d', count % 2 === 0 ? "M-75 0 Q 0 60, 75 0" : "M-75 0 Q 0 35, 75 0");
    teeth.setAttribute('visibility', count % 2 === 0 ? 'visible' : 'hidden');
    
    playCrunch();

    setTimeout(() => chewCycle(count - 1), 120);
}

function openMouth(open) {
    document.getElementById('m-closed').setAttribute('visibility', open ? 'hidden' : 'visible');
    document.getElementById('m-open').setAttribute('visibility', open ? 'visible' : 'hidden');
    document.getElementById('teeth').setAttribute('visibility', open ? 'visible' : 'hidden');
}

function changeWord(dir) {
    wordIdx = (wordIdx + dir + words.length) % words.length;
    updateWord();
}

function lookAt(dx, dy) {
    const lim = 18;
    const distance = Math.sqrt(dx*dx + dy*dy);
    const nx = distance > 0 ? (dx / distance) * lim : 0;
    const ny = distance > 0 ? (dy / distance) * lim : 0;
    
    document.getElementById('pupil-l').setAttribute('cx', -50 + nx);
    document.getElementById('pupil-l').setAttribute('cy', ny);
    document.getElementById('pupil-r').setAttribute('cx', 50 + nx);
    document.getElementById('pupil-r').setAttribute('cy', ny);
}

function blink() {
    const eyes = document.getElementById('eyes');
    eyes.style.opacity = '0.1';
    setTimeout(() => eyes.style.opacity = '1', 100);
}

function playSound(freq, dur, type) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function playCrunch() {
    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const g = audioCtx.createGain();
    g.gain.value = 0.05;
    src.connect(g); g.connect(audioCtx.destination);
    src.start();
}

init();
</script>
</body>
</html>
