<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinary Alphabet</title>
    <style>
        /* Глобальні стилі: один статичний колір фону (без анімації переливання) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Fredoka One', 'Comic Sans MS', cursive, sans-serif;
            background-color: #e15f41;
            /* Статичний патерн у вигляді клітинки (скатертина) для стилізації */
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.05) 75%, rgba(255,255,255,0.05)), 
                linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.05) 75%, rgba(255,255,255,0.05));
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* Декоративні елементи на фоні (овочі та спеції) */
        .floating-item {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            opacity: 0.6;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
        }
        .float-1 { top: 10%; left: 10%; animation: floatY 6s infinite ease-in-out; }
        .float-2 { top: 15%; right: 15%; animation: floatY 5s infinite ease-in-out reverse; }
        .float-3 { bottom: 15%; right: 10%; animation: floatY 7s infinite ease-in-out; }
        .float-4 { bottom: 25%; left: 12%; animation: floatY 6.5s infinite ease-in-out reverse; }

        @keyframes floatY {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Головна ігрова панель */
        #game-board {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 950px;
            height: 75%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0.25), rgba(255,255,255,0.05));
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Навігаційні кнопки - в правому нижньому куті */
        .nav-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 50;
        }

        .btn-nav {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 4px solid #fff;
            background: linear-gradient(135deg, #1dd1a1 0%, #10ac84 100%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 -4px 0 rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }
        .btn-nav:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 15px 25px rgba(0,0,0,0.4); }
        .btn-nav:active { transform: translateY(2px) scale(0.95); box-shadow: 0 5px 10px rgba(0,0,0,0.3); }

        /* Контейнер для карток */
        #cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            perspective: 1200px;
            width: 100%;
        }

        /* Картка зі словом */
        .card {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-radius: 15px;
            padding: 15px 30px;
            font-size: 36px;
            font-weight: 900;
            color: #d35400;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset 0 3px 5px rgba(255,255,255,0.8);
            border: 3px dashed #ff9f43;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 1px 1px 0 rgba(255,255,255,1);
            position: relative;
            transform-style: preserve-3d;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -10px; left: 50%;
            transform: translateX(-50%);
            width: 20px; height: 20px;
            background: #e74c3c;
            border-radius: 50%;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3);
        }

        .card.selected {
            transform: translateY(-20px) scale(1.1) rotate(2deg);
            box-shadow: 0 20px 30px rgba(0,0,0,0.3), 0 0 30px #1dd1a1;
            border-color: #1dd1a1;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            color: #00838f;
        }

        .first-letter { color: #c0392b; font-size: 48px; }
        .hidden-stars { color: #f39c12; letter-spacing: 3px; font-family: monospace; }
        .revealed-text { color: #2c3e50; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.3) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Кнопка перевірки */
        #check-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            border: 5px solid #fff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4), inset 0 -5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }
        #check-btn:hover { transform: scale(1.1) translateY(-5px); }
        #check-btn:active { transform: scale(0.9) translateY(5px); box-shadow: 0 5px 10px rgba(0,0,0,0.4); }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-3px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-10px, 0, 0); }
            40%, 60% { transform: translate3d(10px, 0, 0); }
        }

        .jump { animation: jump 0.6s cubic-bezier(0.28, 0.84, 0.42, 1) both; }
        @keyframes jump {
            0%, 100% { transform: translateY(0) scale(1) rotate(0); }
            50% { transform: translateY(-40px) scale(1.1) rotate(5deg); }
        }

        /* Персонаж: Кухар */
        #chef-container {
            position: absolute;
            bottom: 0%;
            left: 2%;
            width: 35vw;
            max-width: 350px;
            z-index: 25;
            pointer-events: none;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
        }

        /* Анімація погляду */
        .pupil {
            animation: shiftGaze 6s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
            transform-origin: center;
        }
        @keyframes shiftGaze {
            0%, 20% { transform: translate(0, 0); }
            30%, 50% { transform: translate(-4px, 2px); }
            60%, 80% { transform: translate(5px, -1px); }
            90%, 100% { transform: translate(0, 0); }
        }

        /* Анімація помішування */
        .arm-stir {
            animation: stirPot 2s infinite linear;
            transform-origin: 220px 170px;
        }
        @keyframes stirPot {
            0% { transform: rotate(0deg) translateX(0); }
            25% { transform: rotate(5deg) translateX(5px) translateY(5px); }
            50% { transform: rotate(0deg) translateX(10px); }
            75% { transform: rotate(-5deg) translateX(5px) translateY(-5px); }
            100% { transform: rotate(0deg) translateX(0); }
        }

        /* ТЕПЕР ПАРА РУХАЄТЬСЯ ЧІТКО ЗНИЗУ ВГОРУ */
        .steam {
            animation: riseStraight 2.5s infinite linear;
            opacity: 0;
            transform-origin: center bottom;
        }
        .steam:nth-child(2) { animation-delay: 0.8s; }
        .steam:nth-child(3) { animation-delay: 1.6s; }
        
        @keyframes riseStraight {
            0% { transform: translateY(20px) scale(0.8); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-160px) scale(1.3); opacity: 0; }
        }

    </style>
</head>
<body>

    <svg class="floating-item float-1" width="80" height="80" viewBox="0 0 100 100">
        <circle cx="50" cy="55" r="35" fill="#e74c3c"/>
        <path d="M40 25 Q50 15 60 25 Q65 35 50 35 Q35 35 40 25 Z" fill="#2ecc71"/>
        <path d="M50 25 L50 15" stroke="#27ae60" stroke-width="4" stroke-linecap="round"/>

    <svg class="floating-item float-3" width="100" height="100" viewBox="0 0 100 100">

        <path d="M85 10 Q95 0 90 -10 Q80 -5 80 5" fill="none" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>

        <path d="M40 60 L50 50" stroke="#d35400" stroke-width="3" stroke-linecap="round"/>

    </svg>

    <svg id="chef-container" viewBox="0 0 400 400">
        <g fill="none" stroke="#fff" stroke-linecap="round" filter="blur(4px)">
            <path class="steam" d="M290 270 Q310 210 290 150" stroke-width="14" />
            <path class="steam" d="M260 280 Q240 220 260 160" stroke-width="10" />

        </g>

        <path d="M60 400 L50 220 Q120 180 190 220 L180 400 Z" fill="#fdfbfb" stroke="#bdc3c7" stroke-width="5"/>
        <path d="M120 220 L120 400" stroke="#bdc3c7" stroke-width="4" stroke-dasharray="15 10"/>
        <circle cx="100" cy="250" r="6" fill="#2c3e50"/>
        <circle cx="100" cy="300" r="6" fill="#2c3e50"/>
        <circle cx="100" cy="350" r="6" fill="#2c3e50"/>
        <circle cx="140" cy="250" r="6" fill="#2c3e50"/>
        <circle cx="140" cy="300" r="6" fill="#2c3e50"/>
        <circle cx="140" cy="350" r="6" fill="#2c3e50"/>

        <circle cx="120" cy="150" r="55" fill="#fadcba" stroke="#e0ac69" stroke-width="3"/>

        <g id="eyes-group">
            <circle cx="100" cy="140" r="12" fill="#fff" stroke="#d35400" stroke-width="2"/>
            <circle cx="140" cy="140" r="12" fill="#fff" stroke="#d35400" stroke-width="2"/>
            <circle class="pupil" cx="100" cy="140" r="5" fill="#2c3e50"/>
            <circle class="pupil" cx="140" cy="140" r="5" fill="#2c3e50"/>
            <circle class="pupil" cx="98" cy="138" r="2" fill="#fff"/>
            <circle class="pupil" cx="138" cy="138" r="2" fill="#fff"/>
        </g>
        
        <path id="mouth" d="M105 170 Q120 185 135 170" fill="none" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
        
        <path d="M70 110 C40 100, 50 40, 90 40 C100 10, 150 10, 160 40 C200 40, 190 100, 170 110 Z" fill="#fff" stroke="#bdc3c7" stroke-width="4"/>
        <path d="M70 110 Q120 120 170 110 L160 130 Q120 140 80 130 Z" fill="#fdfbfb" stroke="#bdc3c7" stroke-width="3"/>

        <g id="left-arm">
            <path d="M65 230 Q30 270 60 320" fill="none" stroke="#fdfbfb" stroke-width="25" stroke-linecap="round"/>
            <path d="M65 230 Q30 270 60 320" fill="none" stroke="#bdc3c7" stroke-width="27" stroke-linecap="round" style="mix-blend-mode: multiply; opacity: 0.3;"/>
            <circle cx="60" cy="320" r="14" fill="#fadcba"/>
        </g>

        <ellipse cx="300" cy="280" rx="70" ry="20" fill="#2c3e50"/>
        <path d="M230 280 L240 380 Q300 400 360 380 L370 280 Z" fill="#34495e"/>
        <ellipse cx="300" cy="280" rx="60" ry="15" fill="#ff7979"/>
        <circle cx="280" cy="280" r="5" fill="#f1c40f"/>
        <circle cx="310" cy="275" r="4" fill="#2ecc71"/>
        <circle cx="260" cy="285" r="3" fill="#3498db"/>

        <g class="arm-stir">
            <path d="M180 230 Q240 210 260 180" fill="none" stroke="#fdfbfb" stroke-width="25" stroke-linecap="round"/>
            <path d="M180 230 Q240 210 260 180" fill="none" stroke="#bdc3c7" stroke-width="27" stroke-linecap="round" style="mix-blend-mode: multiply; opacity: 0.3;"/>
            <circle cx="265" cy="175" r="15" fill="#fadcba"/>
            <path d="M275 165 L295 280" stroke="#7f8c8d" stroke-width="8" stroke-linecap="round"/>
            <path d="M280 280 C270 300, 320 300, 310 280 Z" fill="#95a5a6"/>
        </g>
    </svg>

    <div id="game-board">
        <div id="cards-container"></div>
        
        <button id="check-btn" onclick="checkAnswer()">
            <svg viewBox="0 0 100 100" width="60" height="60">
                <path d="M20 70 Q50 20 80 70 Z" fill="#fff"/>
                <circle cx="50" cy="25" r="8" fill="#fff"/>
                <rect x="10" y="70" width="80" height="10" rx="5" fill="#fff"/>
            </svg>
        </button>
    </div>

    <div class="nav-controls">
        <button class="btn-nav" onclick="prevLevel()">
            <svg viewBox="0 0 24 24" width="36" height="36">
                <path d="M15 18L9 12L15 6" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <button class="btn-nav" onclick="nextLevel()">
            <svg viewBox="0 0 24 24" width="36" height="36">
                <path d="M9 18L15 12L9 6" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>

    <script>
        const sentences = [
            "Аліса весело малює осінній ранок",
            "Богдан довго крутить пухнастий светр",
            "Ввечері гості миють порожні тарілки",
            "Ганна дбайливо збирає опалі шишки",
            "Діти кидають листя на сніг",
            "Завтра клас малюватиме прекрасний сад",
            "Ірина купує літній м'який намет",
            "Корабель мореплавців обминає підводні скелі",
            "Літо малює нам прекрасні тюльпани",
            "Мама несе обід після роботи",
            "Назар обережно переносить розбиту склянку",
            "Олег пише старі тексти фарбами",
            "Потяг різко скидає темп уранці",
            "Роман старанно тренує футбольні хитрощі",
            "Сергій тихо усміхається фотографуючи хмари",
            "Тарас уважно фарбує холодну цеглу",
            "Учні фіксують хід цікавого читання",
            "Фотограф хоче цілком чарівний шедевр",
            "Хлопчик цікавиться чому шумить щітка",
            "Цей чоловік шукає щільний ящик"
        ];

        let currentLevel = 0;
        let currentWords = [];
        let selectedIndex = null;
        let isRevealed = false;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function soundClick() { playTone(700, 'sine', 0.1, 0.15); }
        function soundSwap() { playTone(900, 'triangle', 0.1, 0.1); }
        function soundSuccess() {
            playTone(523.25, 'sine', 0.15, 0.2); 
            setTimeout(() => playTone(659.25, 'sine', 0.15, 0.2), 100); 
            setTimeout(() => playTone(783.99, 'sine', 0.2, 0.2), 200); 
            setTimeout(() => playTone(1046.50, 'sine', 0.4, 0.2), 300); 
        }
        function soundError() {
            playTone(250, 'square', 0.2, 0.1);
            setTimeout(() => playTone(200, 'square', 0.3, 0.1), 150);
        }

        function loadLevel(level) {
            if(level < 0) level = sentences.length - 1;
            if(level >= sentences.length) level = 0;
            currentLevel = level;
            isRevealed = false;
            selectedIndex = null;
            
            setChefEmotion('normal');

            let originalWords = sentences[currentLevel].split(' ');
            currentWords = originalWords.map(w => ({ word: w }));
            
            for (let i = currentWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentWords[i], currentWords[j]] = [currentWords[j], currentWords[i]];
            }

            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            currentWords.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                if(index === selectedIndex) card.classList.add('selected');
                
                card.onclick = () => { if(!isRevealed) handleCardClick(index); };

                const firstL = item.word.charAt(0);
                const restStr = item.word.substring(1);

                if (isRevealed) {
                    card.innerHTML = `<span class="first-letter">${firstL}</span><span class="revealed-text">${restStr}</span>`;
                } else {
                    card.innerHTML = `<span class="first-letter">${firstL}</span><span class="hidden-stars">${'*'.repeat(restStr.length)}</span>`;
                }
                
                container.appendChild(card);
            });
        }

        function handleCardClick(index) {
            initAudio(); 
            if (selectedIndex === null) {
                soundClick();
                selectedIndex = index;
                renderCards();
            } else if (selectedIndex === index) {
                soundClick();
                selectedIndex = null;
                renderCards();
            } else {
                soundSwap();
                const temp = currentWords[selectedIndex];
                currentWords[selectedIndex] = currentWords[index];
                currentWords[index] = temp;
                selectedIndex = null;
                renderCards();
            }
        }

        function checkAnswer() {
            initAudio();
            if(isRevealed) return; 

            const correctWords = sentences[currentLevel].split(' ');
            let isCorrect = true;
            
            for(let i = 0; i < correctWords.length; i++) {
                if(currentWords[i].word !== correctWords[i]) {
                    isCorrect = false;
                    break;
                }
            }

            const container = document.getElementById('cards-container');
            
            if (isCorrect) {
                soundSuccess();
                isRevealed = true;
                setChefEmotion('happy');
                renderCards();
                
                const cards = document.querySelectorAll('.card');
                cards.forEach((c, i) => {
                    setTimeout(() => c.classList.add('jump'), i * 100);
                });

            } else {
                soundError();
                setChefEmotion('sad');
                container.classList.remove('shake');
                void container.offsetWidth; 
                container.classList.add('shake');
                
                setTimeout(() => setChefEmotion('normal'), 1500);
            }
        }

        function setChefEmotion(emotion) {
            const mouth = document.getElementById('mouth');
            const arm = document.querySelector('.arm-stir');
            
            if (emotion === 'happy') {
                mouth.setAttribute('d', 'M95 165 Q120 195 145 165'); 
                mouth.setAttribute('stroke', '#e74c3c');
                arm.style.animationDuration = '0.5s'; 
            } else if (emotion === 'sad') {
                mouth.setAttribute('d', 'M105 180 Q120 165 135 180');
                mouth.setAttribute('stroke', '#8e44ad');
                arm.style.animationDuration = '4s'; 
            } else {
                mouth.setAttribute('d', 'M105 170 Q120 185 135 170');
                mouth.setAttribute('stroke', '#c0392b');
                arm.style.animationDuration = '2s';
            }
        }

        function nextLevel() {
            soundClick();
            loadLevel(currentLevel + 1);
        }

        function prevLevel() {
            soundClick();
            loadLevel(currentLevel - 1);
        }

        window.onload = () => {
            loadLevel(0);
        };

    </script>
</body>
</html>
