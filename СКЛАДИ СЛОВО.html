<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --meadow-green: #7cfc00;
            --sky-blue: #87ceeb;
            --flower-pink: #ff69b4;
            --wool-white: #f5f5f5;
            --text-color: #3e2723;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--sky-blue);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-world {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Фон: Яскрава галявина з травою, квітами та хмаринками */
            background: 
                radial-gradient(circle at 10% 10%, rgba(255, 255, 100, 0.4) 0%, transparent 40%),
                linear-gradient(180deg, var(--sky-blue) 0%, #a0e6ff 40%, var(--meadow-green) 60%, #5cd65c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
        }

        /* Анімовані хмаринки */
        .cloud {
            position: absolute;
            fill: white;
            opacity: 0.8;
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.1));
            animation: float-cloud 15s linear infinite;
        }

        @keyframes float-cloud {
            0% { transform: translate(-200px, 0); }
            100% { transform: translate(calc(100vw + 200px), 0); }
        }

        /* Квіти на галявині */
        .flower {
            position: absolute;
            width: 30px;
            height: 30px;
            animation: sway-flower 4s ease-in-out infinite;
        }

        @keyframes sway-flower {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* Контейнер для складів */
        .word-dock {
            display: flex;
            gap: 25px;
            z-index: 20;
        }

        /* Пухнасті клубочки вовни */
        .syllable {
            width: 150px;
            height: 150px;
            background: var(--wool-white);
            border: 4px solid #d3d3d3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text-color);
            cursor: pointer;
            box-shadow: 0 10px 0 #b0b0b0;
            transition: all 0.2s;
            user-select: none;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
            /* Текстура вовни */
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M50 10 A40 40 0 1 1 40 12 L50 50 Z" fill="none" stroke="%23e0e0e0" stroke-width="2"/></svg>');
            animation: wobble-wool 3s ease-in-out infinite;
        }

        .syllable:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #b0b0b0;
        }

        .syllable.selected {
            background: linear-gradient(135deg, #aed581, #558b2f);
            border-color: #1b5e20;
            background-image: none;
        }

        @keyframes wobble-wool {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(2deg); }
        }

        /* Кнопки навігації */
        .nav-ui {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 100;
        }

        .btn {
            background: #a1887f;
            border: 3px solid #5d4037;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 0 #5d4037;
        }

        .btn:hover { background: #8d6e63; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #5d4037; }

        /* Овечка SVG */
        #sheep-container {
            width: 400px;
            height: 400px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-world">
    <svg class="cloud" style="top:10%; width:150px; animation-duration: 20s;" viewBox="0 0 100 100"><path d="M25 40 A15 15 0 1 1 35 30 A20 20 0 1 1 65 30 A15 15 0 1 1 75 40 A25 25 0 1 1 25 40 Z"/></svg>
    <svg class="cloud" style="top:25%; width:200px; animation-duration: 25s; animation-delay: -5s;" viewBox="0 0 100 100"><path d="M25 40 A15 15 0 1 1 35 30 A20 20 0 1 1 65 30 A15 15 0 1 1 75 40 A25 25 0 1 1 25 40 Z"/></svg>
    <svg class="flower" style="bottom:15%; left:20%;" viewBox="0 0 100 100"><path d="M50 10 A15 15 0 1 1 65 25 A15 15 0 1 1 50 40 A15 15 0 1 1 35 25 A15 15 0 1 1 50 10 Z" fill="%23ff69b4"/><circle cx="50" cy="25" r="5" fill="%23ffd700"/></svg>
    <svg class="flower" style="bottom:20%; right:25%;" viewBox="0 0 100 100"><path d="M50 10 A15 15 0 1 1 65 25 A15 15 0 1 1 50 40 A15 15 0 1 1 35 25 A15 15 0 1 1 50 10 Z" fill="%23ff69b4"/><circle cx="50" cy="25" r="5" fill="%23ffd700"/></svg>
    <svg class="flower" style="bottom:10%; left:50%;" viewBox="0 0 100 100"><path d="M50 10 A15 15 0 1 1 65 25 A15 15 0 1 1 50 40 A15 15 0 1 1 35 25 A15 15 0 1 1 50 10 Z" fill="%23ff69b4"/><circle cx="50" cy="25" r="5" fill="%23ffd700"/></svg>

    <div class="word-dock" id="syllables-box"></div>

    <div id="sheep-container">
        <svg viewBox="0 0 400 400" id="sheep-sean">
            <defs>
                <radialGradient id="wool-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="#e0e0e0" />
                </radialGradient>
            </defs>
            <path id="body" d="M100 200 A50 50 0 1 1 120 180 A60 60 0 1 1 180 180 A50 50 0 1 1 200 200 A60 60 0 1 1 180 220 A50 50 0 1 1 120 220 A60 60 0 1 1 100 200 Z" fill="url(#wool-grad)" stroke="#d3d3d3" stroke-width="2"/>
            <rect x="130" y="230" width="10" height="40" rx="5" fill="#a1887f"/>
            <rect x="160" y="230" width="10" height="40" rx="5" fill="#a1887f"/>
            <g id="head-group">
                <ellipse cx="115" cy="165" rx="10" ry="20" fill="#a1887f" transform="rotate(-30 115 165)"/>
                <ellipse cx="185" cy="165" rx="10" ry="20" fill="#a1887f" transform="rotate(30 185 165)"/>
                <ellipse cx="150" cy="180" rx="40" ry="50" fill="#a1887f"/>
                <path d="M110 140 Q 90 120 110 100 Q 130 120 110 140 Z" fill="#d3d3d3" stroke="#b0b0b0" stroke-width="2"/>
                <path d="M190 140 Q 210 120 190 100 Q 170 120 190 140 Z" fill="#d3d3d3" stroke="#b0b0b0" stroke-width="2"/>
                <circle cx="135" cy="170" r="8" fill="white" />
                <circle id="pupil-l" cx="137" cy="170" r="3" fill="black" />
                <circle cx="165" cy="170" r="8" fill="white" />
                <circle id="pupil-r" cx="167" cy="170" r="3" fill="black" />
                <path id="mouth" d="M140,200 Q150,210 160,200" stroke="white" stroke-width="2" fill="none" />
                <path d="M130 140 A20 20 0 1 1 150 130 A20 20 0 1 1 170 140 Z" fill="url(#wool-grad)" stroke="#d3d3d3" stroke-width="2"/>
            </g>
        </svg>
    </div>

    <div class="nav-ui">
        <button class="btn" id="prev">◀</button>
        <button class="btn" id="next">▶</button>
    </div>
</div>

<script>
    // 30 слів без однакових складів
    const levelData = [
        ["РИ", "БА"], ["КО", "ЗА"], ["СО", "ВА"], ["ЛИ", "СА"], ["ЗИ", "МА"],
        ["ЛІ", "ТО"], ["РУ", "КА"], ["НО", "ГА"], ["ПО", "ЛЕ"], ["КУ", "РКА"],
        ["ЖА", "БА"], ["СИ", "ЛА"], ["НО", "РА"], ["ГО", "РА"], ["КА", "ВА"],
        ["ВА", "ЗА"], ["МУ", "ХА"], ["ЛА", "ПА"], ["ДИ", "НЯ"], ["КУ", "ЛЯ"],
        ["ПИ", "ЛА"], ["СО", "ДА"], ["МИ", "ЛО"], ["ПЕ", "РО"], ["СА", "ДИ"],
        ["КІ", "НО"], ["НЕ", "БО"], ["ВО", "ДА"], ["МОР", "Е"], ["ФА", "РА"]
    ];

    let currentLvl = 0;
    let selectedSyllables = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Звукові ефекти (процедурні)
    function playSound(isWin) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (isWin) {
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.2);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            // Додати звук мекання
            setTimeout(() => {
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.type = 'triangle';
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            }, 100);
        } else {
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.type = 'sawtooth';
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            // Сумне мекання
            setTimeout(() => {
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.type = 'triangle';
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
            }, 100);
        }
        osc.start();
        osc.stop(audioCtx.currentTime + 0.6);
    }

    // Анімація овечки
    function sheepAnimate(state) {
        const mouth = document.getElementById('mouth');
        const pupils = [document.getElementById('pupil-l'), document.getElementById('pupil-r')];
        const body = document.getElementById('body');
        const head = document.getElementById('head-group');

        if (state === 'happy') {
            mouth.setAttribute('d', 'M135,195 Q150,215 165,195'); // Радісна посмішка
            pupils.forEach(p => p.setAttribute('r', '5'));
            body.style.transform = "translateY(-15px)";
            head.style.transform = "translateY(-10px) rotate(-5deg)";
            setTimeout(() => {
                mouth.setAttribute('d', 'M140,200 Q150,210 160,200');
                pupils.forEach(p => p.setAttribute('r', '3'));
                body.style.transform = "none";
                head.style.transform = "none";
            }, 1000);
        } else {
            document.getElementById('sheep-sean').style.transform = "translateX(20px)";
            pupils.forEach(p => p.setAttribute('r', '1'));
            mouth.setAttribute('d', 'M140,210 Q150,200 160,210'); // Сумний рот
            setTimeout(() => {
                document.getElementById('sheep-sean').style.transform = "none";
                pupils.forEach(p => p.setAttribute('r', '3'));
                mouth.setAttribute('d', 'M140,200 Q150,210 160,200');
            }, 200);
        }
    }

    function renderLevel() {
        const box = document.getElementById('syllables-box');
        box.innerHTML = '';
        selectedSyllables = [];
        
        const currentPair = levelData[currentLvl];
        // Перемішуємо, щоб не було завжди за порядком
        const displayParts = [...currentPair].sort(() => Math.random() - 0.5);

        displayParts.forEach(txt => {
            const div = document.createElement('div');
            div.className = 'syllable';
            div.innerText = txt;
            div.onclick = () => {
                if (div.classList.contains('selected')) return;
                div.classList.add('selected');
                selectedSyllables.push(txt);

                if (selectedSyllables.length === 2) {
                    checkAnswer();
                }
            };
            box.appendChild(div);
        });
    }

    function checkAnswer() {
        const word = levelData[currentLvl].join('');
        const attempt = selectedSyllables.join('');

        if (attempt === word) {
            playSound(true);
            sheepAnimate('happy');
            setTimeout(() => {
                if (currentLvl < levelData.length - 1) {
                    currentLvl++;
                    renderLevel();
                } else {
                    document.getElementById('syllables-box').innerHTML = "🐑🌟🐑";
                }
            }, 1000);
        } else {
            playSound(false);
            sheepAnimate('sad');
            setTimeout(() => {
                document.querySelectorAll('.syllable').forEach(s => s.classList.remove('selected'));
                selectedSyllables = [];
            }, 600);
        }
    }

    // Кнопки
    document.getElementById('next').onclick = () => {
        currentLvl = (currentLvl + 1) % levelData.length;
        renderLevel();
    };
    document.getElementById('prev').onclick = () => {
        currentLvl = (currentLvl - 1 + levelData.length) % levelData.length;
        renderLevel();
    };

    renderLevel();
</script>
</body>
</html>
